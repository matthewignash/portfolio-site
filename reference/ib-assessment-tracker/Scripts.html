<script>
    // ================================================================
    // Global state
    // ================================================================
    var APP = {
      user: null,
      currentPanel: null,
      panelInitialized: {}
    };

    // View-as-Student state (Story 16)
    var VAS = {
      active: false,
      originalUser: null,
      studentKey: null,
      studentInfo: null,
      allStudents: null,
      hashListener: null
    };

    // Hash → panel ID mapping per role
    var HASH_MAP = {
      teacher: {
        "grading":      "panel-grading",
        "exam-viewer":  "panel-exam-viewer",
        "dashboard":    "panel-dashboard",
        "overview":     "panel-overview",
        "builder":      "panel-builder",
        "reports":      "panel-reports"
      },
      student: {
        "dashboard": "panel-student-dashboard",
        "exams":     "panel-student-exams"
      }
    };

    // Default panel per role
    var DEFAULT_HASH = {
      teacher: "grading",
      student: "dashboard"
    };

    // ================================================================
    // Initialization
    // ================================================================
    document.addEventListener("DOMContentLoaded", function() {
      // Parse server-injected userData
      try {
        var el = document.getElementById("user-data");
        APP.user = JSON.parse(el.textContent);
      } catch (e) {
        APP.user = { role: "none" };
      }

      var role = APP.user.role || "none";

      setupHeader(role);
      configureNav(role);
      setupHashRouting(role);

      // Navigate to initial panel
      var hash = window.location.hash.replace("#", "");
      if (hash && isValidHash(hash, role)) {
        showPanelForHash(hash, role);
      } else if (role === "none") {
        showAccessDenied();
      } else {
        var defaultHash = DEFAULT_HASH[role] || "";
        if (defaultHash) {
          window.location.hash = defaultHash;
          showPanelForHash(defaultHash, role);
        }
      }
    });

    // ================================================================
    // Header setup
    // ================================================================
    function setupHeader(role) {
      var el = document.getElementById("header-user-info");
      if (!el) return;

      if (role === "none") {
        el.innerHTML = '<span class="role-badge none">No Access</span>';
        return;
      }

      var name = APP.user.name || "";
      var roleLabel = role === "teacher" ? "Teacher" : "Student";
      var html = "";

      if (name) {
        html += '<span class="user-name">' + escapeHtml(name) + '</span>';
      }
      html += '<span class="role-badge ' + role + '">' + roleLabel + '</span>';

      // Level badge for students (derived from class_section)
      if (role === "student" && APP.user.class_section) {
        var cs = APP.user.class_section.toUpperCase();
        if (cs.indexOf("HL") !== -1) {
          html += '<span class="level-badge hl">HL</span>';
        } else if (cs.indexOf("SL") !== -1) {
          html += '<span class="level-badge sl">SL</span>';
        }
      }

      el.innerHTML = html;

      // Show View-as-Student toggle for teachers
      var vasBtn = document.getElementById("vas-toggle-btn");
      if (vasBtn) vasBtn.style.display = (role === "teacher" && !VAS.active) ? "" : "none";
    }

    // ================================================================
    // Navigation configuration
    // ================================================================
    function configureNav(role) {
      var buttons = document.querySelectorAll(".app-nav button");
      for (var i = 0; i < buttons.length; i++) {
        var btn = buttons[i];
        var teacherOnly = btn.getAttribute("data-teacher-only") === "true";
        var studentOnly = btn.getAttribute("data-student-only") === "true";

        if (role === "none") {
          btn.style.display = "none";
        } else if (role === "teacher") {
          btn.style.display = studentOnly ? "none" : "";
        } else if (role === "student") {
          btn.style.display = teacherOnly ? "none" : (studentOnly ? "" : "none");
        }

        // Wire up click handler
        (function(b) {
          b.addEventListener("click", function() {
            var hash = b.getAttribute("data-hash");
            if (hash) {
              window.location.hash = hash;
            }
          });
        })(btn);
      }
    }

    // ================================================================
    // Hash routing
    // ================================================================
    function setupHashRouting(role) {
      if (VAS.hashListener) {
        window.removeEventListener("hashchange", VAS.hashListener);
      }
      VAS.hashListener = function() {
        var hash = window.location.hash.replace("#", "");
        if (hash && isValidHash(hash, role)) {
          showPanelForHash(hash, role);
        }
      };
      window.addEventListener("hashchange", VAS.hashListener);
    }

    function isValidHash(hash, role) {
      var map = HASH_MAP[role];
      return map && map[hash] !== undefined;
    }

    function showPanelForHash(hash, role) {
      var map = HASH_MAP[role];
      if (!map || !map[hash]) return;
      var panelId = map[hash];
      showPanel(panelId, hash);
    }

    // ================================================================
    // Panel management
    // ================================================================
    function showPanel(panelId, hash) {
      // Hide all panels
      var panels = document.querySelectorAll(".panel");
      for (var i = 0; i < panels.length; i++) {
        panels[i].classList.remove("active");
      }

      // Deactivate all nav buttons
      var buttons = document.querySelectorAll(".app-nav button");
      for (var j = 0; j < buttons.length; j++) {
        buttons[j].classList.remove("active");
      }

      // Show target panel
      var panel = document.getElementById(panelId);
      if (panel) {
        panel.classList.add("active");
        APP.currentPanel = panelId;
      }

      // Activate matching nav button(s) by hash
      if (hash) {
        for (var k = 0; k < buttons.length; k++) {
          if (buttons[k].getAttribute("data-hash") === hash &&
              buttons[k].style.display !== "none") {
            buttons[k].classList.add("active");
          }
        }
      }

      // Lazy init: call panel-specific init function if exists
      if (!APP.panelInitialized[panelId]) {
        APP.panelInitialized[panelId] = true;
        // Convert "panel-exam-viewer" → "examViewerInit"
        var fnName = panelId
          .replace("panel-", "")
          .replace(/-([a-z])/g, function(m, c) { return c.toUpperCase(); }) + "Init";
        if (typeof window[fnName] === "function") {
          window[fnName]();
        }
      }
    }

    function showAccessDenied() {
      // Show denied email
      var emailEl = document.getElementById("denied-email");
      if (emailEl && APP.user.email) {
        emailEl.innerHTML = 'Signed in as: <span class="email">' +
          escapeHtml(APP.user.email) + '</span>';
      }
      showPanel("panel-access-denied", null);
    }

    // ================================================================
    // Toast notifications
    // ================================================================
    function showToast(message, type) {
      type = type || "info";
      var container = document.getElementById("toast-container");
      if (!container) return;

      var toast = document.createElement("div");
      toast.className = "toast toast-" + type;
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(function() {
        toast.style.opacity = "0";
        setTimeout(function() {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 300);
      }, 4000);
    }

    // ================================================================
    // Utility
    // ================================================================
    function escapeHtml(str) {
      var div = document.createElement("div");
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function renderChem(text) {
      if (!text || typeof katex === "undefined") return escapeHtml(text || "");
      return escapeHtml(text).replace(/\$(.+?)\$/g, function(_, expr) {
        try { return katex.renderToString(expr, { throwOnError: false }); }
        catch(e) { return expr; }
      });
    }

    // ================================================================
    // Student Dashboard Module (SD) — Story 2
    // ================================================================
    var SD = {
      initialized: false,
      data: null,
      trendData: null,
      exams: null,
      currentExamId: null,
      viewMode: "summary",
      expandedCategories: {},
      expandedGroups: {},
      expandedSubtopics: {},
      strandExpanded: {}
    };

    /** Called by lazy-init system when panel-student-dashboard first shows */
    function studentDashboardInit() {
      if (SD.initialized) return;
      SD.initialized = true;

      if (!APP.user || !APP.user.student_key) {
        sdShowError("Your student profile could not be loaded. Please contact your teacher.");
        return;
      }

      // Fetch bootstrap data for exam list
      sdShowLoading(true);
      var sdBootRunner_ = google.script.run
        .withSuccessHandler(function(boot) {
          SD.exams = boot.exams || [];
          var activeId = boot.active_exam_id || "";

          // Filter to exams matching student's class_section (or show all)
          var cs = (APP.user.class_section || "").toUpperCase();
          var filtered = SD.exams.filter(function(e) {
            var ecs = String(e.class_section || "").toUpperCase();
            return !ecs || ecs === cs || cs.indexOf(ecs) !== -1 || ecs.indexOf(cs) !== -1;
          });
          if (filtered.length === 0) filtered = SD.exams;

          // Populate exam selector
          if (filtered.length > 1) {
            var sel = document.getElementById("sd-exam-select");
            sel.innerHTML = "";
            filtered.forEach(function(e) {
              var opt = document.createElement("option");
              opt.value = e.exam_id;
              opt.textContent = e.exam_name + (e.level ? " (" + e.level + ")" : "");
              sel.appendChild(opt);
            });
            // Select active exam if in list
            var pick = filtered.find(function(e) { return e.exam_id === activeId; });
            if (pick) sel.value = pick.exam_id;
            document.getElementById("sd-exam-selector").style.display = "";
          }

          // Load dashboard for active or first exam
          var examId = activeId;
          if (!filtered.find(function(e) { return e.exam_id === examId; })) {
            examId = filtered.length > 0 ? filtered[0].exam_id : "";
          }

          if (!examId) {
            sdShowLoading(false);
            sdShowEmpty("No exams found for your class.");
            return;
          }

          SD.currentExamId = examId;
          sdLoadExam(examId);
        })
        .withFailureHandler(function(err) {
          sdShowLoading(false);
          sdShowError("Failed to load exams: " + (err.message || err));
        });
      // Story 16: Route to teacher endpoint when in VAS mode
      if (VAS.active) {
        sdBootRunner_.webapp_bootstrapAsStudent(VAS.studentKey);
      } else {
        sdBootRunner_.webapp_bootstrap();
      }
    }

    // --- Data loading ---
    function sdLoadExam(examId) {
      SD.currentExamId = examId;
      SD.data = null;
      SD.expandedCategories = {};
      SD.expandedGroups = {};
      SD.expandedSubtopics = {};
      SD.strandExpanded = {};

      sdShowLoading(true);
      sdHideAll();

      var sdExamRunner_ = google.script.run
        .withSuccessHandler(function(data) {
          sdShowLoading(false);
          if (!data || !data.scores) {
            sdShowEmpty("No scores available for this exam yet.");
            return;
          }
          SD.data = data;
          sdRenderDashboard(data);
        })
        .withFailureHandler(function(err) {
          sdShowLoading(false);
          sdShowError("Failed to load dashboard: " + (err.message || err));
        });
      // Story 16: Route to teacher endpoint when in VAS mode
      if (VAS.active) {
        sdExamRunner_.webapp_previewStudentView(examId, VAS.studentKey);
      } else {
        sdExamRunner_.webapp_getStudentDashboard(examId);
      }
    }

    function sdSelectExam(examId) {
      SD.viewMode = "summary";
      sdUpdateViewButtons();
      sdLoadExam(examId);
    }

    // --- View switching ---
    function sdSetView(mode) {
      SD.viewMode = mode;
      sdUpdateViewButtons();

      document.getElementById("sd-summary").style.display = mode === "summary" ? "" : "none";
      document.getElementById("sd-topics").style.display = mode === "topics" ? "" : "none";
      document.getElementById("sd-trend").style.display = mode === "trend" ? "" : "none";

      if (mode === "topics" && SD.data) {
        sdRenderTopicTree(SD.data);
      }
      if (mode === "trend" && !SD.trendData) {
        sdLoadTrend();
      }
    }

    function sdUpdateViewButtons() {
      var modes = ["summary", "topics", "trend"];
      modes.forEach(function(m) {
        var btn = document.getElementById("sd-btn-" + m);
        if (btn) btn.className = "sd-view-btn" + (SD.viewMode === m ? " active" : "");
      });
    }

    function sdLoadTrend() {
      var el = document.getElementById("sd-trend-content");
      el.innerHTML = '<div class="sd-loading">Loading exam history...</div>';

      var sdTrendRunner_ = google.script.run
        .withSuccessHandler(function(data) {
          SD.trendData = data || [];
          sdRenderTrend(SD.trendData);
        })
        .withFailureHandler(function(err) {
          el.innerHTML = '<div class="sd-error">Failed to load trend data: ' + escapeHtml(err.message || String(err)) + '</div>';
        });
      // Story 16: Route to teacher endpoint when in VAS mode
      if (VAS.active) {
        sdTrendRunner_.webapp_getStudentTrendDataAsTeacher(VAS.studentKey);
      } else {
        sdTrendRunner_.webapp_getStudentTrendData();
      }
    }

    // --- Render orchestrator ---
    function sdRenderDashboard(data) {
      document.getElementById("sd-view-toggle").style.display = "";
      sdRenderScoreHero(data);
      sdRenderPapers(data);
      sdRenderStrands(data);

      // Show summary view by default
      document.getElementById("sd-summary").style.display = SD.viewMode === "summary" ? "" : "none";
      document.getElementById("sd-topics").style.display = SD.viewMode === "topics" ? "" : "none";
      document.getElementById("sd-trend").style.display = SD.viewMode === "trend" ? "" : "none";

      if (SD.viewMode === "topics") sdRenderTopicTree(data);
    }

    // --- Score hero ---
    function sdRenderScoreHero(data) {
      var s = data.scores;
      var exam = data.exam || {};
      var gradeNum = parseInt(s.ib_grade, 10) || 0;
      var gradeClass = gradeNum >= 1 && gradeNum <= 7 ? "sd-grade-" + gradeNum : "";

      var html = '<div class="sd-score-hero">';
      // IB Grade circle
      html += '<div style="text-align:center;">';
      html += '<div class="sd-ib-grade ' + gradeClass + '">' + (s.ib_grade || "-") + '</div>';
      html += '<div class="sd-ib-grade-label">IB Grade</div>';
      html += '</div>';
      // Total score
      html += '<div>';
      html += '<div class="sd-hero-total">' + s.total_points + '/' + s.total_possible;
      html += '<span class="sd-pts-label"> pts</span></div>';
      html += '</div>';
      // Exam info
      html += '<div class="sd-hero-meta">';
      html += '<div class="sd-hero-exam">' + escapeHtml(exam.exam_name || "") + '</div>';
      if (exam.level) {
        html += '<div class="sd-hero-level">' + escapeHtml(exam.level) + ' Level';
        if (exam.term) html += ' &middot; ' + escapeHtml(exam.term);
        html += '</div>';
      }
      html += '</div>';
      html += '</div>';

      document.getElementById("sd-score-hero").innerHTML = html;
    }

    // --- Paper breakdown cards ---
    function sdRenderPapers(data) {
      var s = data.scores;
      var papers = [
        { name: "Paper 1A", earned: s.paper_1a_earned, possible: s.paper_1a_possible },
        { name: "Paper 1B", earned: s.paper_1b_earned, possible: s.paper_1b_possible },
        { name: "Paper 2",  earned: s.paper_2_earned,  possible: s.paper_2_possible }
      ];

      var html = '<div class="sd-papers-grid">';
      papers.forEach(function(p) {
        var pct = p.possible > 0 ? Math.min(100, Math.round(p.earned / p.possible * 100)) : 0;
        html += '<div class="sd-paper-card">';
        html += '<h4>' + p.name + '</h4>';
        html += '<div class="sd-paper-score">' + p.earned + '/' + p.possible;
        html += '<span class="sd-pts-label"> pts</span></div>';
        html += '<div class="sd-progress"><div class="sd-progress-fill" style="width:' + pct + '%"></div></div>';
        html += '</div>';
      });
      html += '</div>';

      document.getElementById("sd-papers").innerHTML = html;
    }

    // --- Strand band cards ---
    function sdRenderStrands(data) {
      var s = data.scores;
      var descs = data.strandDescriptions || {};
      var strands = [
        { key: "KU", name: descs.KU || "Knowledge & Understanding", points: s.ku_points, possible: s.ku_possible, band: s.ku_band, language: s.ku_language },
        { key: "TT", name: descs.TT || "Thinking & Transfer", points: s.tt_points, possible: s.tt_possible, band: s.tt_band, language: s.tt_language },
        { key: "C",  name: descs.C || "Communication", points: s.c_points, possible: s.c_possible, band: s.c_band, language: s.c_language }
      ];

      var html = '<div class="sd-strands-grid">';
      strands.forEach(function(st) {
        var bandNum = parseInt(st.band, 10) || 0;
        var bandClass = bandNum >= 1 && bandNum <= 8 ? "sd-band-" + bandNum : "";
        var pct = st.possible > 0 ? Math.min(100, Math.round(st.points / st.possible * 100)) : 0;
        var isExpanded = SD.strandExpanded[st.key];
        var shortLang = sdFirstSentence(st.language);

        html += '<div class="sd-strand-card' + (isExpanded ? " expanded" : "") + '" onclick="sdToggleStrand(\'' + st.key + '\')">';
        html += '<div class="sd-strand-header">';
        html += '<div class="sd-strand-name">' + escapeHtml(st.key) + '</div>';
        html += '<div class="sd-band-num ' + bandClass + '">' + (st.band || "-") + '</div>';
        html += '</div>';
        html += '<div class="sd-strand-score">' + st.points + '/' + st.possible + ' pts</div>';
        html += '<div class="sd-progress"><div class="sd-progress-fill" style="width:' + pct + '%"></div></div>';
        if (st.language) {
          html += '<div class="sd-strand-desc">';
          html += '<div class="sd-strand-desc-short">' + escapeHtml(shortLang) + '</div>';
          html += '<div class="sd-strand-desc-full">' + escapeHtml(st.language) + '</div>';
          html += '<div class="sd-expand-hint">' + (isExpanded ? "Click to collapse" : "Click to read more") + '</div>';
          html += '</div>';
        }
        html += '<div style="font-size:11px;color:#9ca3af;margin-top:6px;">' + escapeHtml(st.name) + '</div>';
        html += '</div>';
      });
      html += '</div>';

      document.getElementById("sd-strands").innerHTML = html;
    }

    function sdToggleStrand(key) {
      SD.strandExpanded[key] = !SD.strandExpanded[key];
      if (SD.data) sdRenderStrands(SD.data);
    }

    function sdFirstSentence(text) {
      if (!text) return "";
      var match = text.match(/^[^.!?]+[.!?]/);
      return match ? match[0] : text.substring(0, 120) + (text.length > 120 ? "..." : "");
    }

    // --- Topic tree ---
    function sdRenderTopicTree(data) {
      var ta = data.topicAnalysis;
      if (!ta || !ta.byCategory || ta.byCategory.length === 0) {
        document.getElementById("sd-topic-tree").innerHTML =
          '<div class="sd-empty">No topic data available for this exam.</div>';
        return;
      }

      var html = '<div class="sd-topic-tree">';
      ta.byCategory.forEach(function(cat) {
        var catKey = "cat-" + cat.category;
        var catExp = SD.expandedCategories[catKey];

        html += '<div class="sd-topic-category">';
        // Category header
        html += '<div class="sd-expandable sd-cat-header' + (catExp ? " expanded" : "") + '" onclick="sdToggleCategory(\'' + catKey + '\')">';
        html += '<span class="sd-expand-name">' + escapeHtml(cat.category) + '</span>';
        html += '<span class="sd-expand-score">' + cat.earned + '/' + cat.possible + ' pts</span>';
        html += '</div>';

        // Category children (groups)
        html += '<div class="sd-children' + (catExp ? " expanded" : "") + '">';
        (cat.topicGroups || []).forEach(function(grp) {
          var grpKey = "grp-" + grp.group;
          var grpExp = SD.expandedGroups[grpKey];

          // Group header
          html += '<div class="sd-expandable sd-group-header' + (grpExp ? " expanded" : "") + '" onclick="sdToggleGroup(\'' + grpKey + '\')">';
          html += '<span class="sd-expand-name">' + escapeHtml(grp.group) + ': ' + escapeHtml(sdShortGroupDesc(grp.groupDescription)) + '</span>';
          html += '<span class="sd-expand-score">' + grp.earned + '/' + grp.possible + ' pts</span>';
          html += '</div>';

          // Group children (subtopics)
          html += '<div class="sd-children' + (grpExp ? " expanded" : "") + '">';
          (grp.subtopics || []).forEach(function(sub) {
            html += '<div class="sd-subtopic-row">';
            html += '<span class="sd-subtopic-code td-clickable" onclick="event.stopPropagation(); tdOpenStudent(\'' + escapeHtml(sub.topic) + '\', \'' + escapeHtml(SD.currentExamId || "") + '\')">' + escapeHtml(sub.topic) + '</span>';
            html += '<span class="sd-subtopic-desc">' + escapeHtml(sub.description || "") + '</span>';
            html += '<span class="sd-subtopic-score">' + sub.earned + '/' + sub.possible + ' pts</span>';
            html += '</div>';
          });
          html += '</div>'; // end group children
        });
        html += '</div>'; // end category children
        html += '</div>'; // end topic-category
      });
      html += '</div>';

      document.getElementById("sd-topic-tree").innerHTML = html;
    }

    function sdShortGroupDesc(desc) {
      if (!desc) return "";
      // Strip the "Structure X: " or "Reactivity X: " prefix for compact display
      var match = desc.match(/^(?:Structure|Reactivity)\s+\d+:\s*(.+)/);
      return match ? match[1] : desc;
    }

    function sdToggleCategory(key) {
      SD.expandedCategories[key] = !SD.expandedCategories[key];
      if (SD.data) sdRenderTopicTree(SD.data);
    }

    function sdToggleGroup(key) {
      SD.expandedGroups[key] = !SD.expandedGroups[key];
      if (SD.data) sdRenderTopicTree(SD.data);
    }

    // --- Trend view ---
    function sdRenderTrend(trendData) {
      var el = document.getElementById("sd-trend-content");

      if (!trendData || trendData.length === 0) {
        el.innerHTML = '<div class="sd-empty">No exam history available yet.</div>';
        return;
      }

      var html = '<div class="sd-trend-card">';
      html += '<h3>Exam History</h3>';
      html += '<table class="sd-trend-table">';
      html += '<thead><tr>';
      html += '<th>Exam</th><th>Level</th><th>Total</th><th>IB Grade</th>';
      html += '<th>KU</th><th>TT</th><th>C</th>';
      html += '</tr></thead><tbody>';

      trendData.forEach(function(row) {
        var gradeNum = parseInt(row.ib_grade, 10) || 0;
        var gradeClass = gradeNum >= 1 && gradeNum <= 7 ? "sd-grade-" + gradeNum : "";

        html += '<tr>';
        html += '<td><strong>' + escapeHtml(row.exam_name) + '</strong></td>';
        html += '<td>';
        if (row.level) {
          var lvlClass = row.level.toUpperCase() === "HL" ? "hl" : "sl";
          html += '<span class="level-badge ' + lvlClass + '">' + escapeHtml(row.level) + '</span>';
        }
        html += '</td>';
        html += '<td>' + row.total_points + ' pts</td>';
        html += '<td><span class="sd-ib-grade ' + gradeClass + '" style="width:28px;height:28px;font-size:14px;">' + (row.ib_grade || "-") + '</span></td>';
        html += '<td>' + sdBandBadge(row.ku_band) + '</td>';
        html += '<td>' + sdBandBadge(row.tt_band) + '</td>';
        html += '<td>' + sdBandBadge(row.c_band) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div>';

      // IB Grade trend chart (Story 12)
      if (trendData.length > 1) {
        html += '<div class="sp-chart-section" style="margin-top:20px;">';
        html += '<div class="sp-chart-title">IB Grade Trend</div>';
        html += '<canvas id="sd-trend-chart" class="sp-chart-canvas" height="160"></canvas>';
        html += '</div>';
      }

      el.innerHTML = html;

      if (trendData.length > 1) {
        setTimeout(function() { sdDrawTrendChart(trendData); }, 50);
      }
    }

    function sdDrawTrendChart(trendData) {
      var canvas = document.getElementById("sd-trend-chart");
      if (!canvas || !trendData.length) return;

      var ctx = canvas.getContext("2d");
      var dpr = window.devicePixelRatio || 1;
      var w = canvas.parentElement.clientWidth || 400;
      var h = 160;

      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.scale(dpr, dpr);

      var padding = { top: 20, right: 20, bottom: 30, left: 40 };
      var plotW = w - padding.left - padding.right;
      var plotH = h - padding.top - padding.bottom;

      var yMin = 1, yMax = 7;

      // Grid lines
      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 1;
      for (var g = yMin; g <= yMax; g++) {
        var gy = padding.top + plotH - ((g - yMin) / (yMax - yMin)) * plotH;
        ctx.beginPath();
        ctx.moveTo(padding.left, gy);
        ctx.lineTo(padding.left + plotW, gy);
        ctx.stroke();

        ctx.fillStyle = "#9ca3af";
        ctx.font = "11px sans-serif";
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillText(String(g), padding.left - 6, gy);
      }

      // Plot points
      var points = trendData.map(function(row, i) {
        var grade = parseInt(row.ib_grade, 10) || 0;
        var x = padding.left + (trendData.length === 1 ? plotW / 2 : (i / (trendData.length - 1)) * plotW);
        var y = grade >= yMin ? padding.top + plotH - ((grade - yMin) / (yMax - yMin)) * plotH : padding.top + plotH;
        return { x: x, y: y, grade: grade, name: row.exam_name };
      });

      // Line
      if (points.length > 1) {
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (var i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();
      }

      // Dots
      points.forEach(function(p) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = "#3b82f6";
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
      });

      // X-axis labels
      ctx.fillStyle = "#6b7280";
      ctx.font = "10px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      points.forEach(function(p) {
        var label = p.name;
        if (label.length > 12) label = label.substring(0, 10) + "\u2026";
        ctx.fillText(label, p.x, padding.top + plotH + 6);
      });
    }

    var SE = {

    /**
     * Lazy init — called when panel-student-exams first shown.
     * The showPanel() auto-naming converts "panel-student-exams" → "studentExamsInit".
     */
    function studentExamsInit() {
      if (SE.initialized) return;
      SE.initialized = true;

      seShowLoading(true);

      // Fetch bootstrap data for exam list
      var seBootRunner_ = google.script.run
        .withSuccessHandler(function(result) {
          var exams = (result && result.exams) || [];
          var activeId = (result && result.active_exam_id) || "";
          SE.exams = exams;

          if (!exams.length) {
            seShowLoading(false);
            seShowEmpty("No exams available yet.");
            return;
          }

          // Populate exam selector
          sePopulateExamSelector(exams, activeId);

          // Load the active exam (or first), or pending nav from TD modal
          var examId = activeId || String(exams[0].exam_id || "");
          if (TD._pendingExamNav) {
            examId = TD._pendingExamNav;
            TD._pendingExamNav = null;
            var selEl = document.getElementById("se-exam-select");
            if (selEl) selEl.value = examId;
          }
          seLoadExam(examId);
        })
        .withFailureHandler(function(err) {
          seShowLoading(false);
          seShowError("Failed to load exams: " + (err.message || err));
        });
      // Story 16: Route to teacher endpoint when in VAS mode
      if (VAS.active) {
        seBootRunner_.webapp_bootstrapAsStudent(VAS.studentKey);
      } else {
        seBootRunner_.webapp_bootstrap();
      }
    }

    function sePopulateExamSelector(exams, activeId) {
      var sel = document.getElementById("se-exam-select");
      if (!sel) return;
      sel.innerHTML = "";
      exams.forEach(function(e) {
        var opt = document.createElement("option");
        opt.value = String(e.exam_id || "");
        opt.textContent = String(e.exam_name || e.exam_id || "");
        if (String(e.exam_id) === String(activeId)) opt.selected = true;
        sel.appendChild(opt);
      });
      // Show selector only if multiple exams
      document.getElementById("se-exam-selector").style.display =
        exams.length > 1 ? "" : "none";
    }

    function seSelectExam(examId) {
      if (!examId || examId === SE.currentExamId) return;
      seLoadExam(examId);
    }

    function seLoadExam(examId) {
      SE.currentExamId = examId;
      SE.paperCollapsed = {};
      seShowLoading(true);
      seHideContent();

      var seExamRunner_ = google.script.run
        .withSuccessHandler(function(data) {
          seShowLoading(false);
          if (!data || !data.scores) {
            seShowEmpty("No results available for this exam yet.");
            return;
          }
          SE.data = data;
          // Story 13: Store question content if show_questions is enabled
          SE.questionContent = data.showQuestions ? (data.questionContent || null) : null;
          seRenderExam(data);
        })
        .withFailureHandler(function(err) {
          seShowLoading(false);
          seShowError("Error loading exam: " + (err.message || err));
        });
      // Story 16: Route to teacher endpoint when in VAS mode
      if (VAS.active) {
        seExamRunner_.webapp_previewStudentView(examId, VAS.studentKey);
      } else {
        seExamRunner_.webapp_getStudentDashboard(examId);
      }

    function seRenderExamHeader(data) {
      var s = data.scores || {};

      var gradeNum = parseInt(s.ib_grade, 10) || 0;
      var gradeClass = gradeNum >= 1 && gradeNum <= 7 ? "g" + gradeNum : "";

      var html = '<div class="se-exam-header">';

      // IB Grade circle
      html += '<div class="se-exam-grade ' + gradeClass + '">' + escapeHtml(String(s.ib_grade || "-")) + '</div>';

      // Exam name + level
      html += '<div>';
      html += '<div class="se-exam-title">' + escapeHtml(String(exam.exam_name || "")) + '</div>';
      if (exam.level) {
        var lvl = String(exam.level).toUpperCase();
        var lvlClass = lvl.indexOf("HL") !== -1 ? "hl" : "sl";
        html += '<span class="se-exam-level ' + lvlClass + '">' + escapeHtml(lvl) + '</span>';
      }
      html += '</div>';

      // Total score
      html += '<div class="se-exam-score">';
      html += String(s.total_points || 0) + '/' + String(s.total_possible || 0);
      html += '<span class="se-pts-label"> pts</span>';
      html += '</div>';

      html += '</div>';
      document.getElementById("se-exam-header").innerHTML = html;

    // ================================================================
    // Paper 1A — MCQ table
    // ================================================================
    function seRenderPaper1A(data) {
      var items = data.paper1ADetails || [];
      var summary = data.paper1ASummary || {};
      var correct = summary.correct || 0;
      var total = summary.total || items.length;

      var html = '<div class="se-paper-section">';

      // Collapsible header
      var key = "1a";
      var isCollapsed = SE.paperCollapsed[key];
      html += '<div class="se-paper-header" onclick="seTogglePaper(\'' + key + '\')">';
      html += '<span class="se-paper-title">Paper 1A &mdash; Multiple Choice</span>';
      html += '<span class="se-paper-summary"><strong>' + correct + '/' + total + '</strong> correct';
      html += '<span class="se-paper-chevron ' + (isCollapsed ? '' : 'open') + '">&#9654;</span>';
      html += '</span></div>';

      // Body
      html += '<div class="se-paper-body ' + (isCollapsed ? 'collapsed' : '') + '">';

      // Story 13: Show question content blocks for MCQ questions (if available)
      if (SE.questionContent) {
        items.forEach(function(item) {
          var qcBlocks = SE.questionContent[item.qid] || [];
          if (qcBlocks.length) {
            var sortedBlocks = qcBlocks.slice().sort(function(a,b) { return (a.block_order||0) - (b.block_order||0); });
            html += '<div class="se-question-content" style="margin-bottom:10px;">';
            html += '<strong style="font-size:12px;color:#374151;">Q' + (item.number || "") + '</strong>';
            sortedBlocks.forEach(function(b) {
              if (b.block_type === "image" && b.content) {
                html += '<div class="se-content-block"><img class="se-content-image" src="https://drive.google.com/thumbnail?id=' + encodeURIComponent(b.content) + '&sz=w600" alt="Question image"></div>';
              } else if (b.content) {
                html += '<div class="se-content-block">' + renderChem(String(b.content)).replace(/\n/g, '<br>') + '</div>';
              }
            });
            html += '</div>';
          }
        });
      }

      html += '<table class="se-mcq-table">';
      html += '<thead><tr>';
      html += '<th>#</th><th>Your Answer</th><th>Correct</th><th>Result</th><th>Topic</th><th>Strand</th>';
      html += '</tr></thead>';
      html += '<tbody>';

      items.forEach(function(item, idx) {
        var answered = item.studentAnswer && String(item.studentAnswer).trim();
        var rowClass = !answered ? 'se-unanswered' : (item.isCorrect ? 'se-correct' : 'se-incorrect');
        html += '<tr class="' + rowClass + '">';
        html += '<td>' + (item.number || (idx + 1)) + '</td>';
        html += '<td class="se-answer-cell">' + escapeHtml(String(item.studentAnswer || "-")) + '</td>';
        html += '<td class="se-answer-cell">' + escapeHtml(String(item.correctAnswer || "")) + '</td>';
        html += '<td>' + seResultIcon(item.isCorrect, answered) + '</td>';
        html += '<td>' + seTopicBadge(item.topic, item.topicDescription) + '</td>';
        html += '<td>' + seStrandBadge(item.strand) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      html += '</div></div>';
      return html;
    }

    // ================================================================
    // Paper 1B / Paper 2 — structured questions with rubric
    // ================================================================
    function seRenderPaperStructured(title, key, items, summary) {
      summary = summary || {};
      var earned = summary.earned || 0;
      var total = summary.total || 0;

      var html = '<div class="se-paper-section">';

      // Collapsible header
      var isCollapsed = SE.paperCollapsed[key];
      html += '<div class="se-paper-header" onclick="seTogglePaper(\'' + key + '\')">';
      html += '<span class="se-paper-title">' + escapeHtml(title) + '</span>';
      html += '<span class="se-paper-summary"><strong>' + earned + '/' + total + '</strong> pts';
      html += '<span class="se-paper-chevron ' + (isCollapsed ? '' : 'open') + '">&#9654;</span>';
      html += '</span></div>';

      // Body — question cards
      html += '<div class="se-paper-body ' + (isCollapsed ? 'collapsed' : '') + '">';

      items.forEach(function(q) {
        html += '<div class="se-question-card">';
        html += '<div class="se-question-top">';
        html += '<span class="se-question-label">' + escapeHtml(String(q.label || q.qid || "")) + '</span>';
        html += '<span class="se-question-score">' + (q.earnedPoints || 0) + '/' + (q.maxPoints || 0);
        html += '<span class="se-pts-label"> pts</span></span>';
        html += seStrandBadge(q.strand);
        html += seTopicBadge(q.topic, q.topicDescription);
        html += '</div>';

        // Story 13: Question content blocks (when show_questions is enabled)
        var qcBlocks = SE.questionContent ? (SE.questionContent[q.qid] || []) : [];
        if (qcBlocks.length) {
          var sortedBlocks = qcBlocks.slice().sort(function(a,b) { return (a.block_order||0) - (b.block_order||0); });
          html += '<div class="se-question-content">';
          sortedBlocks.forEach(function(b) {
            if (b.block_type === "image" && b.content) {
              html += '<div class="se-content-block"><img class="se-content-image" src="https://drive.google.com/thumbnail?id=' + encodeURIComponent(b.content) + '&sz=w600" alt="Question image"></div>';
            } else if (b.content) {
              html += '<div class="se-content-block">' + renderChem(String(b.content)).replace(/\n/g, '<br>') + '</div>';
            }
          });
          html += '</div>';
        }

        // Rubric criteria (if available)
        var criteria = q.criteriaResults || [];
        if (criteria.length) {
          html += '<ul class="se-rubric-list">';
          criteria.forEach(function(c) {
            var isEarned = c.earned > 0;
            html += '<li class="se-rubric-item">';
            html += '<span class="se-rubric-icon ' + (isEarned ? 'se-rubric-checked' : 'se-rubric-unchecked') + '">';
            html += isEarned ? '&#10003;' : '&#10007;';
            html += '</span>';
            html += '<span class="se-rubric-text">' + escapeHtml(String(c.criteria_text || "")) + '</span>';
            html += '<span class="se-rubric-pts">' + (c.points || 0) + ' pt' + ((c.points || 0) === 1 ? '' : 's') + '</span>';
            html += '</li>';
          });
          html += '</ul>';
        } else {
          // No rubric — show simple points bar
          var pct = (q.maxPoints || 0) > 0 ? Math.round((q.earnedPoints || 0) / q.maxPoints * 100) : 0;
          html += '<div class="se-points-bar"><div class="se-points-fill" style="width:' + pct + '%"></div></div>';
        }

        html += '</div>';
      });

      html += '</div></div>';
      return html;
    }

    function seResultIcon(isCorrect, answered) {
      if (!answered) return '<span class="se-result-icon unanswered">&mdash;</span>';
      if (isCorrect) return '<span class="se-result-icon correct">&#10003;</span>';
      return '<span class="se-result-icon incorrect">&#10007;</span>';

    function seStrandBadge(strand) {
      if (!strand) return '';
      var s = String(strand).trim().toUpperCase();
      var cls = '';
      if (s === 'KU') cls = 'ku';
      else if (s === 'TT') cls = 'tt';
      else if (s === 'C') cls = 'c';
      return '<span class="se-strand-tag ' + cls + '">' + escapeHtml(s) + '</span>';
    }

    function seTopicBadge(topic, description) {
      if (!topic) return '';
      var t = String(topic).trim();

      var titleAttr = desc ? ' title="' + escapeHtml(desc) + '"' : '';

      }
      html += '</div>';
      html += '<div class="se-exam-score">' + String(s.total_points || 0) + '/' + String(s.total_possible || 0) + '<span class="se-pts-label"> pts</span></div>';
      html += '</div>';

      // Paper 1A
      var p1a = data.paper1ADetails || [];
      if (p1a.length) {
        html += seRenderPaper1A(data);
      }

      // Paper 1B
      var p1b = data.paper1BDetails || [];
      if (p1b.length) {
        html += seRenderPaperStructured("Paper 1B", "1b", p1b, data.paper1BSummary);
      }

      // Paper 2
      var p2 = data.paper2Details || [];
      if (p2.length) {
        html += seRenderPaperStructured("Paper 2", "2", p2, data.paper2Summary);
      }

      // Restore SE state
      SE.paperCollapsed = savedCollapsed;
      SE.questionContent = savedContent;

      // Replace seTogglePaper with pvTogglePaper in the rendered HTML
      html = html.replace(/seTogglePaper\(/g, 'pvTogglePaper(');

      var contentEl = document.getElementById("pv-content");
      contentEl.innerHTML = html;
      contentEl.style.display = "";
    }

    /**
     * Toggle paper section collapsed state inside preview.
     */
    function pvTogglePaper(key) {
      PV.paperCollapsed[key] = !PV.paperCollapsed[key];
      if (PV.data) pvRender(PV.data);
    }

    /**
     * Close the preview modal.
     */
    function pvClose() {
      document.getElementById("pv-modal").style.display = "none";
      PV.open = false;
      PV.data = null;
    }

    // ================================================================
    // View-as-Student Module (VAS) — Story 16
    // Teacher can switch into full student mode for any student
    // ================================================================

    /** Open the student selector modal */
    function vasOpenSelector() {
      document.getElementById("vas-modal").style.display = "";
      document.getElementById("vas-student-list").innerHTML = "";

      if (VAS.allStudents) {
        vasRenderStudentList(VAS.allStudents);
        return;
      }

      document.getElementById("vas-loading").style.display = "";
      google.script.run
        .withSuccessHandler(function(students) {
          document.getElementById("vas-loading").style.display = "none";
          VAS.allStudents = students || [];
          vasPopulateClassFilter(VAS.allStudents);
          vasRenderStudentList(VAS.allStudents);
        })
        .withFailureHandler(function(err) {
          document.getElementById("vas-loading").style.display = "none";
          showToast("Failed to load students: " + (err.message || err), "error");
        })
        .webapp_getAllStudents();
    }

    function vasCloseSelector() {
      document.getElementById("vas-modal").style.display = "none";
    }

    function vasPopulateClassFilter(students) {
      var classes = {};
      students.forEach(function(s) {
        if (s.class_section) classes[s.class_section] = true;
      });
      var sel = document.getElementById("vas-class-filter");
      sel.innerHTML = '<option value="">All Classes</option>';
      Object.keys(classes).sort().forEach(function(c) {
        var opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
      });
    }

    function vasFilterStudents() {
      if (!VAS.allStudents) return;
      var cls = document.getElementById("vas-class-filter").value;
      var search = (document.getElementById("vas-search").value || "").toLowerCase();

      var filtered = VAS.allStudents.filter(function(s) {
        if (cls && s.class_section !== cls) return false;
        if (search) {
          var full = (s.last_name + " " + s.first_name + " " + s.email).toLowerCase();
          if (full.indexOf(search) === -1) return false;
        }
        return true;
      });
      vasRenderStudentList(filtered);
    }

    function vasRenderStudentList(students) {
      var el = document.getElementById("vas-student-list");
      if (!students.length) {
        el.innerHTML = '<div style="padding:20px;color:#9ca3af;text-align:center;">No students found.</div>';
        return;
      }
      var html = '';
      students.forEach(function(s) {
        var lvl = String(s.level || "").toUpperCase();
        var lvlBadge = lvl ? '<span class="level-badge ' + (lvl === "HL" ? "hl" : "sl") + '">' + lvl + '</span>' : '';
        html += '<div class="vas-student-item" onclick="vasActivate(\'' + escapeHtml(s.student_key) + '\')">';
        html += '<span class="vas-student-name">' + escapeHtml(s.last_name + ", " + s.first_name) + '</span>';
        html += '<span class="vas-student-meta">' + escapeHtml(s.class_section || "") + ' ' + lvlBadge + '</span>';
        html += '</div>';
      });
      el.innerHTML = html;
    }

    /** ACTIVATE student view mode */
    function vasActivate(studentKey) {
      var student = null;
      for (var i = 0; i < (VAS.allStudents || []).length; i++) {
        if (VAS.allStudents[i].student_key === studentKey) {
          student = VAS.allStudents[i];
          break;
        }
      }
      if (!student) { showToast("Student not found.", "error"); return; }

      vasCloseSelector();

      // Save original state (only on first activation)
      if (!VAS.active) {
        VAS.originalUser = JSON.parse(JSON.stringify(APP.user));
      }
      VAS.active = true;
      VAS.studentKey = studentKey;
      VAS.studentInfo = student;

      // Swap APP.user to student persona
      APP.user.role = "student";
      APP.user.student_key = student.student_key;
      APP.user.class_section = student.class_section;
      APP.user.level = student.level || "";
      APP.user.name = student.first_name;

      // Reset student modules so they reinitialize with new student
      SD.initialized = false;
      SD.data = null;
      SD.trendData = null;
      SD.exams = null;
      SE.initialized = false;
      SE.data = null;
      SE.exams = null;
      APP.panelInitialized["panel-student-dashboard"] = false;
      APP.panelInitialized["panel-student-exams"] = false;

      // Reconfigure UI
      configureNav("student");
      setupHeader("student");
      setupHashRouting("student");
      vasShowBanner(student);

      // Navigate to student default
      window.location.hash = "dashboard";
      showPanelForHash("dashboard", "student");
    }

    function vasShowBanner(student) {
      var banner = document.getElementById("vas-banner");
      banner.style.display = "";
      document.getElementById("vas-banner-name").textContent =
        student.first_name + " " + student.last_name + " (" + (student.class_section || "") + ")";
      var lvlEl = document.getElementById("vas-banner-level");
      var lvl = String(student.level || "").toUpperCase();
      if (lvl) {
        lvlEl.textContent = lvl;
        lvlEl.className = "level-badge " + (lvl === "HL" ? "hl" : "sl");
        lvlEl.style.display = "";
      } else {
        lvlEl.style.display = "none";
      }
    }

    /** EXIT student view — restore teacher state */
    function vasExit() {
      if (!VAS.active || !VAS.originalUser) return;

      APP.user = VAS.originalUser;
      VAS.active = false;
      VAS.studentKey = null;
      VAS.studentInfo = null;
      VAS.originalUser = null;

      // Reset student modules
      SD.initialized = false;
      SD.data = null;
      SD.trendData = null;
      SD.exams = null;
      SE.initialized = false;
      SE.data = null;
      SE.exams = null;
      APP.panelInitialized["panel-student-dashboard"] = false;
      APP.panelInitialized["panel-student-exams"] = false;

      // Reconfigure UI
      configureNav("teacher");
      setupHeader("teacher");
      setupHashRouting("teacher");

      // Hide banner
      document.getElementById("vas-banner").style.display = "none";

      // Navigate to teacher default
      window.location.hash = DEFAULT_HASH.teacher;
      showPanelForHash(DEFAULT_HASH.teacher, "teacher");
    }

    // ================================================================
    // Class Overview module (CO) — Story 4
    // Teacher analytics: band distributions + student score table
    // ================================================================

    var CO = {
      initialized: false,
      exams: null,
      classes: null,
      currentExamId: null,
      currentClass: "",
      bandData: null,
      studentData: null,
      sortCol: "last_name",
      sortAsc: true,
      pendingCalls: 0
    };

    /**
     * Lazy init — called when panel-overview first shown.
     * panel-overview → strip "panel-" → "overview" → "overviewInit"
     */
    function overviewInit() {
      if (CO.initialized) return;
      CO.initialized = true;

      coShowLoading(true);

      google.script.run
        .withSuccessHandler(function(boot) {
          CO.exams = boot.exams || [];
          CO.classes = boot.classes || [];
          var activeId = boot.active_exam_id || "";

          if (!CO.exams.length) {
            coShowLoading(false);
            coShowEmpty("No exams available. Create an exam first.");
            return;
          }

          // Populate exam selector
          coPopulateExamSelector(CO.exams, activeId);

          // Build class toggle buttons
          coBuildClassToggle(CO.classes);

          // Show filters
          document.getElementById("co-filters").style.display = "";

          // Load data for active exam
          var examId = activeId || String(CO.exams[0].exam_id || "");
          coLoadData(examId, "");
        })
        .withFailureHandler(function(err) {
          coShowLoading(false);
          coShowError("Failed to load: " + (err.message || err));
        })
        .webapp_bootstrap();
    }

    function coPopulateExamSelector(exams, activeId) {
      var sel = document.getElementById("co-exam-select");
      if (!sel) return;
      sel.innerHTML = "";
      exams.forEach(function(e) {
        var opt = document.createElement("option");
        opt.value = String(e.exam_id || "");
        var label = String(e.exam_name || e.exam_id || "");
        if (e.level) label += " (" + e.level + ")";
        opt.textContent = label;
        if (String(e.exam_id) === String(activeId)) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function coBuildClassToggle(classes) {
      var container = document.getElementById("co-class-toggle");
      if (!container) return;
      // "All" button is always first
      var html = '<button class="co-toggle-btn active" data-cls="" onclick="coSetClass(\'\')">All</button>';
      classes.forEach(function(cls) {
        html += '<button class="co-toggle-btn" data-cls="' + escapeHtml(cls) + '" onclick="coSetClass(\'' + escapeHtml(cls) + '\')">' + escapeHtml(cls) + '</button>';
      });
      container.innerHTML = html;
    }

    function coSetClass(cls) {
      CO.currentClass = cls;
      // Update button states
      var btns = document.querySelectorAll("#co-class-toggle .co-toggle-btn");
      for (var i = 0; i < btns.length; i++) {
        var btnCls = btns[i].getAttribute("data-cls") || "";
        btns[i].className = "co-toggle-btn" + (btnCls === cls ? " active" : "");
      }
      coApplyFilters();
    }

    function coApplyFilters() {
      var sel = document.getElementById("co-exam-select");
      var examId = sel ? sel.value : "";
      if (!examId) return;
      coLoadData(examId, CO.currentClass);
    }

    // ================================================================
    // Data loading — two parallel calls
    // ================================================================
    function coLoadData(examId, classSection) {
      CO.currentExamId = examId;
      CO.currentClass = classSection;
      CO.bandData = null;
      CO.studentData = null;
      CO.pendingCalls = 2;

      coShowLoading(true);
      document.getElementById("co-content").style.display = "none";

      // Call 1: Band distributions
      google.script.run
        .withSuccessHandler(function(data) {
          CO.bandData = data;
          CO.pendingCalls--;
          if (CO.pendingCalls <= 0) coOnDataReady();
        })
        .withFailureHandler(function(err) {
          CO.pendingCalls--;
          coShowLoading(false);
          coShowError("Failed to load band data: " + (err.message || err));
        })
        .webapp_getBandDistributions(examId, classSection);

      // Call 2: Student scores
      google.script.run
        .withSuccessHandler(function(data) {
          CO.studentData = data || [];
          CO.pendingCalls--;
          if (CO.pendingCalls <= 0) coOnDataReady();
        })
        .withFailureHandler(function(err) {
          CO.pendingCalls--;
          coShowLoading(false);
          coShowError("Failed to load student data: " + (err.message || err));
        })
        .webapp_getClassScores(examId, classSection);
    }

    function coOnDataReady() {
      coShowLoading(false);

      if (!CO.bandData && (!CO.studentData || CO.studentData.length === 0)) {
        coShowEmpty("No scores available for this exam yet.");
        return;
      }

      coHideStates();
      coRenderSummary();
      coRenderBands(CO.bandData);
      coRenderStudents(CO.studentData);
      document.getElementById("co-content").style.display = "";
    }

    // ================================================================
    // Summary bar
    // ================================================================
    function coRenderSummary() {
      var el = document.getElementById("co-summary");
      if (!el) return;
      var n = CO.bandData ? CO.bandData.n : (CO.studentData ? CO.studentData.length : 0);
      var level = CO.bandData ? CO.bandData.level : "";
      var examName = "";
      if (CO.exams && CO.currentExamId) {
        for (var i = 0; i < CO.exams.length; i++) {
          if (String(CO.exams[i].exam_id) === String(CO.currentExamId)) {
            examName = CO.exams[i].exam_name || "";
            break;
          }
        }
      }
      var html = '<strong>' + n + '</strong> student' + (n !== 1 ? 's' : '');
      if (examName) html += ' &middot; ' + escapeHtml(examName);
      if (level) html += ' &middot; ' + escapeHtml(level);
      if (CO.currentClass) html += ' &middot; Class: ' + escapeHtml(CO.currentClass);
      el.innerHTML = html;
    }

    // ================================================================
    // Band distribution tables
    // ================================================================
    function coRenderBands(data) {
      var el = document.getElementById("co-bands");
      if (!el || !data) { if (el) el.innerHTML = ""; return; }

      var html = '<div class="co-band-section">';
      html += '<h3>Band Distributions</h3>';
      html += '<div class="co-band-grid">';

      // IB Grade distribution (1-7)
      html += '<div class="co-band-card">';
      html += '<h4>IB Grade</h4>';
      html += coBandTableHtml(data.ib, 1, 7);
      html += '</div>';

      // Strand distributions (1-8)
      var strands = [
        { key: "ku", label: "Knowledge & Understanding (KU)" },
        { key: "tt", label: "Thinking & Transfer (TT)" },
        { key: "c",  label: "Communication (C)" }
      ];
      strands.forEach(function(st) {
        html += '<div class="co-band-card">';
        html += '<h4>' + st.label + '</h4>';
        html += coBandTableHtml(data[st.key], 1, 8);
        html += '</div>';
      });

      html += '</div></div>';
      el.innerHTML = html;
    }

    function coBandTableHtml(dist, min, max) {
      dist = dist || {};
      var html = '<table class="co-band-table"><thead><tr>';
      for (var b = min; b <= max; b++) {
        html += '<th>' + b + '</th>';
      }
      html += '</tr></thead><tbody><tr>';
      for (var i = min; i <= max; i++) {
        var count = dist[String(i)] || 0;
        var cls = count > 0 ? 'co-band-cell b' + i : 'co-band-cell empty';
        html += '<td><span class="' + cls + '">' + (count || '-') + '</span></td>';
      }
      html += '</tr></tbody></table>';
      return html;
    }

    // ================================================================
    // Student score table (sortable)
    // ================================================================
    function coRenderStudents(rows) {
      var el = document.getElementById("co-students");
      if (!el) return;

      if (!rows || rows.length === 0) {
        el.innerHTML = "";
        return;
      }

      // Sort rows
      var sorted = rows.slice().sort(function(a, b) {
        var col = CO.sortCol;
        var aVal = a[col];
        var bVal = b[col];

        // Numeric columns
        if (typeof aVal === "number" && typeof bVal === "number") {
          return CO.sortAsc ? aVal - bVal : bVal - aVal;
        }

        // String columns
        aVal = String(aVal || "");
        bVal = String(bVal || "");
        var cmp = aVal.localeCompare(bVal);
        return CO.sortAsc ? cmp : -cmp;
      });

      var columns = [
        { key: "last_name",    label: "Name" },
        { key: "class_section", label: "Class" },
        { key: "total_points", label: "Total" },
        { key: "ku_points",    label: "KU Pts" },
        { key: "tt_points",    label: "TT Pts" },
        { key: "c_points",     label: "C Pts" },
        { key: "ib_grade",     label: "IB Grade" },
        { key: "ku_band",      label: "KU" },
        { key: "tt_band",      label: "TT" },
        { key: "c_band",       label: "C" }
      ];

      var html = '<div class="co-student-section">';
      html += '<h3>Student Scores</h3>';
      html += '<table class="co-student-table">';

      // Header
      html += '<thead><tr>';
      columns.forEach(function(c) {
        var sortIcon = '';
        if (CO.sortCol === c.key) {
          sortIcon = '<span class="co-sort-icon active">' + (CO.sortAsc ? '&#9650;' : '&#9660;') + '</span>';
        } else {
          sortIcon = '<span class="co-sort-icon">&#9650;</span>';
        }
        html += '<th onclick="coSort(\'' + c.key + '\')">' + c.label + sortIcon + '</th>';
      });
      html += '</tr></thead>';

      // Body
      html += '<tbody>';
      sorted.forEach(function(row) {
        html += '<tr style="cursor:pointer;" onclick="spOpen(\'' + escapeHtml(row.student_key || "") + '\')">';
        // Name
        html += '<td><strong>' + escapeHtml(row.last_name || "") + '</strong>';
        if (row.first_name) html += ', ' + escapeHtml(row.first_name);
        html += '</td>';
        // Class
        html += '<td>' + escapeHtml(row.class_section || "") + '</td>';
        // Total pts
        html += '<td>' + row.total_points + ' pts</td>';
        // KU / TT / C pts
        html += '<td>' + row.ku_points + '</td>';
        html += '<td>' + row.tt_points + '</td>';
        html += '<td>' + row.c_points + '</td>';
        // IB Grade pill
        html += '<td>' + coGradePill(row.ib_grade) + '</td>';
        // Band pills
        html += '<td>' + coBandPill(row.ku_band) + '</td>';
        html += '<td>' + coBandPill(row.tt_band) + '</td>';
        html += '<td>' + coBandPill(row.c_band) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';

      el.innerHTML = html;
    }

    function coSort(col) {
      if (CO.sortCol === col) {
        CO.sortAsc = !CO.sortAsc;
      } else {
        CO.sortCol = col;
        CO.sortAsc = true;
      }
      if (CO.studentData) coRenderStudents(CO.studentData);
    }

    function coGradePill(grade) {
      var num = parseInt(grade, 10) || 0;
      if (num < 1 || num > 7) return '<span style="color:#9ca3af;">-</span>';
      return '<span class="co-grade-pill co-band-cell b' + num + '">' + num + '</span>';
    }

    function coBandPill(band) {
      var num = parseInt(band, 10) || 0;
      if (num < 1 || num > 8) return '<span style="color:#9ca3af;">-</span>';
      return '<span class="co-band-pill co-band-cell b' + num + '">' + num + '</span>';
    }

    // ================================================================
    // CO state management helpers
    // ================================================================
    function coShowLoading(show) {
      document.getElementById("co-loading").style.display = show ? "" : "none";
    }

    function coShowEmpty(msg) {
      coHideStates();
      var el = document.getElementById("co-empty");
      el.textContent = msg;
      el.style.display = "";
    }

    function coShowError(msg) {
      coHideStates();
      var el = document.getElementById("co-error");
      el.innerHTML = escapeHtml(msg) + '<br><button class="retry-btn" onclick="coRetry()">Retry</button>';
      el.style.display = "";
    }
    function coRetry() { CO.initialized = false; overviewInit(); }

    function coHideStates() {
      document.getElementById("co-loading").style.display = "none";
      document.getElementById("co-empty").style.display = "none";
      document.getElementById("co-error").style.display = "none";
    }

    // ================================================================
    // Story 5: Grading panel (GR module)
    // panel-grading → gradingInit()
    // ================================================================

    var GR = {
      initialized: false,
      exams: null,
      classes: null,
      roster: null,
      currentExamId: null,
      currentClass: "",
      currentStudentKey: null,
      currentPaper: "1A",
      paper1ATable: null,
      paper1BModel: null,
      paper2Model: null,
      paper1BLoaded: false,
      paper2Loaded: false
    };

    function gradingInit() {
      if (GR.initialized) return;
      GR.initialized = true;
      grShowLoading(true);

      google.script.run
        .withSuccessHandler(function(data) {
          GR.exams = data.exams || [];
          GR.classes = data.classes || [];

          // Populate exam dropdown
          var examSel = document.getElementById("gr-exam-select");
          examSel.innerHTML = '<option value="">-- Select Exam --</option>';
          GR.exams.forEach(function(ex) {
            var opt = document.createElement("option");
            opt.value = ex.exam_id;
            opt.textContent = ex.exam_name + (ex.level ? " (" + ex.level + ")" : "");
            examSel.appendChild(opt);
          });

          // Populate class dropdown
          var clsSel = document.getElementById("gr-class-select");
          clsSel.innerHTML = '<option value="">-- All Classes --</option>';
          GR.classes.forEach(function(c) {
            var opt = document.createElement("option");
            opt.value = c;
            opt.textContent = c;
            clsSel.appendChild(opt);
          });

          // Auto-select active exam
          if (data.active_exam_id) {
            examSel.value = data.active_exam_id;
            GR.currentExamId = data.active_exam_id;
          }

          grShowLoading(false);
          document.getElementById("gr-selectors").style.display = "";

          // Auto-load roster if class is set
          if (GR.currentExamId && GR.classes.length > 0) {
            clsSel.value = GR.classes[0];
            GR.currentClass = GR.classes[0];
            grLoadRoster();
          }
        })
        .withFailureHandler(function(err) {
          grShowLoading(false);
          grShowError(err.message || "Failed to load grading data");
        })
        .webapp_bootstrap();
    }

    function grExamChanged() {
      GR.currentExamId = document.getElementById("gr-exam-select").value;
      GR.currentStudentKey = null;
      grClearPaperContent();
      document.getElementById("gr-paper-tabs").style.display = "none";
      document.getElementById("gr-recompute-bar").style.display = "none";
      document.getElementById("gr-student-select").innerHTML = '<option value="">-- Select Student --</option>';
      if (GR.currentExamId && GR.currentClass) {
        grLoadRoster();
      }
    }

    function grClassChanged() {
      GR.currentClass = document.getElementById("gr-class-select").value;
      GR.currentStudentKey = null;
      grClearPaperContent();
      document.getElementById("gr-paper-tabs").style.display = "none";
      document.getElementById("gr-recompute-bar").style.display = "none";
      if (GR.currentClass) {
        grLoadRoster();
      } else {
        document.getElementById("gr-student-select").innerHTML = '<option value="">-- Select Class first --</option>';
      }
    }

    function grLoadRoster() {
      var stuSel = document.getElementById("gr-student-select");
      stuSel.innerHTML = '<option value="">Loading...</option>';
      stuSel.disabled = true;

      google.script.run
        .withSuccessHandler(function(roster) {
          GR.roster = roster || [];
          stuSel.innerHTML = '<option value="">-- Select Student --</option>';
          GR.roster.forEach(function(s) {
            var opt = document.createElement("option");
            opt.value = s.student_key;
            opt.textContent = s.last_name + ", " + s.first_name;
            stuSel.appendChild(opt);
          });
          stuSel.disabled = false;
        })
        .withFailureHandler(function(err) {
          stuSel.innerHTML = '<option value="">Error loading roster</option>';
          stuSel.disabled = false;
          showToast(err.message || "Failed to load roster", "error");
        })
        .webapp_getRosterByClass(GR.currentClass);
    }

    function grStudentChanged() {
      GR.currentStudentKey = document.getElementById("gr-student-select").value;
      GR.paper1BLoaded = false;
      GR.paper2Loaded = false;
      GR.paper1BModel = null;
      GR.paper2Model = null;
      grClearPaperContent();

      if (!GR.currentStudentKey) {
        document.getElementById("gr-paper-tabs").style.display = "none";
        document.getElementById("gr-recompute-bar").style.display = "none";
        return;
      }

      // Show paper tabs + recompute bar

    // ================================================================
    // Paper 1A — MCQ grid

    function grLoadPaper1A() {
      if (!GR.currentExamId || !GR.currentStudentKey) return;
      grShowLoading(true);
      document.getElementById("gr-paper-1a").style.display = "none";

      var pending = 2;
      var tableData = null;
      var markingData = null;

      function checkDone() {
        pending--;
        if (pending > 0) return;
        grShowLoading(false);
        if (tableData && tableData.length > 0) {
          grRenderMcqGrid(tableData, markingData);
          document.getElementById("gr-paper-1a").style.display = "";
        } else {
          grShowEmpty("No Paper 1A questions found for this exam.");
        }
      }

      // Call 1: Get Paper 1A table (structure + correct answers)
      google.script.run
        .withSuccessHandler(function(data) {
          tableData = data || [];
          GR.paper1ATable = tableData;
          checkDone();
        })
        .withFailureHandler(function(err) {
          tableData = [];
          showToast(err.message || "Failed to load Paper 1A", "error");
          checkDone();
        })
        .webapp_getPaper1ATable(GR.currentExamId);

      // Call 2: Get existing responses via marking model
      google.script.run
        .withSuccessHandler(function(data) {
          markingData = data || [];
          checkDone();
        })
        .withFailureHandler(function(err) {
          markingData = [];
          checkDone();
        })
        .webapp_getPaperMarkingModel(GR.currentExamId, "1A", GR.currentStudentKey);
    }

    function grRenderMcqGrid(questions, markingModel) {
      // Build a map of qid → existing mcq_choice from marking model
      var existMap = {};
      (markingModel || []).forEach(function(m) {
        if (m.existing && m.existing.mcq_choice) {
          existMap[String(m.qid)] = String(m.existing.mcq_choice);
        }
      });

      var grid = document.getElementById("gr-1a-grid");
      var html = "";

      questions.forEach(function(q, i) {
        var val = existMap[String(q.qid)] || "";
        var hlBadge = q.hl_only ? '<span class="gr-hl-badge">HL</span>' : "";
        html += '<div class="gr-mcq-cell">' +
          '<div class="gr-q-num">' + escapeHtml(String(q.number)) + hlBadge + '</div>' +
          '<input id="gr-1a-inp-' + i + '" maxlength="1" value="' + escapeHtml(val) + '" ' +
          'data-idx="' + i + '" data-qid="' + escapeHtml(String(q.qid)) + '">' +
          '</div>';
      });

      grid.innerHTML = html;

      // Auto-advance: move to next input on valid entry
      var inputs = grid.querySelectorAll("input");
      for (var k = 0; k < inputs.length; k++) {
        inputs[k].addEventListener("input", function(e) {
          var v = e.target.value.toUpperCase().replace(/[^A-E]/g, "");
          e.target.value = v;
          if (v.length === 1) {
            var idx = parseInt(e.target.getAttribute("data-idx"), 10);
            var next = document.getElementById("gr-1a-inp-" + (idx + 1));
            if (next) next.focus();
          }
        });
      }
    }

    function grApplyPaste() {
      var raw = document.getElementById("gr-1a-paste").value.toUpperCase().replace(/[^A-E]/g, "");
      var letters = raw.split("");
      var count = GR.paper1ATable ? GR.paper1ATable.length : 0;
      for (var i = 0; i < count; i++) {
        var inp = document.getElementById("gr-1a-inp-" + i);
        if (inp) {
          inp.value = (i < letters.length) ? letters[i] : "";
        }
      }
      if (letters.length > 0) {
        showToast("Pasted " + Math.min(letters.length, count) + " answers", "success");
      }
    }

    function grSavePaper1A() {
      if (!GR.currentExamId || !GR.currentStudentKey || !GR.paper1ATable) return;

      var answers = {};
      GR.paper1ATable.forEach(function(q, i) {
        var inp = document.getElementById("gr-1a-inp-" + i);
        var val = inp ? inp.value.toUpperCase() : "";
        if (val) answers[String(q.qid)] = val;
      });

      if (Object.keys(answers).length === 0) {
        showToast("No answers to save", "error");
        return;
      }

      google.script.run
        .withSuccessHandler(function(result) {
          showToast("Saved " + result.saved + " Paper 1A answers", "success");
        })
        .withFailureHandler(function(err) {
          showToast(err.message || "Failed to save Paper 1A", "error");
        })
        .webapp_savePaper1ABatch({
          exam_id: GR.currentExamId,
          student_key: GR.currentStudentKey,
          answers: answers
        });
    }

    // ================================================================
    // Paper 1B / Paper 2 — Checklist + Manual marking
    // ================================================================

    function grLoadPaper(paper) {
      if (!GR.currentExamId || !GR.currentStudentKey) return;

      var areaId = paper === "1B" ? "gr-1b-questions" : "gr-2-questions";
      document.getElementById(areaId).innerHTML = '<div class="gr-loading">Loading Paper ' + paper + '&hellip;</div>';

      google.script.run
        .withSuccessHandler(function(model) {
          if (paper === "1B") {
            GR.paper1BModel = model || [];
            GR.paper1BLoaded = true;
          } else {
            GR.paper2Model = model || [];
            GR.paper2Loaded = true;
          }
          grRenderPaperQuestions(paper, model || []);
        })
        .withFailureHandler(function(err) {
          document.getElementById(areaId).innerHTML =
            '<div class="gr-error">' + escapeHtml(err.message || "Failed to load") + '</div>';
          if (paper === "1B") GR.paper1BLoaded = true;
          else GR.paper2Loaded = true;
        })
        .webapp_getPaperMarkingModel(GR.currentExamId, paper, GR.currentStudentKey);
    }

    function grRenderPaperQuestions(paper, model) {
      var areaId = paper === "1B" ? "gr-1b-questions" : "gr-2-questions";
      var area = document.getElementById(areaId);

      if (!model || model.length === 0) {
        area.innerHTML = '<div class="gr-empty">No Paper ' + paper + ' questions found.</div>';
        return;
      }

      var html = "";
      model.forEach(function(q, idx) {
        var hlBadge = q.hl_only ? '<span class="gr-hl-badge">HL</span>' : "";
        html += '<div class="gr-qcard" id="gr-qcard-' + paper + '-' + idx + '">';
        html += '<div class="gr-qcard-header">';
        html += '<span class="gr-qcard-label">' + escapeHtml(q.label) + '</span>';
        html += hlBadge;
        html += '<span class="gr-qcard-pts">' + q.max_points + ' pts</span>';
        html += '<span class="gr-qcard-meta">' + escapeHtml(q.strand);
        if (q.ib_topic_code) html += ' &middot; ' + escapeHtml(q.ib_topic_code);
        html += '</span>';
        html += '</div>';

        // Checklist or manual
        if (q.rubric_items && q.rubric_items.length > 0) {
          // Get existing checked items
          var picked = [];
          if (q.existing && q.existing.detail_json) {
            try { picked = JSON.parse(q.existing.detail_json); } catch(e) {}
          }

          q.rubric_items.forEach(function(item) {
            var checked = picked.indexOf(item.item_id) !== -1 ? " checked" : "";
            html += '<label class="gr-checklist-item">';
            html += '<input type="checkbox" class="gr-chk-' + paper + '-' + idx + '" value="' +
              escapeHtml(item.item_id) + '"' + checked + '>';
            html += '<span class="gr-checklist-text">' + escapeHtml(item.criteria_text) + '</span>';
            html += '<span class="gr-checklist-pts">(' + item.points + ' pts)</span>';
            html += '</label>';
          });
        } else {
          // Manual points input
          var existPts = "";
          if (q.existing && q.existing.points_awarded !== "" && q.existing.points_awarded !== null &&
              q.existing.points_awarded !== undefined) {
            existPts = String(q.existing.points_awarded);
          }
          html += '<div class="gr-pts-row">';
          html += '<label>Points:</label>';
          html += '<input type="number" class="gr-pts-input" id="gr-pts-' + paper + '-' + idx + '" ' +
            'min="0" max="' + q.max_points + '" value="' + escapeHtml(existPts) + '">';
          html += '<span class="gr-pts-max">/ ' + q.max_points + '</span>';
          html += '</div>';
        }

        // Per-question save
        html += '<div class="gr-qcard-actions">';
        html += '<button class="gr-btn" onclick="grSaveSingleQuestion(\'' + paper + '\',' + idx +
          ',\'' + escapeHtml(String(q.qid)) + '\',\'' + escapeHtml(q.scoring_mode) + '\')">Save</button>';
        html += '<span class="gr-save-status" id="gr-status-' + paper + '-' + idx + '"></span>';
        html += '</div>';

        html += '</div>';
      });

      area.innerHTML = html;
    }

    function grSaveSingleQuestion(paper, idx, qid, scoringMode) {
      if (!GR.currentExamId || !GR.currentStudentKey) return;

      var payload = {
        exam_id: GR.currentExamId,
        student_key: GR.currentStudentKey,
        qid: qid,
        paper: paper
      };

      var hasChecklist = document.querySelectorAll(".gr-chk-" + paper + "-" + idx).length > 0;
      if (hasChecklist) {
        var checked = [];
        var boxes = document.querySelectorAll(".gr-chk-" + paper + "-" + idx + ":checked");
        for (var i = 0; i < boxes.length; i++) {
          checked.push(boxes[i].value);
        }
        payload.detail_json = JSON.stringify(checked);
        payload.points_awarded = "";
      } else {
        var ptsEl = document.getElementById("gr-pts-" + paper + "-" + idx);
        payload.points_awarded = ptsEl ? ptsEl.value : "";
        payload.detail_json = "";
      }

      var statusEl = document.getElementById("gr-status-" + paper + "-" + idx);
      if (statusEl) { statusEl.textContent = "Saving..."; statusEl.className = "gr-save-status"; }

      google.script.run
        .withSuccessHandler(function() {
          if (statusEl) {
            statusEl.textContent = "Saved \u2713";
            statusEl.className = "gr-save-status saved";
            setTimeout(function() { statusEl.textContent = ""; statusEl.className = "gr-save-status"; }, 3000);
          }
        })
        .withFailureHandler(function(err) {
          if (statusEl) {
            statusEl.textContent = "Error";
            statusEl.className = "gr-save-status";
          }
          showToast(err.message || "Failed to save", "error");
        })
        .webapp_saveResponse(payload);
    }

    function grSaveAllPaper(paper) {
      var model = paper === "1B" ? GR.paper1BModel : GR.paper2Model;
      if (!model || model.length === 0 || !GR.currentExamId || !GR.currentStudentKey) {
        showToast("Nothing to save", "error");
        return;
      }

      var saved = 0;
      var total = model.length;
      var errors = 0;

      showToast("Saving Paper " + paper + " (" + total + " questions)...", "info");

      model.forEach(function(q, idx) {
        var payload = {
          exam_id: GR.currentExamId,
          student_key: GR.currentStudentKey,
          qid: String(q.qid),
          paper: paper
        };

        var hasChecklist = document.querySelectorAll(".gr-chk-" + paper + "-" + idx).length > 0;
        if (hasChecklist) {
          var checked = [];
          var boxes = document.querySelectorAll(".gr-chk-" + paper + "-" + idx + ":checked");
          for (var i = 0; i < boxes.length; i++) {
            checked.push(boxes[i].value);
          }
          payload.detail_json = JSON.stringify(checked);
          payload.points_awarded = "";
        } else {
          var ptsEl = document.getElementById("gr-pts-" + paper + "-" + idx);
          payload.points_awarded = ptsEl ? ptsEl.value : "";
          payload.detail_json = "";
        }

        var statusEl = document.getElementById("gr-status-" + paper + "-" + idx);

        google.script.run
          .withSuccessHandler(function() {
            saved++;
            if (statusEl) {
              statusEl.textContent = "Saved \u2713";
              statusEl.className = "gr-save-status saved";
            }
            if (saved + errors === total) {
              showToast("Saved " + saved + "/" + total + " Paper " + paper + " questions", saved === total ? "success" : "error");
            }
          })
          .withFailureHandler(function(err) {
            errors++;
            if (statusEl) {
              statusEl.textContent = "Error";
              statusEl.className = "gr-save-status";
            }
            if (saved + errors === total) {
              showToast("Saved " + saved + "/" + total + " (" + errors + " errors)", "error");
            }
          })
          .webapp_saveResponse(payload);
      });
    }

    function ebUpdateVisibilityBadge() {
      var btn = document.getElementById("eb-vis-btn");
