      var label = document.getElementById("eb-vis-label");
      if (!btn) return;
      if (!EB.currentExamId || !EB.exams) {
        btn.style.display = "none";
        return;
      }
      btn.style.display = "";
      var exam = null;
      for (var i = 0; i < EB.exams.length; i++) {
        if (String(EB.exams[i].exam_id) === EB.currentExamId) { exam = EB.exams[i]; break; }
      }
      var isVisible = exam && String(exam.status || "").toLowerCase() === "visible";
      btn.className = "eb-vis-toggle " + (isVisible ? "visible" : "hidden");
      icon.innerHTML = isVisible ? "&#10003;" : "&#10005;";
      label.textContent = isVisible ? "Visible" : "Hidden";
    }

    function ebToggleVisibility() {
      if (!EB.currentExamId) { showToast("Select an exam first.", "error"); return; }
      var exam = null;
      for (var i = 0; i < EB.exams.length; i++) {
        if (String(EB.exams[i].exam_id) === EB.currentExamId) { exam = EB.exams[i]; break; }
      }
      var current = exam ? String(exam.status || "").toLowerCase() : "hidden";
      var newStatus = (current === "visible") ? "hidden" : "visible";

      google.script.run
        .withSuccessHandler(function(result) {
          if (exam) exam.status = result.status;
          ebUpdateVisibilityBadge();
          var msg = result.status === "visible" ? "Exam visible to students" : "Exam hidden from students";
          showToast(msg, "success");
        })
        .withFailureHandler(function(err) {
          showToast(err.message || "Failed to update visibility", "error");
        })
        .webapp_setExamVisibility(EB.currentExamId, newStatus);

      var ids = EB.exams.map(function(e) { return e.exam_id; });
      var label = status === "visible" ? "visible" : "hidden";

      google.script.run
        .withSuccessHandler(function(result) {
          EB.exams.forEach(function(e) { e.status = status; });
          ebUpdateVisibilityBadge();
          showToast(result.updated + " exam(s) now " + label, "success");
        })
        .withFailureHandler(function(err) {
          showToast(err.message || "Bulk visibility update failed", "error");
        })
        .webapp_bulkSetExamVisibility(ids, status);

    function ebSetSection(section) {
      EB.activeSection = section;
      var sections = ["setup","paper1a","paper1b","paper2","rubric","bands","content"];
      sections.forEach(function(s) {
        var el = document.getElementById("eb-section-" + s);
        if (el) el.style.display = (s === section) ? "" : "none";
      });

      // Update tab buttons
      var tabs = document.querySelectorAll(".eb-section-tab");
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.toggle("active", tabs[i].getAttribute("data-section") === section);
      }

      // Lazy-load data for certain sections
      if (EB.currentExamId) {
        if (section === "paper1b") ebRefreshPaperRoots("1B");
        if (section === "paper2") ebRefreshPaperRoots("2");
        if (section === "rubric") ebRefreshChecklistQids();
        if (section === "content") qcLoadQuestions();
      }
    }

    // ================================================================
    // Paper 1B / Paper 2 builder (shared functions with paper param)
    // ================================================================

    function ebRefreshPaperRoots(paper) {
      if (!EB.currentExamId) return;
      var prefix = paper === "1B" ? "eb-p1b" : "eb-p2";
      var rootSel = document.getElementById(prefix + "-root");
      var parentSel = document.getElementById(prefix + "-parent");
      rootSel.innerHTML = '<option value="">Loading...</option>';
      parentSel.innerHTML = '<option value="">Loading...</option>';

      google.script.run
        .withSuccessHandler(function(roots) {
          rootSel.innerHTML = "";
          parentSel.innerHTML = "";
          (roots || []).forEach(function(r) {
            var opt1 = document.createElement("option");
            opt1.value = r.qid; opt1.textContent = r.qid;
            rootSel.appendChild(opt1);

            var opt2 = document.createElement("option");
            opt2.value = r.qid; opt2.textContent = r.qid;
            parentSel.appendChild(opt2);
          });

          // Also fetch parts to add to parent select
          google.script.run
            .withSuccessHandler(function(parts) {
              (parts || []).forEach(function(p) {
                var opt = document.createElement("option");
                opt.value = p.qid; opt.textContent = p.label || p.qid;
                parentSel.appendChild(opt);
              });
            })
            .webapp_getPaperParts(EB.currentExamId, paper);
        })
        .withFailureHandler(function(err) {
          rootSel.innerHTML = '<option value="">Error</option>';
          parentSel.innerHTML = '<option value="">Error</option>';
        })
        .webapp_listPaperRoots(EB.currentExamId, paper);
    }

    function ebAddPaperRoot(paper) {
      if (!EB.currentExamId) { showToast("Select an exam first", "error"); return; }
      var prefix = paper === "1B" ? "eb-p1b" : "eb-p2";
      var num = document.getElementById(prefix + "-num").value.trim();
      if (!num) { showToast("Enter a question number", "error"); return; }

      google.script.run
        .withSuccessHandler(function() {
          showToast("Paper " + paper + " root Q" + num + " added", "success");
          document.getElementById(prefix + "-num").value = "";
          ebRefreshPaperRoots(paper);
          ebRefreshChecklistQids();
        })
        .withFailureHandler(function(err) {
          showToast(err.message || "Failed to add root", "error");
        })
        .webapp_addPaperRoot({ exam_id: EB.currentExamId, paper: paper, number: num });
    }

    function ebAddPaperPart(paper) {
      if (!EB.currentExamId) { showToast("Select an exam first", "error"); return; }
      var prefix = paper === "1B" ? "eb-p1b" : "eb-p2";

      var parentQid = document.getElementById(prefix + "-parent").value;
      var token = document.getElementById(prefix + "-token").value.trim();
      if (!parentQid || !token) { showToast("Select parent and enter token", "error"); return; }

      var payload = {

        scoring_mode: document.getElementById(prefix + "-mode").value,
        strand: document.getElementById(prefix + "-strand").value,
        ib_topic_code: document.getElementById(prefix + "-topic").value.trim(),
        hl_only: document.getElementById(prefix + "-hl-only").checked
      };

      google.script.run
        .withSuccessHandler(function() {
          showToast("Paper " + paper + " part added", "success");
          document.getElementById(prefix + "-token").value = "";
          ebRefreshPaperRoots(paper);
          ebRefreshChecklistQids();

    function ebRenderPaperParts(paper, parts) {
      var areaId = paper === "1B" ? "eb-p1b-parts-area" : "eb-p2-parts-area";
      var area = document.getElementById(areaId);
      var prefix = paper === "1B" ? "p1b" : "p2";

        return;

        '<th>QID</th><th>Pts</th><th>Mode</th><th>Strand</th><th>Topic</th><th>HL</th>' +

        html += '<tr>' +
          '<td>' + escapeHtml(p.label || p.qid) + hlBadge + '</td>' +
          '<td>' + (p.max_points || 0) + '</td>' +
          '<td>' + escapeHtml(p.scoring_mode || "manual") + '</td>' +
          '<td><select id="eb-' + prefix + '-s-' + i + '">' +
            '<option' + (p.strand === "KU" ? " selected" : "") + '>KU</option>' +
            '<option' + (p.strand === "TT" ? " selected" : "") + '>TT</option>' +
            '<option' + (p.strand === "C" ? " selected" : "") + '>C</option>' +

          '<td><input id="eb-' + prefix + '-t-' + i + '" value="' + escapeHtml(p.ib_topic_code || "") +

          '<td><input type="checkbox" id="eb-' + prefix + '-hl-' + i + '"' + hlChecked + ' style="width:auto;"></td>' +
          '</tr>';

      html += '</tbody></table>';
      area.innerHTML = html;

    function ebLoadBands() {
      if (!EB.currentExamId) { showToast("Select an exam first", "error"); return; }

      document.getElementById("eb-bands-meta").innerHTML = "Loading...";
      document.getElementById("eb-bands-area").innerHTML = '<div class="eb-loading">Loading...</div>';

      var pending = 2;

      function checkDone() {
        pending--;
        if (pending > 0) return;
        ebRenderBandsEditor();
      }

      // Call 1: Get exam totals
      google.script.run
        .withSuccessHandler(function(totals) {
          EB.bandTotals = totals;
          ebRenderBandsTotals();
          checkDone();
        })
        .withFailureHandler(function(err) {
          document.getElementById("eb-bands-meta").innerHTML = "Error loading totals";
          checkDone();
        })
        .webapp_getExamTotals(EB.currentExamId);

      // Call 2: Get grade bands
      google.script.run
        .withSuccessHandler(function(rows) {
          EB.bandRows = rows || [];
          checkDone();
        })
        .withFailureHandler(function(err) {
          EB.bandRows = [];
          showToast(err.message || "Failed to load grade bands", "error");
          checkDone();
        })
        .webapp_getGradeBands(EB.currentExamId);
    }

    function ebShowLoading(show) {
      ebHideStates();
      document.getElementById("eb-loading").style.display = show ? "" : "none";
    }

    function ebShowEmpty(msg) {
      ebHideStates();
      var el = document.getElementById("eb-empty");
      el.textContent = msg;
      el.style.display = "";
    }

    function ebShowError(msg) {
      ebHideStates();
      var el = document.getElementById("eb-error");
      el.innerHTML = escapeHtml(msg) + '<br><button class="retry-btn" onclick="ebRetry()">Retry</button>';
      el.style.display = "";
    }
    function ebRetry() { EB.initialized = false; builderInit(); }

      document.getElementById("eb-loading").style.display = "none";
      document.getElementById("eb-empty").style.display = "none";
      document.getElementById("eb-error").style.display = "none";
    }

    // ================================================================
    // Bulk Import — Paper 1A Answer Key
    // ================================================================

    /**
     * Detect input format: "letters", "csv", "table", or "unknown"
     */
    function ebBulkDetectFormat(text) {
      var trimmed = text.trim();
      if (!trimmed) return "unknown";

      // Format 1 — Letters only: entire input is A-E chars (ignoring whitespace)
      var joined = trimmed.replace(/\s+/g, "").toUpperCase();
      if (/^[A-E]+$/.test(joined)) return "letters";

      // Format 2 — CSV: 2+ lines, commas present, header has known keywords
      var lines = trimmed.split(/\r?\n/).filter(function(l) { return l.trim() !== ""; });
      if (lines.length >= 2) {
        var firstLine = lines[0].toLowerCase();
        if (firstLine.indexOf(",") !== -1) {
          var csvKeywords = ["answer", "key", "correct_answer", "strand", "topic",
                             "ib_topic_code", "number", "question", "#", "hl"];
          var hasKeyword = csvKeywords.some(function(kw) {
            return firstLine.indexOf(kw) !== -1;
          });
          if (hasKeyword) return "csv";
        }
      }

      // Format 3 — Table: any non-empty line has pipe or tab
      var hasDelimiter = lines.some(function(l) {
        return l.indexOf("|") !== -1 || l.indexOf("\t") !== -1;
      });
      if (hasDelimiter) return "table";

      return "unknown";
    }

    /**
     * Parse letters-only format: "ABDCE" → rows
     */
    function ebBulkParseLetters(text) {
      var chars = text.replace(/\s+/g, "").toUpperCase().split("");
      var rows = [];
      for (var i = 0; i < chars.length; i++) {
        rows.push({
          number: i + 1,
          correct_answer: chars[i],
          strand: "KU",
          ib_topic_code: "",
          hl_only: false
        });
      }
      return rows;
    }

    /**
     * Parse CSV format with header row
     */
    function ebBulkParseCsv(text) {
      var lines = text.trim().split(/\r?\n/).filter(function(l) { return l.trim() !== ""; });
      if (lines.length < 2) return [];

      // Parse header to find column indices
      var headers = lines[0].split(",").map(function(h) { return h.trim().toLowerCase(); });
      var colMap = { number: -1, answer: -1, strand: -1, topic: -1, hl: -1 };

      for (var i = 0; i < headers.length; i++) {
        var h = headers[i];
        if (h === "#" || h === "number" || h === "question" || h === "q") colMap.number = i;
        else if (h === "answer" || h === "key" || h === "correct_answer" || h === "correct") colMap.answer = i;
        else if (h === "strand") colMap.strand = i;
        else if (h === "topic" || h === "ib_topic_code" || h === "ib_topic" || h === "code") colMap.topic = i;
        else if (h === "hl" || h === "hl_only") colMap.hl = i;
      }

      var rows = [];
      for (var r = 1; r < lines.length; r++) {
        var cols = lines[r].split(",").map(function(c) { return c.trim(); });
        var answer = colMap.answer >= 0 ? cols[colMap.answer] || "" : "";
        answer = answer.toUpperCase().replace(/[^A-E]/g, "");

        var strand = colMap.strand >= 0 ? cols[colMap.strand] || "" : "";
        strand = strand.toUpperCase();
        if (strand && ["KU", "TT", "C"].indexOf(strand) === -1) strand = "";

        var topic = colMap.topic >= 0 ? cols[colMap.topic] || "" : "";
        var hlRaw = colMap.hl >= 0 ? (cols[colMap.hl] || "").toLowerCase() : "";
        var hlOnly = hlRaw === "true" || hlRaw === "yes" || hlRaw === "1" || hlRaw === "hl";

        rows.push({
          number: colMap.number >= 0 ? parseInt(cols[colMap.number], 10) || (r) : r,
          correct_answer: answer,
          strand: strand,
          ib_topic_code: topic,
          hl_only: hlOnly
        });
      }
      return rows;
    }

    /**
     * Parse pipe/tab table format
     */
    function ebBulkParseTable(text) {
      var lines = text.trim().split(/\r?\n/).filter(function(l) { return l.trim() !== ""; });
      if (lines.length === 0) return [];

      // Determine delimiter: pipe or tab
      var delim = lines[0].indexOf("|") !== -1 ? "|" : "\t";

      // Check if first line is a header
      var firstCols = lines[0].split(delim).map(function(c) { return c.trim().toLowerCase(); });
      var headerKeywords = ["answer", "key", "correct_answer", "strand", "topic",
                            "ib_topic_code", "number", "question", "#", "hl"];
      var isHeader = headerKeywords.some(function(kw) {
        return firstCols.indexOf(kw) !== -1;
      });

      var colMap = { number: 0, answer: 1, strand: 2, topic: 3, hl: -1 };
      var dataStart = 0;

      if (isHeader) {
        // Map columns from header
        colMap = { number: -1, answer: -1, strand: -1, topic: -1, hl: -1 };
        for (var i = 0; i < firstCols.length; i++) {
          var h = firstCols[i];
          if (h === "#" || h === "number" || h === "question" || h === "q") colMap.number = i;
          else if (h === "answer" || h === "key" || h === "correct_answer" || h === "correct") colMap.answer = i;
          else if (h === "strand") colMap.strand = i;
          else if (h === "topic" || h === "ib_topic_code" || h === "ib_topic" || h === "code") colMap.topic = i;
          else if (h === "hl" || h === "hl_only") colMap.hl = i;
        }
        dataStart = 1;
      }

      var rows = [];
      for (var r = dataStart; r < lines.length; r++) {
        var cols = lines[r].split(delim).map(function(c) { return c.trim(); });
        // Skip separator rows (e.g., "---|---|---")
        if (cols.every(function(c) { return /^[-=:]+$/.test(c) || c === ""; })) continue;

        var answer = colMap.answer >= 0 ? (cols[colMap.answer] || "") : "";
        answer = answer.toUpperCase().replace(/[^A-E]/g, "");

        var strand = colMap.strand >= 0 ? (cols[colMap.strand] || "") : "";
        strand = strand.toUpperCase();
        if (strand && ["KU", "TT", "C"].indexOf(strand) === -1) strand = "";

        var topic = colMap.topic >= 0 ? (cols[colMap.topic] || "") : "";
        var hlRaw = colMap.hl >= 0 ? (cols[colMap.hl] || "").toLowerCase() : "";
        var hlOnly = hlRaw === "true" || hlRaw === "yes" || hlRaw === "1" || hlRaw === "hl";

        var rowNum = colMap.number >= 0 ? parseInt(cols[colMap.number], 10) : NaN;
        if (isNaN(rowNum)) rowNum = rows.length + 1;

        rows.push({
          number: rowNum,
          correct_answer: answer,
          strand: strand,
          ib_topic_code: topic,
          hl_only: hlOnly
        });
      }
      return rows;
    }

    /**
     * Orchestrator: read textarea → detect → parse → validate → preview
     */
    function ebBulkParse() {
      var text = document.getElementById("eb-bulk-input").value;
      if (!text.trim()) {
        showToast("Paste some data first.", "error");
        return;
      }

      var format = ebBulkDetectFormat(text);
      EB.bulkDetectedFormat = format;

      // Show format badge
      var badge = document.getElementById("eb-bulk-format-badge");
      badge.className = "eb-bulk-format-badge";
      badge.textContent = "";

      if (format === "unknown") {
        showToast("Could not detect format. Use letters (ABDCE), CSV with headers, or pipe/tab table.", "error");
        document.getElementById("eb-bulk-preview").style.display = "none";
        document.getElementById("eb-bulk-validation").style.display = "none";
        return;
      }

      badge.textContent = format;
      badge.classList.add(format);

      // Parse based on format
      var rows = [];
      if (format === "letters") rows = ebBulkParseLetters(text);
      else if (format === "csv") rows = ebBulkParseCsv(text);
      else if (format === "table") rows = ebBulkParseTable(text);

      if (rows.length === 0) {
        showToast("Parsed 0 rows. Check your input format.", "error");
        document.getElementById("eb-bulk-preview").style.display = "none";
        document.getElementById("eb-bulk-validation").style.display = "none";
        return;
      }

      // Sort by number
      rows.sort(function(a, b) { return a.number - b.number; });

      EB.bulkParsedRows = rows;
      document.getElementById("eb-bulk-status").textContent = rows.length + " rows parsed";

      ebBulkValidate();
      ebBulkRenderPreview();
    }

    /**
     * Validate parsed rows and render summary
     */
    function ebBulkValidate() {
      var rows = EB.bulkParsedRows;
      var errors = 0, warnings = 0, infos = 0;

      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        if (!r.correct_answer) errors++;
        else if (!r.strand) warnings++;
        else if (!r.ib_topic_code) infos++;
      }

      var el = document.getElementById("eb-bulk-validation");
      var parts = [];

      if (errors === 0 && warnings === 0 && infos === 0) {
        parts.push('<span class="eb-bulk-val-ok"><span class="eb-bulk-icon eb-bulk-icon-ok">&#10003;</span> All ' + rows.length + ' rows valid</span>');
      } else {
        if (errors > 0) {
          parts.push('<span class="eb-bulk-val-error"><span class="eb-bulk-icon eb-bulk-icon-error">&#10007;</span> ' + errors + ' missing answer' + (errors > 1 ? 's' : '') + '</span>');
        }
        if (warnings > 0) {
          parts.push('<span class="eb-bulk-val-warning"><span class="eb-bulk-icon eb-bulk-icon-warning">&#9888;</span> ' + warnings + ' missing strand' + (warnings > 1 ? 's' : '') + '</span>');
        }
        if (infos > 0) {
          parts.push('<span class="eb-bulk-val-info"><span class="eb-bulk-icon eb-bulk-icon-info">&#8505;</span> ' + infos + ' missing topic' + (infos > 1 ? 's' : '') + '</span>');
        }
      }

      el.innerHTML = parts.join(" &nbsp;&middot;&nbsp; ");
      el.style.display = "";
    }

    /**
     * Render editable preview table
     */
    function ebBulkRenderPreview() {
      var rows = EB.bulkParsedRows;
      var html = '<table class="eb-table"><thead><tr>' +
        '<th>#</th><th>Answer</th><th>Strand</th><th>Topic</th><th>HL</th>' +
        '</tr></thead><tbody>';

      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        // Determine cell highlight class
        var ansClass = !r.correct_answer ? ' class="eb-bulk-cell-error"' : '';
        var strClass = r.correct_answer && !r.strand ? ' class="eb-bulk-cell-warn"' : '';
        var topClass = r.correct_answer && r.strand && !r.ib_topic_code ? ' class="eb-bulk-cell-info"' : '';

        html += '<tr>';
        html += '<td>' + r.number + '</td>';
        html += '<td' + ansClass + '><select data-idx="' + i + '" data-field="correct_answer">' +
          '<option value="">—</option>' +
          ['A','B','C','D','E'].map(function(ch) {
            return '<option value="' + ch + '"' + (r.correct_answer === ch ? ' selected' : '') + '>' + ch + '</option>';
          }).join('') + '</select></td>';
        html += '<td' + strClass + '><select data-idx="' + i + '" data-field="strand">' +
          '<option value="">—</option>' +
          ['KU','TT','C'].map(function(s) {
            return '<option value="' + s + '"' + (r.strand === s ? ' selected' : '') + '>' + s + '</option>';
          }).join('') + '</select></td>';
        html += '<td' + topClass + '><input type="text" data-idx="' + i + '" data-field="ib_topic_code" value="' + escapeHtml(r.ib_topic_code) + '"></td>';
        html += '<td><input type="checkbox" data-idx="' + i + '" data-field="hl_only"' + (r.hl_only ? ' checked' : '') + '></td>';
        html += '</tr>';
      }
      html += '</tbody></table>';

      var area = document.getElementById("eb-bulk-table-area");
      area.innerHTML = html;

      // Wire up change handlers to update EB.bulkParsedRows in real-time
      area.addEventListener("change", function(e) {
        var el = e.target;
        var idx = parseInt(el.getAttribute("data-idx"), 10);
        var field = el.getAttribute("data-field");
        if (isNaN(idx) || !field) return;

        if (field === "hl_only") {
          EB.bulkParsedRows[idx].hl_only = el.checked;
        } else {
          EB.bulkParsedRows[idx][field] = el.value;
        }
      });

      document.getElementById("eb-bulk-preview").style.display = "";
    }

    /**
     * Apply parsed rows to Paper 1A (setPaper1ACount → savePaper1ATable → reload)
     */
    function ebBulkApply() {
      if (!EB.currentExamId) {
        showToast("Select an exam first.", "error");
        return;
      }
      var rows = EB.bulkParsedRows;
      if (!rows || rows.length === 0) {
        showToast("No rows to apply. Parse data first.", "error");
        return;
      }

      // Check for any rows missing an answer
      var missingAns = rows.filter(function(r) { return !r.correct_answer; });
      if (missingAns.length > 0) {
        showToast(missingAns.length + " row(s) still missing an answer. Fix before applying.", "error");
        return;
      }

      showToast("Applying " + rows.length + " questions…", "info");

      // Step 1: Create/resize skeleton
      google.script.run
        .withSuccessHandler(function() {
          // Step 2: Save answer key rows
          var saveRows = rows.map(function(r, i) {
            return {
              qid: "1A_" + String(i + 1).padStart(2, "0"),
              correct_answer: r.correct_answer,
              strand: r.strand || "",
              ib_topic_code: r.ib_topic_code || "",
              hl_only: r.hl_only ? true : false
            };
          });
          google.script.run
            .withSuccessHandler(function() {
              showToast("Paper 1A updated — " + rows.length + " questions applied.", "success");
              // Update count input to match
              document.getElementById("eb-p1a-count").value = rows.length;
              // Reload Step 2 table
              ebLoadPaper1ATable();
              // Clear bulk UI
              ebBulkClear();
            })
            .withFailureHandler(function(err) {
              showToast("Save failed: " + err.message, "error");
            })
            .webapp_savePaper1ATable({ exam_id: EB.currentExamId, rows: saveRows });
        })
        .withFailureHandler(function(err) {
          showToast("Set count failed: " + err.message, "error");
        })
        .webapp_setPaper1ACount({ exam_id: EB.currentExamId, count: rows.length });
    }

    /**
     * Clear all bulk import UI and state
     */
    function ebBulkClear() {
      EB.bulkParsedRows = [];
      EB.bulkDetectedFormat = "";
      var input = document.getElementById("eb-bulk-input");
      if (input) input.value = "";
      var badge = document.getElementById("eb-bulk-format-badge");
      if (badge) { badge.textContent = ""; badge.className = "eb-bulk-format-badge"; }
      var status = document.getElementById("eb-bulk-status");
      if (status) status.textContent = "";
      var val = document.getElementById("eb-bulk-validation");
      if (val) { val.innerHTML = ""; val.style.display = "none"; }
      var preview = document.getElementById("eb-bulk-preview");
      if (preview) preview.style.display = "none";
      var area = document.getElementById("eb-bulk-table-area");
      if (area) area.innerHTML = "";
    }

    // ================================================================
    // Story 13: Question Content Editor (QC sub-module)
    // ================================================================

    /**
     * Load all questions for the current exam into the content editor.
     */
    function qcLoadQuestions() {
      if (!EB.currentExamId) {
        document.getElementById("qc-blocks-list").innerHTML = '<div class="qc-empty">Select an exam first.</div>';
        document.getElementById("qc-blocks-actions").style.display = "none";
        return;
      }
      document.getElementById("qc-blocks-list").innerHTML = '<div class="qc-empty">Loading questions...</div>';
      google.script.run
        .withSuccessHandler(function(questions) {
          EB.contentQuestions = questions || [];
          qcPopulateQuestionSelector(EB.contentQuestions, document.getElementById("qc-paper-filter").value);
          if (EB.contentQuestions.length === 0) {
            document.getElementById("qc-blocks-list").innerHTML = '<div class="qc-empty">No questions found for this exam. Add questions in the Paper tabs first.</div>';
            document.getElementById("qc-blocks-actions").style.display = "none";
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById("qc-blocks-list").innerHTML = '<div class="qc-empty" style="color:#ef4444;">Error: ' + escapeHtml(String(err)) + '</div>';
        })
        .webapp_getExamQuestions(EB.currentExamId);
    }

    /**
     * Populate the question selector dropdown, optionally filtered by paper.
     */
    function qcPopulateQuestionSelector(questions, paperFilter) {
      var sel = document.getElementById("qc-question-select");
      sel.innerHTML = '<option value="">-- Select Question --</option>';
      var filtered = questions;
      if (paperFilter) {
        filtered = questions.filter(function(q) { return q.paper === paperFilter; });
      }
      filtered.forEach(function(q) {
        var opt = document.createElement("option");
        opt.value = q.qid;
        var prefix = q.paper ? "[" + q.paper + "] " : "";
        var label = prefix + (q.label || q.qid);
        if (q.scoring_mode === "container") label += " [Container]";
        if (q.parent_qid) label = "  \u2514 " + label;
        opt.textContent = label;
        sel.appendChild(opt);
      });
      // Reset selection
      EB.selectedContentQid = "";
      EB.contentBlocks = [];
      document.getElementById("qc-blocks-list").innerHTML = '<div class="qc-empty">Select a question to edit its content blocks.</div>';
      document.getElementById("qc-blocks-actions").style.display = "none";
    }

    function qcFilterChanged() {
      var paperFilter = document.getElementById("qc-paper-filter").value;
      qcPopulateQuestionSelector(EB.contentQuestions, paperFilter);
    }

    /**
     * When a question is selected, load its content blocks.
     */
    function qcQuestionChanged() {
      var qid = document.getElementById("qc-question-select").value;
      if (!qid) {
        EB.selectedContentQid = "";
        EB.contentBlocks = [];
        document.getElementById("qc-blocks-list").innerHTML = '<div class="qc-empty">Select a question to edit its content blocks.</div>';
        document.getElementById("qc-blocks-actions").style.display = "none";
        return;
      }
      EB.selectedContentQid = qid;
      document.getElementById("qc-blocks-list").innerHTML = '<div class="qc-empty">Loading content...</div>';
      document.getElementById("qc-blocks-actions").style.display = "none";

      google.script.run
        .withSuccessHandler(function(blocks) {
          EB.contentBlocks = blocks || [];
          document.getElementById("qc-blocks-actions").style.display = "";
          qcRenderBlocks();
        })
        .withFailureHandler(function(err) {
          document.getElementById("qc-blocks-list").innerHTML = '<div class="qc-empty" style="color:#ef4444;">Error: ' + escapeHtml(String(err)) + '</div>';
        })
        .webapp_getQuestionContent(EB.currentExamId, qid);
    }

    /**
     * Render all content blocks for the selected question.
     */
    function qcRenderBlocks() {
      var container = document.getElementById("qc-blocks-list");
      if (!EB.contentBlocks.length) {
        container.innerHTML = '<div class="qc-empty">No content blocks yet. Use the buttons below to add text or image blocks.</div>';
        return;
      }
      var html = "";
      EB.contentBlocks.forEach(function(block, idx) {
        html += '<div class="qc-block">';
        html += '<div class="qc-block-header">';
        html += '<span class="qc-type-badge ' + escapeHtml(block.block_type) + '">' + escapeHtml(block.block_type) + '</span>';
        html += '<span class="qc-block-order">#' + (idx + 1) + '</span>';
        html += '<button class="qc-arrow-btn" onclick="qcMoveBlock(' + idx + ',-1)" title="Move up"' + (idx === 0 ? ' disabled' : '') + '>&#9650;</button>';
        html += '<button class="qc-arrow-btn" onclick="qcMoveBlock(' + idx + ',1)" title="Move down"' + (idx === EB.contentBlocks.length - 1 ? ' disabled' : '') + '>&#9660;</button>';
        html += '<button class="qc-delete-btn" onclick="qcRemoveBlock(' + idx + ')" title="Remove block">&#10005;</button>';
        html += '</div>';
        html += '<div class="qc-block-body">';

        if (block.block_type === "image") {
          html += '<div class="qc-fileid-row">';
          html += '<input class="qc-fileid-input" type="text" placeholder="Google Drive file ID" value="' + escapeHtml(block.content) + '" onchange="qcUpdateBlock(' + idx + ',\'content\',this.value)" oninput="qcPreviewImage(' + idx + ',this.value)">';
          html += '<button class="qc-browse-btn eb-btn" onclick="qcPickImage(' + idx + ')" title="Browse Google Drive">Browse Drive</button>';
          html += '</div>';
          if (block.content) {
            html += '<div class="qc-image-preview" id="qc-preview-' + idx + '"><img src="https://drive.google.com/thumbnail?id=' + encodeURIComponent(block.content) + '&sz=w400" alt="Preview" onerror="this.parentElement.innerHTML=\'<span style=color:#ef4444;font-size:12px>Image not found. Check the file ID.</span>\'"></div>';
          } else {
            html += '<div class="qc-image-preview" id="qc-preview-' + idx + '"></div>';
          }
        } else {
          // Formatting toolbar
          html += '<div class="qc-toolbar">';
          html += '<button type="button" class="qc-tool-btn" onclick="qcInsertAtCursor(' + idx + ',\'$X_{2}$\')" title="Subscript">x<sub>n</sub></button>';
          html += '<button type="button" class="qc-tool-btn" onclick="qcInsertAtCursor(' + idx + ',\'$X^{2}$\')" title="Superscript">x<sup>n</sup></button>';
          html += '<button type="button" class="qc-tool-btn" onclick="qcInsertAtCursor(' + idx + ',\'$H_2O$\')" title="Water">H\u2082O</button>';
          html += '<button type="button" class="qc-tool-btn" onclick="qcInsertAtCursor(' + idx + ',\'$CO_2$\')" title="Carbon dioxide">CO\u2082</button>';
          html += '<button type="button" class="qc-tool-btn" onclick="qcInsertAtCursor(' + idx + ',\'$^{+}$\')" title="Positive charge">\u207A</button>';
          html += '<button type="button" class="qc-tool-btn" onclick="qcInsertAtCursor(' + idx + ',\'$^{-}$\')" title="Negative charge">\u207B</button>';
          html += '<span class="qc-tool-hint">Use $...$ for formulas</span>';
          html += '</div>';
          // Textarea with ID for cursor targeting
          html += '<textarea id="qc-text-' + idx + '" class="qc-textarea" placeholder="Enter question text..." oninput="qcUpdateBlock(' + idx + ',\'content\',this.value); qcUpdateTextPreview(' + idx + ', this.value)" onchange="qcUpdateBlock(' + idx + ',\'content\',this.value)">' + escapeHtml(block.content) + '</textarea>';
          // Live preview
          var previewHtml = (block.content && block.content.trim()) ? renderChem(block.content).replace(/\n/g, '<br>') : '';
          html += '<div class="qc-preview" id="qc-preview-text-' + idx + '"' + (!previewHtml ? ' style="display:none"' : '') + '>' + previewHtml + '</div>';
        }

        html += '</div></div>';
      });
      container.innerHTML = html;
    }

    function qcUpdateBlock(index, field, value) {
      if (EB.contentBlocks[index]) {
        EB.contentBlocks[index][field] = value;
      }
    }

    function qcPreviewImage(index, fileId) {
      var previewEl = document.getElementById("qc-preview-" + index);
      if (!previewEl) return;
      if (fileId && fileId.trim()) {
        previewEl.innerHTML = '<img src="https://drive.google.com/thumbnail?id=' + encodeURIComponent(fileId.trim()) + '&sz=w400" alt="Preview" onerror="this.parentElement.innerHTML=\'<span style=color:#ef4444;font-size:12px>Image not found. Check the file ID.</span>\'">';
      } else {
        previewEl.innerHTML = "";
      }
    }

    function qcInsertAtCursor(blockIndex, text) {
      var textarea = document.getElementById("qc-text-" + blockIndex);
      if (!textarea) return;
      var start = textarea.selectionStart;
      var end = textarea.selectionEnd;
      var val = textarea.value;
      textarea.value = val.substring(0, start) + text + val.substring(end);
      textarea.selectionStart = textarea.selectionEnd = start + text.length;
      textarea.focus();
      qcUpdateBlock(blockIndex, 'content', textarea.value);
      qcUpdateTextPreview(blockIndex, textarea.value);
    }

    function qcUpdateTextPreview(blockIndex, content) {
      var previewEl = document.getElementById("qc-preview-text-" + blockIndex);
      if (!previewEl) return;
      if (content && content.trim()) {
        previewEl.innerHTML = renderChem(content).replace(/\n/g, '<br>');
        previewEl.style.display = "";
      } else {
        previewEl.innerHTML = "";
        previewEl.style.display = "none";
      }
    }

    function qcMoveBlock(index, direction) {
      var target = index + direction;
      if (target < 0 || target >= EB.contentBlocks.length) return;
      var temp = EB.contentBlocks[index];
      EB.contentBlocks[index] = EB.contentBlocks[target];
      EB.contentBlocks[target] = temp;
      // Re-number block_order
      EB.contentBlocks.forEach(function(b, i) { b.block_order = i + 1; });
      qcRenderBlocks();
    }

    function qcRemoveBlock(index) {
      EB.contentBlocks.splice(index, 1);
      EB.contentBlocks.forEach(function(b, i) { b.block_order = i + 1; });
      qcRenderBlocks();
    }

    function qcAddBlock(type) {
      var nextOrder = EB.contentBlocks.length + 1;
      EB.contentBlocks.push({
        block_order: nextOrder,
        block_type: type,
        content: ""
      });
      qcRenderBlocks();
    }

    function qcSaveBlocks() {
      if (!EB.currentExamId || !EB.selectedContentQid) return;

      var statusEl = document.getElementById("qc-save-status");
      statusEl.textContent = "Saving...";
      statusEl.className = "qc-save-status";

      // Re-number block_order before saving
      EB.contentBlocks.forEach(function(b, i) { b.block_order = i + 1; });

      google.script.run
        .withSuccessHandler(function() {
          statusEl.textContent = "Saved!";
          statusEl.className = "qc-save-status success";
          setTimeout(function() { statusEl.textContent = ""; }, 3000);
        })
        .withFailureHandler(function(err) {
          statusEl.textContent = "Error: " + String(err);
          statusEl.className = "qc-save-status error";
        })
        .webapp_saveQuestionContent({
          exam_id: EB.currentExamId,
          qid: EB.selectedContentQid,
          blocks: EB.contentBlocks
        });
    }

    // ================================================================
    // Story 13b: Drive Picker for image block selection
    // Reuses RP.pickerConfig, RP.pickerLoaded, rpLoadPickerApi()
    // ================================================================

    /**
     * Open Google Picker to select an image file for the given block.
     */
    /**
     * Story 15: Browse Drive for images — two-step flow.
     * Step 1: Open folder picker (which works with OAuth-only).
     * Step 2: Fetch image list from selected folder, show thumbnail grid.
     */
    function qcPickImage(blockIndex) {
      EB.pickerTargetBlockIndex = blockIndex;

      // Reuse RP's cached config if available
      if (RP.pickerConfig) {
        rpLoadPickerApi(function() { qcShowFolderPicker(); });
        return;
      }

      google.script.run
        .withSuccessHandler(function(cfg) {
          RP.pickerConfig = cfg;
          rpLoadPickerApi(function() { qcShowFolderPicker(); });
        })
        .withFailureHandler(function(err) {
          showToast("Could not load picker: " + (err.message || err), "error");
        })
        .webapp_getPickerConfig();
    }

    function qcShowFolderPicker() {
      if (!RP.pickerConfig || !RP.pickerConfig.oauthToken) {
        showToast("Picker not configured. Try again.", "error");
        return;
      }

      var folderView = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
        .setIncludeFolders(true)
        .setSelectFolderEnabled(true);

      var picker = new google.picker.PickerBuilder()
        .setTitle("Select Folder Containing Images")
        .addView(folderView)
        .setOAuthToken(RP.pickerConfig.oauthToken)
        .setCallback(qcFolderPickerCallback)
        .build();
      picker.setVisible(true);
    }

    function qcFolderPickerCallback(data) {
      if (data.action === google.picker.Action.PICKED) {
        var doc = data.docs && data.docs[0];
        if (doc && doc.id) {
          qcLoadImagesFromFolder(doc.id, doc.name || "Selected Folder");
        }
      }
    }

    function qcLoadImagesFromFolder(folderId, folderName) {
      document.getElementById("ib-modal").style.display = "";
      document.getElementById("ib-folder-name").textContent = folderName;
      document.getElementById("ib-loading").style.display = "";
      document.getElementById("ib-grid").innerHTML = "";
      document.getElementById("ib-empty").style.display = "none";

      google.script.run
        .withSuccessHandler(function(images) {
          document.getElementById("ib-loading").style.display = "none";
          if (!images || !images.length) {
            document.getElementById("ib-empty").style.display = "";
            return;
          }
          qcRenderImageGrid(images);
        })
        .withFailureHandler(function(err) {
          document.getElementById("ib-loading").style.display = "none";
          document.getElementById("ib-grid").innerHTML =
            '<div style="padding:20px;text-align:center;color:#991b1b;">' +
            escapeHtml(err.message || "Failed to load images") + '</div>';
        })
        .webapp_listDriveImages(folderId);
    }

    function qcRenderImageGrid(images) {
      var html = '';
      images.forEach(function(img) {
        html += '<div class="ib-thumb" onclick="qcSelectImage(\'' +
          escapeHtml(img.id) + '\',\'' + escapeHtml(img.name).replace(/'/g, "\\'") + '\')">';
        html += '<img src="' + escapeHtml(img.thumbnailUrl) + '" alt="' +
          escapeHtml(img.name) + '">';
        html += '<div class="ib-thumb-name">' + escapeHtml(img.name) + '</div>';
        html += '</div>';
      });
      document.getElementById("ib-grid").innerHTML = html;
    }

    function qcSelectImage(fileId, fileName) {
      var idx = EB.pickerTargetBlockIndex;
      if (idx !== undefined && EB.contentBlocks[idx]) {
        EB.contentBlocks[idx].content = fileId;
        qcRenderBlocks();
        showToast("Image selected: " + fileName, "success");
      }
      qcCloseImageBrowser();
    }

    function qcCloseImageBrowser() {
      document.getElementById("ib-modal").style.display = "none";
    }

    function rpLoadStudents() {
      if (!RP.currentExamId) {
        showToast("Select an exam first.", "error");
        return;
      }
      var classSection = document.getElementById("rp-class-select").value || "";

      google.script.run
        .withSuccessHandler(function(students) {

          rpUpdateSelectedCount();

          showToast("Failed to load students: " + err.message, "error");
        })
        .webapp_getStudentsForReports(RP.currentExamId, classSection);

    function rpRenderStudentList() {
      var container = document.getElementById("rp-student-list");
      if (RP.students.length === 0) {
        container.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;">No students found for this exam/class combination.</div>';
        return;
      }

      var html = "";
      for (var i = 0; i < RP.students.length; i++) {
        var s = RP.students[i];
        var key = s.student_key;
        var checked = RP.selectedKeys[key] ? " checked" : "";
        var classLabel = s.class_section ? ' <span style="color:#6b7280;font-size:12px;">(' + escapeHtml(s.class_section) + ')</span>' : "";
        html += '<label class="rp-student-item">' +
          '<input type="checkbox" data-key="' + escapeHtml(key) + '" onchange="rpToggleStudent(\'' + escapeHtml(key) + '\')"' + checked + '>' +
          '<span>' + escapeHtml(s.last_name) + ', ' + escapeHtml(s.first_name) + classLabel + '</span>' +
          '</label>';
      }
      container.innerHTML = html;
    }

    // ================================================================

    function rpToggleStudent(key) {
      if (RP.selectedKeys[key]) {
        delete RP.selectedKeys[key];
      } else {
        RP.selectedKeys[key] = true;
      }
      rpUpdateSelectedCount();
    }

    function rpSelectAll() {

        RP.selectedKeys[RP.students[i].student_key] = true;

      var boxes = document.querySelectorAll("#rp-student-list input[type=checkbox]");
      for (var j = 0; j < boxes.length; j++) boxes[j].checked = false;
      rpUpdateSelectedCount();

    function rpUpdateSelectedCount() {
      var count = Object.keys(RP.selectedKeys).length;
      document.getElementById("rp-selected-count").textContent = count + " selected";
      document.getElementById("rp-generate-btn").disabled = !(RP.folderId && count > 0);

    // ================================================================
    // Report generation — sequential one-at-a-time
    // ================================================================

    function rpGenerateReports() {
      if (RP.generating) return;
      if (!RP.folderId) {
        showToast("Create a folder first.", "error");
        return;
      }
      var keys = Object.keys(RP.selectedKeys);
      if (keys.length === 0) {
        showToast("Select at least one student.", "error");
        return;
      }

      // Build ordered list of selected students
      var selectedStudents = RP.students.filter(function(s) {
        return RP.selectedKeys[s.student_key];
      });

      RP.generating = true;

      var rpOptions = {
        format: document.getElementById("rp-format-select").value || "doc",
        namingPattern: document.getElementById("rp-naming-select").value || "custom"
      };

      // Lock controls
      document.getElementById("rp-generate-btn").disabled = true;
      document.getElementById("rp-exam-select").disabled = true;
      document.getElementById("rp-class-select").disabled = true;
      document.getElementById("rp-create-folder-btn").disabled = true;

      // Show progress, clear results
      document.getElementById("rp-progress-section").style.display = "";
      document.getElementById("rp-results-section").style.display = "";
      document.getElementById("rp-results-list").innerHTML = "";
      document.getElementById("rp-open-folder-btn").style.display = "none";

      var completed = 0;
      var total = selectedStudents.length;
      rpUpdateProgress(0, total);

      function processNext(index) {
        if (index >= total) {
          // All done
          var bar = document.getElementById("rp-progress-bar");
          bar.style.width = "100%";
          bar.textContent = "Complete!";

          document.getElementById("rp-open-folder-btn").style.display = "";
          RP.generating = false;

          // Re-enable controls
          document.getElementById("rp-exam-select").disabled = false;
          document.getElementById("rp-class-select").disabled = false;
          document.getElementById("rp-create-folder-btn").disabled = false;
          rpUpdateSelectedCount();

          showToast("All " + total + " reports generated.", "success");
          return;
        }

        var student = selectedStudents[index];
        var displayName = escapeHtml(student.last_name) + ", " + escapeHtml(student.first_name);

        google.script.run
          .withSuccessHandler(function(result) {
            completed++;
            rpUpdateProgress(completed, total);

            var links = '<a href="' + escapeHtml(result.url) + '" target="_blank">Open Report</a>';
            if (result.pdfUrl && rpOptions.format === "both") {
              links += ' | <a href="' + escapeHtml(result.pdfUrl) + '" target="_blank">Open PDF</a>';
            }
            var item = '<div class="rp-result-item rp-result-success">' +
              '&#10003; ' + displayName + ' — ' + links + '</div>';
            document.getElementById("rp-results-list").innerHTML += item;

            processNext(index + 1);
          })
          .withFailureHandler(function(err) {
            completed++;
            rpUpdateProgress(completed, total);

            var item = '<div class="rp-result-item rp-result-error">' +
              '&#10007; ' + displayName +
              ' — Error: ' + escapeHtml(err.message || "Unknown error") + '</div>';
            document.getElementById("rp-results-list").innerHTML += item;

            processNext(index + 1);
          })
          .webapp_generateStudentReport(RP.currentExamId, student.student_key, RP.folderId, rpOptions);
      }

      processNext(0);
    }

    function rpUpdateProgress(completed, total) {
      var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
      var bar = document.getElementById("rp-progress-bar");
      bar.style.width = pct + "%";
      bar.textContent = completed + "/" + total;
    }

    // ================================================================
    // Google Picker — Drive folder selection
    // ================================================================

    function rpPickFolder() {
      if (RP.pickerConfig) {
        rpShowPicker();
        return;
      }
      var btn = document.querySelector('[onclick="rpPickFolder()"]');
      if (btn) { btn.disabled = true; btn.textContent = "Loading…"; }

      google.script.run
        .withSuccessHandler(function(cfg) {
          RP.pickerConfig = cfg;
          if (btn) { btn.disabled = false; btn.textContent = "Choose Folder"; }
          rpLoadPickerApi(function() { rpShowPicker(); });
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.textContent = "Choose Folder"; }
          showToast("Could not load picker: " + (err.message || err), "error");
        })
        .webapp_getPickerConfig();
    }

    function rpLoadPickerApi(callback) {
      if (RP.pickerLoaded) { callback(); return; }
      if (window.gapi && gapi.load) {
        gapi.load("picker", function() { RP.pickerLoaded = true; callback(); });
        return;
      }
      var script = document.createElement("script");
      script.src = "https://apis.google.com/js/api.js";
      script.onload = function() {
        gapi.load("picker", function() { RP.pickerLoaded = true; callback(); });
      };
      script.onerror = function() {
        showToast("Failed to load Google API script.", "error");
      };
      document.head.appendChild(script);
    }

    function rpShowPicker() {
      if (!RP.pickerConfig || !RP.pickerConfig.oauthToken) {
        showToast("Picker not configured. Try again.", "error");
        return;
      }
      var folderView = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
        .setSelectFolderEnabled(true)
        .setMimeTypes("application/vnd.google-apps.folder");

      var picker = new google.picker.PickerBuilder()
        .setTitle("Select Report Destination Folder")
        .addView(folderView)
        .setOAuthToken(RP.pickerConfig.oauthToken)
        .setCallback(rpPickerCallback)
        .build();
      picker.setVisible(true);
    }

    function rpPickerCallback(data) {
      if (data.action === google.picker.Action.PICKED) {
        var doc = data.docs && data.docs[0];
        if (doc) {
          RP.parentFolderId = doc.id;
          RP.parentFolderName = doc.name || doc.id;
          var statusEl = document.getElementById("rp-folder-status");
          if (statusEl) {
            statusEl.innerHTML = 'Destination: <strong>' + escapeHtml(RP.parentFolderName) + '</strong>';
          }
          // Reset subfolder since destination changed
          RP.folderId = null;
          RP.folderUrl = null;
          rpUpdateSelectedCount();
          showToast("Folder selected: " + RP.parentFolderName, "success");
        }
      } else if (data.action === google.picker.Action.CANCEL) {
        // User cancelled — do nothing
      }
    }

    function dbRenderCards(scores, totals) {
      var n = scores.length;
      var maxPts = Number(totals.overall_possible || 0);

      // Average total points
      var sumPts = 0;
      for (var i = 0; i < n; i++) sumPts += Number(scores[i].total_points || 0);
      var avgPts = n > 0 ? (sumPts / n).toFixed(1) : "0";

      // Average IB grade
      var sumIB = 0, ibCount = 0;
      for (var i = 0; i < n; i++) {
        var g = parseInt(scores[i].ib_grade, 10);
        if (!isNaN(g)) { sumIB += g; ibCount++; }
      }
      var avgIB = ibCount > 0 ? (sumIB / ibCount).toFixed(1) : "—";

      // Mode helper
      function modeOf(arr) {
        var freq = {};
        arr.forEach(function(v) { if (v) freq[v] = (freq[v] || 0) + 1; });
        var best = "—", bestN = 0;
        for (var k in freq) { if (freq[k] > bestN) { bestN = freq[k]; best = k; } }
        return best;
      }

      var kuMode = modeOf(scores.map(function(s) { return s.ku_band; }));
      var ttMode = modeOf(scores.map(function(s) { return s.tt_band; }));
      var cMode  = modeOf(scores.map(function(s) { return s.c_band; }));

      var cards = [
        { title: "Students Graded", value: n, sub: "" },
        { title: "Class Average", value: avgPts, sub: maxPts ? "out of " + maxPts + " pts" : "" },
        { title: "IB Grade Avg", value: avgIB, sub: "on 1–7 scale" },
        { title: "KU Band Mode", value: kuMode, sub: "Knowledge &amp; Understanding" },
        { title: "TT Band Mode", value: ttMode, sub: "Thinking &amp; Transfer" },
        { title: "C Band Mode", value: cMode, sub: "Communication" }
      ];

      var html = "";
      cards.forEach(function(c) {
        html += '<div class="db-card">'
          + '<div class="db-card-title">' + c.title + '</div>'
          + '<div class="db-card-value">' + c.value + '</div>'
          + (c.sub ? '<div class="db-card-sub">' + c.sub + '</div>' : '')
          + '</div>';
      });

      document.getElementById("db-cards").innerHTML = html;
    }

    function examViewerInit() {

    function evExamChanged() {
      var sel = document.getElementById("ev-exam-select");
      EV.currentExamId = sel ? sel.value : "";
      if (!EV.currentExamId) return;

      // Find exam and parse papers
      var exam = null;
      for (var i = 0; i < EV.exams.length; i++) {
        if (String(EV.exams[i].exam_id) === EV.currentExamId) { exam = EV.exams[i]; break; }
      }
      if (!exam) return;

      var raw = String(exam.papers_included || "");
      EV.papers = raw.split(",").map(function(p) { return p.trim(); }).filter(Boolean);

      if (!EV.papers.length) {
        evShowEmpty("No papers configured for this exam.");
        return;
      }

      // Build paper tabs
      var tabHtml = "";
      EV.papers.forEach(function(p) {
        var label = "Paper " + p;
        tabHtml += '<button class="ev-paper-tab" data-paper="' + escapeHtml(p) + '" onclick="evSelectPaper(\'' + escapeHtml(p) + '\')">' + escapeHtml(label) + '</button>';
      });
      document.getElementById("ev-paper-tabs").innerHTML = tabHtml;
      document.getElementById("ev-paper-tabs").style.display = "";

      // Auto-select first paper
      evSelectPaper(EV.papers[0]);
    }

    function evSelectPaper(paper) {
      EV.currentPaper = paper;

      // Update tab active state
      var tabs = document.querySelectorAll("#ev-paper-tabs .ev-paper-tab");
      for (var i = 0; i < tabs.length; i++) {
        var tp = tabs[i].getAttribute("data-paper") || "";
        tabs[i].className = "ev-paper-tab" + (tp === paper ? " active" : "");
      }

      evLoadPaper();
    }

    function evLoadPaper() {
      evShowLoading(true);
      document.getElementById("ev-content").style.display = "none";

      var examId = EV.currentExamId;
      var paper = EV.currentPaper;

      if (paper === "1A") {
        google.script.run
          .withSuccessHandler(function(questions) {
            evShowLoading(false);
            if (!questions || !questions.length) {
              evShowEmpty("No questions found for Paper 1A.");
              return;
            }
            evRenderPaper1A(questions);
          })
          .withFailureHandler(function(err) {
            evShowLoading(false);
            evShowError("Failed to load Paper 1A: " + (err.message || err));
          })
          .webapp_getPaper1ATable(examId);
      } else {
        // Paper 1B or 2
        var paperKey = paper === "1B" ? "paper_1b" : "paper_2";
        google.script.run
          .withSuccessHandler(function(parts) {
            if (!parts || !parts.length) {
              evShowLoading(false);
              evShowEmpty("No questions found for Paper " + escapeHtml(paper) + ".");
              return;
            }
            // Load rubrics sequentially
            evLoadRubricsSequential(parts, 0, {}, function(rubricMap) {
              evShowLoading(false);
              evRenderPaperParts(parts, rubricMap);
            });
          })
          .withFailureHandler(function(err) {
            evShowLoading(false);
            evShowError("Failed to load Paper " + escapeHtml(paper) + ": " + (err.message || err));
          })
          .webapp_getPaperParts(examId, paperKey);
      }
    }

    function evLoadRubricsSequential(questions, index, rubricMap, callback) {
      if (index >= questions.length) {
        callback(rubricMap);
        return;
      }

      var q = questions[index];
      var qid = String(q.qid || "");

      google.script.run
        .withSuccessHandler(function(items) {
          rubricMap[qid] = items || [];
          evLoadRubricsSequential(questions, index + 1, rubricMap, callback);
        })
        .withFailureHandler(function() {
          rubricMap[qid] = [];
          evLoadRubricsSequential(questions, index + 1, rubricMap, callback);
        })
        .webapp_getRubricItems(EV.currentExamId, qid);
    }

      questions.forEach(function(q) {
        html += '<div class="ev-question">'
          + '<div class="ev-q-header">'
          + '<span class="ev-q-label">Q' + escapeHtml(String(q.number || "")) + '</span>';

          var sc = String(q.strand || "").toLowerCase();
          html += '<span class="ev-strand-badge ' + sc + '">' + escapeHtml(String(q.strand)) + '</span>';

        }
        if (q.hl_only === true || q.hl_only === "true" || q.hl_only === "TRUE") {
          html += '<span class="ev-hl-badge">HL</span>';
        }

        html += '</div>'; // end header
        html += '<div class="ev-q-body">'
          + '<span class="ev-mcq-answer">' + escapeHtml(String(q.correct_answer || "—")) + '</span>'
          + '</div>';
        html += '</div>'; // end question
      });

      evHideStates();
      document.getElementById("ev-question-list").innerHTML = html;
      document.getElementById("ev-content").style.display = "";
    }

    function evRenderPaperParts(questions, rubricMap) {
      var html = "";
      questions.forEach(function(q) {
        var qid = String(q.qid || "");
        html += '<div class="ev-question">'
          + '<div class="ev-q-header">'
          + '<span class="ev-q-label">' + escapeHtml(String(q.label || qid)) + '</span>';

        if (q.strand) {
          var sc = String(q.strand || "").toLowerCase();
          html += '<span class="ev-strand-badge ' + sc + '">' + escapeHtml(String(q.strand)) + '</span>';
        }
        if (q.ib_topic_code) {
          html += '<span class="ev-topic-code td-clickable" onclick="tdOpenClassAggregate(\'' + escapeHtml(String(q.ib_topic_code)) + '\', \'' + escapeHtml(EV.currentExamId) + '\', \'\')">' + escapeHtml(String(q.ib_topic_code)) + '</span>';
        }
        if (q.hl_only === true || q.hl_only === "true" || q.hl_only === "TRUE") {
          html += '<span class="ev-hl-badge">HL</span>';
        }
        html += '<span class="ev-max-points">' + Number(q.max_points || 0) + ' pts</span>';
        html += '</div>'; // end header

        // Rubric table
        var items = rubricMap[qid] || [];
        if (items.length) {
          html += '<div class="ev-q-body">'
            + '<table class="ev-rubric-table"><thead><tr><th>Pts</th><th>Criteria</th></tr></thead><tbody>';
          items.forEach(function(item) {
            html += '<tr><td>' + Number(item.points || 0) + '</td>'
              + '<td>' + renderChem(String(item.criteria_text || "")) + '</td></tr>';
          });
          html += '</tbody></table></div>';
        }

        html += '</div>'; // end question
      });

      evHideStates();
      document.getElementById("ev-question-list").innerHTML = html;
      document.getElementById("ev-content").style.display = "";
    }

    function tdRenderStudentView(data) {
      var html = "";
      var a = data.aggregate || {};

      // Aggregate summary bar
      html += '<div class="td-aggregate">';
      html += '<div class="td-agg-score">' + a.earned + '/' + a.possible + '</div>';
      html += '<div class="td-agg-pct">' + a.pct + '%</div>';
      html += '<div class="td-agg-label">' + a.questionCount + ' question' + (a.questionCount !== 1 ? 's' : '') + '</div>';
      html += '</div>';

      // Question table with expandable rows
      if (data.questions && data.questions.length) {
        var qc = data.questionContent || {};

        html += '<table class="td-question-table">';
        html += '<thead><tr><th class="td-chevron-cell"></th><th>Exam</th><th>Question</th><th>Paper</th><th>Strand</th><th>Score</th><th>Result</th></tr></thead>';
        html += '<tbody>';

        data.questions.forEach(function(q) {
          var rowKey = q.examId + "||" + q.qid;
          var isExpanded = !!TD.expandedRows[rowKey];

          // Determine if content is available
          var contentBlocks = (qc[q.examId] && qc[q.examId][q.qid]) ? qc[q.examId][q.qid] : [];
          var hasContent = contentBlocks.length > 0 || (q.questionText && q.questionText.trim());
          var hasExpandable = hasContent && q.showQuestions;

          var pct = q.pointsPossible > 0 ? Math.round(q.pointsEarned / q.pointsPossible * 100) : 0;
          var cls = pct >= 75 ? "td-good" : (pct >= 50 ? "td-partial" : "td-poor");

          // Summary row
          html += '<tr class="' + cls + (hasExpandable ? ' td-expandable' : '') + '"' +
            (hasExpandable ? ' onclick="tdToggleRow(\'' + escapeHtml(rowKey) + '\')"' : '') + '>';

          // Chevron column
          if (hasExpandable) {
            html += '<td class="td-chevron-cell"><span class="td-row-chevron' + (isExpanded ? ' open' : '') + '">&#9654;</span></td>';
          } else {
            html += '<td class="td-chevron-cell"></td>';
          }

          // Exam name — clickable link to full exam
          html += '<td><a href="#" class="td-exam-link" onclick="event.stopPropagation(); tdNavigateToExam(\'' + escapeHtml(q.examId) + '\'); return false;">' + escapeHtml(q.examName) + '</a></td>';
          html += '<td>' + escapeHtml(q.label) + '</td>';
          html += '<td>' + escapeHtml(q.paper) + '</td>';
          html += '<td>' + seStrandBadge(q.strand) + '</td>';
          html += '<td>' + q.pointsEarned + '/' + q.pointsPossible + '</td>';

          if (q.isCorrectMcq === "1" || q.isCorrectMcq === "true" || q.isCorrectMcq === "TRUE") {
            html += '<td><span class="td-result correct">&#10003;</span></td>';
          } else if (q.isCorrectMcq === "0" || q.isCorrectMcq === "false" || q.isCorrectMcq === "FALSE") {
            html += '<td><span class="td-result incorrect">&#10007;</span></td>';
          } else {
            html += '<td>' + pct + '%</td>';
          }
          html += '</tr>';

          // Detail row (expandable content)
          if (hasExpandable) {
            html += '<tr class="td-detail-row"' + (isExpanded ? '' : ' style="display:none;"') + '>';
            html += '<td colspan="7" class="td-detail-cell">';

            // Render content blocks
            if (contentBlocks.length) {
              html += '<div class="td-question-content">';
              contentBlocks.forEach(function(b) {
                if (b.block_type === "image" && b.content) {
                  html += '<div class="td-content-block"><img class="td-content-image" src="https://drive.google.com/thumbnail?id=' + encodeURIComponent(b.content) + '&sz=w600" alt="Question image"></div>';
                } else if (b.content) {
                  html += '<div class="td-content-block">' + renderChem(String(b.content)).replace(/\n/g, '<br>') + '</div>';
                }
              });
              html += '</div>';
            } else if (q.questionText && q.questionText.trim()) {
              html += '<div class="td-question-content">';
              html += '<div class="td-content-block">' + renderChem(q.questionText).replace(/\n/g, '<br>') + '</div>';
              html += '</div>';
            }

            // View Full Exam link
            html += '<div class="td-view-exam">';
            html += '<a href="#" class="td-view-exam-link" onclick="event.stopPropagation(); tdNavigateToExam(\'' + escapeHtml(q.examId) + '\'); return false;">';
            html += 'View Full Exam &rarr;</a>';
            html += '</div>';

            html += '</td></tr>';
          }
        });

        html += '</tbody></table>';
      }

      document.getElementById("td-body").innerHTML = html;
    }
