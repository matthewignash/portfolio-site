    function tdNavigateToExam(examId) {
      tdClose();
      var role = VAS.active ? "student" : (APP.user ? APP.user.role : "student");
      window.location.hash = "exams";
      showPanelForHash("exams", role);

      if (SE.initialized && SE.exams) {
        seLoadExam(examId);
        var sel = document.getElementById("se-exam-select");
        if (sel) sel.value = examId;
      } else {
        TD._pendingExamNav = examId;
      }
    }

    function tdRenderClassView(data) {
      var html = "";
      var ca = data.classAggregate || {};

      // Class aggregate summary bar
      html += '<div class="td-aggregate">';
      html += '<div class="td-agg-score">' + ca.earned + '/' + ca.possible + '</div>';
      html += '<div class="td-agg-pct">' + ca.pct + '%</div>';
      html += '<div class="td-agg-label">' + ca.studentCount + ' student' + (ca.studentCount !== 1 ? 's' : '') + '</div>';
      html += '</div>';

      // Per-student table
      if (data.students && data.students.length) {
        html += '<table class="td-student-table">';
        html += '<thead><tr><th>Student</th><th>Class</th><th>Score</th><th>%</th><th>Qs</th></tr></thead>';
        html += '<tbody>';

        data.students.forEach(function(s) {
          var pct = s.possible > 0 ? Math.round(s.earned / s.possible * 100) : 0;
          var cls = pct >= 75 ? "td-good" : (pct >= 50 ? "td-partial" : "td-poor");
          html += '<tr class="' + cls + '" style="cursor:pointer;" onclick="tdDrillIntoStudent(\'' + escapeHtml(s.studentKey) + '\')">';
          html += '<td><strong>' + escapeHtml(s.lastName) + '</strong>, ' + escapeHtml(s.firstName) + '</td>';
          html += '<td>' + escapeHtml(s.classSection) + '</td>';
          html += '<td>' + s.earned + '/' + s.possible + '</td>';
          html += '<td>' + pct + '%</td>';
          html += '<td>' + s.questions + '</td>';
          html += '</tr>';
        });

        html += '</tbody></table>';
      }

      document.getElementById("td-body").innerHTML = html;
    }

    // Teacher clicks a student row in class aggregate to see their individual drill-down
    function tdDrillIntoStudent(studentKey) {
      TD.studentKey = studentKey;
      TD.mode = "student";
      tdLoad();
    }

    // ================================================================
    // SP — Student Profile Modal (Story 12)
    // ================================================================
    var SP = {
      open: false,
      studentKey: null,
      data: null,
      currentTab: "exams",
      selectedExams: {},
      expandedCategories: {},
      expandedGroups: {}
    };

    /**
     * Open student profile modal — called from CO student table row click.
     */
    function spOpen(studentKey) {
      SP.studentKey = studentKey;
      SP.data = null;
      SP.currentTab = "exams";
      SP.selectedExams = {};
      SP.expandedCategories = {};
      SP.expandedGroups = {};

      document.getElementById("sp-modal").style.display = "";
      document.body.style.overflow = "hidden";
      SP.open = true;

      // Reset UI
      document.getElementById("sp-student-name").textContent = "Loading\u2026";
      document.getElementById("sp-student-meta").textContent = "";
      document.getElementById("sp-tab-content-exams").innerHTML = "";
      document.getElementById("sp-tab-content-topics").innerHTML = "";
      document.getElementById("sp-tab-content-charts").innerHTML = "";
      document.getElementById("sp-exam-filter").style.display = "none";
      document.getElementById("sp-error").style.display = "none";
      spSetTabBtnState("exams");
      spShowTabContent("exams");

      document.getElementById("sp-loading").style.display = "";

      google.script.run
        .withSuccessHandler(function(data) {
          document.getElementById("sp-loading").style.display = "none";
          SP.data = data;
          spRenderHeader(data.student);
          spInitExamSelector(data.examScores);
          spRenderExams(data.examScores);
        })
        .withFailureHandler(function(err) {
          document.getElementById("sp-loading").style.display = "none";
          var el = document.getElementById("sp-error");
          el.textContent = err.message || String(err);
          el.style.display = "";
        })
        .webapp_getStudentProfile(studentKey);
    }

    function spClose() {
      document.getElementById("sp-modal").style.display = "none";
      document.body.style.overflow = "";
      SP.open = false;
      SP.data = null;
    }

    function spRenderHeader(student) {
      var name = escapeHtml(student.last_name || "") + ", " + escapeHtml(student.first_name || "");
      document.getElementById("sp-student-name").textContent = name;

      var meta = "";
      if (student.class_section) meta += escapeHtml(student.class_section);
      if (student.level) {
        var lvlCls = student.level.toUpperCase() === "HL" ? "hl" : "sl";
        meta += ' <span class="level-badge ' + lvlCls + '">' + escapeHtml(student.level.toUpperCase()) + '</span>';
      }
      if (student.email) meta += " &middot; " + escapeHtml(student.email);
      document.getElementById("sp-student-meta").innerHTML = meta;
    }

    // ================================================================
    // SP — Exam selector checkboxes
    // ================================================================

    function spInitExamSelector(examScores) {
      examScores.forEach(function(e) {
        SP.selectedExams[e.exam_id] = true;
      });

      var container = document.getElementById("sp-exam-checkboxes");
      var html = "";
      examScores.forEach(function(e) {
        html += '<label><input type="checkbox" checked onchange="spToggleExam(\'' +
          escapeHtml(e.exam_id) + '\', this.checked)">' +
          escapeHtml(e.exam_name) + '</label>';
      });
      container.innerHTML = html;
    }

    function spToggleExam(examId, checked) {
      SP.selectedExams[examId] = checked;
      if (SP.currentTab === "topics") spRenderTopics();
      if (SP.currentTab === "charts") spRenderCharts();
    }

    function spSelectAllExams() {
      if (!SP.data) return;
      SP.data.examScores.forEach(function(e) { SP.selectedExams[e.exam_id] = true; });
      var inputs = document.querySelectorAll("#sp-exam-checkboxes input");
      for (var i = 0; i < inputs.length; i++) inputs[i].checked = true;
      if (SP.currentTab === "topics") spRenderTopics();
      if (SP.currentTab === "charts") spRenderCharts();
    }

    function spDeselectAllExams() {
      if (!SP.data) return;
      SP.data.examScores.forEach(function(e) { SP.selectedExams[e.exam_id] = false; });
      var inputs = document.querySelectorAll("#sp-exam-checkboxes input");
      for (var i = 0; i < inputs.length; i++) inputs[i].checked = false;
      if (SP.currentTab === "topics") spRenderTopics();
      if (SP.currentTab === "charts") spRenderCharts();
    }

    // ================================================================
    // SP — Tab management
    // ================================================================

    function spSetTab(tab) {
      SP.currentTab = tab;
      spSetTabBtnState(tab);
      spShowTabContent(tab);

      // Show exam filter only on topics/charts tabs
      document.getElementById("sp-exam-filter").style.display =
        (tab === "topics" || tab === "charts") ? "" : "none";

      if (tab === "topics" && SP.data) spRenderTopics();
      if (tab === "charts" && SP.data) spRenderCharts();
    }

    function spSetTabBtnState(tab) {
      var tabs = ["exams", "topics", "charts"];
      tabs.forEach(function(t) {
        var btn = document.getElementById("sp-tab-" + t);
        if (btn) btn.className = "sp-tab-btn" + (t === tab ? " active" : "");
      });
    }

    function spShowTabContent(tab) {
      var tabs = ["exams", "topics", "charts"];
      tabs.forEach(function(t) {
        var el = document.getElementById("sp-tab-content-" + t);
        if (el) el.style.display = (t === tab) ? "" : "none";
      });
    }

    // ================================================================
    // SP — Exams tab
    // ================================================================

    function spRenderExams(examScores) {
      var el = document.getElementById("sp-tab-content-exams");
      if (!examScores || examScores.length === 0) {
        el.innerHTML = '<div class="sp-loading">No exam data available.</div>';
        return;
      }

      var html = '<table class="sp-exam-table">';
      html += '<thead><tr>';
      html += '<th>Exam</th><th>Level</th><th>Total</th><th>IB</th>';
      html += '<th>KU</th><th>TT</th><th>C</th>';
      html += '<th>KU Band</th><th>TT Band</th><th>C Band</th>';
      html += '</tr></thead><tbody>';

      examScores.forEach(function(row) {
        html += '<tr>';
        html += '<td><strong>' + escapeHtml(row.exam_name) + '</strong></td>';
        html += '<td>';
        if (row.level) {
          var lvlCls = row.level.toUpperCase() === "HL" ? "hl" : "sl";
          html += '<span class="level-badge ' + lvlCls + '">' + escapeHtml(row.level) + '</span>';
        }
        html += '</td>';
        html += '<td>' + row.total_points + ' pts</td>';
        html += '<td>' + coGradePill(row.ib_grade) + '</td>';
        html += '<td>' + row.ku_points + '</td>';
        html += '<td>' + row.tt_points + '</td>';
        html += '<td>' + row.c_points + '</td>';
        html += '<td>' + coBandPill(row.ku_band) + '</td>';
        html += '<td>' + coBandPill(row.tt_band) + '</td>';
        html += '<td>' + coBandPill(row.c_band) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      el.innerHTML = html;
    }

    // ================================================================
    // SP — Topics tab (filterable topic tree)
    // ================================================================

    function spGetSelectedExamIds() {
      var map = {};
      Object.keys(SP.selectedExams).forEach(function(eid) {
        if (SP.selectedExams[eid]) map[eid] = true;
      });
      return map;
    }

    function spRenderTopics() {
      var el = document.getElementById("sp-tab-content-topics");
      if (!SP.data || !SP.data.topicsByExam) {
        el.innerHTML = '<div class="sp-loading">No topic data available.</div>';
        return;
      }

      var selectedIds = spGetSelectedExamIds();

      // Re-aggregate topics using only selected exams
      var topicAgg = {};
      SP.data.topicsByExam.forEach(function(t) {
        var earned = 0, possible = 0;
        Object.keys(t.exams).forEach(function(eid) {
          if (selectedIds[eid]) {
            earned += t.exams[eid].earned;
            possible += t.exams[eid].possible;
          }
        });
        if (possible > 0) {
          topicAgg[t.topic] = {
            topic: t.topic,
            description: t.description,
            group: t.group,
            groupDescription: t.groupDescription,
            earned: earned,
            possible: possible
          };
        }
      });

      // Group into categories > groups > subtopics
      var byGroup = {};
      Object.keys(topicAgg).forEach(function(tc) {
        var t = topicAgg[tc];
        if (!byGroup[t.group]) {
          byGroup[t.group] = {
            group: t.group, groupDescription: t.groupDescription,
            earned: 0, possible: 0, subtopics: []
          };
        }
        byGroup[t.group].earned += t.earned;
        byGroup[t.group].possible += t.possible;
        byGroup[t.group].subtopics.push(t);
      });

      var groups = Object.keys(byGroup).map(function(k) { return byGroup[k]; })
        .sort(function(a, b) { return a.group.localeCompare(b.group, undefined, { numeric: true }); });

      var byCategory = {};
      groups.forEach(function(g) {
        var cat = g.group.charAt(0) === "S" ? "Structure" : "Reactivity";
        if (!byCategory[cat]) {
          byCategory[cat] = { category: cat, earned: 0, possible: 0, topicGroups: [] };
        }
        byCategory[cat].earned += g.earned;
        byCategory[cat].possible += g.possible;
        byCategory[cat].topicGroups.push(g);
      });

      var categories = Object.keys(byCategory).map(function(k) { return byCategory[k]; })
        .sort(function(a, b) { return a.category.localeCompare(b.category); });

      if (categories.length === 0) {
        el.innerHTML = '<div class="sp-loading">No topic data for selected exams.</div>';
        return;
      }

      // Render tree
      var html = '<div class="sp-topic-tree">';
      categories.forEach(function(cat) {
        var catKey = "sp-cat-" + cat.category;
        var catExp = SP.expandedCategories[catKey];
        html += '<div class="sp-topic-category">';
        html += '<div class="sp-cat-header' + (catExp ? " expanded" : "") +
          '" onclick="spToggleCat(\'' + catKey + '\')">';
        html += '<span class="sp-expand-name">&#9654; ' + escapeHtml(cat.category) + '</span>';
        var catPct = cat.possible > 0 ? Math.round(cat.earned / cat.possible * 100) : 0;
        html += '<span class="sp-expand-score">' + cat.earned + '/' + cat.possible + ' (' + catPct + '%)</span>';
        html += '</div>';
        html += '<div class="sp-children' + (catExp ? " expanded" : "") + '">';

        cat.topicGroups.forEach(function(grp) {
          var grpKey = "sp-grp-" + grp.group;
          var grpExp = SP.expandedGroups[grpKey];
          html += '<div class="sp-group-header' + (grpExp ? " expanded" : "") +
            '" onclick="spToggleGrp(\'' + grpKey + '\')">';
          html += '<span class="sp-expand-name">&#9654; ' + escapeHtml(grp.group) +
            ': ' + escapeHtml(grp.groupDescription || "") + '</span>';
          var grpPct = grp.possible > 0 ? Math.round(grp.earned / grp.possible * 100) : 0;
          html += '<span class="sp-expand-score">' + grp.earned + '/' + grp.possible + ' (' + grpPct + '%)</span>';
          html += '</div>';
          html += '<div class="sp-children' + (grpExp ? " expanded" : "") + '">';

          grp.subtopics.sort(function(a, b) {
            return a.topic.localeCompare(b.topic, undefined, { numeric: true });
          }).forEach(function(sub) {
            html += '<div class="sp-subtopic-row">';
            html += '<span class="sp-subtopic-code" onclick="event.stopPropagation(); tdOpenTeacherStudent(\'' +
              escapeHtml(sub.topic) + '\', \'\', \'' + escapeHtml(SP.studentKey) + '\')">' +
              escapeHtml(sub.topic) + '</span>';
            html += '<span class="sp-subtopic-desc">' + renderChem(sub.description || "") + '</span>';
            var subPct = sub.possible > 0 ? Math.round(sub.earned / sub.possible * 100) : 0;
            html += '<span class="sp-subtopic-score">' + sub.earned + '/' + sub.possible +
              ' (' + subPct + '%)</span>';
            html += '</div>';
          });
          html += '</div>';
        });
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';

      el.innerHTML = html;
    }

    function spToggleCat(key) {
      SP.expandedCategories[key] = !SP.expandedCategories[key];
      spRenderTopics();
    }

    function spToggleGrp(key) {
      SP.expandedGroups[key] = !SP.expandedGroups[key];
      spRenderTopics();
    }

    // ================================================================
    // SP — Charts tab (Canvas bar charts per topic)
    // ================================================================

    function spRenderCharts() {
      var el = document.getElementById("sp-tab-content-charts");
      spDrawTopicCharts(el);
    }

    function spDrawTopicCharts(container) {
      if (!SP.data || !SP.data.topicsByExam || !SP.data.examScores) {
        container.innerHTML = '<div class="sp-loading">No chart data available.</div>';
        return;
      }

      var selectedIds = spGetSelectedExamIds();

      var orderedExams = SP.data.examScores.filter(function(e) {
        return selectedIds[e.exam_id];
      });

      if (orderedExams.length === 0) {
        container.innerHTML = '<div class="sp-loading">Select at least one exam to see charts.</div>';
        return;
      }

      var topicsWithData = SP.data.topicsByExam.filter(function(t) {
        return orderedExams.some(function(e) {
          return t.exams[e.exam_id] && t.exams[e.exam_id].possible > 0;
        });
      });

      if (topicsWithData.length === 0) {
        container.innerHTML = '<div class="sp-loading">No topic data for selected exams.</div>';
        return;
      }

      var html = '';
      topicsWithData.forEach(function(topic, idx) {
        var canvasId = 'sp-chart-' + idx;
        html += '<div class="sp-chart-section">';
        html += '<div class="sp-chart-title">' + escapeHtml(topic.topic) +
          (topic.description ? ': ' + escapeHtml(topic.description) : '') + '</div>';
        html += '<canvas id="' + canvasId + '" class="sp-chart-canvas" height="120"></canvas>';
        html += '</div>';
      });

      container.innerHTML = html;

      setTimeout(function() {
        topicsWithData.forEach(function(topic, idx) {
          spDrawBarChart('sp-chart-' + idx, topic, orderedExams);
        });
      }, 50);
    }

    function spDrawBarChart(canvasId, topic, orderedExams) {
      var canvas = document.getElementById(canvasId);
      if (!canvas) return;

      var ctx = canvas.getContext("2d");
      var dpr = window.devicePixelRatio || 1;

      var rowHeight = 28;
      var labelWidth = 140;
      var padding = { top: 8, right: 60, bottom: 8, left: 8 };

      var containerWidth = canvas.parentElement.clientWidth || 600;
      canvas.style.width = containerWidth + "px";
      canvas.width = containerWidth * dpr;

      var totalRows = orderedExams.length;
      var canvasHeight = padding.top + totalRows * rowHeight + padding.bottom;
      canvas.style.height = canvasHeight + "px";
      canvas.height = canvasHeight * dpr;

      ctx.scale(dpr, dpr);

      var barAreaWidth = containerWidth - padding.left - labelWidth - padding.right;
      if (barAreaWidth < 50) barAreaWidth = 50;

      var maxPossible = 0;
      orderedExams.forEach(function(e) {
        var d = topic.exams[e.exam_id];
        if (d && d.possible > maxPossible) maxPossible = d.possible;
      });
      if (maxPossible === 0) maxPossible = 1;

      var earnedColor = "#3b82f6";
      var possibleColor = "#e5e7eb";
      var textColor = "#374151";

      orderedExams.forEach(function(exam, i) {
        var y = padding.top + i * rowHeight;
        var d = topic.exams[exam.exam_id] || { earned: 0, possible: 0 };
        var earnedW = maxPossible > 0 ? (d.earned / maxPossible) * barAreaWidth : 0;
        var possibleW = maxPossible > 0 ? (d.possible / maxPossible) * barAreaWidth : 0;
        var barX = padding.left + labelWidth;
        var barY = y + 4;
        var barH = rowHeight - 10;

        // Label
        ctx.fillStyle = textColor;
        ctx.font = "12px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        var label = exam.exam_name;
        if (label.length > 20) label = label.substring(0, 18) + "\u2026";
        ctx.fillText(label, padding.left + labelWidth - 8, barY + barH / 2);

        // Possible bar (gray)
        ctx.fillStyle = possibleColor;
        spRoundRect(ctx, barX, barY, possibleW, barH, 4);

        // Earned bar (blue)
        if (d.earned > 0) {
          ctx.fillStyle = earnedColor;
          spRoundRect(ctx, barX, barY, earnedW, barH, 4);
        }

        // Percentage label
        var pct = d.possible > 0 ? Math.round((d.earned / d.possible) * 100) : 0;
        if (pct >= 70) ctx.fillStyle = "#059669";
        else if (pct >= 50) ctx.fillStyle = "#d97706";
        else ctx.fillStyle = "#dc2626";

        ctx.textAlign = "left";
        ctx.font = "bold 11px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillText(d.earned + "/" + d.possible + " (" + pct + "%)",
          barX + possibleW + 6, barY + barH / 2);
      });
    }

    function spRoundRect(ctx, x, y, width, height, radius) {
      if (width < 1) return;
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
    }
</script>
