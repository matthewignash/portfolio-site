 * ServerAPI — Promise wrapper for google.script.run
 *
 * Converts callback-based google.script.run into clean async/await calls.
 * All server functions return { success, data?, error?, code? }.
 * This wrapper unwraps that and throws on failure.

   * Calls a server-side function by name and returns a Promise.
   * @param {string} functionName - Name of the top-level server function (e.g., 'apiGetCurrentUser')
   * @param {...*} args - Arguments to pass to the server function
   * @returns {Promise<*>} Resolves with the data property, rejects with error message
   */
  function call(functionName) {
    var args = Array.prototype.slice.call(arguments, 1);

    return new Promise(function(resolve, reject) {
      var runner = google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success === false) {
            reject(new Error(response.error || 'Unknown server error'));
          } else if (response && response.hasOwnProperty('data')) {
            resolve(response.data);
          } else {
            // For functions that don't use the apiWrap_ pattern
            resolve(response);
          }
        })
        .withFailureHandler(function(error) {
          reject(new Error(error.message || 'Server call failed'));
        });

      // Call the function with its arguments
      runner[functionName].apply(runner, args);
    });
  }
