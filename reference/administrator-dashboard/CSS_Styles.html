  padding: 20px; margin-bottom: 24px;
}
.wl-latest-card h3 { margin: 0 0 12px; font-size: 1rem; font-weight: 600; }
.wl-dimension-badges {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.wl-dim-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 20px; font-size: 0.85rem;
  background: var(--bg); border: 1px solid var(--border);
}
.wl-dim-badge-score {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-weight: 700;
  color: #fff; font-size: 0.8rem;
}
.wl-score-1 { background: #dc2626; }
.wl-score-2 { background: #f97316; }
.wl-score-3 { background: #eab308; }
.wl-score-4 { background: #84cc16; }
.wl-score-5 { background: #16a34a; }

/* ── Developmental Comfort (DDO integration) ── */
.wl-dimension-row--optional {
  border-left: 3px solid #8b5cf6; background: rgba(139, 92, 246, 0.04);
}
.wl-optional-tag {
  display: inline-block; font-size: 0.65rem; text-transform: uppercase;
  letter-spacing: 0.04em; padding: 2px 6px; border-radius: 4px;
  background: rgba(139, 92, 246, 0.12); color: #7c3aed; font-weight: 600;
  vertical-align: middle; margin-left: 6px;
}
.wl-dim-badge--dev {
  border-color: #8b5cf6; background: rgba(139, 92, 246, 0.06);
}

/* ── Trend Chart ── */
.wl-trend-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; margin-bottom: 24px;
}
.wl-trend-card h3 { margin: 0 0 12px; font-size: 1rem; font-weight: 600; }
.wl-chart-container { position: relative; height: 280px; }

/* ── Workload Gauge ── */
.wl-workload-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 24px; margin-bottom: 24px; text-align: center;
}
.wl-workload-score {
  width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; font-weight: 700; border: 6px solid var(--border);
}
.wl-workload-score.green { border-color: #16a34a; color: #16a34a; }
.wl-workload-score.amber { border-color: #d97706; color: #d97706; }
.wl-workload-score.red { border-color: #dc2626; color: #dc2626; }
.wl-workload-level {
  font-size: 0.9rem; text-transform: uppercase; font-weight: 600;
  letter-spacing: 0.05em; margin-bottom: 4px;
}
.wl-workload-level.green { color: #16a34a; }
.wl-workload-level.amber { color: #d97706; }
.wl-workload-level.red { color: #dc2626; }

/* ── Component Breakdown Bars ── */
.wl-components {
  margin-top: 20px;
}
.wl-component-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.wl-component-label {
  min-width: 120px; font-size: 0.85rem; font-weight: 500; text-align: right;
}
.wl-component-bar-bg {
  flex: 1; height: 22px; background: var(--bg); border-radius: 11px;
  overflow: hidden; position: relative;
}
.wl-component-bar-fill {
  height: 100%; border-radius: 11px; transition: width 0.4s ease;
}
.wl-component-bar-fill.green { background: #16a34a; }
.wl-component-bar-fill.amber { background: #d97706; }
.wl-component-bar-fill.red { background: #dc2626; }
.wl-component-value {
  min-width: 50px; font-size: 0.8rem; color: var(--text-muted);
}

/* ── Department Heatmap ── */
.wl-heatmap {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.wl-heatmap-cell {
  border-radius: 10px; padding: 16px; text-align: center;
  color: #fff; font-weight: 600;
}
.wl-heatmap-cell.score-high { background: #16a34a; }
.wl-heatmap-cell.score-mid { background: #d97706; }
.wl-heatmap-cell.score-low { background: #dc2626; }
.wl-heatmap-dept { font-size: 0.85rem; margin-bottom: 4px; opacity: 0.9; }
.wl-heatmap-score { font-size: 1.5rem; }
.wl-heatmap-meta { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; }

/* ── Alert Cards ── */
.wl-alerts-list {
  display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px;
}
.wl-alert-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; border-left: 4px solid var(--border);
}
.wl-alert-card.critical { border-left-color: #dc2626; }
.wl-alert-card.warning { border-left-color: #d97706; }
.wl-alert-card.info { border-left-color: #3b82f6; }
.wl-alert-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.wl-alert-type {
  font-size: 0.75rem; text-transform: uppercase; font-weight: 600;
  letter-spacing: 0.05em; padding: 2px 8px; border-radius: 4px;
}
.wl-alert-type.critical { background: #fee2e2; color: #dc2626; }
.wl-alert-type.warning { background: #fef3c7; color: #d97706; }
.wl-alert-type.info { background: #dbeafe; color: #3b82f6; }
.wl-alert-severity {
  font-size: 0.75rem; text-transform: uppercase; font-weight: 600;
}
.wl-alert-message { font-size: 0.9rem; margin-bottom: 10px; line-height: 1.4; }
.wl-alert-meta {
  font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px;
}
.wl-alert-actions {
  display: flex; gap: 8px;
}

/* ── Staff Workload Cards (admin overview) ── */
.wl-staff-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.wl-staff-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; display: flex; align-items: center; gap: 16px;
}
.wl-staff-score-ring {
  width: 56px; height: 56px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-weight: 700;
  font-size: 1.1rem; border: 4px solid var(--border); flex-shrink: 0;
}
.wl-staff-score-ring.green { border-color: #16a34a; color: #16a34a; }
.wl-staff-score-ring.amber { border-color: #d97706; color: #d97706; }
.wl-staff-score-ring.red { border-color: #dc2626; color: #dc2626; }
.wl-staff-info { flex: 1; }
.wl-staff-name { font-weight: 600; font-size: 0.95rem; }
.wl-staff-dept { font-size: 0.8rem; color: var(--text-muted); }

/* ── Distribution Chart ── */
.wl-distribution {
  display: flex; gap: 24px; align-items: center; margin-bottom: 24px;
  flex-wrap: wrap;
}
.wl-distribution-chart {
  width: 200px; height: 200px; position: relative;
}
.wl-distribution-legend {
  display: flex; flex-direction: column; gap: 8px;
}
.wl-legend-item {
  display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
}
.wl-legend-dot {
  width: 12px; height: 12px; border-radius: 50%;
}
.wl-legend-dot.green { background: #16a34a; }
.wl-legend-dot.amber { background: #d97706; }
.wl-legend-dot.red { background: #dc2626; }

/* ── Config Form ── */
.wl-config-section {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; margin-bottom: 20px;
}
.wl-config-section h3 {
  margin: 0 0 16px; font-size: 1rem; font-weight: 600;
}
.wl-config-row {
  display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.wl-config-row:last-child { border-bottom: none; }
.wl-config-key { min-width: 200px; font-size: 0.85rem; font-weight: 500; }
.wl-config-desc { flex: 1; font-size: 0.8rem; color: var(--text-muted); }
.wl-config-input {
  width: 80px; padding: 6px 10px; border: 1px solid var(--border);
  border-radius: 6px; text-align: center; font-size: 0.875rem;
}

/* ── Attention List ── */
.wl-attention-list {
  display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px;
}
.wl-attention-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
}
.wl-attention-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 0.75rem; flex-shrink: 0;
}
.wl-attention-info { flex: 1; }
.wl-attention-name { font-weight: 600; font-size: 0.9rem; }
.wl-attention-reason { font-size: 0.8rem; color: var(--text-muted); }

/* ── Check-in History Table ── */
.wl-history-table {
  width: 100%; border-collapse: collapse; font-size: 0.85rem;
}
.wl-history-table th {
  text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border);
  font-weight: 600; font-size: 0.8rem; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-muted);
}
.wl-history-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.wl-history-table tr:hover td { background: var(--surface-hover); }

/* ── Filter Bar ── */
.wl-filter-bar {
  display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap;
}

/* ── Activity Log ── */
.wl-activity-list {
  display: flex; flex-direction: column; gap: 8px;
}
.wl-activity-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px; border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
}
.wl-activity-icon {
  width: 32px; height: 32px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 0.8rem;
  background: var(--bg); flex-shrink: 0;
}
.wl-activity-text { flex: 1; line-height: 1.4; }
.wl-activity-time { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
