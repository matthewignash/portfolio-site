.cm-phase-detail__field-value--empty {
  color: var(--color-text-muted);
  font-style: italic;
}

.cm-phase-detail__actions {
  display: flex;
  gap: var(--space-xs);
  margin-top: var(--space-md);
  padding-top: var(--space-md);
  border-top: 1px solid var(--color-border);
}

/* ── Stakeholders ── */

.cm-stakeholder-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}

.cm-stakeholder {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: var(--color-surface-alt);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
}

.cm-stakeholder__name {
  font-weight: 500;
  color: var(--color-text);
  min-width: 140px;
}

.cm-stakeholder__role {
  display: inline-flex;
  padding: 2px var(--space-sm);
  border-radius: var(--radius-full);
  font-size: var(--font-size-xs);
  font-weight: 500;
  background: var(--color-primary-light);
  color: var(--color-primary-dark);
}

.cm-stakeholder__role--champion {
  background: #faf5ff;
  color: #7c3aed;
}

.cm-stakeholder__role--contributor {
  background: var(--color-primary-light);
  color: var(--color-primary-dark);
}

.cm-stakeholder__role--informed {
  background: var(--color-surface-alt);
  color: var(--color-text-secondary);
}

.cm-stakeholder__role--affected {
  background: var(--color-warning-light);
  color: var(--color-warning);
}

.cm-stakeholder__engagement {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xxs);
  padding: 2px var(--space-sm);
  border-radius: var(--radius-full);
  font-size: var(--font-size-xs);
  font-weight: 500;
}

.cm-stakeholder__engagement--supportive {
  background: var(--color-success-light);
  color: var(--color-success);
}

.cm-stakeholder__engagement--neutral {
  background: var(--color-surface-alt);
  color: var(--color-text-secondary);
}

.cm-stakeholder__engagement--resistant {
  background: var(--color-danger-light);
  color: var(--color-danger);
}

.cm-stakeholder__notes {
  flex: 1;
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.cm-stakeholder__actions {
  display: flex;
  gap: var(--space-xxs);
  flex-shrink: 0;
}

/* ── Assessment History ── */

.cm-assessment-card {
  background: var(--color-surface-alt);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-sm);
  overflow: hidden;
}

.cm-assessment-card__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-sm) var(--space-md);
  cursor: pointer;
  transition: background 0.15s;
}

.cm-assessment-card__header:hover {
  background: var(--color-border);
}

.cm-assessment-card__date {
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-text);
}

.cm-assessment-card__assessor {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
}

.cm-assessment-card__readiness {
  font-weight: 600;
  font-size: var(--font-size-sm);
}

.cm-assessment-card__toggle {
  font-size: var(--font-size-xs);
  color: var(--color-text-muted);
  transition: transform 0.2s;
}

.cm-assessment-card__toggle--open {
  transform: rotate(180deg);
}

.cm-assessment-card__body {
  padding: 0 var(--space-md) var(--space-md);
  display: none;
}

.cm-assessment-card__body--open {
  display: block;
}

/* ── Comparison Table ── */

.cm-compare-wrap {
  overflow-x: auto;
  margin: 0 calc(-1 * var(--space-lg));
  padding: 0 var(--space-lg);
}

.cm-compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--font-size-sm);
}

.cm-compare-table th {
  padding: var(--space-sm) var(--space-md);
  text-align: center;
  font-weight: 600;
  color: var(--color-text);
  background: var(--color-surface-alt);
  border-bottom: 2px solid var(--color-border);
  white-space: nowrap;
}

.cm-compare-table th:first-child {
  text-align: left;
  position: sticky;
  left: 0;
  background: var(--color-surface-alt);
  z-index: 1;
}

.cm-compare-table td {
  padding: var(--space-sm) var(--space-md);
  text-align: center;
  border-bottom: 1px solid var(--color-border);
}

.cm-compare-table td:first-child {
  text-align: left;
  font-weight: 500;
  position: sticky;
  left: 0;
  background: var(--color-surface);
  z-index: 1;
}

.cm-compare-cell {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-weight: 600;
  font-size: var(--font-size-sm);
  color: white;
}

.cm-compare-cell--danger {
  background: var(--color-danger);
}

.cm-compare-cell--warning {
  background: var(--color-warning);
}

.cm-compare-cell--success {
  background: var(--color-success);
}

.cm-compare-cell--na {
  background: var(--color-text-muted);
  font-size: var(--font-size-xs);
}

/* ── Empty States ── */

.cm-empty {
  text-align: center;
  padding: var(--space-2xl) var(--space-lg);
  color: var(--color-text-muted);
}

.cm-empty__icon {
  font-size: 2.5rem;
  margin-bottom: var(--space-sm);
}

.cm-empty__text {
  font-size: var(--font-size-sm);
  margin-bottom: var(--space-md);
}

/* ── Responsive ── */

@media (max-width: 768px) {
  .cm-stats {
    grid-template-columns: repeat(2, 1fr);
  }

  .cm-knoster__grid,
  .cm-knoster__grid--five {
    grid-template-columns: repeat(2, 1fr);
  }

  .cm-stepper {
    flex-wrap: wrap;
    gap: var(--space-xs);
    justify-content: center;
  }

  .cm-stepper__step {
    flex: 0 0 auto;
  }

  .cm-stepper__connector {
    display: none;
  }

  .cm-header__top {
    flex-direction: column;
  }

  .cm-header__actions {
    width: 100%;
  }

  .cm-stakeholder {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-xs);
  }

  .cm-stakeholder__notes {
    white-space: normal;
  }

  .cm-phase-detail__header {
    flex-direction: column;
    gap: var(--space-xs);
  }

  .cm-compare-table {
    font-size: var(--font-size-xs);
  }

  .cm-compare-table th,
  .cm-compare-table td {
    padding: var(--space-xs);
  }
}

/* ── CM Communications Timeline ── */

.cm-comm-timeline {
  position: relative;
  padding-left: 28px;
}

.cm-comm-timeline::before {
  content: '';
  position: absolute;
  left: 10px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border-color);
}

.cm-comm-timeline__item {
  position: relative;
  margin-bottom: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  cursor: pointer;
  transition: box-shadow 0.2s;
}

.cm-comm-timeline__item:hover {
  box-shadow: var(--shadow-sm);
}

.cm-comm-timeline__marker {
  position: absolute;
  left: -24px;
  top: 14px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid var(--bg-primary);
  box-shadow: 0 0 0 2px var(--border-color);
}

.cm-comm-timeline__marker--sent {
  background: var(--color-success);
  box-shadow: 0 0 0 2px var(--color-success);
}

.cm-comm-timeline__marker--planned {
  background: var(--color-info);
  box-shadow: 0 0 0 2px var(--color-info);
}

.cm-comm-timeline__marker--cancelled {
  background: var(--color-muted);
  box-shadow: 0 0 0 2px var(--color-muted);
}

.cm-comm-timeline__date {
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
  margin-bottom: 2px;
}

.cm-comm-timeline__subject {
  font-weight: 600;
  margin-bottom: 4px;
}

.cm-comm-timeline__meta {
  display: flex;
  gap: var(--space-sm);
  flex-wrap: wrap;
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
}

.cm-comm-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: var(--font-size-xs);
  font-weight: 500;
  color: #fff;
}

.cm-comm-badge--announcement { background: var(--color-info); }
.cm-comm-badge--update { background: var(--color-primary); }
.cm-comm-badge--feedback_request { background: #8b5cf6; }
.cm-comm-badge--milestone { background: var(--color-success); }
.cm-comm-badge--escalation { background: var(--color-danger); }

.cm-comm-actions {
  display: flex;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

/* ── CM Readiness Trends ── */

.cm-trends {
  margin-top: var(--space-md);
}

.cm-trends__toggle {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  cursor: pointer;
  font-weight: 600;
  color: var(--color-primary);
  margin-bottom: var(--space-sm);
  user-select: none;
}

.cm-trends__toggle-icon {
  transition: transform 0.2s;
  font-size: var(--font-size-sm);
}

.cm-trends__toggle-icon--open {
  transform: rotate(90deg);
}

.cm-trends__chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
  margin-top: var(--space-sm);
}

.cm-trends__chart-card {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: var(--space-md);
}

.cm-trends__chart-card h4 {
  margin: 0 0 var(--space-sm) 0;
  font-size: var(--font-size-sm);
  color: var(--text-secondary);
}

.cm-trends__chart-card canvas {
  max-height: 260px;
}

.cm-risk-trend {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

.cm-risk-trend__item {
  padding: var(--space-xs) var(--space-sm);
  border-radius: var(--radius);
  font-size: var(--font-size-xs);
  border: 1px solid var(--border-color);
}

/* ── CM Heatmap ── */

.cm-heatmap {
  margin-top: var(--space-md);
}

.cm-heatmap__table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--font-size-sm);
}

.cm-heatmap__table th,
.cm-heatmap__table td {
  padding: var(--space-xs) var(--space-sm);
  text-align: center;
  border: 1px solid var(--border-color);
}

.cm-heatmap__table th {
  background: var(--bg-secondary);
  font-weight: 600;
  font-size: var(--font-size-xs);
}

.cm-heatmap__table td:first-child {
  text-align: left;
  font-weight: 500;
  background: var(--bg-primary);
  white-space: nowrap;
}

.cm-heatmap__cell { border-radius: 3px; font-weight: 600; }
.cm-heatmap__cell--1 { background: #fee2e2; color: #b91c1c; }
.cm-heatmap__cell--2 { background: #fef3c7; color: #b45309; }
.cm-heatmap__cell--3 { background: #fef9c3; color: #a16207; }
.cm-heatmap__cell--4 { background: #d1fae5; color: #047857; }
.cm-heatmap__cell--5 { background: #a7f3d0; color: #065f46; }
.cm-heatmap__cell--na { background: var(--bg-secondary); color: var(--text-secondary); }

/* ── CM Progress Timeline ── */

.cm-timeline {
  margin-top: var(--space-md);
}

.cm-timeline__track {
  display: flex;
  gap: 0;
  position: relative;
  padding: var(--space-md) 0;
  overflow-x: auto;
}

.cm-timeline__phase {
  flex: 1;
  min-width: 100px;
  text-align: center;
  padding: var(--space-sm) var(--space-xs);
  position: relative;
}

.cm-timeline__phase::after {
  content: '';
  position: absolute;
  top: 50%;
  right: 0;
  width: 100%;
  height: 4px;
  background: var(--border-color);
  z-index: 0;
  transform: translateY(-50%);
}

.cm-timeline__phase:last-child::after {
  width: 50%;
  left: 0;
  right: auto;
}

.cm-timeline__phase:first-child::after {
  width: 50%;
  right: 0;
  left: auto;
}

.cm-timeline__phase-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  margin: 0 auto var(--space-xs);
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  font-weight: 700;
}

.cm-timeline__phase--completed .cm-timeline__phase-dot {
  background: var(--color-success);
}

.cm-timeline__phase--active .cm-timeline__phase-dot {
  background: var(--color-primary);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
}

.cm-timeline__phase--pending .cm-timeline__phase-dot {
  background: var(--border-color);
}

.cm-timeline__phase-label {
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
  line-height: 1.3;
}

.cm-timeline__phase--active .cm-timeline__phase-label {
  color: var(--color-primary);
  font-weight: 600;
}

.cm-timeline__milestone {
  margin-top: var(--space-md);
  padding: var(--space-xs) var(--space-sm);
  background: var(--bg-secondary);
  border-radius: var(--radius);
  font-size: var(--font-size-xs);
}

/* ── CM Health Score ── */

.cm-health-score {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md);
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  margin-bottom: var(--space-md);
}

.cm-health-score__ring {
  flex-shrink: 0;
}

.cm-health-score__ring svg {
  display: block;
}

.cm-health-score__value {
  font-size: 20px;
  font-weight: 700;
}

.cm-health-score__label {
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
}

.cm-health-score__breakdown {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cm-health-score__breakdown-item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-size: var(--font-size-xs);
}

.cm-health-score__breakdown-label {
  width: 100px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.cm-health-score__breakdown-bar {
  flex: 1;
  height: 8px;
  background: var(--bg-secondary);
  border-radius: 4px;
  overflow: hidden;
}

.cm-health-score__breakdown-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

.cm-health-score__breakdown-pct {
  width: 36px;
  text-align: right;
  font-weight: 600;
  font-size: var(--font-size-xs);
}

/* ── CM Duration Analytics ── */

.cm-duration-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: var(--space-sm);
  font-size: var(--font-size-sm);
}

.cm-duration-table th,
.cm-duration-table td {
  padding: var(--space-xs) var(--space-sm);
  border-bottom: 1px solid var(--border-color);
  text-align: left;
}

.cm-duration-table th {
  font-weight: 600;
  color: var(--text-secondary);
  font-size: var(--font-size-xs);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.cm-duration-bar {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  height: 16px;
}

.cm-duration-bar__actual {
  height: 8px;
  background: var(--color-primary);
  border-radius: 4px;
  min-width: 4px;
}

.cm-duration-bar__avg {
  height: 8px;
  background: var(--color-muted);
  border-radius: 4px;
  opacity: 0.5;
  min-width: 4px;
}

/* ── CM Enhancement Responsive ── */

@media (max-width: 768px) {
  .cm-trends__chart-row {
    grid-template-columns: 1fr;
  }

  .cm-health-score {
    flex-direction: column;
    text-align: center;
  }

  .cm-health-score__breakdown-label {
    width: 80px;
  }

  .cm-timeline__track {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .cm-timeline__phase {
    min-width: 80px;
  }

  .cm-heatmap__table {
    font-size: var(--font-size-xs);
  }
}

/* ═══════════════════════════════════════════════
   Accreditation Module
   ═══════════════════════════════════════════════ */

/* ── Stats Grid ── */

.acc-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.acc-stat-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  text-align: center;
}

.acc-stat-card__value {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.2;
}

.acc-stat-card__label {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-top: var(--space-xxs);
}

/* ── Framework Cards ── */

.acc-framework-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.acc-framework-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-left: 4px solid var(--color-primary);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  transition: box-shadow 0.15s;
  cursor: pointer;
}

.acc-framework-card:hover {
  box-shadow: var(--shadow-md);
}

.acc-framework-card__header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--space-sm);
}

.acc-framework-card__title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--color-text);
  margin: 0;
}

.acc-framework-card__meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-md);
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-md);
}

.acc-framework-card__stats {
  display: flex;
  gap: var(--space-lg);
  font-size: var(--font-size-sm);
  margin-bottom: var(--space-sm);
}

.acc-framework-card__stat {
  display: flex;
  align-items: center;
  gap: var(--space-xxs);
}

.acc-framework-card__stat-value {
  font-weight: 600;
  color: var(--color-text);
}

/* ── Progress Bar ── */

.acc-progress-bar {
  width: 100%;
  height: 8px;
  background: var(--color-surface-alt);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.acc-progress-bar--lg {
  height: 12px;
}

.acc-progress-bar__fill {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width 0.3s ease;
  background: var(--color-primary);
}

.acc-progress-bar__fill--green {
  background: var(--color-success);
}

.acc-progress-bar__fill--amber {
  background: var(--color-warning);
}

.acc-progress-bar__fill--red {
  background: var(--color-danger);
}

/* ── Header Card ── */

.acc-header {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-left: 4px solid var(--color-primary);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-lg);
}

.acc-header__top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-md);
  margin-bottom: var(--space-md);
}

.acc-header__title {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--color-text);
  margin: 0;
}

.acc-header__desc {
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
  margin: var(--space-xs) 0 var(--space-md);
  line-height: 1.5;
}

.acc-header__meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-lg);
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-md);
}

.acc-header__meta-label {
  font-weight: 500;
  color: var(--color-text);
}

.acc-header__actions {
  display: flex;
  gap: var(--space-xs);
  flex-shrink: 0;
}

.acc-header__progress {
  display: flex;
  align-items: center;
  gap: var(--space-md);
}

.acc-header__progress-label {
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-text-secondary);
  white-space: nowrap;
}

.acc-header__progress-value {
  font-size: 1.1rem;
  font-weight: 700;
}

/* ── Section (Shared) ── */

.acc-section {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-lg);
}

.acc-section__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-md);
}

.acc-section__title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--color-text);
  margin: 0;
}

/* ── Accordion — Domain → Standards ── */

.acc-accordion {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.acc-domain {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.acc-domain__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-md);
  background: var(--color-surface-alt);
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}

.acc-domain__header:hover {
  background: var(--color-border);
}

.acc-domain__name {
  font-weight: 600;
  color: var(--color-text);
}

.acc-domain__progress {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}

.acc-domain__toggle {
  font-size: var(--font-size-xs);
  color: var(--color-text-muted);
  transition: transform 0.2s;
}

.acc-domain__toggle--open {
  transform: rotate(180deg);
}

.acc-domain__body {
  display: none;
}

.acc-domain__body--open {
  display: block;
}

/* ── Standard Row ── */

.acc-standard-row {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  border-top: 1px solid var(--color-border);
  cursor: pointer;
  transition: background 0.15s;
}

.acc-standard-row:hover {
  background: var(--color-surface-alt);
}

.acc-standard-row__code {
  font-weight: 600;
  color: var(--color-primary);
  min-width: 50px;
}

.acc-standard-row__text {
  flex: 1;
  font-size: var(--font-size-sm);
  color: var(--color-text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.acc-standard-row__info {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  flex-shrink: 0;
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
}

/* ── Readiness Traffic Light ── */

.acc-readiness {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

.acc-readiness--green {
  background: var(--color-success);
}

.acc-readiness--amber {
  background: var(--color-warning);
}

.acc-readiness--red {
  background: var(--color-danger);
}

/* ── Evidence Rows ── */

.acc-evidence-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}

.acc-evidence-row {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: var(--color-surface-alt);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
}

.acc-evidence-row__title {
  font-weight: 500;
  color: var(--color-text);
  min-width: 180px;
}

.acc-evidence-row__title a {
  color: var(--color-primary);
  text-decoration: none;
}

.acc-evidence-row__title a:hover {
  text-decoration: underline;
}

.acc-evidence-row__type {
  display: inline-flex;
  padding: 2px var(--space-sm);
  border-radius: var(--radius-full);
  font-size: var(--font-size-xs);
  font-weight: 500;
  background: var(--color-primary-light);
  color: var(--color-primary-dark);
  text-transform: uppercase;
}

.acc-evidence-row__meta {
  flex: 1;
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.acc-evidence-row__actions {
  display: flex;
  gap: var(--space-xxs);
  flex-shrink: 0;
}

/* ── Narrative Card ── */

.acc-narrative-card {
  background: var(--color-surface-alt);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
}

.acc-narrative-card__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-md);
}

.acc-narrative-card__text {
  font-size: var(--font-size-sm);
  color: var(--color-text);
  line-height: 1.7;
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
}

.acc-narrative-card__meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-md);
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  margin-top: var(--space-md);
  padding-top: var(--space-sm);
  border-top: 1px solid var(--color-border);
}

.acc-narrative-card__word-count {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xxs);
  padding: 2px var(--space-sm);
  border-radius: var(--radius-full);
  font-size: var(--font-size-xs);
  background: var(--color-surface);
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border);
}

/* ── Version History ── */

.acc-version-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  margin-top: var(--space-sm);
}

.acc-version-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-xs) var(--space-md);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: var(--font-size-xs);
  cursor: pointer;
  transition: background 0.15s;
}

.acc-version-item:hover {
  background: var(--color-surface-alt);
}

.acc-version-item__label {
  font-weight: 500;
  color: var(--color-text);
}

.acc-version-item__meta {
  color: var(--color-text-secondary);
}

/* ── Export Bar ── */

.acc-export-bar {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
  padding: var(--space-md);
  background: var(--color-surface-alt);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-md);
}

/* ── Visit Readiness / Gap List ── */

.acc-readiness-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.acc-readiness-stat {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  text-align: center;
}

.acc-readiness-stat__value {
  font-size: 1.75rem;
  font-weight: 700;
  line-height: 1.2;
}

.acc-readiness-stat__value--green { color: var(--color-success); }
.acc-readiness-stat__value--amber { color: var(--color-warning); }
.acc-readiness-stat__value--red { color: var(--color-danger); }

.acc-readiness-stat__label {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-top: var(--space-xxs);
}

.acc-gaps-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.acc-gap-domain {
  margin-bottom: var(--space-sm);
}

.acc-gap-domain__title {
  font-size: var(--font-size-sm);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: var(--space-xs);
  padding-bottom: var(--space-xxs);
  border-bottom: 1px solid var(--color-border);
}

.acc-gap-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-xs) var(--space-md);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.15s;
}

.acc-gap-item:hover {
  background: var(--color-surface-alt);
}

.acc-gap-item--red {
  border-left: 3px solid var(--color-danger);
}

.acc-gap-item--amber {
  border-left: 3px solid var(--color-warning);
}

.acc-gap-item__code {
  font-weight: 600;
  min-width: 50px;
  color: var(--color-text);
}

.acc-gap-item__text {
  flex: 1;
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.acc-gap-item__issues {
  display: flex;
  gap: var(--space-xxs);
  flex-shrink: 0;
}

.acc-gap-issue {
  display: inline-flex;
  padding: 2px var(--space-sm);
  border-radius: var(--radius-full);
  font-size: var(--font-size-xs);
  font-weight: 500;
}

.acc-gap-issue--red {
  background: var(--color-danger-light);
  color: var(--color-danger);
}

.acc-gap-issue--amber {
  background: var(--color-warning-light);
  color: var(--color-warning);
}

/* ── Empty State ── */

.acc-empty {
  text-align: center;
  padding: var(--space-2xl) var(--space-lg);
  color: var(--color-text-muted);
}

.acc-empty__icon {
  font-size: 2.5rem;
  margin-bottom: var(--space-sm);
}

.acc-empty__text {
  font-size: var(--font-size-sm);
  margin-bottom: var(--space-md);
}

/* ── Responsive ── */

@media (max-width: 768px) {
  .acc-stats,
  .acc-readiness-summary {
    grid-template-columns: repeat(2, 1fr);
  }

  .acc-framework-card__header {
    flex-direction: column;
    gap: var(--space-xs);
  }

  .acc-framework-card__stats {
    flex-wrap: wrap;
  }

  .acc-header__top {
    flex-direction: column;
  }

  .acc-header__actions {
    width: 100%;
  }

  .acc-header__progress {
    flex-direction: column;
    align-items: flex-start;
  }

  .acc-standard-row {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-xs);
  }

  .acc-standard-row__text {
    white-space: normal;
  }

  .acc-evidence-row {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-xs);
  }

  .acc-evidence-row__meta {
    white-space: normal;
  }

  .acc-export-bar {
    flex-direction: column;
  }

  .acc-gap-item {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-xs);
  }

  .acc-gap-item__text {
    white-space: normal;
  }
}

/* ═══════════════════════════════════════════════
   Reporting / Executive Dashboard (.rpt-)
   Phase 7
   ═══════════════════════════════════════════════ */

/* ── Header ── */
.rpt-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-lg);
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.rpt-header__title {
  font-size: var(--font-size-xl);
  font-weight: 700;
  color: var(--color-text);
}

.rpt-header__timestamp {
  font-size: var(--font-size-xs);
  color: var(--color-text-muted);
}

.rpt-header__actions {
  display: flex;
  gap: var(--space-sm);
}

/* ── KPI Cards Grid ── */
.rpt-kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.rpt-kpi-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md) var(--space-lg);
  border-left: 4px solid var(--color-border);
  transition: box-shadow var(--transition-fast);
}

.rpt-kpi-card:hover {
  box-shadow: var(--shadow-md);
}

.rpt-kpi-card--good    { border-left-color: var(--color-success); }
.rpt-kpi-card--warning { border-left-color: var(--color-warning); }
.rpt-kpi-card--danger  { border-left-color: var(--color-danger); }

.rpt-kpi-card__icon {
  font-size: var(--font-size-lg);
  margin-bottom: var(--space-xs);
}

.rpt-kpi-card__value {
  font-size: var(--font-size-2xl);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.1;
}

.rpt-kpi-card__label {
  font-size: var(--font-size-xs);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
  margin-top: var(--space-xxs);
}

.rpt-kpi-card__sub {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  margin-top: var(--space-xs);
}

.rpt-kpi-card__sub--danger {
  color: var(--color-danger);
  font-weight: 600;
}

/* ── Chart Row ── */
.rpt-chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-lg);
  margin-bottom: var(--space-lg);
}

.rpt-chart-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
}

.rpt-chart-card__title {
  font-size: var(--font-size-sm);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: var(--space-md);
}

.rpt-chart-card__canvas {
  width: 100%;
  max-height: 250px;
}

/* ── Collapsible Detail Sections ── */
.rpt-section {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-md);
  overflow: hidden;
}

.rpt-section__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-md) var(--space-lg);
  cursor: pointer;
  user-select: none;
  transition: background var(--transition-fast);
}

.rpt-section__header:hover {
  background: var(--color-surface-alt);
}

.rpt-section__left {
  display: flex;
  align-items: center;
  gap: var(--space-md);
}

.rpt-section__title {
  font-size: var(--font-size-base);
  font-weight: 600;
  color: var(--color-text);
}

.rpt-section__badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 2px var(--space-sm);
  border-radius: var(--radius-full);
  font-size: var(--font-size-xs);
  font-weight: 600;
}

.rpt-section__badge--good    { background: #dcfce7; color: #166534; }
.rpt-section__badge--warning { background: #fef3c7; color: #92400e; }
.rpt-section__badge--danger  { background: #fecaca; color: #991b1b; }
.rpt-section__badge--info    { background: #dbeafe; color: #1e40af; }

.rpt-section__toggle {
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  transition: transform var(--transition-fast);
}

.rpt-section__toggle--open {
  transform: rotate(180deg);
}

.rpt-section__body {
  display: none;
  padding: 0 var(--space-lg) var(--space-lg);
  border-top: 1px solid var(--color-border);
}

.rpt-section__body--open {
  display: block;
  padding-top: var(--space-lg);
}

/* ── Horizontal Bar Charts (pure CSS) ── */
.rpt-bar-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.rpt-bar-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
}

.rpt-bar-item__label {
  min-width: 120px;
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-text);
  text-align: right;
}

.rpt-bar-item__track {
  flex: 1;
  height: 20px;
  background: var(--color-surface-alt);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.rpt-bar-item__fill {
  height: 100%;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  transition: width var(--transition-normal);
  min-width: 2px;
}

.rpt-bar-item__value {
  min-width: 40px;
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}

/* ── Stacked Bar ── */
.rpt-stacked-bar {
  display: flex;
  height: 28px;
  border-radius: var(--radius-full);
  overflow: hidden;
  background: var(--color-surface-alt);
  margin-bottom: var(--space-sm);
}

.rpt-stacked-bar__segment {
  height: 100%;
  transition: width var(--transition-normal);
}

.rpt-stacked-bar__segment--draft      { background: #9ca3af; }
.rpt-stacked-bar__segment--active     { background: var(--color-primary); }
.rpt-stacked-bar__segment--review     { background: var(--color-info); }
.rpt-stacked-bar__segment--completed  { background: var(--color-success); }
.rpt-stacked-bar__segment--overdue    { background: var(--color-danger); }
.rpt-stacked-bar__segment--green      { background: var(--color-success); }
.rpt-stacked-bar__segment--amber      { background: var(--color-warning); }
.rpt-stacked-bar__segment--red        { background: var(--color-danger); }

/* ── Legend ── */
.rpt-legend {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-md);
  margin-top: var(--space-sm);
}

.rpt-legend__item {
  display: flex;
  align-items: center;
  gap: var(--space-xxs);
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
}

.rpt-legend__dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Mini Table ── */
.rpt-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--font-size-sm);
}

.rpt-table th {
  text-align: left;
  font-weight: 600;
  color: var(--color-text-secondary);
  padding: var(--space-sm) var(--space-md);
  border-bottom: 2px solid var(--color-border);
  font-size: var(--font-size-xs);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.rpt-table td {
  padding: var(--space-sm) var(--space-md);
  border-bottom: 1px solid var(--color-border);
  color: var(--color-text);
}

.rpt-table tr:last-child td {
  border-bottom: none;
}

.rpt-table tr:hover td {
  background: var(--color-surface-alt);
}

/* ── Score Pill ── */
.rpt-score {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 36px;
  padding: 2px var(--space-sm);
  border-radius: var(--radius-full);
  font-weight: 600;
  font-size: var(--font-size-xs);
}

.rpt-score--good    { background: #dcfce7; color: #166534; }
.rpt-score--warning { background: #fef3c7; color: #92400e; }
.rpt-score--danger  { background: #fecaca; color: #991b1b; }

/* ── Alert List (overdue items) ── */
.rpt-alert-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}

.rpt-alert-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: var(--color-surface-alt);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--color-danger);
  font-size: var(--font-size-sm);
}

.rpt-alert-item__name {
  font-weight: 500;
  color: var(--color-text);
  min-width: 160px;
}

.rpt-alert-item__meta {
  color: var(--color-text-secondary);
  flex: 1;
}

.rpt-alert-item__value {
  font-weight: 600;
  color: var(--color-danger);
  white-space: nowrap;
}

/* ── Empty State ── */
.rpt-empty {
  text-align: center;
  padding: var(--space-xl);
  color: var(--color-text-muted);
  font-size: var(--font-size-sm);
}

/* ── Print Styles ── */
@media print {
  .app-header,
  .tab-bar,
  .rpt-header__actions {
    display: none !important;
  }

  .rpt-section__body {
    display: block !important;
    padding-top: var(--space-lg);
  }

  .rpt-section__toggle {
    display: none;
  }

  .rpt-kpi-card {
    break-inside: avoid;
    box-shadow: none;
    border: 1px solid #ccc;
  }

  .rpt-section {
    break-inside: avoid;
    box-shadow: none;
  }

  .module-container {
    overflow: visible !important;
  }

  .rpt-chart-card {
    break-inside: avoid;
  }
}

/* ── Leadership Investment Report ── */
.rpt-invest-header {
  text-align: center;
  margin-bottom: var(--space-lg);
}

.rpt-invest-gauge {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
  padding: var(--space-md) var(--space-xl);
  border-radius: var(--radius-lg);
  background: var(--color-surface-alt);
}

.rpt-invest-gauge--good { background: #dcfce7; }
.rpt-invest-gauge--warning { background: #fef3c7; }
.rpt-invest-gauge--danger { background: #fee2e2; }

.rpt-invest-gauge__score {
  font-size: 2.5rem;
  font-weight: 700;
  line-height: 1;
}

.rpt-invest-gauge--good .rpt-invest-gauge__score { color: #16a34a; }
.rpt-invest-gauge--warning .rpt-invest-gauge__score { color: #d97706; }
.rpt-invest-gauge--danger .rpt-invest-gauge__score { color: #dc2626; }

.rpt-invest-gauge__label {
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
}

.rpt-invest-gauge__title {
  margin-top: var(--space-sm);
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}

.rpt-invest-dims {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.rpt-invest-dim {
  padding: var(--space-sm) 0;
}

.rpt-invest-dim__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  font-size: var(--font-size-sm);
  font-weight: 500;
}

.rpt-invest-dim__score {
  font-weight: 700;
  font-size: var(--font-size-sm);
}

.rpt-invest-dim__bar {
  height: 10px;
  background: var(--color-bg-muted);
  border-radius: 5px;
  overflow: hidden;
}

.rpt-invest-dim__fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.3s ease;
}

.rpt-invest-dim__detail {
  margin-top: 2px;
  font-size: var(--font-size-xs);
  color: var(--color-text-muted);
}

/* ── Responsive ── */
@media (max-width: 1024px) {
  .rpt-kpi-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .rpt-chart-row {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 768px) {
  .rpt-kpi-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .rpt-bar-item__label {
    min-width: 80px;
    font-size: var(--font-size-xs);
  }

  .rpt-table {
    font-size: var(--font-size-xs);
  }

  .rpt-table th,
  .rpt-table td {
    padding: var(--space-xs) var(--space-sm);
  }
}

@media (max-width: 480px) {
  .rpt-kpi-grid {
    grid-template-columns: 1fr;
  }

  .rpt-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .rpt-alert-item {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-xs);
  }

  .rpt-section__header {
    padding: var(--space-sm) var(--space-md);
  }

  .rpt-section__body--open {
    padding: var(--space-md);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   MEETING MINUTES MODULE
   ═══════════════════════════════════════════════════════════════════ */

/* ── Stats grid ── */

.mm-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.mm-stat-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  border: 1px solid var(--border-color);
  text-align: center;
}

.mm-stat-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}

.mm-stat-value--warn {
  color: var(--danger);
}

.mm-stat-label {
  font-size: var(--text-xs);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: var(--space-xs);
}

/* ── Filter bar ── */

.mm-filter-bar {
  display: flex;
  gap: var(--space-sm);
  flex-wrap: wrap;
  align-items: flex-end;
  margin-bottom: var(--space-lg);
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  border: 1px solid var(--border-color);
}

.mm-filter-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 160px;
}

.mm-filter-group--grow {
  flex: 1;
  min-width: 200px;
}

.mm-filter-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-secondary);
}

.mm-filter-bar select,
.mm-filter-bar input {
  padding: 7px 10px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  background: var(--white);
}

/* ── Meeting type badges ── */

.mm-type-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: capitalize;
  white-space: nowrap;
}

.mm-type--leadership_team { background: #dbeafe; color: #1e40af; }
.mm-type--department      { background: #ede9fe; color: #6d28d9; }
.mm-type--committee       { background: #ffedd5; color: #c2410c; }
.mm-type--staff           { background: #dcfce7; color: #16a34a; }
.mm-type--parent          { background: #fce7f3; color: #be185d; }
.mm-type--other           { background: #f3f4f6; color: #4b5563; }

/* ── Meeting status badges ── */

.mm-status--draft     { background: #fef9c3; color: #a16207; }
.mm-status--finalized { background: #d1fae5; color: #065f46; }
.mm-status--archived  { background: #e5e7eb; color: #6b7280; }

/* ── Detail view ── */

.mm-back-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: var(--text-sm);
  color: var(--primary);
  cursor: pointer;
  margin-bottom: var(--space-md);
  text-decoration: none;
  font-weight: 500;
}

.mm-back-link:hover {
  text-decoration: underline;
}

.mm-detail-header {
  margin-bottom: var(--space-xl);
}

.mm-detail-title-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-md);
  margin-bottom: var(--space-sm);
}

.mm-detail-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-primary);
  margin: 0;
}

.mm-detail-actions {
  display: flex;
  gap: var(--space-xs);
  flex-shrink: 0;
}

.mm-detail-badges {
  display: flex;
  gap: var(--space-xs);
  margin-bottom: var(--space-md);
}

.mm-detail-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--space-md);
  padding: var(--space-md);
  background: var(--bg-light);
  border-radius: var(--radius-md);
}

.mm-meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.mm-meta-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.mm-meta-value {
  font-size: var(--text-sm);
  color: var(--text-primary);
}

/* ── Attendees ── */

.mm-attendees-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
}

.mm-attendee-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px 4px 4px;
  background: var(--bg-light);
  border-radius: 20px;
  font-size: var(--text-sm);
  border: 1px solid var(--border-color);
}

.mm-attendee-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
}

/* ── Sections ── */

.mm-section {
  margin-bottom: var(--space-xl);
}

.mm-section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-sm);
}

.mm-section-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin: 0;
}

.mm-section-content {
  background: var(--white);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  font-size: var(--text-sm);
  line-height: 1.7;
  color: var(--text-secondary);
  white-space: pre-wrap;
}

.mm-section-empty {
  color: var(--text-muted);
  font-style: italic;
}

/* ── Action items ── */

.mm-action-item {
  background: var(--white);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-bottom: var(--space-sm);
  transition: box-shadow 0.15s;
}

.mm-action-item:hover {
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
}

.mm-action-item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-sm);
  margin-bottom: var(--space-xs);
}

.mm-action-item-title {
  font-weight: 600;
  color: var(--text-primary);
  margin: 0;
  font-size: var(--text-sm);
}

.mm-action-item-badges {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.mm-priority--high   { background: #fef2f2; color: #991b1b; padding: 2px 8px; border-radius: 10px; font-size: var(--text-xs); font-weight: 600; }
.mm-priority--medium { background: #fffbeb; color: #92400e; padding: 2px 8px; border-radius: 10px; font-size: var(--text-xs); font-weight: 600; }
.mm-priority--low    { background: #f0fdf4; color: #166534; padding: 2px 8px; border-radius: 10px; font-size: var(--text-xs); font-weight: 600; }

.mm-item-status--pending     { background: #fef9c3; color: #a16207; padding: 2px 8px; border-radius: 10px; font-size: var(--text-xs); font-weight: 600; }
.mm-item-status--in_progress { background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 10px; font-size: var(--text-xs); font-weight: 600; }
.mm-item-status--completed   { background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 10px; font-size: var(--text-xs); font-weight: 600; text-decoration: line-through; }

.mm-action-item-desc {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
  line-height: 1.5;
}

.mm-action-item-meta {
  display: flex;
  gap: var(--space-md);
  flex-wrap: wrap;
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-bottom: var(--space-xs);
}

.mm-action-item-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: var(--space-xs);
  border-top: 1px solid var(--border-light);
  margin-top: var(--space-xs);
}

.mm-action-item-actions {
  display: flex;
  gap: var(--space-xs);
}

/* ── Linked task indicator ── */

.mm-linked-task {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: var(--text-xs);
  color: var(--primary);
  background: #eff6ff;
  padding: 3px 10px;
  border-radius: var(--radius-md);
  font-weight: 500;
}

.mm-linked-task--deleted {
  color: var(--text-muted);
  background: var(--bg-light);
  text-decoration: line-through;
}

/* ── Link-task modal ── */

.mm-task-type-btns {
  display: flex;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.mm-task-type-btn {
  flex: 1;
  padding: var(--space-md);
  border: 2px solid var(--border-color);
  background: var(--white);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}

.mm-task-type-btn:hover {
  border-color: var(--primary);
  background: #f0f9ff;
}

.mm-task-type-btn--active {
  border-color: var(--primary);
  background: var(--primary);
  color: var(--white);
}

.mm-destination-group {
  margin-top: var(--space-md);
}

.mm-destination-group label {
  display: block;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.mm-destination-group select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  margin-bottom: var(--space-sm);
}

/* ── Form fields (modals) ── */

.mm-form-group {
  margin-bottom: var(--space-md);
}

.mm-form-label {
  display: block;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.mm-form-label--required::after {
  content: ' *';
  color: var(--danger);
}

.mm-form-input,
.mm-form-select,
.mm-form-textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-family: inherit;
  box-sizing: border-box;
}

.mm-form-input:focus,
.mm-form-select:focus,
.mm-form-textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.mm-form-textarea {
  resize: vertical;
  min-height: 80px;
}

.mm-form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm);
}

/* ── Activity log ── */

.mm-activity-list {
  max-height: 400px;
  overflow-y: auto;
}

.mm-activity-entry {
  display: flex;
  gap: var(--space-sm);
  padding: var(--space-sm) 0;
  border-bottom: 1px solid var(--border-light);
}

.mm-activity-entry:last-child {
  border-bottom: none;
}

.mm-activity-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
}

.mm-activity-body {
  flex: 1;
  min-width: 0;
}

.mm-activity-desc {
  font-size: var(--text-sm);
  color: var(--text-primary);
}

.mm-activity-time {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── Empty state ── */

.mm-empty-state {
  text-align: center;
  padding: var(--space-xl) var(--space-md);
  color: var(--text-muted);
}

.mm-empty-icon {
  font-size: 3rem;
  margin-bottom: var(--space-sm);
  opacity: 0.4;
}

.mm-empty-text {
  font-size: var(--text-sm);
  margin-bottom: var(--space-md);
}

/* ── Responsive ── */

@media (max-width: 768px) {
  .mm-stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .mm-filter-bar {
    flex-direction: column;
  }

  .mm-filter-group {
    min-width: 100%;
  }

  .mm-detail-title-row {
    flex-direction: column;
  }

  .mm-detail-meta {
    grid-template-columns: 1fr;
  }

  .mm-form-row {
    grid-template-columns: 1fr;
  }

  .mm-action-item-header {
    flex-direction: column;
  }

  .mm-task-type-btns {
    flex-direction: column;
  }
}

/* ═══════════════════════════════════════════════
   PD Tracking Styles (.pd-)
   ═══════════════════════════════════════════════ */

/* Stats grid */
.pd-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}
.pd-stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  text-align: center;
}
.pd-stat-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.2;
}
.pd-stat-label {
  font-size: var(--text-sm);
  color: var(--text-muted);
  margin-top: var(--space-xs);
}

/* Filter bar */
.pd-filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
  align-items: center;
}
.pd-filter-bar select,
.pd-filter-bar input {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: var(--text-sm);
  background: var(--surface);
}
.pd-filter-bar input[type="text"] {
  min-width: 200px;
}

/* Catalog grid */
.pd-catalog {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--space-lg);
  margin-bottom: var(--space-xl);
}
.pd-offering-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.15s ease, transform 0.15s ease;
  cursor: pointer;
  overflow: hidden;
}
.pd-offering-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.pd-offering-header {
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  flex-wrap: wrap;
}
.pd-offering-title {
  font-weight: 600;
  font-size: var(--text-base);
  color: var(--text);
  flex: 1;
  min-width: 0;
}
.pd-offering-body {
  padding: var(--space-md) var(--space-lg);
  flex: 1;
  font-size: var(--text-sm);
  color: var(--text-muted);
}
.pd-offering-meta {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  margin-top: var(--space-sm);
  font-size: var(--text-sm);
}
.pd-offering-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.pd-offering-meta-icon {
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}
.pd-offering-footer {
  padding: var(--space-md) var(--space-lg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-sm);
}

/* Category badges */
.pd-category-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.pd-cat--workshop     { background: #dbeafe; color: #1d4ed8; }
.pd-cat--course       { background: #ede9fe; color: #6d28d9; }
.pd-cat--conference   { background: #ffedd5; color: #c2410c; }
.pd-cat--webinar      { background: #ccfbf1; color: #0f766e; }
.pd-cat--coaching     { background: #dcfce7; color: #15803d; }
.pd-cat--book_study   { background: #e0e7ff; color: #4338ca; }
.pd-cat--other        { background: #f3f4f6; color: #4b5563; }

/* Status badges */
.pd-status--draft     { background: #fef3c7; color: #92400e; }
.pd-status--published { background: #dcfce7; color: #15803d; }
.pd-status--completed { background: #dbeafe; color: #1d4ed8; }
.pd-status--cancelled { background: #fee2e2; color: #991b1b; }

/* Capacity bar */
.pd-capacity-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: var(--space-xs);
}
.pd-capacity-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}
.pd-capacity-fill--low     { background: #22c55e; }
.pd-capacity-fill--medium  { background: #f59e0b; }
.pd-capacity-fill--full    { background: #ef4444; }
.pd-capacity-text {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Registration status badges */
.pd-reg--registered { background: #dcfce7; color: #15803d; }
.pd-reg--waitlisted { background: #fef3c7; color: #92400e; }
.pd-reg--attended   { background: #dbeafe; color: #1d4ed8; }
.pd-reg--no_show    { background: #fee2e2; color: #991b1b; }
.pd-reg--cancelled  { background: #f3f4f6; color: #6b7280; }

/* Detail view */
.pd-detail-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
  flex-wrap: wrap;
}
.pd-detail-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
}
.pd-detail-badges {
  display: flex;
  gap: var(--space-sm);
  align-items: center;
  margin-top: var(--space-xs);
}
.pd-detail-actions {
  display: flex;
  gap: var(--space-sm);
  flex-wrap: wrap;
}
.pd-detail-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
}
.pd-meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.pd-meta-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.pd-meta-value {
  font-size: var(--text-sm);
  color: var(--text);
  font-weight: 500;
}

/* Section containers */
.pd-section {
  margin-bottom: var(--space-xl);
}
.pd-section-title {
  font-size: var(--text-lg);
  font-weight: 600;
  margin-bottom: var(--space-md);
  color: var(--text);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

/* Reflection cards */
.pd-reflection-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
}
.pd-reflection-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-sm);
}
.pd-reflection-author {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}
.pd-reflection-author-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}
.pd-reflection-text {
  color: var(--text-muted);
  font-size: var(--text-sm);
  line-height: 1.6;
}
.pd-reflection-linked {
  margin-top: var(--space-sm);
  padding: var(--space-xs) var(--space-sm);
  background: #ede9fe;
  border-radius: var(--radius);
  font-size: 11px;
  color: #6d28d9;
  display: inline-block;
}

/* Rating stars */
.pd-rating-stars {
  display: inline-flex;
  gap: 2px;
}
.pd-star--filled { color: #f59e0b; }
.pd-star--empty  { color: var(--border); }

/* My PD Summary */
.pd-my-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--space-lg);
  margin-bottom: var(--space-xl);
}
.pd-summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  text-align: center;
}
.pd-credit-ring {
  width: 100px;
  height: 100px;
  margin: 0 auto var(--space-sm);
}
.pd-credit-ring-bg { stroke: var(--border); }
.pd-credit-ring-fill { stroke: var(--primary); transition: stroke-dashoffset 0.6s ease; }
.pd-credit-ring-text {
  font-size: 1.2rem;
  font-weight: 700;
  fill: var(--text);
}

/* Tags */
.pd-tags {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
}
.pd-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  background: #f3f4f6;
  color: #4b5563;
}
.pd-standard-tag {
  background: #ede9fe;
  color: #6d28d9;
  cursor: pointer;
}
.pd-standard-tag:hover {
  background: #ddd6fe;
}

/* Attendance form */
.pd-attendance-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  margin-bottom: var(--space-md);
}
.pd-attendance-item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.pd-attendance-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
}

/* Link to standard modal */
.pd-standard-selector {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  max-height: 300px;
  overflow-y: auto;
}
.pd-standard-option {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
}
.pd-standard-option:hover {
  background: #f3f4f6;
}
.pd-standard-option--selected {
  border-color: var(--primary);
  background: #ede9fe;
}

/* Activity log */
.pd-activity-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}
.pd-activity-entry {
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  padding: var(--space-sm) 0;
  border-bottom: 1px solid var(--border);
  font-size: var(--text-sm);
}
.pd-activity-entry:last-child { border-bottom: none; }
.pd-activity-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.pd-activity-text { flex: 1; color: var(--text); }
.pd-activity-time { color: var(--text-muted); font-size: 11px; white-space: nowrap; }

/* Empty state */
.pd-empty {
  text-align: center;
  padding: var(--space-xl);
  color: var(--text-muted);
}
.pd-empty-icon { font-size: 2.5rem; margin-bottom: var(--space-sm); }

/* Forms */
.pd-form-group {
  margin-bottom: var(--space-md);
}
.pd-form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
  margin-bottom: var(--space-xs);
}
.pd-form-input,
.pd-form-select,
.pd-form-textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: var(--text-sm);
  background: var(--surface);
}
.pd-form-textarea { min-height: 80px; resize: vertical; }
.pd-form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}
.pd-form-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--space-md);
}

/* Chart container */
.pd-chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-lg);
  max-height: 350px;
}

/* Responsive */
@media (max-width: 768px) {
  .pd-catalog {
    grid-template-columns: 1fr;
  }
  .pd-stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .pd-detail-meta {
    grid-template-columns: 1fr;
  }
  .pd-form-row,
  .pd-form-row-3 {
    grid-template-columns: 1fr;
  }
  .pd-detail-header {
    flex-direction: column;
  }
  .pd-my-summary {
    grid-template-columns: 1fr;
  }
}

/* ═══════════════════════════════════════════════════
   Staff Feedback & 360 Reviews (.fb-*)
   ═══════════════════════════════════════════════════ */

/* ── Stats grid ── */
.fb-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.fb-stat-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  text-align: center;
}
.fb-stat-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.1;
}
.fb-stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.fb-stat-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── Filter bar ── */
.fb-filter-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.fb-filter-bar select,
.fb-filter-bar input {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.85rem;
  background: #fff;
}
.fb-filter-bar input[type="text"] {
  min-width: 200px;
}

/* ── Cycle cards ── */
.fb-cycle-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.fb-cycle-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.15s;
}
.fb-cycle-card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  transform: translateY(-2px);
}
.fb-cycle-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.fb-cycle-header h3 {
  margin: 0 0 6px;
  font-size: 1.05rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.fb-cycle-body {
  padding: 14px 18px;
}
.fb-cycle-body p {
  margin: 0 0 8px;
  font-size: 0.85rem;
  color: var(--text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.fb-cycle-meta {
  display: flex;
  gap: 16px;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.fb-cycle-footer {
  padding: 10px 18px;
  background: var(--bg-muted);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.8rem;
}

/* ── Type badges ── */
.fb-type-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.fb-type--360        { background: #EDE9FE; color: #6D28D9; }
.fb-type--peer       { background: #DBEAFE; color: #2563EB; }
.fb-type--supervisor { background: #CCFBF1; color: #0F766E; }
.fb-type--self       { background: #D1FAE5; color: #059669; }

/* ── Status badges ── */
.fb-status--draft    { background: #FEF3C7; color: #92400E; }
.fb-status--open     { background: #D1FAE5; color: #065F46; }
.fb-status--closed   { background: #DBEAFE; color: #1E40AF; }
.fb-status--archived { background: #F3F4F6; color: #6B7280; }

/* ── Assignment status badges ── */
.fb-asgn--pending     { background: #FEF3C7; color: #92400E; }
.fb-asgn--in_progress { background: #DBEAFE; color: #1E40AF; }
.fb-asgn--submitted   { background: #D1FAE5; color: #065F46; }
.fb-asgn--declined    { background: #FEE2E2; color: #991B1B; }

/* ── Completion bar ── */
.fb-completion-bar {
  width: 100%;
  height: 6px;
  background: #E5E7EB;
  border-radius: 3px;
  overflow: hidden;
}
.fb-completion-fill {
  height: 100%;
  background: #059669;
  border-radius: 3px;
  transition: width 0.3s ease;
}
.fb-completion-text {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ── Detail layout ── */
.fb-detail-header {
  margin-bottom: 20px;
}
.fb-detail-header h2 {
  margin: 0 0 8px;
  font-size: 1.3rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.fb-detail-meta {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
  font-size: 0.85rem;
}
.fb-detail-meta-item {
  background: var(--bg-muted);
  padding: 10px 14px;
  border-radius: 8px;
}
.fb-detail-meta-item strong {
  display: block;
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.fb-detail-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

/* ── Detail tabs ── */
.fb-detail-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
}
.fb-detail-tab {
  padding: 10px 20px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color 0.2s, border-color 0.2s;
}
.fb-detail-tab:hover {
  color: var(--primary);
}
.fb-detail-tab--active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  font-weight: 600;
}

/* ── Questions list ── */
.fb-question-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.fb-question-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
}
.fb-question-num {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 600;
}
.fb-question-content {
  flex: 1;
}
.fb-question-content p {
  margin: 0 0 6px;
  font-size: 0.9rem;
}
.fb-question-type-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  background: #F3F4F6;
  color: #6B7280;
}
.fb-question-required {
  color: #DC2626;
  font-size: 0.75rem;
  font-weight: 600;
  margin-left: 6px;
}
.fb-question-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

/* ── Assignment cards & table ── */
.fb-assignment-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.fb-assignment-card:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.fb-assignment-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.fb-assignment-header h4 {
  margin: 0;
  font-size: 0.95rem;
  font-weight: 600;
}
.fb-responder-info {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.fb-role-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: capitalize;
}
.fb-role--self       { background: #D1FAE5; color: #059669; }
.fb-role--peer       { background: #DBEAFE; color: #2563EB; }
.fb-role--supervisor { background: #CCFBF1; color: #0F766E; }

/* ── Anonymous badge ── */
.fb-anonymous-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  background: #F3F4F6;
  color: #6B7280;
}

/* ── Feedback form ── */
.fb-form {
  max-width: 720px;
}
.fb-form-question {
  margin-bottom: 24px;
  padding: 18px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.fb-form-question-text {
  font-size: 0.95rem;
  font-weight: 500;
  margin: 0 0 12px;
}
.fb-form-rating {
  margin-bottom: 10px;
}
.fb-form-textarea {
  width: 100%;
  min-height: 80px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.85rem;
  font-family: inherit;
  resize: vertical;
}
.fb-form-textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
.fb-form-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

/* ── Summary cards ── */
.fb-summary-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.fb-summary-card:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.fb-summary-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.fb-summary-header h4 {
  margin: 0;
  font-size: 1rem;
  font-weight: 600;
}
.fb-summary-score {
  display: flex;
  align-items: center;
  gap: 8px;
}
.fb-summary-score .fb-avg-rating {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--primary);
}
.fb-summary-meta {
  display: flex;
  gap: 16px;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.fb-threshold-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
}
.fb-threshold--met     { background: #D1FAE5; color: #065F46; }
.fb-threshold--not-met { background: #FEE2E2; color: #991B1B; }

/* ── Rating stars (display) ── */
.fb-rating-stars {
  display: inline-flex;
  gap: 2px;
  font-size: 1.1rem;
}
.fb-star--filled { color: #F59E0B; }
.fb-star--empty  { color: #D1D5DB; }

/* ── Question breakdown (in summary detail) ── */
.fb-question-breakdown {
  margin-top: 16px;
}
.fb-question-breakdown-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #F3F4F6;
}
.fb-question-breakdown-item:last-child {
  border-bottom: none;
}
.fb-breakdown-label {
  flex: 1;
  font-size: 0.85rem;
}
.fb-breakdown-bar {
  width: 120px;
  height: 8px;
  background: #E5E7EB;
  border-radius: 4px;
  overflow: hidden;
}
.fb-breakdown-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 4px;
}
.fb-breakdown-value {
  width: 40px;
  text-align: right;
  font-size: 0.85rem;
  font-weight: 600;
}

/* ── Text responses (anonymized) ── */
.fb-text-responses {
  margin-top: 16px;
}
.fb-text-response {
  padding: 12px 14px;
  background: var(--bg-muted);
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 0.85rem;
  line-height: 1.5;
  font-style: italic;
  border-left: 3px solid var(--primary);
}

/* ── Activity log ── */
.fb-activity-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.fb-activity-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #F3F4F6;
  font-size: 0.8rem;
}
.fb-activity-item:last-child {
  border-bottom: none;
}
.fb-activity-avatar {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 600;
}
.fb-activity-content {
  flex: 1;
}
.fb-activity-time {
  color: var(--text-muted);
  font-size: 0.75rem;
}

/* ── Bulk assign modal ── */
.fb-bulk-assign-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.fb-bulk-assign-option {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
}
.fb-bulk-assign-option input[type="checkbox"] {
  width: 16px;
  height: 16px;
}
.fb-bulk-preview {
  background: var(--bg-muted);
  padding: 12px;
  border-radius: 8px;
  font-size: 0.85rem;
  text-align: center;
  color: var(--text-muted);
}

/* ── Form groups (cycle create/edit) ── */
.fb-form-group {
  margin-bottom: 14px;
}
.fb-form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.fb-form-group input,
.fb-form-group select,
.fb-form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.85rem;
  font-family: inherit;
}
.fb-form-group textarea {
  min-height: 60px;
  resize: vertical;
}
.fb-form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.fb-form-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
}

/* ── Chart container ── */
.fb-chart-container {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 20px;
}
.fb-chart-container h3 {
  margin: 0 0 14px;
  font-size: 1rem;
  font-weight: 600;
}
.fb-chart-canvas {
  max-height: 300px;
}

/* ── Link to standard modal ── */
.fb-standard-selector {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 300px;
  overflow-y: auto;
}
.fb-standard-option {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.fb-standard-option:hover {
  background: #F0F7FF;
  border-color: var(--primary);
}
.fb-standard-option h4 {
  margin: 0 0 2px;
  font-size: 0.85rem;
  font-weight: 600;
}
.fb-standard-option p {
  margin: 0;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ── Empty states ── */
.fb-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.fb-empty-icon {
  font-size: 2.5rem;
  margin-bottom: 10px;
}
.fb-empty p {
  font-size: 0.9rem;
  margin: 0;
}

/* ── Multiplier Profile (Feedback Summary) ── */
.fb-profile-breakdown-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.fb-profile-row {
  display: grid;
  grid-template-columns: 120px 1fr 50px 40px;
  gap: 8px;
  align-items: center;
}

.fb-profile-label {
  font-weight: 600;
  font-size: var(--font-size-sm);
}

.fb-profile-bar {
  height: 8px;
  background: var(--color-bg-muted, #f3f4f6);
  border-radius: 4px;
  overflow: hidden;
}

.fb-profile-bar__fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s ease;
}

.fb-profile-bar--multiplier {
  background: linear-gradient(90deg, rgba(124, 58, 237, 0.5), rgba(124, 58, 237, 0.9));
}

.fb-profile-bar--diminisher {
  background: linear-gradient(90deg, rgba(234, 88, 12, 0.5), rgba(234, 88, 12, 0.9));
}

.fb-profile-value {
  font-weight: 600;
  font-size: var(--font-size-sm);
  text-align: right;
}

.fb-profile-count {
  text-align: right;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .fb-stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .fb-cycle-grid {
    grid-template-columns: 1fr;
  }
  .fb-detail-meta {
    grid-template-columns: 1fr;
  }
  .fb-detail-tabs {
    overflow-x: auto;
  }
  .fb-form-row,
  .fb-form-row-3 {
    grid-template-columns: 1fr;
  }
  .fb-filter-bar {
    flex-direction: column;
  }
  .fb-question-breakdown-item {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .fb-breakdown-bar {
    width: 100%;
  }
  .fb-profile-row {
    grid-template-columns: 1fr 100px 40px;
  }
  #fb-my-profile-wrap {
    grid-template-columns: 1fr !important;
  }
}

/* ═══════════════════════════════════════════════
   Staff Wellness & Workload  (.wl-*)
   ═══════════════════════════════════════════════ */

/* ── Sub-navigation ── */
.wl-sub-nav {
  display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0;
}
.wl-sub-nav-btn {
  padding: 8px 16px; background: none; border: none; border-bottom: 2px solid transparent;
  margin-bottom: -2px; cursor: pointer; font-size: 0.875rem; color: var(--text-muted);
  border-radius: 6px 6px 0 0; transition: all 0.2s;
}
.wl-sub-nav-btn:hover { color: var(--text); background: var(--surface-hover); }
.wl-sub-nav-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

/* ── Admin KPI Grid ── */
.wl-admin-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.wl-kpi-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; text-align: center;
}
.wl-kpi-value {
  font-size: 2rem; font-weight: 700; color: var(--text);
  line-height: 1.2; margin-bottom: 4px;
}
.wl-kpi-label {
  font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.05em;
}
.wl-kpi-card.green .wl-kpi-value { color: #16a34a; }
.wl-kpi-card.amber .wl-kpi-value { color: #d97706; }
.wl-kpi-card.red .wl-kpi-value { color: #dc2626; }

/* ── Check-in Form ── */
.wl-checkin-form {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 24px; margin-bottom: 24px;
}
.wl-checkin-form h3 {
  margin: 0 0 16px; font-size: 1.1rem; font-weight: 600;
}
.wl-dimension-row {
  display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
  padding: 12px; border-radius: 8px; background: var(--bg);
}
.wl-dimension-label {
  min-width: 120px; font-weight: 500; font-size: 0.9rem;
}
.wl-dimension-desc {
  font-size: 0.75rem; color: var(--text-muted); margin-top: 2px;
}
.wl-score-picker {
  display: flex; gap: 8px;
}
.wl-score-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border);
  background: var(--surface); cursor: pointer; font-weight: 600; font-size: 0.9rem;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
}
.wl-score-btn:hover { transform: scale(1.1); }
.wl-score-btn.selected { border-color: transparent; color: #fff; transform: scale(1.15); }
.wl-score-btn[data-score="1"].selected { background: #dc2626; }
.wl-score-btn[data-score="2"].selected { background: #f97316; }
.wl-score-btn[data-score="3"].selected { background: #eab308; }
.wl-score-btn[data-score="4"].selected { background: #84cc16; }
.wl-score-btn[data-score="5"].selected { background: #16a34a; }
.wl-score-btn[data-score="1"]:not(.selected) { color: #dc2626; }
.wl-score-btn[data-score="2"]:not(.selected) { color: #f97316; }
.wl-score-btn[data-score="3"]:not(.selected) { color: #eab308; }
.wl-score-btn[data-score="4"]:not(.selected) { color: #84cc16; }
.wl-score-btn[data-score="5"]:not(.selected) { color: #16a34a; }
.wl-notes-area {
  width: 100%; min-height: 80px; padding: 10px; border: 1px solid var(--border);
  border-radius: 8px; font-family: inherit; font-size: 0.875rem; resize: vertical;
  background: var(--bg);
}
.wl-submit-row {
  display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;
}

/* ── Latest Check-in Summary ── */
.wl-latest-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
