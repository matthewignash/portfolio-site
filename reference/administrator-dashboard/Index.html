        <span class="text-muted text-sm">Loading...</span>
      </div>

    <!-- Tab Navigation -->
    <nav class="tab-bar" id="tab-bar" role="tablist">

    <main class="main-content" id="main-content">

      <div class="module-container" id="module-feedback"></div>
      <div class="module-container" id="module-wellness"></div>

    </main>

  </div>

  <!-- App Scripts (order matters: utils → api → components → modules → app) -->
  <?!= include('JS_Utils') ?>
  <?!= include('JS_Api') ?>
  <?!= include('JS_Components') ?>

  <!-- Bootstrap App namespace so modules can register before JS_App loads -->
  <script>var App = { ModuleRegistry: {} };</script>

  <!-- Staff Wellness & Workload -->
  <?!= include('Module_Wellness') ?>

  <!-- App controller (must be last — initializes everything) -->
  <?!= include('JS_App') ?>
</body>
</html>
