<script>
    // ================================================
    // STANDARDS TAB FUNCTIONS (Story 2.3)
    // ================================================

    function loadStandards() {
      google.script.run
        .withSuccessHandler(function(data) {
          standardsData = data || [];
          showStandards();
          populateCoverageMapDropdown();
        })
        .withFailureHandler(function(err) {
          document.getElementById('standardsContent').innerHTML =
            '<p style="color:#dc2626;">Error loading standards: ' + err.message + '</p>';
        })
        .getStandards();
    }

    function onStandardsFrameworkFilterChange() {
      var fw = document.getElementById('standardsFrameworkFilter').value;
      var subjectEl = document.getElementById('standardsSubjectFilter');
      if (!fw) {
        subjectEl.innerHTML = '<option value="">All Subjects</option>';
        subjectEl.disabled = true;
      } else {
        var loadAndPopulate = function(cache) {
          var subjects = (cache && cache[fw]) || [];
          var html = '<option value="">All ' + escapeHtml(fw) + '</option>';
          for (var i = 0; i < subjects.length; i++) {
            html += '<option value="' + escapeHtml(subjects[i]) + '">' + escapeHtml(subjects[i]) + '</option>';
          }
          subjectEl.innerHTML = html;
          subjectEl.disabled = subjects.length === 0;
        };
        if (stdSubjectsCache) {
          loadAndPopulate(stdSubjectsCache);
        } else {
          subjectEl.innerHTML = '<option value="">Loading...</option>';
          subjectEl.disabled = true;
          google.script.run
            .withSuccessHandler(function(data) {
              stdSubjectsCache = data || {};
              loadAndPopulate(stdSubjectsCache);
            })
            .withFailureHandler(function() {
              subjectEl.innerHTML = '<option value="">All ' + escapeHtml(fw) + '</option>';
              subjectEl.disabled = false;
            })
            .getStandardSubjects();
        }
      }
      filterStandards();
    }

    function showStandards() {
      var container = document.getElementById('standardsContent');
      var frameworkFilter = document.getElementById('standardsFrameworkFilter').value;
      var subjectFilter = document.getElementById('standardsSubjectFilter') ? document.getElementById('standardsSubjectFilter').value : '';
      var searchText = document.getElementById('standardsSearchInput').value.toLowerCase().trim();

      // Filter standards
      var filtered = standardsData.filter(function(s) {
        if (frameworkFilter && s.framework !== frameworkFilter) return false;
        if (subjectFilter && s.subject !== subjectFilter) return false;
        if (searchText) {
          var searchable = ((s.code || '') + ' ' + (s.description || '') + ' ' + (s.subject || '') + ' ' + (s.strand || '')).toLowerCase();
          if (searchable.indexOf(searchText) === -1) return false;
        }
        return true;
      });

      if (filtered.length === 0) {
        if (standardsData.length === 0) {
          container.innerHTML =
            '<div style="text-align:center; padding:40px; color:#94a3b8;">' +
            '<p style="font-size:18px; margin-bottom:8px;">No standards yet</p>' +
            '<p style="font-size:13px; margin-bottom:16px;">Add standards manually or seed example standards to get started.</p>' +
            '<button class="btn btn-success" onclick="seedStandards()">Seed Example Standards</button>' +
            '</div>';
        } else {
          container.innerHTML =
            '<div style="text-align:center; padding:40px; color:#94a3b8;">' +
            '<p>No standards match your search.</p>' +
            '</div>';
        }
        return;
      }

      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var s = filtered[i];
        var frameworkClass = (s.framework || 'Custom').toLowerCase().replace(/[^a-z]/g, '');
        html += '<div class="standard-card">';
        html += '<div style="display:flex; align-items:flex-start; gap:12px;">';
        html += '<span class="standard-card-code">' + escapeHtml(s.code || '—') + '</span>';
        html += '<div style="flex:1; min-width:0;">';
        html += '<div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">';
        html += '<span class="standard-card-framework">' + escapeHtml(s.framework || 'Custom') + '</span>';
        if (s.subject) {
          html += '<span class="standard-card-meta">' + escapeHtml(s.subject) + '</span>';
        }
        if (s.gradeLevel) {
          html += '<span class="standard-card-meta">' + escapeHtml(s.gradeLevel) + '</span>';
        }
        if (s.strand) {
          html += '<span class="standard-card-meta">' + escapeHtml(s.strand) + '</span>';
        }
        html += '</div>';
        if (s.description) {
          html += '<div class="standard-card-desc">' + escapeHtml(s.description) + '</div>';
        }
        html += '</div>';
        // Action buttons (teacher/admin only)
        if (userData && userData.canEdit) {
          html += '<div style="display:flex; gap:6px; flex-shrink:0;">';
          html += '<button class="btn btn-outline btn-small" onclick="openStandardModal(\'' + s.standardId + '\')" title="Edit">Edit</button>';
          if (userData.isAdmin) {
            html += '<button class="btn btn-outline btn-small" style="color:#dc2626; border-color:#dc2626;" onclick="confirmDeleteStandard(\'' + s.standardId + '\')" title="Delete">Delete</button>';
          }
          html += '</div>';
        }
        html += '</div>';
        html += '</div>';
      }

      container.innerHTML = html;
    }

    function filterStandards() {
      showStandards();
    }

    function openStandardModal(standardId) {
      // Reset form
      document.getElementById('standardFormId').value = '';
      document.getElementById('standardFormCode').value = '';
      document.getElementById('standardFormFramework').value = 'NGSS';
      document.getElementById('standardFormDescription').value = '';
      document.getElementById('standardFormSubject').value = '';
      document.getElementById('standardFormGradeLevel').value = '';
      document.getElementById('standardFormStrand').value = '';

      if (standardId) {
        document.getElementById('standardModalTitle').textContent = 'Edit Standard';
        // Find the standard in loaded data
        for (var i = 0; i < standardsData.length; i++) {
          if (standardsData[i].standardId === standardId) {
            var s = standardsData[i];
            document.getElementById('standardFormId').value = s.standardId;
            document.getElementById('standardFormCode').value = s.code || '';
            document.getElementById('standardFormFramework').value = s.framework || 'NGSS';
            document.getElementById('standardFormDescription').value = s.description || '';
            document.getElementById('standardFormSubject').value = s.subject || '';
            document.getElementById('standardFormGradeLevel').value = s.gradeLevel || '';
            document.getElementById('standardFormStrand').value = s.strand || '';
            break;
          }
        }
      } else {
        document.getElementById('standardModalTitle').textContent = 'Add Standard';
      }

      document.getElementById('standardModal').classList.add('active');
      document.getElementById('standardFormCode').focus();
    }

    function closeStandardModal() {
      document.getElementById('standardModal').classList.remove('active');
    }

    function saveStandardFromModal() {
      var code = document.getElementById('standardFormCode').value.trim();
      var framework = document.getElementById('standardFormFramework').value;

      if (!code) {
        showToast('Standard code is required', 'error');
        return;
      }

      var data = {
        standardId: document.getElementById('standardFormId').value || '',
        code: code,
        framework: framework,
        description: document.getElementById('standardFormDescription').value.trim(),
        subject: document.getElementById('standardFormSubject').value.trim(),
        gradeLevel: document.getElementById('standardFormGradeLevel').value.trim(),
        strand: document.getElementById('standardFormStrand').value.trim(),
        active: true
      };

      google.script.run
        .withSuccessHandler(function() {
          closeStandardModal();
          showToast('Standard saved successfully');
          loadStandards();
          // Also refresh picker data
          loadAllStandardsForPicker();
        })
        .withFailureHandler(function(err) {
          showToast('Error saving standard: ' + err.message, 'error');
        })
        .saveStandard(data);
    }

    function confirmDeleteStandard(standardId) {
      if (!confirm('Are you sure you want to delete this standard? This is a soft delete and can be reversed.')) return;

      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success) {
            showToast('Standard deleted');
            loadStandards();
            loadAllStandardsForPicker();
          } else {
            showToast('Could not delete standard', 'error');
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error deleting standard: ' + err.message, 'error');
        })
        .deleteStandard(standardId);
    }

    function seedStandards() {
      if (!confirm('This will seed example standards (NGSS, CCSS, IB-MYP). Duplicates will be skipped. Continue?')) return;

      showToast('Seeding standards...');
      google.script.run
        .withSuccessHandler(function(result) {
          showToast('Imported ' + result.imported + ' standards (' + result.skipped + ' skipped)');
          loadStandards();
          loadAllStandardsForPicker();
        })
        .withFailureHandler(function(err) {
          showToast('Error seeding standards: ' + err.message, 'error');
        })
        .seedCommonStandards();
    }

    // ================================================
    // ALIGNMENT DATA HELPERS (Standards Alignment)
    // ================================================

    function parseAlignmentData(raw) {
      if (!raw) return { strength: 'introduced', notes: '' };
      if (typeof raw === 'object') return raw;
      try {
        var parsed = JSON.parse(raw);
        return {
          strength: parsed.strength || 'introduced',
          notes: parsed.notes || ''
        };
      } catch (e) {
        // Legacy plain-string notes
        return { strength: 'introduced', notes: String(raw) };
      }
    }

    function getStrengthDotHtml(strength) {
      var cls = 'sal-strength-dot ';
      if (strength === 'mastered') cls += 'mastered';
      else if (strength === 'practiced') cls += 'practiced';
      else cls += 'introduced';
      return '<span class="' + cls + '"></span>';
    }

    // ================================================
    // COVERAGE REPORT FUNCTIONS (Story 2.3)
    // ================================================

    function populateCoverageMapDropdown() {
      var select = document.getElementById('coverageMapSelect');
      if (!select) return;

      // Keep the first "Choose a map" option
      var html = '<option value="">-- Choose a map --</option>';
      for (var i = 0; i < mapsData.length; i++) {
        var m = mapsData[i];
        html += '<option value="' + m.mapId + '">' + escapeHtml(m.name || m.mapId) + '</option>';
      }
      select.innerHTML = html;
    }

    function loadCoverageForMap(mapId) {
      var container = document.getElementById('coverageContent');
      if (!mapId) {
        container.innerHTML = '<p style="color:#94a3b8; font-size:13px; text-align:center;">Select a map above to view standards coverage.</p>';
        coverageData = null;
        return;
      }

      container.innerHTML = '<div class="loading"><span class="loading-spinner"></span>Loading coverage...</div>';

      google.script.run
        .withSuccessHandler(function(data) {
          coverageData = data;
          renderCoverage();
          loadUncoveredHexes();
        })
        .withFailureHandler(function(err) {
          container.innerHTML = '<p style="color:#dc2626;">Error: ' + escapeHtml(err.message) + '</p>';
        })
        .getStandardsCoverage(mapId);
    }

    function renderCoverage() {
      var container = document.getElementById('coverageContent');
      if (!coverageData) {
        container.innerHTML = '<p style="color:#94a3b8; font-size:13px; text-align:center;">No coverage data.</p>';
        return;
      }

      var d = coverageData;
      var pct = d.coveragePercent || 0;
      var barColor = pct >= 75 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';
      var mapId = document.getElementById('coverageMapSelect').value;

      var html = '';

      // Summary bar
      html += '<div class="coverage-summary">';
      html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">';
      html += '<span style="font-weight:600; font-size:14px;">' + pct + '% Coverage</span>';
      html += '<span style="font-size:13px; color:#64748b;">' + d.coveredCount + ' covered / ' + d.gapCount + ' gaps / ' + d.totalStandards + ' total</span>';
      html += '</div>';
      html += '<div class="coverage-bar">';
      html += '<div class="coverage-bar-fill" style="width:' + pct + '%; background:' + barColor + ';"></div>';
      html += '</div>';
      html += '</div>';

      // Covered standards (clickable with drilldown)
      if (d.covered && d.covered.length > 0) {
        html += '<div style="margin-top:16px;">';
        html += '<h4 style="margin:0 0 8px; font-size:13px; color:#10b981; text-transform:uppercase; letter-spacing:0.5px;">Covered (' + d.covered.length + ')</h4>';
        for (var i = 0; i < d.covered.length; i++) {
          var c = d.covered[i];
          var std = c.standard;
          var covId = 'sal-cov-' + i;
          html += '<div class="sal-coverage-item" onclick="toggleCoverageDrilldown(\'' + covId + '\')">';
          html += '<div style="display:flex; align-items:center; gap:8px;">';
          html += '<span class="standard-card-code" style="font-size:11px; padding:2px 6px;">' + escapeHtml(std.code || '') + '</span>';
          html += '<span style="flex:1; font-size:12px; color:#475569; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + escapeHtml(std.description || '') + '</span>';
          html += '<span style="font-size:11px; color:#64748b; flex-shrink:0;">' + c.hexCount + ' hex' + (c.hexCount !== 1 ? 'es' : '') + ' &#9660;</span>';
          html += '</div>';
          // Drilldown: list of hex names
          html += '<div class="sal-drilldown" id="' + covId + '">';
          if (c.hexIds && c.hexIds.length > 0) {
            for (var h = 0; h < c.hexIds.length; h++) {
              var hexTitle = getCoverageHexTitle(mapId, c.hexIds[h]);
              html += '<div class="sal-drilldown-hex">';
              html += '<span style="color:#3b82f6;">&#x2B22;</span> ';
              html += '<span class="sal-drilldown-hex-title">' + escapeHtml(hexTitle) + '</span>';
              html += '</div>';
            }
          }
          html += '</div>';
          html += '</div>';
        }
        html += '</div>';
      }

      // Gap standards (with "Link to hex" button)
      if (d.gaps && d.gaps.length > 0) {
        html += '<div style="margin-top:16px;">';
        html += '<h4 style="margin:0 0 8px; font-size:13px; color:#ef4444; text-transform:uppercase; letter-spacing:0.5px;">Gaps (' + d.gaps.length + ')</h4>';
        for (var j = 0; j < d.gaps.length; j++) {
          var g = d.gaps[j];
          var gapId = 'sal-gap-' + j;
          html += '<div style="padding:6px 0; border-bottom:1px solid #f1f5f9;">';
          html += '<div style="display:flex; align-items:center; gap:8px;">';
          html += '<span class="standard-card-code" style="font-size:11px; padding:2px 6px; opacity:0.6;">' + escapeHtml(g.code || '') + '</span>';
          html += '<span style="flex:1; font-size:12px; color:#94a3b8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + escapeHtml(g.description || '') + '</span>';
          html += '<button class="sal-gap-link-btn" onclick="openGapLinker(\'' + gapId + '\', \'' + g.standardId + '\')">Link to hex</button>';
          html += '</div>';
          // Inline hex picker
          html += '<div class="sal-gap-hex-picker" id="' + gapId + '">';
          html += buildGapHexPickerHtml(mapId, g.standardId, gapId);
          html += '</div>';
          html += '</div>';
        }
        html += '</div>';
      }

      // Uncovered hexes placeholder
      html += '<div class="sal-uncovered-section" id="salUncoveredSection" style="display:none;"></div>';

      container.innerHTML = html;
    }

    function getCoverageHexTitle(mapId, hexId) {
      // Try to find hex title from current map data
      if (currentMap && currentMap.mapId === mapId && currentMap.hexes) {
        for (var i = 0; i < currentMap.hexes.length; i++) {
          if (currentMap.hexes[i].id === hexId) {
            return currentMap.hexes[i].title || hexId;
          }
        }
      }
      // Fallback: try mapsData
      for (var m = 0; m < mapsData.length; m++) {
        if (mapsData[m].mapId === mapId && mapsData[m].hexes) {
          for (var h = 0; h < mapsData[m].hexes.length; h++) {
            if (mapsData[m].hexes[h].id === hexId) {
              return mapsData[m].hexes[h].title || hexId;
            }
          }
        }
      }
      return hexId;
    }

    function toggleCoverageDrilldown(elementId) {
      var el = document.getElementById(elementId);
      if (!el) return;
      if (el.className.indexOf('visible') !== -1) {
        el.className = 'sal-drilldown';
      } else {
        el.className = 'sal-drilldown visible';
      }
    }

    function openGapLinker(gapId, standardId) {
      var el = document.getElementById(gapId);
      if (!el) return;
      if (el.className.indexOf('visible') !== -1) {
        el.className = 'sal-gap-hex-picker';
      } else {
        el.className = 'sal-gap-hex-picker visible';
      }
    }

    function buildGapHexPickerHtml(mapId, standardId, gapId) {
      // Build a dropdown of hexes from the map
      var hexes = [];
      for (var m = 0; m < mapsData.length; m++) {
        if (mapsData[m].mapId === mapId && mapsData[m].hexes) {
          hexes = mapsData[m].hexes;
          break;
        }
      }
      if (hexes.length === 0) return '<span style="color:#94a3b8; font-size:11px;">No hexes in this map.</span>';

      var html = '<select id="gapHexSelect-' + gapId + '">';
      html += '<option value="">-- Select hex --</option>';
      for (var i = 0; i < hexes.length; i++) {
        html += '<option value="' + hexes[i].id + '">' + escapeHtml(hexes[i].title || hexes[i].id) + '</option>';
      }
      html += '</select>';
      html += '<button class="sal-gap-link-btn" onclick="linkGapToHex(\'' + standardId + '\', \'' + gapId + '\')">Link</button>';
      return html;
    }

    function linkGapToHex(standardId, gapId) {
      var selectEl = document.getElementById('gapHexSelect-' + gapId);
      if (!selectEl || !selectEl.value) {
        showToast('Select a hex first', 'error');
        return;
      }
      var mapId = document.getElementById('coverageMapSelect').value;
      var hexId = selectEl.value;

      google.script.run
        .withSuccessHandler(function() {
          showToast('Standard linked to hex');
          loadCoverageForMap(mapId);
        })
        .withFailureHandler(function(err) {
          showToast('Error linking: ' + err.message, 'error');
        })
        .linkStandardToHex(mapId, hexId, standardId, JSON.stringify({ strength: 'introduced', notes: '' }));
    }

    // Uncovered Hexes
    function loadUncoveredHexes() {
      var mapId = document.getElementById('coverageMapSelect').value;
      if (!mapId) return;

      google.script.run
        .withSuccessHandler(function(hexes) {
          renderUncoveredHexes(hexes || []);
        })
        .withFailureHandler(function(err) {
          console.error('Error loading uncovered hexes:', err);
        })
        .getUncoveredHexes(mapId);
    }

    function renderUncoveredHexes(hexes) {
      var section = document.getElementById('salUncoveredSection');
      if (!section) return;

      if (hexes.length === 0) {
        section.style.display = 'none';
        return;
      }

      var html = '<div class="sal-uncovered-title">Uncovered Hexes (' + hexes.length + ')</div>';
      html += '<p style="font-size:11px; color:#94a3b8; margin:0 0 8px;">These hexes have no standards linked yet.</p>';
      for (var i = 0; i < hexes.length; i++) {
        var h = hexes[i];
        html += '<div class="sal-uncovered-hex">';
        html += '<span>' + escapeHtml(h.title || h.id) + '</span>';
        html += '<span style="font-size:11px; opacity:0.7;">' + escapeHtml(h.type || 'core') + '</span>';
        html += '</div>';
      }

      section.innerHTML = html;
      section.style.display = 'block';
    }

    // ================================================
    // BULK OPERATIONS (Standards Alignment)
    // ================================================

    var salBulkMode = 'stdToHexes';

    function toggleBulkPanel() {
      var panel = document.getElementById('salBulkPanel');
      if (!panel) return;
      if (panel.className.indexOf('visible') !== -1) {
        panel.className = 'sal-bulk-panel';
      } else {
        panel.className = 'sal-bulk-panel visible';
        setBulkMode(salBulkMode);
      }
    }

    function setBulkMode(mode) {
      salBulkMode = mode;
      // Update tab active states
      var tabs = document.querySelectorAll('.sal-bulk-tab');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].className = 'sal-bulk-tab';
      }
      // Find the clicked tab
      var allTabs = document.querySelectorAll('.sal-bulk-tab');
      for (var t = 0; t < allTabs.length; t++) {
        if (mode === 'stdToHexes' && t === 0) allTabs[t].className = 'sal-bulk-tab active';
        if (mode === 'hexToStds' && t === 1) allTabs[t].className = 'sal-bulk-tab active';
      }

      if (mode === 'stdToHexes') {
        renderBulkStdToHexes();
      } else {
        renderBulkHexToStds();
      }
    }

    function renderBulkStdToHexes() {
      var container = document.getElementById('salBulkContent');
      var mapId = document.getElementById('coverageMapSelect').value;

      if (!mapId) {
        container.innerHTML = '<p style="color:#94a3b8; font-size:12px;">Select a map in the coverage report first.</p>';
        return;
      }

      // Standard selector
      var html = '<div style="margin-bottom:8px;">';
      html += '<label style="font-size:12px; font-weight:600; color:#374151;">Select Standard:</label>';
      html += '<select class="form-select" id="bulkStdSelect" style="margin-top:4px; font-size:12px;">';
      html += '<option value="">-- Choose a standard --</option>';
      for (var i = 0; i < hexStandardsAllData.length; i++) {
        var s = hexStandardsAllData[i];
        html += '<option value="' + s.standardId + '">' + escapeHtml(s.code) + ' - ' + escapeHtml((s.description || '').substring(0, 50)) + '</option>';
      }
      html += '</select>';
      html += '</div>';

      // Hex checkboxes
      var hexes = [];
      for (var m = 0; m < mapsData.length; m++) {
        if (mapsData[m].mapId === mapId && mapsData[m].hexes) {
          hexes = mapsData[m].hexes;
          break;
        }
      }

      html += '<label style="font-size:12px; font-weight:600; color:#374151;">Select Hexes:</label>';
      html += '<div class="sal-checkbox-list" style="margin-top:4px;">';
      for (var h = 0; h < hexes.length; h++) {
        html += '<label class="sal-checkbox-item">';
        html += '<input type="checkbox" value="' + hexes[h].id + '" class="bulkHexCheck">';
        html += '<span class="sal-checkbox-item-code">' + escapeHtml(hexes[h].title || hexes[h].id) + '</span>';
        html += '<span class="sal-checkbox-item-desc">' + escapeHtml(hexes[h].type || 'core') + '</span>';
        html += '</label>';
      }
      html += '</div>';

      html += '<div class="sal-bulk-actions">';
      html += '<button class="btn btn-success btn-small" onclick="executeBulkLink(\'stdToHexes\')">Link All Selected</button>';
      html += '<span class="sal-bulk-result" id="bulkResult"></span>';
      html += '</div>';

      container.innerHTML = html;
    }

    function renderBulkHexToStds() {
      var container = document.getElementById('salBulkContent');
      var mapId = document.getElementById('coverageMapSelect').value;

      if (!mapId) {
        container.innerHTML = '<p style="color:#94a3b8; font-size:12px;">Select a map in the coverage report first.</p>';
        return;
      }

      // Hex selector
      var hexes = [];
      for (var m = 0; m < mapsData.length; m++) {
        if (mapsData[m].mapId === mapId && mapsData[m].hexes) {
          hexes = mapsData[m].hexes;
          break;
        }
      }

      var html = '<div style="margin-bottom:8px;">';
      html += '<label style="font-size:12px; font-weight:600; color:#374151;">Select Hex:</label>';
      html += '<select class="form-select" id="bulkHexSelect" style="margin-top:4px; font-size:12px;">';
      html += '<option value="">-- Choose a hex --</option>';
      for (var h = 0; h < hexes.length; h++) {
        html += '<option value="' + hexes[h].id + '">' + escapeHtml(hexes[h].title || hexes[h].id) + '</option>';
      }
      html += '</select>';
      html += '</div>';

      // Standard checkboxes
      html += '<label style="font-size:12px; font-weight:600; color:#374151;">Select Standards:</label>';
      html += '<div class="sal-checkbox-list" style="margin-top:4px;">';
      for (var i = 0; i < hexStandardsAllData.length; i++) {
        var s = hexStandardsAllData[i];
        html += '<label class="sal-checkbox-item">';
        html += '<input type="checkbox" value="' + s.standardId + '" class="bulkStdCheck">';
        html += '<span class="sal-checkbox-item-code">' + escapeHtml(s.code) + '</span>';
        html += '<span class="sal-checkbox-item-desc">' + escapeHtml((s.description || '').substring(0, 60)) + '</span>';
        html += '</label>';
      }
      html += '</div>';

      html += '<div class="sal-bulk-actions">';
      html += '<button class="btn btn-success btn-small" onclick="executeBulkLink(\'hexToStds\')">Link All Selected</button>';
      html += '<span class="sal-bulk-result" id="bulkResult"></span>';
      html += '</div>';

      container.innerHTML = html;
    }

    function executeBulkLink(mode) {
      var mapId = document.getElementById('coverageMapSelect').value;
      var resultEl = document.getElementById('bulkResult');
      if (!mapId) {
        showToast('No map selected', 'error');
        return;
      }

      if (mode === 'stdToHexes') {
        var stdSelect = document.getElementById('bulkStdSelect');
        if (!stdSelect || !stdSelect.value) {
          showToast('Select a standard first', 'error');
          return;
        }
        var standardId = stdSelect.value;
        var hexChecks = document.querySelectorAll('.bulkHexCheck:checked');
        var hexIds = [];
        for (var h = 0; h < hexChecks.length; h++) {
          hexIds.push(hexChecks[h].value);
        }
        if (hexIds.length === 0) {
          showToast('Select at least one hex', 'error');
          return;
        }
        if (resultEl) resultEl.textContent = 'Linking...';

        google.script.run
          .withSuccessHandler(function(result) {
            if (resultEl) resultEl.textContent = 'Linked: ' + result.linked + ', Skipped: ' + result.skipped;
            showToast('Bulk link complete: ' + result.linked + ' linked');
            loadCoverageForMap(mapId);
          })
          .withFailureHandler(function(err) {
            if (resultEl) resultEl.textContent = '';
            showToast('Bulk link error: ' + err.message, 'error');
          })
          .bulkLinkStandardToHexes(standardId, mapId, hexIds, 'introduced');
      } else {
        var hexSelect = document.getElementById('bulkHexSelect');
        if (!hexSelect || !hexSelect.value) {
          showToast('Select a hex first', 'error');
          return;
        }
        var hexId = hexSelect.value;
        var stdChecks = document.querySelectorAll('.bulkStdCheck:checked');
        var standardIds = [];
        for (var s = 0; s < stdChecks.length; s++) {
          standardIds.push(stdChecks[s].value);
        }
        if (standardIds.length === 0) {
          showToast('Select at least one standard', 'error');
          return;
        }
        if (resultEl) resultEl.textContent = 'Linking...';

        google.script.run
          .withSuccessHandler(function(result) {
            if (resultEl) resultEl.textContent = 'Linked: ' + result.linked + ', Skipped: ' + result.skipped;
            showToast('Bulk link complete: ' + result.linked + ' linked');
            loadCoverageForMap(mapId);
          })
          .withFailureHandler(function(err) {
            if (resultEl) resultEl.textContent = '';
            showToast('Bulk link error: ' + err.message, 'error');
          })
          .bulkLinkStandardsToHex(mapId, hexId, standardIds, 'introduced');
      }
    }

    // ================================================
    // HEX EDITOR STANDARDS PICKER (Story 2.3)
    // ================================================

    function loadAllStandardsForPicker(forceAll) {
      var ctx = forceAll ? null : getStandardsContextForMap();
      var filters = null;
      if (ctx) {
        filters = { framework: ctx.framework };
        if (ctx.subject) {
          filters.subject = ctx.subject;
        }
      }
      hexStandardsPickerContext = ctx;
      hexStandardsShowAll = !ctx || forceAll;
      google.script.run
        .withSuccessHandler(function(data) {
          hexStandardsAllData = data || [];
          updateStdScopeIndicators();
        })
        .withFailureHandler(function(err) {
          console.error('Error loading standards for picker:', err);
          hexStandardsAllData = [];
        })
        .getStandards(filters);
    }

    function toggleStandardsScope() {
      hexStandardsShowAll = !hexStandardsShowAll;
      loadAllStandardsForPicker(hexStandardsShowAll);
    }

    function updateStdScopeIndicators() {
      var indicators = document.querySelectorAll('.std-scope-indicator');
      for (var i = 0; i < indicators.length; i++) {
        var el = indicators[i];
        if (hexStandardsPickerContext && !hexStandardsShowAll) {
          var label = hexStandardsPickerContext.subject || hexStandardsPickerContext.framework;
          el.innerHTML = '<span class="std-scope-label">' + escapeHtml(label) + ' (' + hexStandardsAllData.length + ')</span> <a href="#" class="std-scope-toggle" onclick="toggleStandardsScope(); return false;">Show all</a>';
          el.style.display = 'block';
        } else if (hexStandardsPickerContext && hexStandardsShowAll) {
          var label2 = hexStandardsPickerContext.subject || hexStandardsPickerContext.framework;
          el.innerHTML = '<span class="std-scope-label">All standards (' + hexStandardsAllData.length + ')</span> <a href="#" class="std-scope-toggle" onclick="toggleStandardsScope(); return false;">Show ' + escapeHtml(label2) + ' only</a>';
          el.style.display = 'block';
        } else {
          el.style.display = 'none';
        }
      }
    }

    function searchStandardsForHex(query) {
      var listEl = document.getElementById('hexStandardsList');
      if (!listEl) return;

      query = (query || '').toLowerCase().trim();

      // Filter out already-selected standards
      var selectedIds = [];
      for (var k = 0; k < hexStandardsSelected.length; k++) {
        selectedIds.push(hexStandardsSelected[k].standardId);
      }
      var results = hexStandardsAllData.filter(function(s) {
        if (selectedIds.indexOf(s.standardId) !== -1) return false;
        if (!query) return true;
        var searchable = ((s.code || '') + ' ' + (s.description || '') + ' ' + (s.framework || '') + ' ' + (s.subject || '')).toLowerCase();
        return searchable.indexOf(query) !== -1;
      });

      if (hexStandardsAllData.length === 0) {
        listEl.innerHTML = '<div class="standards-picker-empty">No standards available. Add standards in the Standards tab first.</div>';
        listEl.style.display = 'block';
        return;
      }

      if (results.length === 0) {
        listEl.innerHTML = '<div class="standards-picker-empty">No matching standards</div>';
        listEl.style.display = 'block';
        return;
      }

      // Show max 10 results
      var maxResults = Math.min(results.length, 10);
      var html = '';
      for (var i = 0; i < maxResults; i++) {
        var s = results[i];
        html += '<div class="standards-picker-item" onclick="selectStandardForHex(\'' + s.standardId + '\')">';
        html += '<strong>' + escapeHtml(s.code || '') + '</strong>';
        html += ' <span style="color:#64748b; font-size:11px;">(' + escapeHtml(s.framework || '') + ')</span>';
        if (s.description) {
          var desc = s.description.length > 60 ? s.description.substring(0, 60) + '...' : s.description;
          html += '<div style="font-size:11px; color:#94a3b8; margin-top:2px;">' + escapeHtml(desc) + '</div>';
        }
        html += '</div>';
      }
      if (results.length > maxResults) {
        html += '<div class="standards-picker-empty">...and ' + (results.length - maxResults) + ' more. Type to narrow results.</div>';
      }

      listEl.innerHTML = html;
      listEl.style.display = 'block';
    }

    function selectStandardForHex(standardId) {
      if (!selectedHexId || !currentMap) return;

      // Find the standard
      var standard = null;
      for (var i = 0; i < hexStandardsAllData.length; i++) {
        if (hexStandardsAllData[i].standardId === standardId) {
          standard = hexStandardsAllData[i];
          break;
        }
      }
      if (!standard) return;

      // Check if already selected
      for (var j = 0; j < hexStandardsSelected.length; j++) {
        if (hexStandardsSelected[j].standardId === standardId) return;
      }

      // Add to selected with default alignment
      var enriched = {
        standardId: standard.standardId,
        code: standard.code,
        description: standard.description,
        framework: standard.framework,
        strength: 'introduced',
        notes: ''
      };
      hexStandardsSelected.push(enriched);
      renderHexStandardsTags();

      // Clear search and hide dropdown
      document.getElementById('hexStandardsSearch').value = '';
      document.getElementById('hexStandardsList').style.display = 'none';

      // Persist to backend with default alignment JSON
      var alignmentJson = JSON.stringify({ strength: 'introduced', notes: '' });
      google.script.run
        .withSuccessHandler(function() {
          // Update count cache
          if (hexStandardsCountsCache[selectedHexId]) {
            hexStandardsCountsCache[selectedHexId]++;
          } else {
            hexStandardsCountsCache[selectedHexId] = 1;
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error linking standard: ' + err.message, 'error');
        })
        .linkStandardToHex(currentMap.mapId, selectedHexId, standardId, alignmentJson);
    }

    function removeStandardFromHex(standardId) {
      if (!selectedHexId || !currentMap) return;

      // Remove from selected array
      hexStandardsSelected = hexStandardsSelected.filter(function(s) {
        return s.standardId !== standardId;
      });
      renderHexStandardsTags();

      // Persist removal to backend
      google.script.run
        .withSuccessHandler(function() {
          // Update count cache
          if (hexStandardsCountsCache[selectedHexId] && hexStandardsCountsCache[selectedHexId] > 0) {
            hexStandardsCountsCache[selectedHexId]--;
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error unlinking standard: ' + err.message, 'error');
        })
        .unlinkStandardFromHex(currentMap.mapId, selectedHexId, standardId);
    }

    function renderHexStandardsTags() {
      var container = document.getElementById('hexStandardsTags');
      if (!container) return;

      if (hexStandardsSelected.length === 0) {
        container.innerHTML = '';
        return;
      }

      var html = '';
      for (var i = 0; i < hexStandardsSelected.length; i++) {
        var s = hexStandardsSelected[i];
        var alignment = parseAlignmentData(s.alignmentNotes || null);
        var strength = s.strength || alignment.strength || 'introduced';
        var notes = s.notes !== undefined ? s.notes : (alignment.notes || '');
        var hasNotes = notes && notes.length > 0;

        html += '<div class="sal-tag-row" id="sal-tag-' + s.standardId + '">';
        html += '<div style="display:flex; align-items:center; gap:8px; flex:1; min-width:0;">';
        html += getStrengthDotHtml(strength);
        html += '<span class="sal-tag-code">' + escapeHtml(s.code || s.standardId) + '</span>';
        html += '<span class="sal-tag-desc">' + escapeHtml(s.description || '') + '</span>';
        html += '</div>';
        html += '<div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">';
        // Strength dropdown
        html += '<select class="sal-strength-select" onchange="onStrengthChange(\'' + s.standardId + '\', this.value)">';
        html += '<option value="introduced"' + (strength === 'introduced' ? ' selected' : '') + '>Introduced</option>';
        html += '<option value="practiced"' + (strength === 'practiced' ? ' selected' : '') + '>Practiced</option>';
        html += '<option value="mastered"' + (strength === 'mastered' ? ' selected' : '') + '>Mastered</option>';
        html += '</select>';
        // Notes toggle
        html += '<button class="sal-notes-toggle' + (hasNotes ? ' has-notes' : '') + '" onclick="toggleAlignmentNotes(\'' + s.standardId + '\')" title="' + (hasNotes ? 'Edit notes' : 'Add notes') + '">&#128221;</button>';
        // Remove
        html += '<button class="sal-tag-remove" onclick="removeStandardFromHex(\'' + s.standardId + '\')" title="Remove">&times;</button>';
        html += '</div>';
        // Notes area (hidden by default)
        html += '<div class="sal-notes-inline" id="sal-notes-' + s.standardId + '">';
        html += '<textarea class="sal-notes-input" id="sal-notes-input-' + s.standardId + '" placeholder="Alignment notes..." onblur="saveAlignmentNotes(\'' + s.standardId + '\')">' + escapeHtml(notes) + '</textarea>';
        html += '</div>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function onStrengthChange(standardId, newStrength) {
      if (!selectedHexId || !currentMap) return;

      // Update local state
      for (var i = 0; i < hexStandardsSelected.length; i++) {
        if (hexStandardsSelected[i].standardId === standardId) {
          hexStandardsSelected[i].strength = newStrength;
          break;
        }
      }

      // Update the dot visually
      var tagEl = document.getElementById('sal-tag-' + standardId);
      if (tagEl) {
        var dot = tagEl.querySelector('.sal-strength-dot');
        if (dot) {
          dot.className = 'sal-strength-dot ' + newStrength;
        }
      }

      // Find current notes
      var currentNotes = '';
      var notesInput = document.getElementById('sal-notes-input-' + standardId);
      if (notesInput) currentNotes = notesInput.value;

      // Persist to backend
      google.script.run
        .withSuccessHandler(function() { /* silent */ })
        .withFailureHandler(function(err) {
          showToast('Error updating strength: ' + err.message, 'error');
        })
        .updateHexStandardAlignment(currentMap.mapId, selectedHexId, standardId, {
          strength: newStrength,
          notes: currentNotes
        });
    }

    function toggleAlignmentNotes(standardId) {
      var notesEl = document.getElementById('sal-notes-' + standardId);
      if (!notesEl) return;
      if (notesEl.className.indexOf('visible') !== -1) {
        notesEl.className = 'sal-notes-inline';
      } else {
        notesEl.className = 'sal-notes-inline visible';
        var input = document.getElementById('sal-notes-input-' + standardId);
        if (input) input.focus();
      }
    }

    function saveAlignmentNotes(standardId) {
      if (!selectedHexId || !currentMap) return;

      var notesInput = document.getElementById('sal-notes-input-' + standardId);
      if (!notesInput) return;
      var notes = notesInput.value.trim();

      // Update local state
      for (var i = 0; i < hexStandardsSelected.length; i++) {
        if (hexStandardsSelected[i].standardId === standardId) {
          hexStandardsSelected[i].notes = notes;
          break;
        }
      }

      // Update toggle button appearance
      var tagEl = document.getElementById('sal-tag-' + standardId);
      if (tagEl) {
        var toggleBtn = tagEl.querySelector('.sal-notes-toggle');
        if (toggleBtn) {
          if (notes) {
            toggleBtn.className = 'sal-notes-toggle has-notes';
          } else {
            toggleBtn.className = 'sal-notes-toggle';
          }
        }
      }

      // Find current strength
      var currentStrength = 'introduced';
      for (var j = 0; j < hexStandardsSelected.length; j++) {
        if (hexStandardsSelected[j].standardId === standardId) {
          currentStrength = hexStandardsSelected[j].strength || 'introduced';
          break;
        }
      }

      // Persist
      google.script.run
        .withSuccessHandler(function() { /* silent */ })
        .withFailureHandler(function(err) {
          showToast('Error saving notes: ' + err.message, 'error');
        })
        .updateHexStandardAlignment(currentMap.mapId, selectedHexId, standardId, {
          strength: currentStrength,
          notes: notes
        });
    }

    function loadHexStandards(mapId, hexId) {
      // Reset
      hexStandardsSelected = [];
      renderHexStandardsTags();
      document.getElementById('hexStandardsSearch').value = '';
      document.getElementById('hexStandardsList').style.display = 'none';

      if (!mapId || !hexId) return;

      google.script.run
        .withSuccessHandler(function(links) {
          hexStandardsSelected = [];
          if (links && links.length > 0) {
            for (var i = 0; i < links.length; i++) {
              if (links[i].standard) {
                var alignment = parseAlignmentData(links[i].alignmentNotes);
                hexStandardsSelected.push({
                  standardId: links[i].standardId,
                  code: links[i].standard.code,
                  description: links[i].standard.description,
                  framework: links[i].standard.framework,
                  alignmentNotes: links[i].alignmentNotes,
                  strength: alignment.strength,
                  notes: alignment.notes
                });
              }
            }
          }
          renderHexStandardsTags();
        })
        .withFailureHandler(function(err) {
          console.error('Error loading hex standards:', err);
        })
        .getStandardsForHex(mapId, hexId);
    }

    // ================================================
    // LESSON STANDARDS PICKER (Standards Alignment)
    // ================================================

    function searchStandardsForLesson(query) {
      var resultsEl = document.getElementById('lessonStandardsResults');
      if (!resultsEl) return;

      query = (query || '').toLowerCase().trim();
      if (!query || query.length < 2) {
        resultsEl.className = 'sal-lesson-results';
        return;
      }

      // Filter out already-selected
      var selectedIds = [];
      for (var k = 0; k < lessonStandardsSelected.length; k++) {
        selectedIds.push(lessonStandardsSelected[k].standardId);
      }

      var results = hexStandardsAllData.filter(function(s) {
        if (selectedIds.indexOf(s.standardId) !== -1) return false;
        var searchable = ((s.code || '') + ' ' + (s.description || '') + ' ' + (s.framework || '')).toLowerCase();
        return searchable.indexOf(query) !== -1;
      });

      if (results.length === 0) {
        resultsEl.innerHTML = '<div class="sal-lesson-result-item" style="color:#94a3b8; cursor:default;">No matching standards</div>';
        resultsEl.className = 'sal-lesson-results visible';
        return;
      }

      var maxResults = Math.min(results.length, 8);
      var html = '';
      for (var i = 0; i < maxResults; i++) {
        var s = results[i];
        var desc = (s.description || '').length > 50 ? (s.description || '').substring(0, 50) + '...' : (s.description || '');
        html += '<div class="sal-lesson-result-item" onclick="selectStandardForLesson(\'' + s.standardId + '\')">';
        html += '<strong>' + escapeHtml(s.code || '') + '</strong> ';
        html += '<span style="color:#64748b; font-size:11px;">' + escapeHtml(desc) + '</span>';
        html += '</div>';
      }
      if (results.length > maxResults) {
        html += '<div class="sal-lesson-result-item" style="color:#94a3b8; cursor:default; font-size:11px;">...and ' + (results.length - maxResults) + ' more</div>';
      }

      resultsEl.innerHTML = html;
      resultsEl.className = 'sal-lesson-results visible';
    }

    function selectStandardForLesson(standardId) {
      // Find the standard
      var standard = null;
      for (var i = 0; i < hexStandardsAllData.length; i++) {
        if (hexStandardsAllData[i].standardId === standardId) {
          standard = hexStandardsAllData[i];
          break;
        }
      }
      if (!standard) return;

      // Check if already selected
      for (var j = 0; j < lessonStandardsSelected.length; j++) {
        if (lessonStandardsSelected[j].standardId === standardId) return;
      }

      lessonStandardsSelected.push(standard);
      renderLessonStandardsTags();
      updateLessonStandardsBadge();

      // Clear search
      var searchInput = document.getElementById('lessonStandardsSearch');
      if (searchInput) searchInput.value = '';
      var resultsEl = document.getElementById('lessonStandardsResults');
      if (resultsEl) resultsEl.className = 'sal-lesson-results';
    }

    function removeStandardFromLesson(standardId) {
      lessonStandardsSelected = lessonStandardsSelected.filter(function(s) {
        return s.standardId !== standardId;
      });
      renderLessonStandardsTags();
      updateLessonStandardsBadge();
    }

    function renderLessonStandardsTags() {
      var container = document.getElementById('lessonStandardsTags');
      if (!container) return;

      if (lessonStandardsSelected.length === 0) {
        container.innerHTML = '<span style="color:#94a3b8;font-size:12px;">No standards linked yet</span>';
        return;
      }

      var html = '';
      for (var i = 0; i < lessonStandardsSelected.length; i++) {
        var s = lessonStandardsSelected[i];
        html += '<span class="sal-lesson-tag">';
        html += escapeHtml(s.code || s.standardId);
        html += ' <button class="sal-lesson-tag-remove" onclick="removeStandardFromLesson(\'' + s.standardId + '\')">&times;</button>';
        html += '</span>';
      }
      container.innerHTML = html;
    }

    function loadLessonStandards(standardIds) {
      lessonStandardsSelected = [];
      if (!standardIds || standardIds.length === 0) {
        renderLessonStandardsTags();
        updateLessonStandardsBadge();
        return;
      }

      // Find standards from the all-data cache
      for (var i = 0; i < standardIds.length; i++) {
        for (var j = 0; j < hexStandardsAllData.length; j++) {
          if (hexStandardsAllData[j].standardId === standardIds[i]) {
            lessonStandardsSelected.push(hexStandardsAllData[j]);
            break;
          }
        }
      }
      renderLessonStandardsTags();
      updateLessonStandardsBadge();
    }

    function updateLessonStandardsBadge() {
      var badge = document.getElementById('lessonStandardsBadge');
      if (!badge) return;
      if (lessonStandardsSelected.length > 0) {
        badge.textContent = lessonStandardsSelected.length;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    // Close standards picker dropdown when clicking outside
    document.addEventListener('click', function(e) {
      var picker = document.getElementById('hexStandardsPicker');
      if (picker && !picker.contains(e.target)) {
        var listEl = document.getElementById('hexStandardsList');
        if (listEl) listEl.style.display = 'none';
      }
      // Also close lesson standards results
      var lessonPicker = document.querySelector('.sal-lesson-picker');
      if (lessonPicker && !lessonPicker.contains(e.target)) {
        var resultsEl = document.getElementById('lessonStandardsResults');
        if (resultsEl) resultsEl.className = 'sal-lesson-results';
      }
    });
</script>
