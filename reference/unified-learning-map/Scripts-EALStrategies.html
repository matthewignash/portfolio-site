<script>
// ============================================================================
// EAL TEACHING STRATEGIES GUIDE — esg- prefix
// Teacher-only tab: WIDA Framework, Translanguaging, Sheltered Instruction,
// Scaffolding for EAL, Dictionary Demo, Setup Guide, Strategy Gallery
// ES5 only — no const, let, =>, template literals, .includes()
// ============================================================================

var esgLoaded = false;

// ================================================
// ENTRY POINT
// ================================================

function loadEALStrategiesTab() {
  if (esgLoaded) return;
  esgLoaded = true;
  switchEsgSection('gettingStarted');
}

var ESG_SECTION_MAP = {
  gettingStarted: { id: 'esgSectionGettingStarted', render: function() { return esgRenderGettingStarted(); } },
  concepts:       { id: 'esgSectionConcepts',       render: function() { return esgRenderConceptCards(); } },
  demo:           { id: 'esgSectionDemo',           render: function() { return esgRenderInteractiveDemo(); } },
  setup:          { id: 'esgSectionSetup',          render: function() { return esgRenderSetupGuide(); } },
  gallery:        { id: 'esgSectionGallery',        render: function() { return esgRenderStrategyGallery(); } }
};

function switchEsgSection(sectionName) {
  var keys = ['gettingStarted', 'concepts', 'demo', 'setup', 'gallery'];
  var i, key, el;

  // Hide all sections
  for (i = 0; i < keys.length; i++) {
    key = keys[i];
    el = document.getElementById(ESG_SECTION_MAP[key].id);
    if (el) el.style.display = 'none';
  }

  // Update active button
  var btns = document.querySelectorAll('#esgSubNav .esg-subnav-btn');
  for (i = 0; i < btns.length; i++) {
    btns[i].className = 'esg-subnav-btn' + (keys[i] === sectionName ? ' active' : '');
  }

  // Show selected section + lazy render
  var section = ESG_SECTION_MAP[sectionName];
  if (!section) return;
  el = document.getElementById(section.id);
  if (!el) return;
  el.style.display = '';

  if (!esgRenderedSections[sectionName]) {
    esgRenderedSections[sectionName] = true;
    el.innerHTML = '<div class="esg-container">' + section.render() + '</div>';
  }

  // Reset scroll position
  var sc = el.closest('.scroll-container');
  if (sc) sc.scrollTop = 0;
}

// ================================================
// GETTING STARTED (EAL/LS Onboarding Reference)
// ================================================

function esgRenderGettingStarted() {
  var steps = [
    {
      title: 'Create Support Profiles',
      desc: 'Import or create <b>student support profiles</b> with WIDA levels, home languages, accommodations, and strategies from the Integrations tab or class roster.'
    },
    {
      title: 'See Reminders While Planning',
      desc: 'When editing a hex on an assigned map, the <b>accommodation info bar</b> shows how many students have support profiles and their key needs.'
    },
    {
      title: 'Generate Differentiated Prompts',
      desc: 'Use the <b>AI Prompt Builder</b> in the hex editor to generate instruction prompts that integrate WIDA levels, UDL strategies, and translanguaging pedagogy.'
    },
    {
      title: 'Enable the Student Dictionary',
      desc: 'Add <b>vocabulary terms</b> to units and hexes. Students see automatic translations in their home language via a floating dictionary panel.'
    },
    {
      title: 'Monitor Strategy Usage',
      desc: 'Check the <b>Support Insights</b> sub-tab in Progress to see which strategies students are using, adoption rates, and effectiveness data.'
    }
  ];

  var html = '';
  html += '<div class="esg-section">';
  html += '<div class="esg-section-title">\uD83C\uDF0D Getting Started: Supporting EAL/LS Students</div>';
  html += '<div class="esg-steps">';

  for (var i = 0; i < steps.length; i++) {
    html += '<div class="esg-step">';
    html += '<div class="esg-step-num">' + (i + 1) + '</div>';
    html += '<div class="esg-step-content">';
    html += '<div class="esg-step-title">' + steps[i].title + '</div>';
    html += '<div class="esg-step-desc">' + steps[i].desc + '</div>';
    html += '</div>';
    html += '</div>';
  }

  html += '</div>'; // .esg-steps
  html += '<button class="tur-replay-btn" onclick="if(typeof turReplayTour===\'function\')turReplayTour()"><span class="tur-replay-icon">\u25B6</span> Replay Interactive Tour</button>';
  html += '</div>'; // .esg-section
  return html;
}

// ================================================
// CONCEPT CARDS (Expandable Accordion)
// ================================================

function esgRenderConceptCards() {
  var html = '';
  html += '<div class="esg-section">';
  html += '<div class="esg-section-title">Understanding EAL Support Approaches</div>';
  html += '<div class="esg-concept-cards">';

  // WIDA Framework Card
  html += '<div class="esg-concept-card" id="esgCardWida">';
  html += '<div class="esg-concept-header" onclick="esgToggleCard(\'esgCardWida\')">';
  html += '<div class="esg-concept-icon esg-wida">&#127760;</div>';
  html += '<div class="esg-concept-title">WIDA Framework<span class="esg-concept-subtitle">Proficiency levels and language domains for multilingual learners</span></div>';
  html += '<span class="esg-concept-chevron">&#9660;</span>';
  html += '</div>';
  html += '<div class="esg-concept-body">';
  html += '<p>The WIDA Framework provides a common language for describing the English language development of multilingual learners. It defines 6 proficiency levels (1-Entering through 6-Reaching) across 4 language domains: Listening, Speaking, Reading, and Writing.</p>';
  html += '<h4>Proficiency Levels</h4>';
  html += '<ul>';
  html += '<li><strong>Level 1 (Entering)</strong> — Beginning to use English. Benefits from visual supports, home language resources, and simplified text.</li>';
  html += '<li><strong>Level 2 (Emerging)</strong> — Using phrases and short sentences. Needs graphic organizers, word banks, and structured templates.</li>';
  html += '<li><strong>Level 3 (Developing)</strong> — Using expanded sentences with increasing detail. Responds well to sentence frames and academic vocabulary support.</li>';
  html += '<li><strong>Level 4 (Expanding)</strong> — Using varied sentence structures. Benefits from content-area vocabulary instruction and complex text scaffolds.</li>';
  html += '<li><strong>Level 5 (Bridging)</strong> — Using specialized academic language. Still benefits from pre-teaching key vocabulary and cross-linguistic connections.</li>';
  html += '<li><strong>Level 6 (Reaching)</strong> — Using English comparable to English-proficient peers in academic settings.</li>';
  html += '</ul>';
  html += '<h4>How this system uses WIDA</h4>';
  html += '<div class="esg-highlight">Student support profiles store WIDA levels per domain. The prompt builder uses these levels to generate differentiated instruction. The dictionary auto-translates vocabulary into each student\'s home language(s). Teacher dashboards show WIDA distribution to help plan group instruction.</div>';
  html += '</div>';
  html += '</div>';

  // Translanguaging Card
  html += '<div class="esg-concept-card" id="esgCardTrans">';
  html += '<div class="esg-concept-header" onclick="esgToggleCard(\'esgCardTrans\')">';
  html += '<div class="esg-concept-icon esg-trans">&#128172;</div>';
  html += '<div class="esg-concept-title">Translanguaging<span class="esg-concept-subtitle">Leveraging students\' full linguistic repertoire as a learning asset</span></div>';
  html += '<span class="esg-concept-chevron">&#9660;</span>';
  html += '</div>';
  html += '<div class="esg-concept-body">';
  html += '<p>Translanguaging recognizes that multilingual students draw on their entire language repertoire to make meaning. Rather than separating languages, it treats all of a student\'s languages as interconnected resources for learning.</p>';
  html += '<h4>Key principles</h4>';
  html += '<ul>';
  html += '<li><strong>Asset-based approach</strong> — Home languages are strengths, not deficits. Students who can think in multiple languages have cognitive advantages.</li>';
  html += '<li><strong>Flexible language use</strong> — Students can brainstorm, annotate, and discuss in any language before producing in English.</li>';
  html += '<li><strong>Cross-linguistic connections</strong> — Cognates, transfer strategies, and multilingual glossaries help students bridge between languages.</li>';
  html += '<li><strong>Identity affirmation</strong> — Welcoming home languages in the classroom validates students\' cultural identities and builds belonging.</li>';
  html += '</ul>';
  html += '<h4>How this system supports translanguaging</h4>';
  html += '<div class="esg-highlight">The academic vocabulary dictionary provides word-to-word translations in Japanese, Korean, French, and Tamil. Students can toggle between languages in the dictionary panel. The system encourages students to think and take notes in any language they know. Support profiles track home languages so the system can present the right translations automatically.</div>';
  html += '</div>';
  html += '</div>';

  // Sheltered Instruction (SIOP) Card
  html += '<div class="esg-concept-card" id="esgCardSiop">';
  html += '<div class="esg-concept-header" onclick="esgToggleCard(\'esgCardSiop\')">';
  html += '<div class="esg-concept-icon esg-siop">&#128218;</div>';
  html += '<div class="esg-concept-title">Sheltered Instruction (SIOP)<span class="esg-concept-subtitle">Making academic content comprehensible for language learners</span></div>';
  html += '<span class="esg-concept-chevron">&#9660;</span>';
  html += '</div>';
  html += '<div class="esg-concept-body">';
  html += '<p>The Sheltered Instruction Observation Protocol (SIOP) model helps teachers make grade-level academic content accessible to English language learners while simultaneously developing their English proficiency. It has 8 interrelated components.</p>';
  html += '<h4>8 Components of SIOP</h4>';
  html += '<ul>';
  html += '<li><strong>Lesson Preparation</strong> — Define both content and language objectives. Adapt content to proficiency levels.</li>';
  html += '<li><strong>Building Background</strong> — Connect new concepts to students\' prior knowledge and experiences. Pre-teach key vocabulary.</li>';
  html += '<li><strong>Comprehensible Input</strong> — Use clear speech, visuals, modeling, and gestures. Simplify language without simplifying content.</li>';
  html += '<li><strong>Strategies</strong> — Teach learning strategies explicitly. Use think-alouds, graphic organizers, and study skills.</li>';
  html += '<li><strong>Interaction</strong> — Provide structured opportunities for oral practice. Use group work with defined roles.</li>';
  html += '<li><strong>Practice &amp; Application</strong> — Offer hands-on materials and activities. Let students practice all 4 language domains.</li>';
  html += '<li><strong>Lesson Delivery</strong> — Engage students 90-100% of the period. Pace appropriately for language levels.</li>';
  html += '<li><strong>Review &amp; Assessment</strong> — Review key vocabulary and concepts. Provide multiple ways to demonstrate understanding.</li>';
  html += '</ul>';
  html += '<h4>How this system supports SIOP</h4>';
  html += '<div class="esg-highlight">The hex map system naturally supports SIOP by breaking content into manageable chunks (hexes), providing visual pathways (the map), and offering vocabulary support (the dictionary). The lesson editor includes language objectives, and the UDL framework aligns with comprehensible input strategies.</div>';
  html += '</div>';
  html += '</div>';

  // Scaffolding for EAL Card
  html += '<div class="esg-concept-card" id="esgCardScaffold">';
  html += '<div class="esg-concept-header" onclick="esgToggleCard(\'esgCardScaffold\')">';
  html += '<div class="esg-concept-icon esg-scaffold">&#128736;</div>';
  html += '<div class="esg-concept-title">Scaffolding for EAL Learners<span class="esg-concept-subtitle">Temporary supports that build toward independent learning</span></div>';
  html += '<span class="esg-concept-chevron">&#9660;</span>';
  html += '</div>';
  html += '<div class="esg-concept-body">';
  html += '<p>Scaffolding provides temporary, structured support that helps EAL students access content and complete tasks they could not manage independently. Effective scaffolds are gradually removed as proficiency grows.</p>';
  html += '<h4>Types of scaffolds</h4>';
  html += '<ul>';
  html += '<li><strong>Verbal scaffolds</strong> — Sentence starters, word banks, vocabulary pre-teaching, think-pair-share, recasting student responses.</li>';
  html += '<li><strong>Procedural scaffolds</strong> — Graphic organizers, step-by-step instructions, checklists, templates, worked examples.</li>';
  html += '<li><strong>Instructional scaffolds</strong> — Modeling, explicit teaching of academic language, frontloading key concepts, using visuals and realia.</li>';
  html += '<li><strong>Social scaffolds</strong> — Strategic grouping, peer buddies, collaborative tasks, home language discussion time.</li>';
  html += '</ul>';
  html += '<h4>Scaffolding by WIDA level</h4>';
  html += '<ul>';
  html += '<li><strong>Levels 1-2</strong> — Heavy scaffolding: visuals, home language support, simplified text, word banks, sentence frames.</li>';
  html += '<li><strong>Levels 3-4</strong> — Moderate scaffolding: graphic organizers, sentence starters, academic vocabulary instruction, structured collaboration.</li>';
  html += '<li><strong>Levels 5-6</strong> — Light scaffolding: pre-teaching specialized vocabulary, complex text strategies, writing templates for academic genres.</li>';
  html += '</ul>';
  html += '<div class="esg-highlight">The AI Prompt Builder generates WIDA-level-appropriate scaffolds automatically. The dictionary provides vocabulary support at all levels. Teachers can configure UDL strategies per hex, and the support dashboard tracks which scaffolds students are actually using.</div>';
  html += '</div>';
  html += '</div>';

  html += '</div>'; // .esg-concept-cards
  html += '</div>'; // .esg-section
  return html;
}

function esgToggleCard(cardId) {
  var card = document.getElementById(cardId);
  if (!card) return;
  card.classList.toggle('esg-expanded');
}

// ================================================
// STRATEGY GALLERY
// ================================================

  html += '<div class="esg-section-title">EAL Strategy Gallery</div>';

  // Vocabulary Building Strategies

    {
      name: 'Vocabulary Notebooks',
      desc: 'Students maintain personal glossaries with the term, definition, a drawing or symbol, and the translation in their home language.',

    },
    {
      name: 'Word Sort Activities',

  html += esgRenderStrategyDomain('Writing Support', [
    {
      name: 'Sentence Frames and Starters',
      desc: 'Provide structured templates like "The evidence suggests that ___" or "I agree because ___" to scaffold academic writing.',

    },
    {

      desc: 'Break writing into explicit stages (plan, draft, revise, edit) with a checklist for each stage tailored to WIDA level.',

    },
    {

    {
      name: 'Portfolio-Based Assessment',
      desc: 'Collect student work over time to show growth. Include drafts, revisions, and reflections in any language. The iteration history in hex maps supports this naturally.',
      tags: ['All Levels', 'Formative']
    },
    {
      name: 'Oral Assessment Options',
      desc: 'Allow students to demonstrate understanding through oral explanations, presentations, or recorded responses instead of written-only formats.',
      tags: ['Levels 1-3', 'Multimodal']
    },
    {
      name: 'Self-Assessment with L1 Reflection',
      desc: 'Students rate their confidence and write reflections in their home language first, then translate key points to English. Uses the hex self-assessment feature.',
      tags: ['All Levels', 'Translanguaging']
    }
  ]);

  html += '</div>'; // .esg-section
  return html;
}

function esgRenderStrategyDomain(domainTitle, strategies) {
  var html = '';
  html += '<div class="esg-strategy-domain">';
  html += '<div class="esg-strategy-domain-title">' + domainTitle + '</div>';
  html += '<div class="esg-strategy-cards">';

  for (var i = 0; i < strategies.length; i++) {
    var s = strategies[i];
    html += '<div class="esg-strategy-card">';
    html += '<div class="esg-strategy-name">' + s.name + '</div>';
    html += '<div class="esg-strategy-desc">' + s.desc + '</div>';
    if (s.tags && s.tags.length > 0) {
      html += '<div class="esg-strategy-tags">';
      for (var t = 0; t < s.tags.length; t++) {
        var tagClass = 'esg-strategy-tag';
        var tagLower = s.tags[t].toLowerCase();
        if (tagLower.indexOf('1') !== -1 && tagLower.indexOf('level') !== -1) {
          tagClass += ' esg-tag-beginner';
        } else if (tagLower.indexOf('3') !== -1 && tagLower.indexOf('level') !== -1) {
          tagClass += ' esg-tag-intermediate';
        } else if (tagLower.indexOf('5') !== -1 && tagLower.indexOf('level') !== -1) {
          tagClass += ' esg-tag-advanced';
        }
        html += '<span class="' + tagClass + '">' + s.tags[t] + '</span>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>'; // .esg-strategy-cards
  html += '</div>'; // .esg-strategy-domain
  return html;
}
</script>
