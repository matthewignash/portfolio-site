<style>

}

.lrd-sidebar-header {

}

.lrd-sidebar-body {

}

.lrd-progress-fill {

.lrd-score-badge {

  font-weight: 600;

  100% { background: transparent; }
}
.lrd-just-unlocked {
  animation: lrd-just-unlocked-flash 3s ease-out;
