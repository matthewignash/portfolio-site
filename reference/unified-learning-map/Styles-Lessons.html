<style>
  /* ============================== */
  /* Lesson Editor — lsn- prefix    */
  /* ============================== */

  /* Modal override: wider for rich content */
  .lsn-modal { max-width: 720px; }
  .lsn-modal .modal-body { max-height: 70vh; overflow-y: auto; padding: 16px 20px; }

  /* Accordion sections */
  .lsn-section { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .lsn-section-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f8fafc; cursor: pointer; user-select: none; transition: background 0.15s; }
  .lsn-section-header:hover { background: #f1f5f9; }
  .lsn-section-title { font-size: 13px; font-weight: 600; color: #1e293b; display: flex; align-items: center; gap: 6px; }
  .lsn-section-badge { background: #667eea; color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; padding: 0 5px; }
  .lsn-section-badge.empty { background: #cbd5e1; }
  .lsn-section-chevron { font-size: 14px; color: #94a3b8; transition: transform 0.2s; }
  .lsn-section.lsn-collapsed .lsn-section-chevron { transform: rotate(-90deg); }
  .lsn-section-body { padding: 12px 14px; border-top: 1px solid #e2e8f0; }
  .lsn-section.lsn-collapsed .lsn-section-body { display: none; }

  /* Basic info row */
  .lsn-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .lsn-row > * { flex: 1; }

  /* Activity cards */
  .lsn-activity-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
  .lsn-activity-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .lsn-activity-card-label { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.3px; }
  .lsn-activity-remove { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .lsn-activity-remove:hover { color: #dc2626; }
  .lsn-template-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .lsn-template-select { flex: 1; font-size: 12px; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 4px; background: white; color: #475569; }
  .lsn-template-apply { font-size: 11px; padding: 4px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
  .lsn-template-apply:hover { background: #5568d3; }

  /* UDL principle blocks */
  .lsn-udl-principle { border-left: 3px solid #667eea; padding: 8px 12px; margin-bottom: 10px; background: #fafaff; border-radius: 0 6px 6px 0; }
  .lsn-udl-principle.representation { border-left-color: #3b82f6; }
  .lsn-udl-principle.action-expression { border-left-color: #10b981; }
  .lsn-udl-principle.engagement { border-left-color: #f59e0b; }
  .lsn-udl-label { font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; }

  /* Strategy chips */
  .lsn-chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .lsn-strategy-chip { display: inline-block; font-size: 11px; padding: 4px 10px; border: 1px solid #cbd5e1; border-radius: 12px; color: #475569; cursor: pointer; user-select: none; transition: all 0.15s; background: white; }
  .lsn-strategy-chip:hover { border-color: #94a3b8; background: #f8fafc; }
  .lsn-strategy-chip.selected { background: #667eea; color: white; border-color: #667eea; }

  /* Dynamic list items (success criteria, resources) */
  .lsn-list-item { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .lsn-list-item input { flex: 1; }
  .lsn-list-remove { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .lsn-list-remove:hover { color: #dc2626; }
  .lsn-add-btn { font-size: 12px; color: #667eea; cursor: pointer; background: none; border: 1px dashed #cbd5e1; border-radius: 4px; padding: 4px 10px; width: 100%; text-align: center; margin-top: 4px; }
  .lsn-add-btn:hover { background: #f8fafc; border-color: #667eea; }

  /* Assessment strategy picker */
  .lsn-assess-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .lsn-assess-select { flex: 1; font-size: 12px; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 4px; background: white; color: #475569; }
  .lsn-assess-apply { font-size: 11px; padding: 4px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
  .lsn-assess-apply:hover { background: #5568d3; }

  /* Small form helpers inside lesson editor */
  .lsn-small-label { font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 3px; display: block; }
  .lsn-form-input { width: 100%; font-size: 13px; padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 4px; }
  .lsn-form-textarea { width: 100%; font-size: 13px; padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 4px; resize: vertical; min-height: 50px; font-family: Arial, sans-serif; }
  .lsn-form-textarea.tall { min-height: 80px; }
</style>
