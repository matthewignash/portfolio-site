<style>
/* ============================================================================
   COLLABSPACE — BOARD LIST — colab- prefix
   Board grid, board cards, filter chips, create form, empty state
   ============================================================================ */

/* View container */
.colab-view-container {
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.colab-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.colab-header-title {
  font-size: 22px;
  font-weight: 700;
  color: #1e293b;
}
.colab-header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Filter chips */
.colab-filter-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.colab-filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid #e2e8f0;
  background: #fff;
  color: #64748b;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.colab-filter-chip:hover {
  border-color: #cbd5e1;
  background: #f8fafc;
}
.colab-filter-chip.active {
  background: #0d9488;
  color: #fff;
  border-color: #0d9488;
}

/* Board grid */
.colab-board-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

/* Board card */
.colab-board-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.colab-board-card:hover {
  border-color: #0d9488;
  box-shadow: 0 2px 8px rgba(13, 148, 136, 0.1);
  transform: translateY(-1px);
}

/* Color accent bar on left side based on board type */
.colab-board-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
}
.colab-board-card[data-type="discussion"]::before { background: #3b82f6; }
.colab-board-card[data-type="brainstorm"]::before { background: #f59e0b; }
.colab-board-card[data-type="labgroup"]::before { background: #0d9488; }
.colab-board-card[data-type="project"]::before { background: #8b5cf6; }
.colab-board-card[data-type="freeform"]::before { background: #64748b; }

/* Card header */
.colab-card-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}
.colab-card-icon {
  font-size: 22px;
  line-height: 1;
  flex-shrink: 0;
}
.colab-card-title {
  font-size: 15px;
  font-weight: 600;
  color: #1e293b;
  line-height: 1.3;
  flex: 1;
  word-break: break-word;
}

/* Card description */
.colab-card-desc {
  font-size: 13px;
  color: #64748b;
  line-height: 1.4;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Card meta row */
.colab-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* Stat badges */
.colab-stat-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  color: #64748b;
  background: #f1f5f9;
  padding: 2px 8px;
  border-radius: 10px;
}
.colab-stat-badge .colab-stat-icon {
  font-size: 12px;
}

/* Type badge */
.colab-type-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
}
.colab-type-badge.discussion { background: #dbeafe; color: #1e40af; }
.colab-type-badge.brainstorm { background: #fef3c7; color: #92400e; }
.colab-type-badge.labgroup { background: #ccfbf1; color: #115e59; }
.colab-type-badge.project { background: #ede9fe; color: #5b21b6; }
.colab-type-badge.freeform { background: #f1f5f9; color: #475569; }

/* Layout badge */
.colab-layout-badge {
  font-size: 11px;
  color: #94a3b8;
}

/* Archived indicator */
.colab-card-archived {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 11px;
  color: #94a3b8;
  background: #f1f5f9;
  padding: 2px 8px;
  border-radius: 6px;
}

/* Card actions (show on hover) */
.colab-card-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: none;
  gap: 4px;
}
.colab-board-card:hover .colab-card-actions {
  display: flex;
}
.colab-board-card:hover .colab-card-archived {
  display: none;
}
.colab-card-action-btn {
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 12px;
  cursor: pointer;
  color: #64748b;
  transition: all 0.15s;
}
.colab-card-action-btn:hover {
  background: #e2e8f0;
  color: #1e293b;
}
.colab-card-action-btn.danger:hover {
  background: #fef2f2;
  color: #dc2626;
  border-color: #fecaca;
}

/* ---- Create Board Form ---- */
.colab-create-form {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}
.colab-create-form-title {
  font-size: 16px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 16px;
}

/* Template picker cards */
.colab-template-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.colab-template-card {
  border: 2px solid #e2e8f0;
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.colab-template-card:hover {
  border-color: #0d9488;
  background: #f0fdfa;
}
.colab-template-card.active {
  border-color: #0d9488;
  background: #f0fdfa;
}
.colab-template-icon {
  font-size: 24px;
  margin-bottom: 6px;
}
.colab-template-name {
  font-size: 13px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 2px;
}
.colab-template-hint {
  font-size: 11px;
  color: #94a3b8;
}

/* Form fields */
.colab-form-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.colab-form-group {
  flex: 1;
  margin-bottom: 12px;
}
.colab-form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #475569;
  margin-bottom: 4px;
}
.colab-form-input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 13px;
  color: #1e293b;
  background: #fff;
  box-sizing: border-box;
  transition: border-color 0.2s;
}
.colab-form-input:focus {
  outline: none;
  border-color: #0d9488;
  box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.1);
}
.colab-form-select {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 13px;
  color: #1e293b;
  background: #fff;
  box-sizing: border-box;
}
.colab-form-select:focus {
  outline: none;
  border-color: #0d9488;
}
.colab-form-textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 13px;
  color: #1e293b;
  background: #fff;
  box-sizing: border-box;
  resize: vertical;
  min-height: 60px;
}
.colab-form-textarea:focus {
  outline: none;
  border-color: #0d9488;
  box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.1);
}
.colab-form-hint {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 2px;
}

/* Layout radio chips */
.colab-layout-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.colab-layout-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 12px;
  color: #64748b;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.colab-layout-chip:hover {
  border-color: #cbd5e1;
}
.colab-layout-chip.active {
  border-color: #0d9488;
  background: #f0fdfa;
  color: #0d9488;
  font-weight: 600;
}

/* Create form footer */
.colab-form-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #f1f5f9;
}

/* ---- Empty State ---- */
.colab-empty {
  text-align: center;
  padding: 48px 20px;
}
.colab-empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
}
.colab-empty-title {
  font-size: 18px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 6px;
}
.colab-empty-text {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 16px;
}

/* ---- Loading ---- */
.colab-loading {
  text-align: center;
  padding: 40px 20px;
  color: #64748b;
}

/* ---- Class selector in board list ---- */
.colab-class-selector {
  display: flex;
  align-items: center;
  gap: 8px;
}
.colab-class-label {
  font-size: 13px;
  color: #64748b;
  white-space: nowrap;
}

/* ---- Board count ---- */
.colab-board-count {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 10px;
}
</style>
