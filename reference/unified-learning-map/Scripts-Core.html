    // Accessibility: Focus trap for modal dialogs (Session 3)
    function a11yTrapFocus(modalEl, e) {
      var focusableSelector = 'a[href], button:not([disabled]), textarea:not([disabled]), input:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"]), [contenteditable="true"]';
      var focusables = modalEl.querySelectorAll(focusableSelector);
      var visibleFocusables = [];
      for (var i = 0; i < focusables.length; i++) {
        // Filter to visible elements (not hidden by display:none or similar)
        if (focusables[i].offsetParent !== null || focusables[i].offsetWidth > 0 || focusables[i].offsetHeight > 0) {
          visibleFocusables.push(focusables[i]);
        }
      }
      if (visibleFocusables.length === 0) return;

      var firstEl = visibleFocusables[0];
      var lastEl = visibleFocusables[visibleFocusables.length - 1];

      if (e.shiftKey) {
        // Shift+Tab: if on first element, wrap to last
        if (document.activeElement === firstEl) {
          e.preventDefault();
          lastEl.focus();
        }
      } else {
        // Tab: if on last element, wrap to first
        if (document.activeElement === lastEl) {
          e.preventDefault();
          firstEl.focus();
        }
      }
    }

    document.addEventListener('keydown', function(e) {
      // Accessibility: Focus trap for content modal (Session 3)
      if (e.key === 'Tab') {
        var contentModal = document.getElementById('contentModal');
        if (contentModal && contentModal.style.display !== 'none' && contentModal.classList.contains('active')) {
          a11yTrapFocus(contentModal, e);
          return;
        }
      }
      // Command Palette: Ctrl+K / Cmd+K
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (typeof cmdOpen !== 'undefined' && cmdOpen) { closeCommandPalette(); } else if (typeof openCommandPalette === 'function') { openCommandPalette(); }
        return;
      }
      // Projector Mode keyboard shortcuts (Arrow/Space/T/B/R when projector is open)
      if (typeof pjmHandleKeydown === 'function' && pjmIsOpen && pjmHandleKeydown(e)) return;
      // Countdown Timer keyboard shortcuts (Space/R/F/M when timer is open)

    /**
     * Handle class selection in the global preview banner.
     * Populates the student dropdown from roster.
     */
    function onGlobalPreviewClassChange(classId) {
      previewClassId = classId;
      previewStudentEmail = null;
      // Clear data globals
      progressDashboardData = null;
      celData = null;
      plannerData = null;
      plannerTasks = [];
      ssdInitialized = false;
      ssdSelectedMapId = null;

      var studentSel = document.getElementById('tpvGlobalStudentSelect');
      var nameSp = document.getElementById('tpvGlobalStudentName');
      if (nameSp) nameSp.textContent = '';

      if (!classId) {
        if (studentSel) {
          studentSel.innerHTML = '<option value="">-- Student --</option>';
          studentSel.disabled = true;
        }
        // Sync Progress tab tpv- selectors if they exist
        var localClassSel = document.getElementById('tpvClassSelect');
        if (localClassSel) localClassSel.value = '';
        return;
      }

      if (studentSel) {
        studentSel.innerHTML = '<option value="">Loading...</option>';
        studentSel.disabled = true;
      }

      getCachedRoster(classId, function(roster) {
        if (!studentSel) return;
        studentSel.innerHTML = '<option value="">-- Student --</option>';
        var active = [];
        for (var i = 0; i < roster.length; i++) {
          if (roster[i].status !== 'removed') active.push(roster[i]);
        }
        if (active.length === 0) {
          studentSel.innerHTML = '<option value="">No students</option>';
          return;
        }
        active.sort(function(a, b) {
          var na = (a.studentName || a.email || '').toLowerCase();
          var nb = (b.studentName || b.email || '').toLowerCase();
          return na < nb ? -1 : (na > nb ? 1 : 0);
        });
        for (var j = 0; j < active.length; j++) {
          var opt = document.createElement('option');
          opt.value = active[j].studentEmail || active[j].email;
          opt.textContent = active[j].studentName || active[j].studentEmail || active[j].email;
          // Restore selection if already set
          if (previewStudentEmail && opt.value === previewStudentEmail) opt.selected = true;
          studentSel.appendChild(opt);
        }
        studentSel.disabled = false;
        // Sync Progress tab tpv- selectors if they exist
        var localClassSel = document.getElementById('tpvClassSelect');
        if (localClassSel && String(localClassSel.value) !== String(classId)) {
          localClassSel.value = classId;
        }
      }, function(err) {
        if (studentSel) studentSel.innerHTML = '<option value="">Error loading</option>';
      });
    }

    /**
     * Handle student selection in the global preview banner.
     * Fetches batch data and re-renders the active tab.

    function onGlobalPreviewStudentChange(email) {
      previewStudentEmail = email;

      progressDashboardData = null;
      celData = null;
      ssdInitialized = false;
      ssdSelectedMapId = null;

      var nameSp = document.getElementById('tpvGlobalStudentName');
      if (nameSp) nameSp.textContent = '';

      if (!email) return;

      if (nameSp) nameSp.textContent = 'Loading...';

      var expectedEmail = email;
      google.script.run
        .withSuccessHandler(function(batch) {
          if (previewStudentEmail !== expectedEmail) return; // stale response
          // Dispatch batch data
          progressDashboardData = batch.dashboard;
          celData = batch.celebrations;
          plannerData = batch.planner;
          plannerTasks = (batch.planner && batch.planner.tasks) ? batch.planner.tasks : [];
          if (typeof uclChecklistData !== 'undefined') uclChecklistData = batch.unitChecklists || [];

          // Update name from student select text
          var sSel = document.getElementById('tpvGlobalStudentSelect');
          if (sSel && nameSp) {
            var selOpt = sSel.options[sSel.selectedIndex];
            nameSp.textContent = selOpt ? selOpt.textContent : '';
          }

          // Show WIDA bracket selector for teacher preview
          var bracketSel = document.getElementById('tpvWidaBracket');
          if (bracketSel) {
            bracketSel.style.display = '';
            bracketSel.value = ''; // Auto (from profile)
            previewWidaBracket = null;
          }
          var bracketLabel = document.getElementById('tpvWidaBracketLabel');
          if (bracketLabel) bracketLabel.style.display = '';

          // Re-render the active tab
          var activeView = document.querySelector('.view.active');
          if (activeView) {
            var viewId = activeView.id;
            if (viewId === 'progressView' && typeof loadProgressDashboard === 'function') {
              loadProgressDashboard();
            } else if (viewId === 'studyDashView' && typeof ssdRenderDashboard === 'function') {
              ssdInitialized = false;
              ssdRenderDashboard();
            } else if (viewId === 'plannerView' && typeof renderPlannerView === 'function') {
              renderPlannerView();
            }
          }

          // Sync Progress tab tpv- selectors if they exist
          var localStudentSel = document.getElementById('tpvStudentSelect');
          if (localStudentSel && String(localStudentSel.value) !== String(email)) {
            localStudentSel.value = email;
          }
        })
        .withFailureHandler(function(err) {
          if (previewStudentEmail !== expectedEmail) return;
          if (nameSp) nameSp.textContent = '';
          showToast('Error loading student data: ' + escapeHtml(err.message), 'error');
        })
        .getStudentBatchDataForPreview(email);
    }

        .withSuccessHandler(function(data) {

            document.getElementById('usersTab').classList.add('hidden');
            document.getElementById('settingsTab').classList.add('hidden');
          }
          if (user.isAdmin) {
            document.getElementById('settingsTab').classList.remove('hidden');

          if (!user.canEdit) {
            document.getElementById('coursesTab').classList.add('hidden');
            document.getElementById('standardsTab').classList.add('hidden');
            document.getElementById('ubdPlannerTab').classList.add('hidden');

            document.getElementById('integrationsTab').classList.remove('hidden');
            document.getElementById('teachingMethodsTab').classList.remove('hidden');
            document.getElementById('ealStrategiesTab').classList.remove('hidden');

          var plnTab = document.getElementById('plannerTab');
          if (plnTab) {
            if (!user.canEdit) { plnTab.classList.remove('hidden'); }
            else { plnTab.classList.add('hidden'); }
          }
          // Collab tab: visible to all roles
          var collabTabEl = document.getElementById('collabTab');
          if (collabTabEl) collabTabEl.classList.remove('hidden');
          if (!user.isAdmin) {
            var seedBtn = document.getElementById('seedStandardsBtn');
            if (seedBtn) seedBtn.style.display = 'none';
          }

          // --- Dispatch form options ---
          formOptions = data.formOptions || {
            subjects: ['Science', 'Math', 'English', 'Other'],

          if (data.courses) {

            for (var i = 0; i < coursesData.length; i++) {

          // Student-specific: single batch RPC replaces 3 expensive calls
          // (dashboard + planner + celebrations in one backend call)
          if (!user.canEdit) {
            google.script.run
              .withSuccessHandler(function(batch) {
                // Dispatch dashboard data
                progressDashboardData = batch.dashboard;
                if (typeof renderProgressStudentView === 'function') {
                  renderProgressStudentView(batch.dashboard);
                }
                // Dispatch planner data
                plannerData = batch.planner;
                plannerTasks = batch.planner.tasks || [];
                plannerDataLoaded = true;
                uclChecklistData = batch.unitChecklists || [];
                if (typeof renderPlannerView === 'function') renderPlannerView();
                // Dispatch celebration data
                celData = batch.celebrations;

              .withSuccessHandler(function(profile) {

                if (profile && profile.homeLanguages && profile.homeLanguages.length > 0) {
                  var supportedDictLangs = ['ja', 'ko', 'fr', 'ta', 'zh', 'es', 'ar', 'hi', 'vi', 'tl', 'pt', 'ru', 'de', 'it'];

          if (!user.canEdit && typeof ctdStudentStartPolling === 'function') {
            ctdStudentStartPolling();

          // Start student quick poll polling (if student mode)
          if (!user.canEdit && typeof qpStudentStartPolling === 'function') {

            setTimeout(function() {

                onbShowWelcome(data.tourStatus);
              } else if (data.tourStatus.shouldShowTour && typeof turStartTour === 'function') {
                turStartTour(data.tourStatus);
              }
            }, 2000);
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById('userEmail').textContent = 'Error loading data';
          showToast(friendlyError(err), 'error');
          console.error('Initial data load error:', err);
        })
        .getInitialData();

    function switchTab(button) {
      var viewName = button.getAttribute('data-view');
      document.querySelectorAll('.tab').forEach(function(t) {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
        t.setAttribute('tabindex', '-1');
      });
      button.classList.add('active');
      button.setAttribute('aria-selected', 'true');
      button.setAttribute('tabindex', '0');
      document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
      document.getElementById(viewName + 'View').classList.add('active');
      closeUnitsPanel();  // Story 2.1b: Close units panel when switching tabs
      // Accessibility: announce tab switch to screen readers (Session 3)
      a11yAnnounce('Switched to ' + button.textContent.trim() + ' tab');

      // Lazy-load secondary data on first tab visit
      // Note: standards picker now loads in openMapInBuilder() with course context scoping
      if (viewName === 'ubdPlanner' && !_lazyUbdLoaded && userData && userData.canEdit) {
        _lazyUbdLoaded = true;
        if (typeof loadUbdPlannerData === 'function') loadUbdPlannerData();
      }
      if (viewName === 'integrations' && !_lazyIntegrationsLoaded && userData && userData.canEdit) {
        _lazyIntegrationsLoaded = true;
        if (typeof loadIntegrationSettings === 'function') loadIntegrationSettings();
      }
      if (viewName === 'teachingMethods' && !tmgLoaded && userData && userData.canEdit) {
        if (typeof loadTeachingMethodsTab === 'function') loadTeachingMethodsTab();
      }
      if (viewName === 'ealStrategies' && !esgLoaded && userData && userData.canEdit) {
        if (typeof loadEALStrategiesTab === 'function') loadEALStrategiesTab();
      }
      if (viewName === 'collab' && !colabBoardsLoaded) {
        if (typeof colabLoadBoards === 'function') colabLoadBoards();
      }
      // Onboarding milestone: planner visited
      if (viewName === 'planner' && typeof onbMarkMilestone === 'function') {
        onbMarkMilestone('plannerVisited');
      }
      // Student-only lazy-loads on first Planner tab visit
      if (viewName === 'planner' && userData && !userData.canEdit) {
        if (!_lazyAiscCoreLoaded) {
          _lazyAiscCoreLoaded = true;
          google.script.run
            .withSuccessHandler(function(core) {
              ascCoreData = core;
              if (typeof ascRenderPlannerPanel === 'function') ascRenderPlannerPanel();
            })
            .withFailureHandler(function() { ascCoreData = null; })
            .getAiscCore();
        }
        if (!_lazyStlLoaded && typeof stlLoadTasks === 'function') {
          _lazyStlLoaded = true;
          stlLoadTasks();
        }
        if (!_lazyAtlLoaded && typeof loadATLData === 'function') {
          _lazyAtlLoaded = true;
          loadATLData();
        }
        if (!_lazyPjrLoaded && typeof pjrLoadJournal === 'function') {
          _lazyPjrLoaded = true;
          pjrLoadJournal();
        }
      }
      // Study Dashboard: lazy-load on first visit (student or teacher preview)
      if (viewName === 'studyDash' && !ssdInitialized && userData && (!userData.canEdit || previewStudentEmail)) {
        ssdInitialized = true;
        if (typeof ssdRenderDashboard === 'function') ssdRenderDashboard();
      }
    }

    // Accessibility: Arrow key navigation for tab system (Session 3, WAI-ARIA Tabs pattern)
    // Accessibility: Arrow key navigation for tab system (Session 3, WAI-ARIA Tabs manual activation)
    // Arrow/Home/End move focus only; Enter/Space activates the focused tab.
    // Manual activation avoids triggering expensive lazy-load RPCs for tabs the user arrows past.
    (function initTabKeyboardNav() {
      var tabsContainer = document.getElementById('tabsContainer');
      if (!tabsContainer) return;
      tabsContainer.addEventListener('keydown', function(e) {
        var key = e.key;

        // Enter/Space: activate the focused tab
        if (key === 'Enter' || key === ' ') {
          e.preventDefault();
          if (document.activeElement && document.activeElement.getAttribute('role') === 'tab') {
            switchTab(document.activeElement);
          }
          return;
        }

        // Arrow keys / Home / End: move focus only (do not activate)
        if (key !== 'ArrowRight' && key !== 'ArrowLeft' && key !== 'Home' && key !== 'End') return;

        var allTabs = tabsContainer.querySelectorAll('[role="tab"]');
        var visibleTabs = [];
        for (var i = 0; i < allTabs.length; i++) {
          // Skip hidden tabs (display:none from role-based visibility)
          if (allTabs[i].offsetParent !== null || allTabs[i].offsetWidth > 0) {
            visibleTabs.push(allTabs[i]);
          }
        }
        if (visibleTabs.length === 0) return;

        var currentIdx = -1;
        for (var j = 0; j < visibleTabs.length; j++) {
          if (visibleTabs[j] === document.activeElement) { currentIdx = j; break; }
        }
        if (currentIdx === -1) return;

        var targetIdx = currentIdx;
        if (key === 'ArrowRight') {
          targetIdx = (currentIdx + 1) % visibleTabs.length;
        } else if (key === 'ArrowLeft') {
          targetIdx = (currentIdx - 1 + visibleTabs.length) % visibleTabs.length;
        } else if (key === 'Home') {
          targetIdx = 0;
        } else if (key === 'End') {
          targetIdx = visibleTabs.length - 1;
        }

        // Move focus and update roving tabindex without activating
        e.preventDefault();
        var allTabEls = tabsContainer.querySelectorAll('[role="tab"]');
        for (var k = 0; k < allTabEls.length; k++) {
          allTabEls[k].setAttribute('tabindex', '-1');
        }
        visibleTabs[targetIdx].setAttribute('tabindex', '0');
        visibleTabs[targetIdx].focus();
      });
    })();

    // ================================================
    // ROSTER CACHE
    // ================================================

    var _rosterCache = {};

    /**
     * Get class roster with client-side caching.
     * Avoids redundant RPCs when switching between views that need roster data.
     * Cache is per-classId. Call invalidateRosterCache(classId) after edits.
     */
    function getCachedRoster(classId, callback, errCallback) {
      if (_rosterCache[classId]) {
        callback(_rosterCache[classId]);
        return;
      }
      google.script.run
        .withSuccessHandler(function(roster) {
          _rosterCache[classId] = roster;
          callback(roster);
        })
        .withFailureHandler(function(err) {
          if (errCallback) errCallback(err);
        })
        .getClassRoster(classId);
    }

    function invalidateRosterCache(classId) {
      if (classId) {
        delete _rosterCache[classId];
      } else {
        _rosterCache = {};
      }
    }

    // ================================================
    // UTILITIES
    // ================================================

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /**
     * Convert raw backend error messages into student-friendly text.
     * Maps common technical error patterns to plain-language equivalents.
     */
    function friendlyError(err) {
      var msg = (err && err.message) ? err.message : (typeof err === 'string' ? err : '');
      var lower = msg.toLowerCase();
      if (lower.indexOf('sheet not found') !== -1 || lower.indexOf('spreadsheet') !== -1) {
        return 'Something went wrong loading your data. Try refreshing the page.';
      }
      if (lower.indexOf('lock timeout') !== -1 || lower.indexOf('lock service') !== -1 || lower.indexOf('too many') !== -1) {
        return 'The system is busy right now. Please try again in a moment.';
      }
      if (lower.indexOf('permission') !== -1 || lower.indexOf('access') !== -1 || lower.indexOf('denied') !== -1) {
        return 'You don\'t have access to this. Ask your teacher for help.';
      }
      if (lower.indexOf('not found') !== -1 || lower.indexOf('no record') !== -1) {
        return 'We couldn\'t find what you were looking for. Try refreshing the page.';
      }
      if (lower.indexOf('network') !== -1 || lower.indexOf('timeout') !== -1 || lower.indexOf('fetch') !== -1) {
        return 'There was a connection problem. Check your internet and try again.';
      }
      if (lower.indexOf('invalid') !== -1 || lower.indexOf('validation') !== -1) {
        return 'Something wasn\'t quite right. Please check your input and try again.';
      }
      // Default fallback
      return 'Something went wrong. Please try again.';
    }

    /**
     * Get the current WIDA bracket for adaptive UI rendering.
     * Returns 'low' (levels 1-2), 'mid' (levels 3-4), 'high' (levels 5-6), or null (no profile).
     * Checks previewWidaBracket override first (for teacher preview mode).
     */
    function getWidaBracket() {
      // Teacher preview override takes priority
      if (previewWidaBracket) { return previewWidaBracket; }
      // Check student's actual WIDA profile
      if (typeof sstProfileData !== 'undefined' && sstProfileData && sstProfileData.widaOverallLevel) {
        var level = parseInt(sstProfileData.widaOverallLevel, 10);
        if (level >= 1 && level <= 2) { return 'low'; }
        if (level >= 3 && level <= 4) { return 'mid'; }
        if (level >= 5 && level <= 6) { return 'high'; }
      }
      return null;
    }

    /**
     * CSV Export Utility — generates and downloads a CSV file from tabular data.
     * @param {string[]} headers - Column header names
     * @param {Array[]} rows - Array of row arrays (cell values)
     * @param {string} filename - Download filename (should end in .csv)
     */
    function csvExportData(headers, rows, filename) {
      if (!headers || !rows) return;
      var csvContent = '\uFEFF'; // BOM for Excel UTF-8 compatibility
      function esc(val) {
        var s = (val === null || val === undefined) ? '' : String(val);
        if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1 || s.indexOf('\r') !== -1) {
          return '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }
      var headerLine = [];
      for (var h = 0; h < headers.length; h++) headerLine.push(esc(headers[h]));
      csvContent += headerLine.join(',') + '\r\n';
      for (var r = 0; r < rows.length; r++) {
        var rowLine = [];
        for (var c = 0; c < rows[r].length; c++) rowLine.push(esc(rows[r][c]));
        csvContent += rowLine.join(',') + '\r\n';
      }
      var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename || 'export.csv';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('CSV downloaded: ' + (filename || 'export.csv'), 'success');
    }

    function showToast(message, type) {
      var toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (type || 'info');
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 3000);
      // Accessibility: announce toast to screen readers (Session 3)
      a11yAnnounce(message);
    }

</script>
