<style>

   QUICK POLLS / EXIT TICKETS
   Prefix: qp-
   ================================================ */

.qp-modal {

}

}

.qp-close:focus-visible { outline: 3px solid #0d9488; outline-offset: 2px; }

}

}
.qp-textarea:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.15); }

.qp-char-count { font-size: 12px; color: #94a3b8; float: right; margin-top: 4px; }

}
.qp-option-input:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.15); }

.qp-option-remove {
  background: none; border: none; font-size: 18px; color: #94a3b8;
  cursor: pointer; padding: 4px 8px; border-radius: 4px;
}
.qp-option-remove:hover { color: #ef4444; background: #fef2f2; }
.qp-option-remove:focus-visible { outline: 3px solid #0d9488; outline-offset: 2px; }

.qp-add-option {
  display: block; width: 100%; padding: 8px; border: 2px dashed #0d9488;

.qp-footer { padding: 16px 0 0; border-top: 1px solid #e2e8f0; margin-top: 16px; }

.qp-launch-btn:focus-visible { outline: 3px solid #0d9488; outline-offset: 2px; }

}

  transition: all 0.15s;
}
.qp-close-poll-btn:hover { background: #fef2f2; }
.qp-close-poll-btn:focus-visible { outline: 3px solid #ef4444; outline-offset: 2px; }

/* ---- Open-ended responses ---- */
.qp-open-responses { display: flex; flex-direction: column; gap: 8px; }
.qp-open-response-card {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;

}

.qp-open-response-text { font-size: 14px; color: #0f172a; }

.qp-history-item {

}

.qp-history-meta { display: flex; gap: 12px; font-size: 12px; color: #94a3b8; }
.qp-history-type {
  background: #f1f5f9; padding: 1px 6px; border-radius: 3px;
  font-weight: 600; color: #64748b;
}

/* ---- Empty state ---- */
.qp-empty { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 14px; }

/* ================================================
   STUDENT BAR
   ================================================ */

  padding: 12px 16px; display: none;
  transform: translateY(100%); transition: transform 0.3s ease;
}
.qp-student-bar.qp-bar-visible { transform: translateY(0); }

.qp-student-question {
  font-size: 14px; font-weight: 700; color: #0f172a; margin-bottom: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.qp-student-options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.qp-student-option {
  flex: 1; min-width: 120px; min-height: 44px; padding: 10px 14px;

  font-size: 14px; color: #374151; cursor: pointer; transition: all 0.15s;

}
.qp-student-option:hover { border-color: #0d9488; background: #f0fdfa; }
.qp-student-option.active { border-color: #0d9488; background: #f0fdfa; color: #0d9488; font-weight: 600; }

.qp-student-textarea-footer { display: flex; align-items: center; justify-content: space-between; }
.qp-student-char-count { font-size: 12px; color: #94a3b8; }

.qp-student-submit {
  padding: 8px 24px; border: none; border-radius: 8px;
  background: #0d9488; color: white; font-size: 14px; font-weight: 600;

.qp-student-submit:disabled { opacity: 0.5; cursor: not-allowed; }

.qp-student-result-label { font-size: 12px; color: #374151; min-width: 60px; flex-shrink: 0; }

   RESPONSIVE
   ================================================ */

  .qp-student-options { flex-direction: column; }

  .qp-result-label { min-width: 60px; font-size: 12px; }
  .qp-result-count { min-width: 45px; font-size: 12px; }
  .qp-pjm-question { font-size: 20px; }
  .qp-pjm-result-label { font-size: 14px; min-width: 70px; }
