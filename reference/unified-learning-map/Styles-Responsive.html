<style>
/* ================================================
   RESPONSIVE STYLES (mob- prefix for new classes)
   Must be loaded LAST for cascade priority.
   Breakpoints: 1024px (tablet), 640px (phone)
   ================================================ */

/* ---- TABLET: max-width 1024px ---- */
@media (max-width: 1024px) {

  /* Header: tighter padding */
  .header { padding: 12px 16px; }
  .app-title { font-size: 18px; }

  /* Tabs: horizontal scroll */
  .tabs {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 16px;
    scrollbar-width: none; /* Firefox */
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 16px; white-space: nowrap; flex-shrink: 0; }

  /* Courses layout: stack units panel below */
  .courses-layout { flex-direction: column; }
  .units-panel.active {
    width: 100%;
    border-left: none;
    border-top: 1px solid #e2e8f0;
    max-height: 50vh;
  }

  /* Builder layout: stack editor panel below */
  .builder-main { flex-direction: column; }
  .editor-panel.active {
    width: 100%;
    border-left: none;
    border-top: 1px solid #e2e8f0;
    max-height: 50vh;
  }

  /* Student analytics: 2-column grid */
  .spa-overview-cards { grid-template-columns: repeat(2, 1fr); }

  /* Self-assessment summary: 2-column grid */
  .sa-summary-cards { grid-template-columns: repeat(2, 1fr); }

  /* Notification panel: slightly narrower + shifted */
  .ntf-panel { width: 320px; right: -40px; }

  /* Student Planner: stack schedule below tasks */
  .pln-layout { flex-direction: column; }
  .pln-schedule-panel { width: 100%; border-left: none; border-top: 1px solid #e2e8f0; max-height: 50vh; }

  /* Scroll container: reduce padding */
  .scroll-container { padding: 24px 16px; }

  /* Settings & integrations: fluid width */
  .set-sections { max-width: 100%; }
  .int-sections { max-width: 100%; }

  /* Tour tooltip: narrower on tablet */
  .tur-tooltip { max-width: 340px; width: 340px; }

  /* Portfolio: 2-column stats, scrollable graph */
  .pf-stats-cards { grid-template-columns: repeat(2, 1fr); }
  .pf-graph-container { overflow-x: auto; }

  /* Lab Insights: 3-column overview on tablet */
  .lin-overview-cards { grid-template-columns: repeat(3, 1fr); }
  .lin-criterion-row { grid-template-columns: 160px 1fr 50px 80px; }

  /* Name Selector: tablet */
  .nsg-groups-grid { grid-template-columns: repeat(2, 1fr); }
  .nsg-group-config { flex-direction: column; align-items: flex-start; }

  /* Countdown Timer: tablet */
  .ctd-preset-grid { grid-template-columns: repeat(3, 1fr); }
  .ctd-modal { max-width: 90vw; }

  /* Projector Mode: tablet */
  .pjm-stats-bar { gap: 8px; padding: 10px 16px; }
  .pjm-stat-value { font-size: 28px; }
  .pjm-stat-label { font-size: 12px; }
  .pjm-focus-header { gap: 24px; }
  .pjm-focus-title { font-size: 28px; }
  .pjm-student-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  .pjm-slides-toolbar { padding: 8px 12px; }
  .pjm-slides-select { min-width: 160px; }
  .pjm-sidebar.pjm-sidebar-open { width: 260px; }
  .pjm-sidebar-tab { font-size: 12px; padding: 6px 0; }
  .pjm-sidebar-li-number { width: 18px; height: 18px; font-size: 12px; }
  .pjm-sidebar-li-item { gap: 6px; padding: 4px 2px; }
}


/* ---- PHONE: max-width 640px ---- */
@media (max-width: 640px) {

  /* Header: stack vertically */
  .header {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 12px;
  }
  .header-right {
    width: 100%;
    justify-content: space-between;
  }
  .app-title { font-size: 16px; margin-bottom: 0; }
  .user-info { font-size: 12px; }

  /* Student preview banner: wrap on phone */
  .student-preview-banner .tpv-global-left { flex-wrap: wrap; gap: 6px; }
  .student-preview-banner .tpv-global-select { max-width: 100%; }

  /* Tabs: smaller touch targets */
  .tab { padding: 8px 12px; font-size: 12px; }

  /* View mode: compact */
  .view-mode-label { display: none; }
  .view-mode-btn { padding: 4px 8px; font-size: 12px; }
  .view-mode-switcher { padding: 4px 8px; }

  /* Student preview banner: compact */
  .student-preview-banner { padding: 6px 12px; font-size: 12px; }
  .tpv-global-select { max-width: 150px; }

  /* Scroll container: tighter */
  .scroll-container { padding: 16px 12px; }

  /* Cards: compact */
  .card { padding: 16px; }
  .card h2 { font-size: 16px; }
  .card-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  /* Modals: full-screen */
  .modal {
    max-width: 100%;
    width: 100%;
    max-height: 100vh;
    border-radius: 0;
  }
  .modal-body { max-height: calc(100vh - 140px); }
  .modal.modal-lg { max-width: 100%; }
  .lsn-modal { max-width: 100%; }
  .lsn-modal .modal-body { max-height: calc(100vh - 140px); }

  /* Content modal: full-screen */
  .content-modal {
    max-width: 100%;
    max-height: 100vh;
    border-radius: 0;
  }
  .content-modal.csb-sidebar-open { max-width: 100%; }
  .csb-main { padding: 24px 16px; }
  .content-modal-body { position: relative; }
  .csb-sidebar {
    position: absolute; top: 0; right: 0; bottom: 0; width: 85%;
    z-index: 5; background: white;
    box-shadow: -4px 0 16px rgba(0,0,0,0.15);
    transform: translateX(100%); transition: transform 0.25s ease;
  }
  .csb-sidebar.csb-hidden { transform: translateX(100%); display: flex; }
  .csb-sidebar.csb-visible-mobile { transform: translateX(0); }

  /* Grid columns: single column */
  .spa-overview-cards { grid-template-columns: 1fr; }
  .sa-summary-cards { grid-template-columns: 1fr; }

  /* Progress overview cards: wrap smaller */
  .pgd-overview-card { min-width: 80px; }
  .pgd-selector-group select { width: 100%; }

  /* Builder toolbar: stack */
  .builder-toolbar {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 12px;
  }
  .toolbar-buttons { flex-wrap: wrap; }

  /* Hex grid: scale down for mobile (0.8 for 44px+ tap targets) */
  .grid-container {
    transform: scale(0.8);
    transform-origin: top left;
    overflow: auto;
    padding: 20px;
  }
  .hex-node { min-width: 44px; min-height: 44px; }
  /* Counter-scale status indicators to meet 12px floor after 0.8 transform */
  .hex-status-text { font-size: 15px; }
  .hex-status-badge { width: 22px; height: 22px; font-size: 12px; }

  /* Notification panel: near full-width */
  .ntf-panel {
    position: fixed;
    left: 8px;
    right: 8px;
    top: auto;
    width: auto;
  }

  /* Self-assessment rating bar: 2x2 grid */
  .sa-rating-bar { flex-wrap: wrap; }
  .sa-rating-item { flex: 0 0 calc(50% - 4px); }

  /* Inline form widths: override inline styles */
  #courseSearchInput { width: 100% !important; }
  #courseStatusFilter { width: 100% !important; }

  /* Data items: compact */
  .data-item { padding: 12px; }
  .data-item h3 { font-size: 14px; }

  /* Class cards: compact */
  .class-card { padding: 14px; }
  .class-card-meta { font-size: 12px; gap: 8px; }

  /* Buttons: compact */
  .btn { padding: 8px 14px; font-size: 12px; }

  /* Empty state: less padding */
  .empty-state { padding: 30px 16px; }
  .empty-state .empty-icon { font-size: 48px; }

  /* Course analytics: already responsive via auto-fit */
  /* UBD planner + Progress: already handled by 900px query */

  /* Self-assessment evidence rows: stack */
  .sa-evidence-row { flex-direction: column; }
  .sa-evidence-row .sa-ev-label { width: 100%; min-width: 0; }
  .sa-evidence-row .sa-ev-url { min-width: 0; }

  /* Teacher self-assessment display: wrap */
  .sa-teacher-note { max-width: 100%; }

  /* Distribution label: narrower */
  .sa-distribution-label { width: 60px; font-size: 12px; }

  /* Analytics heatmap: horizontal scroll */
  .cad-heatmap-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Standards bulk panel: full width */
  .sal-bulk-body { flex-direction: column; }

  /* Student Planner: hide schedule panel on phone, full-width tasks */
  .pln-schedule-panel { display: none; }
  .pln-task-panel { width: 100%; }
  .pln-stats-bar { grid-template-columns: repeat(2, 1fr); }
  .pln-filter-bar { gap: 6px; }
  .pln-filter-chip { font-size: 12px; padding: 5px 10px; }
  .pln-task-card { padding: 12px; }
  .pln-task-icon { font-size: 20px; width: 36px; height: 36px; }
  .pln-task-label { font-size: 13px; }

  /* Celebrations: responsive overlay + badges */
  .cel-card { max-width: 90%; }
  .cel-badge-gallery { grid-template-columns: repeat(3, 1fr); }

  /* ATL Toolkit: single-column cards on phone */
  .atl-category-cards { grid-template-columns: 1fr; }
  .atl-timeline { gap: 6px; }
  .atl-timeline-item { min-width: 90px; font-size: 12px; }
  .atl-rating-bar { flex-wrap: wrap; }
  .atl-rating-btn { flex: 0 0 calc(50% - 2px); font-size: 12px; }
  .atl-emoji-labels .atl-rating-btn { padding: 8px 10px; font-size: 13px; }
  .atl-toolkit-panel { padding-top: 12px; }

  /* Prompt Builder / Enhanced Support: phone layout */
  .pb-detail-panel { max-height: 200px; margin: 0 8px 8px; }
  .pb-udl-chip { font-size: 12px; padding: 3px 8px; }
  .pb-info-chips { display: none; }
  .pb-prompt-modal { max-width: 100% !important; border-radius: 0 !important; }
  .pb-prompt-textarea { min-height: 200px; font-size: 12px; }
  .pb-depth-selector { flex-direction: column; align-items: flex-start; }
  .pb-wida-card { padding: 8px; }
  .pb-udl-legend { flex-direction: column; gap: 4px; }

  /* Student Support Tab (E3-S1) */
  .sst-domains-grid { grid-template-columns: 1fr; }
  .sst-domain-card { padding: 8px; }
  .sst-strategy-item { font-size: 12px; }
  .sst-accom-card { padding: 8px; }
  .sst-save-btn { width: 100%; }

  /* Teacher Support Dashboard: phone overrides */
  .tsd-student-header { flex-wrap: wrap; gap: 6px; }
  .tsd-strategy-chips { gap: 4px; }
  .tsd-strategy-chip { font-size: 12px; padding: 3px 8px; }
  .tsd-heatmap-container { display: none; }

  /* Design Thinking / PBL: phone overrides */
  .dtk-pbl-toggle-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  .dtk-phase-list { gap: 4px; }
  .dtk-phase-item { padding: 4px 8px; font-size: 12px; }
  .dtk-custom-label-input { font-size: 12px; }

  .dtk-progress-container { padding: 8px 12px; }

  /* Iteration History: phone overrides */
  .itr-timeline { padding-left: 18px; }
  .itr-card { padding: 10px; }
  .itr-evidence-row { flex-direction: column; }
  .itr-evidence-row input { max-width: 100% !important; }

  /* Peer Feedback: phone overrides */
  .pfb-review-form { padding: 12px; }
  .pfb-rating-bar { flex-wrap: wrap; }
  .pfb-rating-btn { flex: 0 0 calc(50% - 4px); font-size: 12px; }
  .pfb-feedback-card { padding: 10px; }
  .pfb-criterion { padding: 8px; }
  .pfb-criterion-editor { flex-direction: column; }

  /* PBL Dashboard: phone overrides */
  .pbl-summary-cards { grid-template-columns: repeat(2, 1fr); }
  .pbl-peer-stats { grid-template-columns: 1fr; }
  .pbl-heatmap-scroll { display: none; }
  .pbl-swimlane-scroll { font-size: 12px; }
  .pbl-checkpoint-table { font-size: 12px; }
  .pbl-summary-card { padding: 10px; }

  /* Teaching Methods Guide: phone overrides */
  .tmg-container { padding: 0; }
  .tmg-demo-grid { flex-direction: column; align-items: center; }
  .tmg-demo-arrow { display: none; }
  .tmg-templates { grid-template-columns: 1fr; }
  .tmg-concept-header { padding: 12px 14px; }
  .tmg-concept-icon { width: 36px; height: 36px; font-size: 18px; }
  .tmg-strat-cards { grid-template-columns: 1fr; }
  .tmg-picker-questions { grid-template-columns: 1fr; }
  .tmg-strat-chip-row { gap: 4px; }
  .tmg-strat-badge { font-size: 12px; padding: 2px 8px; }
  .tmg-strat-group-header { font-size: 13px; }
  .tmg-picker-q { padding: 10px; }

  /* Guide tab sub-navs: compact on phone */
  .tmg-subnav, .esg-subnav { padding: 0 12px; }
  .tmg-subnav-btn, .esg-subnav-btn { padding: 8px 12px; font-size: 12px; }

  /* EAL Strategies Guide: phone overrides */
  .esg-container { padding: 0; }
  .esg-demo-flex { flex-direction: column; }
  .esg-demo-flex > * { min-width: 0; }
  .esg-strategy-cards { grid-template-columns: 1fr; }
  .esg-concept-header { padding: 12px 14px; }
  .esg-concept-icon { width: 36px; height: 36px; font-size: 18px; }
  .esg-demo-dict-entry { flex-direction: column; gap: 4px; }

  /* Dictionary / Vocabulary: phone overrides */
  .dct-vocab-header { flex-direction: column; gap: 8px; align-items: flex-start; }

  /* Floating Dictionary Panel: full-width on phone */

  .dct-dict-panel.dct-visible { right: 0; }
  .dct-dict-header { padding: 12px; }
  .dct-dict-title { font-size: 15px; }
  .dct-lang-pills { gap: 4px; }

  .dct-student-term { font-size: 13px; }

  .dct-dict-trigger { bottom: 12px; right: 12px; width: 40px; height: 40px; font-size: 14px; }

  /* Tour: bottom-sheet tooltip on phone */
  .tur-tooltip {
    position: fixed !important;
    bottom: 0 !important;
    left: 0 !important;
    right: 0 !important;
    top: auto !important;
    width: 100% !important;
    max-width: 100% !important;
    max-height: 60vh;
    border-radius: 16px 16px 0 0;
    overflow-y: auto;
    transform: none !important;
  }
  .tur-arrow { display: none; }
  .tur-btn { padding: 10px 18px; font-size: 14px; }
  .tur-tooltip-title { font-size: 15px; }
  .tur-tooltip-body { font-size: 13px; }
  .tur-complete-card { max-width: 90%; padding: 24px 20px; }
  .tur-welcome-overlay { max-width: 95%; padding: 24px 20px; }

  /* Lab Report: phone overrides */
