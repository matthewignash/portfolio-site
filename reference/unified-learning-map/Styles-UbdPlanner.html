<style>
    /* ================================================
       UBD PLANNER TAB STYLES
       ================================================ */

    /* Two-panel layout (mirrors .courses-layout) */
    .ubd-planner-layout { display: flex; flex: 1; overflow: hidden; }
    .ubd-planner-browser { flex: 1; overflow-y: auto; }
    .ubd-editor-panel { width: 520px; background: white; border-left: 1px solid #e2e8f0; display: none; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    .ubd-editor-panel.active { display: flex; }

    /* Editor header */
    .ubd-editor-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; }
    .ubd-editor-header h3 { font-size: 16px; font-weight: 600; color: #1a202c; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    /* Sub-tabs */
    .ubd-editor-subtabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #f8fafc; padding: 0 16px; }
    .ubd-subtab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: #64748b; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
    .ubd-subtab:hover { color: #3b82f6; }
    .ubd-subtab.active { color: #3b82f6; border-bottom-color: #3b82f6; font-weight: 600; }

    /* Editor body */
    .ubd-editor-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .ubd-editor-footer { padding: 12px 16px; border-top: 1px solid #e2e8f0; background: #f8fafc; display: flex; gap: 8px; }

    /* Sub-tab content panels */
    .ubd-subtab-content { display: none; }
    .ubd-subtab-content.active { display: block; }

    /* Form sections within editor */
    .ubd-section-title { font-size: 13px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #f1f5f9; }
    .ubd-section-title:first-child { margin-top: 0; }
    .ubd-field { margin-bottom: 14px; }
    .ubd-field label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    .ubd-field textarea { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 60px; transition: border-color 0.2s; box-sizing: border-box; }
    .ubd-field textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .ubd-field input[type="text"],
    .ubd-field input[type="number"] { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: inherit; transition: border-color 0.2s; box-sizing: border-box; }
    .ubd-field input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .ubd-field select { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: inherit; background: white; }
    .ubd-field-hint { font-size: 11px; color: #94a3b8; margin-top: 3px; }
    .ubd-field-row { display: flex; gap: 12px; }
    .ubd-field-row > .ubd-field { flex: 1; }

    /* Completion badge */
    .ubd-completion-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    .ubd-completion-badge.gray { background: #f1f5f9; color: #94a3b8; }
    .ubd-completion-badge.yellow { background: #fef3c7; color: #b45309; }
    .ubd-completion-badge.blue { background: #dbeafe; color: #2563eb; }
    .ubd-completion-badge.green { background: #dcfce7; color: #16a34a; }

    /* Course accordion in browser */
    .ubd-course-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .ubd-course-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
    .ubd-course-header:hover { background: #f8fafc; }
    .ubd-course-title { font-size: 14px; font-weight: 600; color: #1e293b; }
    .ubd-course-meta { font-size: 12px; color: #94a3b8; }
    .ubd-course-chevron { color: #94a3b8; transition: transform 0.2s; font-size: 12px; }
    .ubd-course-card.expanded .ubd-course-chevron { transform: rotate(90deg); }
    .ubd-course-units { display: none; padding: 0 12px 12px; }
    .ubd-course-card.expanded .ubd-course-units { display: block; }

    /* Unit items in browser */
    .ubd-unit-item { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.15s; }
    .ubd-unit-item:hover { background: #f0f7ff; border-color: #bfdbfe; }
    .ubd-unit-item.selected { background: #eff6ff; border-color: #3b82f6; }
    .ubd-unit-item.no-map { opacity: 0.6; }
    .ubd-unit-title { font-size: 13px; font-weight: 500; color: #1e293b; }
    .ubd-unit-map-label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .ubd-no-map-badge { font-size: 10px; color: #ef4444; background: #fef2f2; padding: 2px 6px; border-radius: 4px; }

    /* Map link indicator in editor */
    .ubd-map-indicator { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 6px; margin-bottom: 14px; }
    .ubd-map-indicator .map-name { font-size: 13px; font-weight: 500; color: #1e293b; flex: 1; }

    /* Completeness progress bar */
    .ubd-progress-bar { width: 100%; height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .ubd-progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

    /* Dynamic list items (EQs, LIs, Vocabulary) */
    .ubd-dynamic-list { margin-bottom: 14px; }
    .ubd-dynamic-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; padding: 8px 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; }
    .ubd-dynamic-item .item-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .ubd-dynamic-item input,
    .ubd-dynamic-item textarea,
    .ubd-dynamic-item select { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 12px; font-family: inherit; box-sizing: border-box; }
    .ubd-dynamic-item textarea { min-height: 40px; resize: vertical; }
    .ubd-remove-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; padding: 4px; line-height: 1; flex-shrink: 0; }
    .ubd-remove-btn:hover { color: #dc2626; }
    .ubd-add-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; font-size: 12px; color: #3b82f6; background: #eff6ff; border: 1px dashed #93c5fd; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .ubd-add-btn:hover { background: #dbeafe; border-color: #3b82f6; }

    /* UDL Strategy checkboxes */
    .ubd-udl-section { margin-bottom: 14px; }
    .ubd-udl-principle-title { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .ubd-strategy-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .ubd-strategy-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 16px; cursor: pointer; transition: all 0.15s; background: white; }
    .ubd-strategy-chip:hover { border-color: #93c5fd; }
    .ubd-strategy-chip.selected { background: #eff6ff; border-color: #3b82f6; color: #2563eb; }

    /* Standards picker (adapted from hex editor) */
    .ubd-standards-picker { margin-bottom: 14px; }
    .ubd-standards-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .ubd-standard-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: #e0e7ff; color: #4338ca; font-size: 11px; font-weight: 500; border-radius: 4px; }
    .ubd-standard-tag .remove { cursor: pointer; color: #6366f1; font-weight: bold; }
    .ubd-standard-tag .remove:hover { color: #ef4444; }
    .ubd-standards-results { max-height: 150px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; margin-top: 4px; display: none; }
    .ubd-standards-results.active { display: block; }
    .ubd-standard-result { padding: 6px 10px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
    .ubd-standard-result:hover { background: #f0f7ff; }
    .ubd-standard-result:last-child { border-bottom: none; }
    .ubd-standard-code { font-weight: 600; color: #4338ca; }

    /* Validation results */
    .ubd-validation-results { padding: 12px; border-radius: 8px; margin-bottom: 14px; }
    .ubd-validation-results.valid { background: #dcfce7; border: 1px solid #86efac; }
    .ubd-validation-results.invalid { background: #fef2f2; border: 1px solid #fca5a5; }
    .ubd-validation-item { font-size: 12px; padding: 2px 0; }
    .ubd-validation-item.error { color: #dc2626; }
    .ubd-validation-item.warning { color: #b45309; }

    /* Empty state for no-map units */
    .ubd-no-map-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
    .ubd-no-map-state .icon { font-size: 36px; margin-bottom: 12px; }
    .ubd-no-map-state p { font-size: 14px; margin-bottom: 16px; }

    /* UBD planner layout when active (let .view/.view.active handle display) */
    .view.active#ubdPlannerView { flex-direction: column; }
    .ubd-planner-layout { min-height: 0; }
    .ubd-planner-browser .scroll-container { height: 100%; }
    .ubd-planner-browser .card { margin: 16px; }

    /* Unsaved indicator */
    .ubd-editor-header .unsaved-dot { width: 8px; height: 8px; background: #f59e0b; border-radius: 50%; margin-left: 8px; flex-shrink: 0; }

    /* Report sub-tab */
    .ubd-report-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
    .ubd-report-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; text-align: center; }
    .ubd-report-value { font-size: 22px; font-weight: 700; color: #1e293b; line-height: 1.2; }
    .ubd-report-label { font-size: 12px; color: #64748b; margin-top: 2px; }
    .ubd-report-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .ubd-report-table th { text-align: left; padding: 6px 8px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; color: #475569; font-weight: 600; }
    .ubd-report-table td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; color: #1e293b; }
    .ubd-report-std { padding: 6px 0; border-bottom: 1px solid #f1f5f9; display: flex; gap: 6px; align-items: baseline; }
    .ubd-report-std:last-child { border-bottom: none; }
    .ubd-report-std-code { font-size: 12px; font-weight: 600; color: #4338ca; white-space: nowrap; }
    .ubd-report-std-desc { font-size: 12px; color: #64748b; }
    .ubd-report-gap { background: #fef2f2; padding: 6px 8px; border-radius: 4px; margin-bottom: 2px; }

    /* New item flash animation */
    @keyframes ubd-flash-new {
      0% { background: #dbeafe; border-color: #3b82f6; }
      100% { background: #f8fafc; border-color: #e2e8f0; }
    }
    .ubd-item-new { animation: ubd-flash-new 1.5s ease-out forwards; }

    /* Standards scope indicator */
    .ubd-std-scope { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 12px; background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 6px; margin-bottom: 8px; }
    .ubd-std-scope-label { font-size: 12px; color: #5b21b6; }
    .ubd-std-scope-toggle { font-size: 12px; color: #7c3aed; text-decoration: none; white-space: nowrap; }
    .ubd-std-scope-toggle:hover { text-decoration: underline; }

    /* Count badge on section titles */
    .ubd-count-badge { display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; background: #e0e7ff; color: #4338ca; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px; margin-left: 6px; vertical-align: middle; text-transform: none; letter-spacing: 0; }

    /* Vocabulary tier select + simplified definition */
    .ubd-vocab-term-row { display: flex; gap: 8px; align-items: center; }
    .ubd-vocab-tier-select { width: 130px; padding: 6px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; background: #fff; flex-shrink: 0; }
    .ubd-vocab-tier-select:focus { border-color: #0d9488; outline: none; box-shadow: 0 0 0 2px rgba(13,148,136,0.15); }
    .ubd-vocab-simplified-input { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 100%; }
    .ubd-vocab-simplified-input:focus { border-color: #0d9488; outline: none; box-shadow: 0 0 0 2px rgba(13,148,136,0.15); }
    .ubd-vocab-simplified-input::placeholder { color: #93c5fd; }

    /* Tier coverage summary */
    .ubd-vocab-coverage { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; margin-top: 8px; }
    .ubd-vocab-tier-pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .ubd-vocab-coverage-hint { font-size: 12px; color: #92400e; background: #fef3c7; padding: 4px 10px; border-radius: 4px; }

    /* Responsive: stack panels on narrow screens */
    @media (max-width: 900px) {
      .ubd-planner-layout { flex-direction: column; }
      .ubd-editor-panel { width: 100%; border-left: none; border-top: 1px solid #e2e8f0; max-height: 60vh; }
      .ubd-planner-browser { max-height: 40vh; }
    }
</style>
