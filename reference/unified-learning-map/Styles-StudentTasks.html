<style>
/* ============================================================================
   STUDENT CUSTOM TASKS — stl- prefix
   Collapsible to-do list section within the Student Planner tab
   ============================================================================ */

/* Section wrapper */
.stl-section {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
}

/* Header */
.stl-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.stl-header:hover { background: #f1f5f9; }
.stl-header-icon { font-size: 18px; }
.stl-header-title {
  font-size: 15px;
  font-weight: 600;
  color: #1e293b;
  flex: 1;
}
.stl-header-count {
  font-size: 12px;
  font-weight: 600;
  background: #e2e8f0;
  color: #475569;
  padding: 2px 8px;
  border-radius: 10px;
}
.stl-header-count.stl-all-done {
  background: #d1fae5;
  color: #065f46;
}
.stl-header-chevron {
  font-size: 16px;
  color: #94a3b8;
  transition: transform 0.25s;
}
.stl-section.stl-collapsed .stl-header-chevron { transform: rotate(-90deg); }
.stl-section.stl-collapsed .stl-body { display: none; }

/* Body */
.stl-body { padding: 0; }

/* Add bar */
.stl-add-bar {
  display: flex;
  gap: 8px;
  padding: 12px 18px;
  border-bottom: 1px solid #f1f5f9;
  align-items: center;
}
.stl-add-input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 13px;
  color: #1e293b;
  outline: none;
  transition: border-color 0.2s;
}
.stl-add-input:focus { border-color: #3b82f6; }
.stl-add-input::placeholder { color: #94a3b8; }
.stl-add-date {
  padding: 7px 10px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 12px;
  color: #475569;
  background: #fff;
  cursor: pointer;
  width: 130px;
}
.stl-add-btn {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  background: #3b82f6;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
.stl-add-btn:hover { background: #2563eb; }
.stl-add-btn:disabled { background: #94a3b8; cursor: not-allowed; }

/* Task list */
.stl-task-list { padding: 0; }

/* Individual task */
.stl-task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  border-bottom: 1px solid #f1f5f9;
  transition: background 0.15s;
}
.stl-task-item:last-child { border-bottom: none; }
.stl-task-item:hover { background: #f8fafc; }
.stl-task-item.stl-completed { opacity: 0.55; }

/* Checkbox */
.stl-checkbox {
  width: 20px;
  height: 20px;
  border: 2px solid #cbd5e1;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color 0.2s, background 0.2s;
  font-size: 12px;
  color: transparent;
}
.stl-checkbox:hover { border-color: #3b82f6; }
.stl-checkbox.stl-checked {
  background: #10b981;
  border-color: #10b981;
  color: #fff;
}

/* Title */
.stl-task-title {
  flex: 1;
  font-size: 13px;
  color: #1e293b;
  line-height: 1.4;
}
.stl-completed .stl-task-title { text-decoration: line-through; color: #94a3b8; }

/* Due date badge */
.stl-task-due {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 8px;
  background: #f1f5f9;
  color: #475569;
  white-space: nowrap;
  flex-shrink: 0;
}
.stl-task-due.stl-overdue { background: #fef2f2; color: #dc2626; }
.stl-task-due.stl-due-today { background: #fffbeb; color: #d97706; }

/* Actions */
.stl-task-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.stl-action-btn {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: none;
  color: #94a3b8;
  cursor: pointer;
  border-radius: 4px;
  font-size: 14px;
  transition: color 0.15s, background 0.15s;
}
.stl-action-btn:hover { color: #475569; background: #f1f5f9; }
.stl-action-btn.stl-delete:hover { color: #dc2626; background: #fef2f2; }

/* Empty state */
.stl-empty {
  padding: 24px 18px;
  text-align: center;
  color: #94a3b8;
  font-size: 13px;
}
</style>
