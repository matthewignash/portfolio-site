<style>
/* ================================================
   REVIEW INSIGHTS DASHBOARD (rvi- prefix)
   Teacher analytics for iterations + peer feedback
   ================================================ */

/* Container */
.rvi-container { padding: 4px 0; }

/* Section titles */
.rvi-section-title {
  font-size: 15px; font-weight: 700; color: #1e293b;
  margin: 20px 0 10px; padding-bottom: 6px;
  border-bottom: 2px solid #e2e8f0;
}
.rvi-section-title:first-child { margin-top: 4px; }

/* Empty & loading states */
.rvi-empty {
  text-align: center; padding: 40px 20px; color: #64748b;
}
.rvi-empty-icon { font-size: 36px; margin-bottom: 8px; }
.rvi-empty-title { font-size: 16px; font-weight: 700; color: #334155; margin-bottom: 4px; }
.rvi-empty-text { font-size: 13px; max-width: 400px; margin: 0 auto; }
.rvi-loading {
  text-align: center; padding: 40px 20px; font-size: 14px; color: #64748b;
}

/* Summary cards */
.rvi-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.rvi-card {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
  padding: 14px; text-align: center;
}
.rvi-card-value {
  font-size: 24px; font-weight: 800; color: #0f172a; line-height: 1.2;
}
.rvi-card-label {
  font-size: 12px; color: #64748b; margin-top: 2px;
}
.rvi-card-value.green { color: #16a34a; }
.rvi-card-value.amber { color: #d97706; }
.rvi-card-value.red { color: #dc2626; }

/* Iteration hex rows */
.rvi-hex-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px;
  margin-bottom: 6px; cursor: pointer; background: #fff;
  transition: background 0.15s;
}
.rvi-hex-row:hover { background: #f8fafc; }
.rvi-hex-row:focus-visible { outline: 3px solid #14b8a6; outline-offset: 1px; border-radius: 6px; }

.rvi-hex-label {
  font-size: 13px; font-weight: 600; color: #334155;
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rvi-hex-stats {
  display: flex; gap: 14px; align-items: center; font-size: 12px; color: #64748b;
  flex-shrink: 0; margin-left: 10px;
}
.rvi-hex-stat { white-space: nowrap; }
.rvi-hex-stat strong { color: #334155; }
.rvi-hex-chevron {
  width: 20px; text-align: center; font-size: 12px; color: #94a3b8;
  transition: transform 0.15s; flex-shrink: 0;
}
.rvi-hex-row.expanded .rvi-hex-chevron { transform: rotate(90deg); }

/* Expandable detail */
.rvi-hex-detail {
  display: none; padding: 8px 12px 12px; border: 1px solid #e2e8f0;
  border-top: none; border-radius: 0 0 6px 6px; margin-top: -7px; margin-bottom: 6px;
  background: #f8fafc;
}
.rvi-hex-detail.open { display: block; }

.rvi-student-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid #f1f5f9;
}
.rvi-student-item:last-child { border-bottom: none; }
.rvi-student-name { font-size: 13px; color: #334155; flex: 1; }
.rvi-student-count {
  font-size: 12px; font-weight: 700; color: #64748b;
  margin: 0 10px; white-space: nowrap;
}

/* Status badges */
.rvi-status-badge {
  font-size: 12px; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; white-space: nowrap;
}
.rvi-status-badge.approved { background: #dcfce7; color: #166534; }
.rvi-status-badge.submitted { background: #fef3c7; color: #92400e; }
.rvi-status-badge.revision_requested { background: #fee2e2; color: #991b1b; }

/* Peer feedback participation bar */
.rvi-participation {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.rvi-participation-bar-container {
  flex: 1; height: 16px; background: #e2e8f0; border-radius: 8px; overflow: hidden;
}
.rvi-participation-bar-fill {
  height: 100%; border-radius: 8px; transition: width 0.3s;
}
.rvi-participation-label {
  font-size: 14px; font-weight: 700; color: #334155; white-space: nowrap; min-width: 45px; text-align: right;
}

/* Per-student review count bars */
.rvi-reviewer-row {
  display: flex; align-items: center; gap: 10px; padding: 5px 0;
}
.rvi-reviewer-name {
  font-size: 13px; color: #334155; width: 140px; min-width: 100px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rvi-reviewer-bar-container {
  flex: 1; height: 12px; background: #f1f5f9; border-radius: 6px; overflow: hidden;
}
.rvi-reviewer-bar-fill {
  height: 100%; background: #3b82f6; border-radius: 6px; min-width: 4px;
}
.rvi-reviewer-count {
  font-size: 12px; font-weight: 700; color: #334155; width: 30px; text-align: right;
}

/* Non-participant highlight */
.rvi-nonparticipant {
  background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px;
  padding: 10px 14px; margin-top: 10px;
}
.rvi-nonparticipant-title {
  font-size: 13px; font-weight: 700; color: #92400e; margin-bottom: 6px;
}
.rvi-nonparticipant-list {
  font-size: 13px; color: #78350f; line-height: 1.6;
}
</style>
