<style>
/* ================================================
   TEACHER CALENDAR / TIMELINE (tcl- prefix)
   Map-level time gate + due date visualization
   ================================================ */

/* --- Overlay --- */
.tcl-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 265;
  display: none;
  align-items: center;
  justify-content: center;
}
.tcl-overlay.active {
  display: flex;
}

/* --- Modal --- */
.tcl-modal {
  background: white;
  border-radius: 12px;
  width: 95%;
  max-width: 900px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  overflow: hidden;
}

/* --- Header --- */
.tcl-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.tcl-header-title {
  font-size: 16px;
  font-weight: 600;
  color: #1e293b;
}
.tcl-header-close {
  background: none;
  border: none;
  font-size: 22px;
  color: #94a3b8;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}
.tcl-header-close:hover { color: #1e293b; background: #f1f5f9; }

/* --- Toolbar --- */
.tcl-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-bottom: 1px solid #f1f5f9;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.tcl-view-toggle {
  display: flex;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  overflow: hidden;
}
.tcl-view-btn {
  padding: 5px 12px;
  font-size: 13px;
  border: none;
  background: white;
  color: #64748b;
  cursor: pointer;
}
.tcl-view-btn.active {
  background: #0d9488;
  color: white;
}
.tcl-month-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
}
.tcl-nav-btn {
  padding: 4px 10px;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  background: white;
  color: #475569;
  cursor: pointer;
  font-size: 13px;
}
.tcl-nav-btn:hover { background: #f8fafc; }
.tcl-month-label {
  font-size: 13px;
  font-weight: 500;
  color: #1e293b;
  min-width: 120px;
  text-align: center;
}
.tcl-summary-badge {
  font-size: 12px;
  color: #64748b;
  background: #f1f5f9;
  padding: 3px 8px;
  border-radius: 10px;
}

/* --- Body (scroll area) --- */
.tcl-body {
  flex: 1;
  overflow: auto;
  padding: 16px 20px;
  min-height: 0;
}

/* --- Empty state --- */
.tcl-empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #94a3b8;
}
.tcl-empty-icon { font-size: 36px; margin-bottom: 8px; }
.tcl-empty-title { font-size: 15px; font-weight: 500; color: #64748b; }
.tcl-empty-text { font-size: 13px; margin-top: 4px; }

/* --- Timeline View --- */
.tcl-timeline {
  overflow-x: auto;
  position: relative;
  min-height: 120px;
}
.tcl-timeline-header {
  display: flex;
  position: sticky;
  top: 0;
  z-index: 2;
  background: white;
  border-bottom: 2px solid #e2e8f0;
}
.tcl-timeline-day {
  flex-shrink: 0;
  text-align: center;
  font-size: 10px;
  color: #94a3b8;
  border-right: 1px solid #f1f5f9;
  padding: 2px 0;
}
.tcl-timeline-day.weekend { background: #fafafa; }
.tcl-timeline-day.today { background: #fef2f2; color: #ef4444; font-weight: 600; }
.tcl-timeline-day-num { font-size: 11px; font-weight: 500; color: #475569; }
.tcl-timeline-day.today .tcl-timeline-day-num { color: #ef4444; }

.tcl-timeline-rows {
  position: relative;
}
.tcl-timeline-row {
  display: flex;
  align-items: center;
  height: 36px;
  border-bottom: 1px solid #f1f5f9;
  position: relative;
}
.tcl-timeline-row:hover { background: #fafafa; }

.tcl-hex-label {
  position: sticky;
  left: 0;
  z-index: 1;
  background: white;
  min-width: 140px;
  max-width: 140px;
  padding: 0 8px;
  font-size: 12px;
  color: #1e293b;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-right: 1px solid #e2e8f0;
  height: 100%;
}
.tcl-timeline-row:hover .tcl-hex-label { background: #fafafa; }
.tcl-hex-icon { font-size: 13px; flex-shrink: 0; }

.tcl-bar-area {
  flex: 1;
  position: relative;
  height: 100%;
}

/* --- Bars --- */
.tcl-bar {
  position: absolute;
  top: 6px;
  height: 24px;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 0 6px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: opacity 0.2s;
}
.tcl-bar:hover { opacity: 0.85; }
.tcl-bar.time-gate {
  background: rgba(6, 182, 212, 0.2);
  border: 1px solid #06b6d4;
  color: #0e7490;
}
.tcl-bar.due-date {
  background: rgba(217, 119, 6, 0.2);
  border: 1px solid #d97706;
  color: #92400e;
  min-width: 20px;
}
.tcl-bar.active {
  background: rgba(16, 185, 129, 0.15);
  border-color: #10b981;
  color: #047857;
}
.tcl-bar.future {
  border-style: dashed;
  opacity: 0.7;
}
.tcl-bar.expired {
  opacity: 0.4;
  background: rgba(148, 163, 184, 0.15);
  border-color: #94a3b8;
  color: #64748b;
}

/* --- Today line --- */
.tcl-today-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #ef4444;
  z-index: 3;
  pointer-events: none;
}
.tcl-today-line::before {
  content: '';
  position: absolute;
  top: -3px;
  left: -3px;
  width: 8px;
  height: 8px;
  background: #ef4444;
  border-radius: 50%;
}

/* --- List View --- */
.tcl-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.tcl-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.tcl-list-item:hover { border-color: #0d9488; }
.tcl-list-item.expired { opacity: 0.5; }
.tcl-list-icon { font-size: 20px; flex-shrink: 0; }
.tcl-list-body { flex: 1; min-width: 0; }
.tcl-list-label {
  font-size: 14px;
  font-weight: 500;
  color: #1e293b;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tcl-list-dates {
  font-size: 12px;
  color: #64748b;
  margin-top: 2px;
}
.tcl-list-badge {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  flex-shrink: 0;
}
.tcl-list-badge.time-gate { background: #ecfeff; color: #0e7490; }
.tcl-list-badge.due-date { background: #fffbeb; color: #92400e; }
.tcl-list-status {
  font-size: 12px;
  color: #64748b;
  flex-shrink: 0;
}
.tcl-list-status.active { color: #10b981; font-weight: 500; }
.tcl-list-status.future { color: #06b6d4; }
.tcl-list-status.expired { color: #94a3b8; }

/* Focus-visible parity (WCAG 2.4.7) */
.tcl-header-close:focus-visible,
.tcl-nav-btn:focus-visible,
.tcl-bar:focus-visible,
.tcl-list-item:focus-visible {
  outline: 3px solid #0d9488;
  outline-offset: 2px;
}
</style>
