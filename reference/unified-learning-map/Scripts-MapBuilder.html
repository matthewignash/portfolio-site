    /**
     * Load student progress data for the current map.
     * Calls getStudentProgress(mapId) via RPC, stores in studentProgressData.
     */
    function loadStudentMapProgress(callback) {
      if (!currentMap || !currentMap.mapId) {
        if (callback) callback();
        return;
      }
      studentProgressLoading = true;
      var expectedMapId = currentMap.mapId; // stale-response guard

      // Show loading indicator on grid
      var container = document.getElementById('gridContainer');
      var loadingEl = document.getElementById('studentProgressLoading');
      if (!loadingEl) {
        loadingEl = document.createElement('div');
        loadingEl.id = 'studentProgressLoading';
        loadingEl.className = 'student-progress-loading';
        loadingEl.innerHTML = '<span class="loading-spinner"></span> Loading your progress...';
        container.appendChild(loadingEl);
      }
      loadingEl.style.display = 'block';

      google.script.run
        .withSuccessHandler(function(data) {
          // Stale-response guard: user may have switched maps
          if (!currentMap || currentMap.mapId !== expectedMapId) return;
          if (typeof data === 'object' && data !== null) {
            studentProgressData = data;
          } else {
            studentProgressData = {};
          }
          studentProgressLoading = false;
          if (loadingEl) loadingEl.style.display = 'none';
          if (callback) callback();
          // Load lesson progress summaries for unit maps (non-blocking second pass)
          if (typeof lsmLoadProgressSummaries === 'function') {
            lsmLoadProgressSummaries();
          }
        })
        .withFailureHandler(function(err) {
          if (!currentMap || currentMap.mapId !== expectedMapId) return;
          studentProgressLoading = false;
          if (loadingEl) loadingEl.style.display = 'none';
          console.error('Error loading student progress:', err);
          showToast(friendlyError(err), 'error');
          if (callback) callback();
        })
        .getStudentProgress(currentMap.mapId);
    }

    /**
     * Returns {fill, stroke, opacity} for a hex based on student progress state.
     * Fill = status color, Stroke = type color.
     */
    function getStudentHexTheme(type, progressStatus) {
      var typeTheme = HEX_THEMES[type] || { fill: '#ffffff', stroke: '#3b82f6' };
      var typeStroke = typeTheme.stroke;

      switch (progressStatus) {
        case 'locked':
          return { fill: '#f1f5f9', stroke: '#cbd5e1' };
        case 'not_started':
          return { fill: '#f8fafc', stroke: typeStroke };
        case 'in_progress':
          return { fill: '#dbeafe', stroke: typeStroke };
        case 'completed_pending':
          return { fill: '#fef3c7', stroke: '#f59e0b' };
        case 'completed':
          return { fill: '#d1fae5', stroke: typeStroke };
        case 'mastered':
          return { fill: '#a7f3d0', stroke: typeStroke };
        default:
          return { fill: '#f8fafc', stroke: typeStroke };
      }
    }

    // ================================================
    // UX OVERHAUL: COLLAPSIBLE SECTIONS (uxo-)
    // ================================================

    /**
     * Wrap HTML content in a collapsible section.
     * @param {string} sectionKey - Unique key for this section
     * @param {string} title - Display title with optional emoji prefix
     * @param {string} innerHtml - The HTML to wrap
     * @param {boolean} defaultCollapsed - Whether collapsed by default
     * @returns {string} Wrapped HTML
     */
    function uxoWrapCollapsible(sectionKey, title, innerHtml, defaultCollapsed) {
      var isCollapsed = (typeof uxoCollapsedSections[sectionKey] !== 'undefined')
        ? uxoCollapsedSections[sectionKey]
        : defaultCollapsed;
      var collapsedClass = isCollapsed ? ' collapsed' : '';
      var expandedAttr = isCollapsed ? 'false' : 'true';
      var html = '<div class="uxo-section' + collapsedClass + '" id="uxoSection-' + sectionKey + '">';
      html += '<div class="uxo-section-header" role="button" tabindex="0" aria-expanded="' + expandedAttr + '" aria-controls="uxoBody-' + sectionKey + '" onclick="uxoToggleSection(\'' + sectionKey + '\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();uxoToggleSection(\'' + sectionKey + '\');}">';
      html += '<span class="uxo-section-title">' + title + '<span class="uxo-section-summary" id="uxoSummary-' + sectionKey + '"></span></span>';
      html += '<span class="uxo-chevron">&#9660;</span>';
      html += '</div>';
      html += '<div class="uxo-section-body" id="uxoBody-' + sectionKey + '">' + innerHtml + '</div>';
      html += '</div>';
      return html;
    }

    /**
     * Toggle a collapsible section open/closed.
     */
    function uxoToggleSection(sectionKey) {
      var el = document.getElementById('uxoSection-' + sectionKey);
      if (!el) return;
      var isNowCollapsed = !el.classList.contains('collapsed');
      if (isNowCollapsed) {
        el.classList.add('collapsed');
      } else {
        el.classList.remove('collapsed');
      }
      uxoCollapsedSections[sectionKey] = isNowCollapsed;
      // Accessibility: sync aria-expanded on header (Session 3)
      var header = el.querySelector('.uxo-section-header');

    /**

    /**
     * Build context-sensitive action buttons for the student hex modal.
     */
    function renderStudentModalFooter(hex, progress) {
      var status = progress ? progress.status : 'not_started';
      var teacherApproved = progress ? progress.teacherApproved : false;
      var hasAssessment = hex.assessmentJson ? true : false;
      var html = '<div style="display:flex;gap:8px;align-items:center;width:100%;">';

      switch (status) {
        case 'not_started':
          html += '<button class="btn btn-success" onclick="submitHexProgress(\'' + hex.id + '\', \'in_progress\')">▶️ Start Working</button>';
          break;
        case 'in_progress':
          if (hasAssessment) {
            // When assessment exists, completion is driven by passing the assessment
            html += '<span style="font-size:13px;color:#2563eb;font-weight:600;">📝 Complete the assessment above to progress</span>';
          } else {
            html += '<button class="btn btn-success" onclick="submitHexProgress(\'' + hex.id + '\', \'completed\')">✅ Mark Complete</button>';
          }
          break;
        case 'completed':
          if (!teacherApproved && appConfig.requireTeacherApproval) {
            html += '<span style="font-size:13px;color:#b45309;font-weight:600;">⏳ Awaiting Teacher Review</span>';

      return html;

    /**
     * Submit hex progress (student action).
     * updateProgress → autoProgress → reload → re-render.
     */
    function submitHexProgress(hexId, newStatus) {
      if (!currentMap || !currentMap.mapId) return;

      // Disable buttons to prevent double-click
      var footerEl = document.getElementById('contentModalFooter');
      var buttons = footerEl.querySelectorAll('button');
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
      }

      // Show spinner in footer
      var statusSpan = document.createElement('span');
      statusSpan.className = 'submit-spinner';
      statusSpan.innerHTML = '<span class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin-right:6px;"></span>Saving...';
      footerEl.insertBefore(statusSpan, footerEl.firstChild);

      google.script.run
        .withSuccessHandler(function() {
          // Now auto-progress to unlock next hexes
          google.script.run
            .withSuccessHandler(function(autoResult) {
              // Reload progress data and re-render
              studentProgressData = {};  // Clear so it reloads
              loadStudentMapProgress(function() {
                renderHexGridInternal();
                closeContentModal();

                // Show notification
                if (autoResult && autoResult.unlockedHexes && autoResult.unlockedHexes.length > 0) {
                  showUnlockNotification(autoResult.unlockedHexes, newStatus);
                } else {
                  var msg = newStatus === 'in_progress' ? 'Started working!' : 'Marked complete!';
                  showToast(msg, 'success');
                }

                // Check celebrations after hex completion/mastery
                if (typeof checkCelebrations === 'function' &&
                    (newStatus === 'completed' || newStatus === 'mastered')) {
                  checkCelebrations(currentMap.mapId, hexId, newStatus);
                }

                // Show reflection prompt after completion (research: metacognitive pause)
                if (typeof rflShowCompletionPrompt === 'function' &&
                    (newStatus === 'completed' || newStatus === 'mastered')) {
                  setTimeout(function() { rflShowCompletionPrompt(hexId, newStatus); }, 800);
                }

                // Check design thinking phase transition (Story 1.3)
                if (typeof dtkCheckPhaseTransition === 'function' &&
                    (newStatus === 'completed' || newStatus === 'mastered')) {
                  dtkCheckPhaseTransition(hexId, newStatus);
                }

                // Check for choice branches on this hex (student picks path)
                if (newStatus === 'completed' || newStatus === 'mastered') {
                  bexCheckAndShowChoiceModal(hexId);
                }

                // Auto-complete parent lesson hex if this is a lesson map and all done
                if (currentMap && currentMap.meta && currentMap.meta.isLessonMap &&
                    currentMap.meta.parentMapId &&
                    (newStatus === 'completed' || newStatus === 'mastered')) {
                  google.script.run
                    .withSuccessHandler(function(parentResult) {
                      if (parentResult && parentResult.parentUpdated) {
                        showToast('Lesson complete! Unit activity "' + escapeHtml(parentResult.parentHexLabel) + '" updated.', 'success');
                        lessonProgressSummary = {};
                        // Trigger celebration check for lesson map completion
                        if (typeof checkCelebrations === 'function') {
                          checkCelebrations(currentMap.mapId, '', 'completed');
                        }
                      }
                    })
                    .withFailureHandler(function(pErr) {
                      console.warn('Parent lesson hex update (non-fatal): ' + (pErr && pErr.message ? pErr.message : ''));
                    })
                    .checkAndCompleteParentLessonHex(currentMap.mapId);
                }
              });
            })
            .withFailureHandler(function(err) {
              console.error('Auto-progress error:', err);
              // Still reload and re-render even if auto-progress fails
              studentProgressData = {};
              loadStudentMapProgress(function() {
                renderHexGridInternal();
                closeContentModal();
                showToast('Progress saved! Some hexes may not have unlocked automatically.', 'info');
              });
            })
            .autoProgressStudent(currentMap.mapId, hexId);
        })
        .withFailureHandler(function(err) {
          showToast(friendlyError(err), 'error');
          // Re-enable buttons
          for (var j = 0; j < buttons.length; j++) {
            buttons[j].disabled = false;
          }
          if (statusSpan.parentNode) statusSpan.parentNode.removeChild(statusSpan);
        })
        .updateStudentProgress(currentMap.mapId, hexId, newStatus);
    }

    /**

    /**
     * Add a new empty evidence row. Max 3 rows.
     */
    function addSaEvidenceRow() {
      if (saEvidenceCount >= 3) return;
      var container = document.getElementById('saEvidenceRows');
      if (!container) return;

      var rowHtml = renderSaEvidenceRow(saEvidenceCount, null);
      var temp = document.createElement('div');
      temp.innerHTML = rowHtml;
      container.appendChild(temp.firstChild);

      saEvidenceCount++;
      if (saEvidenceCount >= 3) {

        if (addBtn) addBtn.style.display = 'none';

    /**
     * Remove an evidence row and re-index remaining rows.
     */
    function removeSaEvidenceRow(index) {
      var row = document.getElementById('saEvRow' + index);
      if (row && row.parentNode) row.parentNode.removeChild(row);

      // Re-index remaining rows
      var container = document.getElementById('saEvidenceRows');
      if (!container) return;
      var rows = container.querySelectorAll('.sa-evidence-row');
      saEvidenceCount = rows.length;
      for (var ri = 0; ri < rows.length; ri++) {
        rows[ri].id = 'saEvRow' + ri;
        var labelInput = rows[ri].querySelector('.sa-ev-label');
        var urlInput = rows[ri].querySelector('.sa-ev-url');
        var removeBtn = rows[ri].querySelector('.sa-evidence-remove');
        if (labelInput) labelInput.id = 'saEvLabel' + ri;
        if (urlInput) urlInput.id = 'saEvUrl' + ri;
        if (removeBtn) removeBtn.setAttribute('onclick', 'removeSaEvidenceRow(' + ri + ')');
      }

      // Show add button if under limit
      var addBtn = document.getElementById('saAddEvidenceBtn');
      if (addBtn && saEvidenceCount < 3) addBtn.style.display = '';
    }

      var goalEl = document.getElementById('saGoal');
      var countEl = document.getElementById('saGoalCharCount');
      if (!goalEl || !countEl) return;
      var len = goalEl.value.length;
      countEl.textContent = len + '/150';
    }

    /**
     * Collect all evidence data from the DOM rows.
     * Returns array of {label, url}.
     */
    function collectSaEvidenceData() {
      var evidence = [];
      for (var ci = 0; ci < saEvidenceCount; ci++) {
        var labelEl = document.getElementById('saEvLabel' + ci);
        var urlEl = document.getElementById('saEvUrl' + ci);
        if (labelEl && urlEl) {
          var url = urlEl.value.trim();
          if (url) {
            evidence.push({ label: labelEl.value.trim(), url: url });
          }
        }
      }
      return evidence;
    }

      saSelectedRating = level;
      // Update visual state on all 4 buttons
      for (var i = 1; i <= 4; i++) {
        var btn = document.getElementById('saRatingBtn' + i);
        if (!btn) continue;
        if (i === level) {
          btn.className = 'sa-rating-btn selected sa-level-' + i;

    function updateSaCharCount() {

      var countEl = document.getElementById('saCharCount');
      if (!noteEl || !countEl) return;

      var len = noteEl.value.length;
      countEl.textContent = len + '/300';

        countEl.className = 'sa-char-count at-limit';

        countEl.className = 'sa-char-count near-limit';
      } else {

    /**
     * Save self-assessment data (rating + note) via RPC.
     */
    function saveSelfAssessment(hexId) {
      if (!currentMap || !currentMap.mapId) return;

      var rating = saSelectedRating;
      var noteEl = document.getElementById('saNote');
      var note = noteEl ? noteEl.value : '';

      if (!rating) {
        showToast('Please select a confidence level first.', 'info');
        return;
      }

      // Collect goal + evidence (v2)
      var goalEl = document.getElementById('saGoal');
      var goal = goalEl ? goalEl.value : '';
      var evidence = collectSaEvidenceData();
      var evidenceJson = JSON.stringify(evidence);

      // Disable save button
      var saveBtn = document.getElementById('saSaveBtn');
      if (saveBtn) saveBtn.disabled = true;

      google.script.run
        .withSuccessHandler(function() {
          // Update local progress data
          if (studentProgressData[hexId]) {
            studentProgressData[hexId].selfAssessRating = rating;
            studentProgressData[hexId].selfAssessNote = note;
            studentProgressData[hexId].selfAssessGoal = goal;
            studentProgressData[hexId].selfAssessEvidence = evidence;

          // Show saved confirmation
          var statusEl = document.getElementById('saSaveStatus');
          if (statusEl) {
            statusEl.className = 'sa-save-status visible';
            setTimeout(function() {
              statusEl.className = 'sa-save-status';
            }, 2000);
          }
          if (saveBtn) saveBtn.disabled = false;
          showToast('Self-assessment saved!', 'success');
        })
        .withFailureHandler(function(err) {
          showToast(friendlyError(err), 'error');
          if (saveBtn) saveBtn.disabled = false;
        })
        .saveSelfAssessment(currentMap.mapId, hexId, rating, note, goal, evidenceJson);
    }

    /**
     * Show prerequisite guidance popup when student clicks a locked hex.
     * Traverses branches backward to find which hexes point to this locked hex.
     */
    function showPrerequisiteGuidance(lockedHex) {
      var prereqs = [];
      var timeGates = [];

      if (currentMap && currentMap.hexes) {
        for (var i = 0; i < currentMap.hexes.length; i++) {
          var hex = currentMap.hexes[i];
          if (!hex.branches) continue;
          for (var j = 0; j < hex.branches.length; j++) {
            var branch = hex.branches[j];
            if (!branch.nextHexIds) continue;
            for (var k = 0; k < branch.nextHexIds.length; k++) {
              if (String(branch.nextHexIds[k]) === String(lockedHex.id)) {
                // Check if this is a time-based branch
                if (branch.condition && branch.condition.type === 'time') {
                  timeGates.push({
                    availableAfter: branch.condition.availableAfter || '',
                    availableBefore: branch.condition.availableBefore || '',
                    label: branch.condition.label || 'Time Gate'
                  });
                } else {
                  var progress = studentProgressData[hex.id];
                  var status = progress ? (progress.status || 'not_started') : 'locked';
                  prereqs.push({
                    id: hex.id,
                    label: hex.label || 'Hex',
                    icon: hex.icon || '',
                    status: status
                  });
                }
                break; // found this hex as prereq, no need to check more branches
              }
            }
          }
        }
      }

      if (prereqs.length === 0 && timeGates.length === 0) {
        showToast('This hex is not yet available.', 'info');
        return;
      }

      // Remove existing popup if any
      closePrereqPopup();

      // Build popup HTML
      var html = '<div class="sng-prereq-title">';
      if (timeGates.length > 0 && prereqs.length === 0) {
        html += '<span>&#9200;</span> Time-locked:';
      } else {
        html += '<span>&#128274;</span> Complete these first:';
      }
      html += '</div>';

      // Show time gate info
      if (timeGates.length > 0) {
        for (var ti = 0; ti < timeGates.length; ti++) {
          var tg = timeGates[ti];
          var timeMsg = '';
          if (tg.availableAfter) timeMsg += 'Available after ' + tg.availableAfter;
          if (tg.availableAfter && tg.availableBefore) timeMsg += ' &middot; ';
          if (tg.availableBefore) timeMsg += 'Available until ' + tg.availableBefore;
          html += '<div style="padding:6px 10px;font-size:13px;color:#e2e8f0;">&#9200; ' + timeMsg + '</div>';
        }
      }
      html += '<button class="sng-prereq-close" onclick="closePrereqPopup()">&times;</button>';
      html += '<ul class="sng-prereq-list">';

      for (var p = 0; p < prereqs.length; p++) {
        var pr = prereqs[p];
        var statusLabel = pr.status === 'locked' ? 'Not Available' :
                          pr.status === 'not_started' ? 'Not Started' :
                          pr.status === 'in_progress' ? 'In Progress' :
                          pr.status === 'completed' ? 'Completed' :
                          pr.status === 'mastered' ? 'Mastered' : pr.status;

        html += '<li class="sng-prereq-item">';
        html += '<span class="sng-prereq-status ' + pr.status + '"></span>';
        html += '<span>' + (pr.icon ? pr.icon + ' ' : '') + escapeHtml(pr.label) + '</span>';
        html += '<span style="margin-left:auto;font-size:11px;opacity:0.7;">' + statusLabel + '</span>';
        html += '</li>';
      }
      html += '</ul>';
      html += '<button class="sng-prereq-dismiss-btn" onclick="closePrereqPopup()">Got it</button>';

      var popup = document.createElement('div');
      popup.id = 'sngPrereqPopup';
      popup.className = 'sng-prereq-popup';
      popup.innerHTML = html;
      document.body.appendChild(popup);

      // Popup persists until student dismisses (no auto-dismiss — EAL students need time to read)
    }

    }

    /**
     * Determine the "best next hex" for the student.
     * Among unlocked hexes with status not_started, prefer core type.
     */
    function getRecommendedHexId() {
      if (!currentMap || !currentMap.hexes) return null;

      var candidates = [];
      for (var i = 0; i < currentMap.hexes.length; i++) {
        var hex = currentMap.hexes[i];
        var progress = studentProgressData[hex.id];
        if (progress && progress.status === 'not_started') {
          candidates.push(hex);
        }
      }

      if (candidates.length === 0) return null;

      // Prefer core type
      for (var j = 0; j < candidates.length; j++) {
        if (candidates[j].type === 'core') {
          return candidates[j].id;
        }
      }

      // Fallback: first not_started
      return candidates[0].id;
    }

    /**
     * Apply pulsing glow and "UP NEXT" badge to the recommended hex.
     */
    function applyRecommendedHexIndicator() {
      // Remove previous indicators
      var oldBadges = document.querySelectorAll('.sng-recommended-badge');
      for (var i = 0; i < oldBadges.length; i++) {
        oldBadges[i].parentNode.removeChild(oldBadges[i]);
      }
      var oldGlows = document.querySelectorAll('.sng-recommended');
      for (var j = 0; j < oldGlows.length; j++) {
        oldGlows[j].classList.remove('sng-recommended');
      }

      var recHexId = getRecommendedHexId();
      if (!recHexId) return;

      var hexEl = document.querySelector('.hex-node[data-hex-id="' + recHexId + '"]');
      if (!hexEl) return;

      hexEl.classList.add('sng-recommended');

      var badge = document.createElement('div');
      badge.className = 'sng-recommended-badge';
      badge.textContent = 'UP NEXT';
      hexEl.appendChild(badge);
    }

    /**
     * Show a rich notification naming the unlocked hexes. Persists 5 seconds.
     */
    function showUnlockNotification(unlockedHexIds, actionStatus) {
      // Remove existing notification
      var existing = document.getElementById('sngUnlockNotification');
      if (existing && existing.parentNode) existing.parentNode.removeChild(existing);

      var actionMsg = actionStatus === 'in_progress' ? 'Started working!' : 'Marked complete!';
      if (actionStatus === 'time_unlock') actionMsg = '';

      // Resolve hex IDs to labels
      var hexNames = [];
      for (var i = 0; i < unlockedHexIds.length; i++) {
        var hex = findHexById(unlockedHexIds[i]);
        if (hex) {
          hexNames.push({ label: hex.label || 'Hex', icon: hex.icon || '' });
        }
      }

      if (hexNames.length === 0) {
        showToast(actionMsg, 'success');
        return;
      }

      // Check if any unlocked hex is a resource type
      var hasResource = false;
      for (var r = 0; r < unlockedHexIds.length; r++) {
        var rHex = findHexById(unlockedHexIds[r]);
        if (rHex && rHex.type === 'resource') { hasResource = true; break; }
      }

      var html = '<div class="sng-unlock-title">';
      if (actionStatus === 'time_unlock') {
        html += '<span>&#9200;</span> New Content Available!';
      } else if (actionStatus === 'choice') {
        html += '<span>&#128275;</span> Path chosen! New activities unlocked!';
      } else {
        html += '<span>&#128275;</span> ' + escapeHtml(actionMsg) + ' New paths unlocked!';
      }
      if (hasResource) {
        html += '<div class="sng-unlock-resource-note">📦 New resource available!</div>';
      }
      html += '</div>';
      html += '<ul class="sng-unlock-hex-list">';
      for (var j = 0; j < hexNames.length; j++) {
        var uHex = findHexById(unlockedHexIds[j]);
        var isRes = uHex && uHex.type === 'resource';
        html += '<li class="sng-unlock-hex-item">';
        html += '<span>' + (isRes ? '📦' : (hexNames[j].icon || '&#11043;')) + '</span>';
        html += '<span>' + escapeHtml(hexNames[j].label) + (isRes ? ' (Resource)' : '') + '</span>';
        html += '</li>';
      }
      html += '</ul>';

      var notif = document.createElement('div');
      notif.id = 'sngUnlockNotification';
      notif.className = 'sng-unlock-notification';
      notif.innerHTML = html;
      document.body.appendChild(notif);

      // Trigger animation
      setTimeout(function() { notif.classList.add('show'); }, 10);

      // Auto-dismiss after 5 seconds
      setTimeout(function() {
        notif.classList.remove('show');
        setTimeout(function() {
          if (notif.parentNode) notif.parentNode.removeChild(notif);
        }, 400);
      }, 5000);
    }

    /**
     * E3-S1: Render 4 domain cards (L/S/R/W) with WIDA levels and strategy checkboxes.
     */
    function sstRenderDomainCards(hexId, progress, hexType) {
      var domains = ['listening', 'speaking', 'reading', 'writing'];
      var recDomains = SST_TYPE_STRATEGY_MAP[hexType || 'core'] || ['reading', 'writing'];
      var strategies = sstProfileData.strategies || [];
      var usedStrategies = (progress && progress.strategiesUsed) ? progress.strategiesUsed : [];

      // Initialize selected strategies for this hex from progress data
      if (!sstSelectedStrategies[hexId]) {
        sstSelectedStrategies[hexId] = usedStrategies.slice(0);
      }

      // Group strategies by domain using keyword matching
      var domainStrategies = { listening: [], speaking: [], reading: [], writing: [] };
      var unmatchedStrategies = [];

      for (var s = 0; s < strategies.length; s++) {
        var strat = strategies[s];
        var stratText = (strat.strategy || '').toLowerCase();
        var matched = false;

        for (var d = 0; d < domains.length; d++) {
          var keywords = SST_DOMAIN_KEYWORDS[domains[d]];
          for (var k = 0; k < keywords.length; k++) {
            if (stratText.indexOf(keywords[k]) !== -1) {
              domainStrategies[domains[d]].push(strat);
              matched = true;
              break;
            }
          }
          if (matched) break;
        }

        if (!matched) {
          unmatchedStrategies.push(strat);
        }
      }

      var html = '<div class="sst-domains-grid">';

      for (var di = 0; di < domains.length; di++) {
        var domain = domains[di];
        var domainLevel = (sstProfileData.widaDomains && sstProfileData.widaDomains[domain]) ? sstProfileData.widaDomains[domain] : 0;
        var dStrategies = domainStrategies[domain];

        // Add unmatched strategies to each domain card so they appear everywhere
        var allForDomain = dStrategies.concat(unmatchedStrategies);
        // Deduplicate by strategy text
        var seen = {};
        var uniqueForDomain = [];
        for (var u = 0; u < allForDomain.length; u++) {
          var sKey = allForDomain[u].strategy || '';
          if (!seen[sKey]) {
            seen[sKey] = true;
            uniqueForDomain.push(allForDomain[u]);
          }
        }

        var isRecommended = recDomains.indexOf(domain) !== -1;
        html += '<div class="sst-domain-card' + (isRecommended ? ' sst-domain-recommended' : '') + '">';
        html += '<div class="sst-domain-header">';
        html += '<span class="sst-domain-icon">' + (SST_DOMAIN_ICONS[domain] || '') + '</span>';
        html += '<span class="sst-domain-label">' + (SST_DOMAIN_LABELS[domain] || domain) + '</span>';
        if (domainLevel > 0) {
          html += '<span class="sst-domain-level">Level ' + domainLevel + '</span>';
        }
        html += '</div>';
        if (isRecommended) {
          html += '<div class="sst-recommended-badge">\u2605 Recommended for this activity</div>';
        }

        if (uniqueForDomain.length > 0) {
          html += '<div class="sst-strategy-list">';
          for (var si = 0; si < uniqueForDomain.length; si++) {
            var stratName = uniqueForDomain[si].strategy || '';
            var isChecked = sstSelectedStrategies[hexId].indexOf(stratName) !== -1;
            var escapedStrat = escapeHtml(stratName).replace(/'/g, "\\'");
            html += '<div class="sst-strategy-item" onclick="sstToggleStrategy(\'' + escapeHtml(hexId) + "', '" + escapedStrat + '\', this)">';
            html += '<div class="sst-strategy-checkbox' + (isChecked ? ' checked' : '') + '"></div>';
            html += '<span class="sst-strategy-text">' + escapeHtml(stratName) + '</span>';
            html += '</div>';
          }
          html += '</div>';
        } else {
          html += '<p class="sst-domain-empty">No specific strategies for this domain</p>';
        }

        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function sstRenderSentenceFrames(bracket) {

        frames = CN_SENTENCE_FRAMES.low || [];

      } else if (bracket === 'high') {
        // High bracket: show first 2 analytical frames as brief reminder
        frames = (CN_SENTENCE_FRAMES.high || []).slice(0, 2);
      } else {
        return '';
      }

      if (frames.length === 0) return '';

      var html = '<div class="sst-frames-section">';

    /**

     * Uses SBAR_QUESTION_CUES from Scripts-Core.html.
     */
    function sstRenderQuestionCues(hex, bracket) {
      if (!bracket) return '';
      if (typeof SBAR_QUESTION_CUES === 'undefined') return '';
      var sbarDomains = (hex.curriculum && hex.curriculum.sbarDomains) ? hex.curriculum.sbarDomains : [];

      var cues = [];
      for (var d = 0; d < sbarDomains.length; d++) {
        var domain = sbarDomains[d];
        var domainCues = SBAR_QUESTION_CUES[domain];
        if (!domainCues) continue;

        if (bracket === 'low') {
          // Show 2 simplest cues per domain
          for (var c = 0; c < domainCues.length && c < 2; c++) { cues.push(domainCues[c]); }
        } else if (bracket === 'mid') {
          // Show all cues per domain
          for (var c2 = 0; c2 < domainCues.length; c2++) { cues.push(domainCues[c2]); }
        } else if (bracket === 'high') {
          // Show 1 cue per domain (brief prompt)
          if (domainCues.length > 0) { cues.push(domainCues[0]); }

      if (cues.length === 0) return '';

      var html = '<div class="sst-cues-section">';
      html += '<div class="sst-cues-header">\u2753 Questions to Guide Your Thinking</div>';

    /**
     * E3-S1: Toggle a strategy checkbox in the student support section.
     */
    function sstToggleStrategy(hexId, strategyText, itemEl) {
      if (!sstSelectedStrategies[hexId]) {
        sstSelectedStrategies[hexId] = [];
      }

      var arr = sstSelectedStrategies[hexId];
      var idx = arr.indexOf(strategyText);
      if (idx !== -1) {
        arr.splice(idx, 1);
      } else {
        arr.push(strategyText);
      }

      // Toggle checkbox visual
      if (itemEl) {
        var checkbox = itemEl.querySelector('.sst-strategy-checkbox');
        if (checkbox) {
          if (idx !== -1) {
            checkbox.className = 'sst-strategy-checkbox';
          } else {
            checkbox.className = 'sst-strategy-checkbox checked';
          }
        }
      }
    }

    /**
     * E3-S1: Save student's self-marked strategies to Progress.
     */
    function sstSaveStrategies(hexId) {
      if (!currentMap || !currentMap.mapId) {
        showToast('Error: No map loaded', 'error');
        return;
      }

      var strategies = sstSelectedStrategies[hexId] || [];
      var btn = document.querySelector('.sst-save-btn');
      var status = document.getElementById('sstSaveStatus');
      if (btn) btn.disabled = true;

      google.script.run
        .withSuccessHandler(function() {
          if (btn) btn.disabled = false;
          if (status) {
            status.textContent = 'Saved \u2713';
            status.className = 'sst-save-status visible';
            setTimeout(function() {
              status.className = 'sst-save-status';
            }, 2500);
          }
          // Update local cache
          if (studentProgressData && studentProgressData[hexId]) {
            studentProgressData[hexId].strategiesUsed = strategies.slice(0);
          }
        })
        .withFailureHandler(function(err) {
          if (btn) btn.disabled = false;
          showToast(friendlyError(err), 'error');
        })
        .saveStrategiesUsed(currentMap.mapId, hexId, strategies);
    }

    /**
     * Render lesson map link info in the teacher hex editor panel.
     * Shows linked map details or create/link options.
     */
    function lsmRenderLinkInfo(hexId) {
      var container = document.getElementById('lessonHexLinkInfo');
      if (!container) return;
      var hex = findHexById(hexId);
      if (!hex) { container.innerHTML = ''; return; }

      if (hex.linkedMapId) {
        // Find the linked map
        var linkedMap = null;
        for (var i = 0; i < mapsData.length; i++) {
          if (String(mapsData[i].mapId) === String(hex.linkedMapId)) {
            linkedMap = mapsData[i];
            break;
          }
        }
        if (linkedMap) {
          var hexCount = linkedMap.hexes ? linkedMap.hexes.length : 0;
          var html = '<div class="lsm-linked-card">';
          html += '<div class="lsm-linked-title">' + escapeHtml(linkedMap.title) + '</div>';
          html += '<div class="lsm-linked-meta">' + hexCount + ' hex' + (hexCount !== 1 ? 'es' : '') + '</div>';
          html += '<div class="lsm-linked-actions">';
          html += '<button class="btn btn-primary btn-small" onclick="lsmOpenLinkedMap(\'' + escapeHtml(hex.linkedMapId) + '\', \'' + escapeHtml(hexId) + '\')">Open Lesson Map</button>';
          html += '<button class="btn btn-outline btn-small" onclick="lsmUnlinkMap(\'' + escapeHtml(hexId) + '\')">Unlink</button>';
          var hasLessonPlan = hex.lessonPlan && hex.lessonPlan.objectives && hex.lessonPlan.objectives.length > 0;
          if (hasLessonPlan) {
            html += '<button class="btn btn-outline btn-small" onclick="exportLessonPlanFromHex(\'' + escapeHtml(hexId) + '\')">\uD83D\uDCC4 Export Lesson Plan</button>';
          }
          html += '</div>';
          html += '</div>';
          container.innerHTML = html;
        } else {
          container.innerHTML = '<div class="lsm-editor-note">Linked map not found (ID: ' + escapeHtml(hex.linkedMapId) + '). <button class="btn btn-ghost btn-small" onclick="lsmUnlinkMap(\'' + escapeHtml(hexId) + '\')">Clear link</button></div>';
        }
      } else {
        // No linked map — show create/link options
        var html = '<div class="lsm-link-options">';
        html += '<button class="btn btn-primary btn-small" onclick="lsmCreateLinkedMap(\'' + escapeHtml(hexId) + '\')" style="width:100%;margin-bottom:8px;">Create Lesson Map</button>';
        html += '<div class="lsm-link-or">or link an existing map:</div>';
        html += '<select class="editor-select lsm-link-select" id="lsmLinkSelect" onchange="lsmLinkExistingMap(\'' + escapeHtml(hexId) + '\', this.value)">';
        html += '<option value="">— Select a map —</option>';
        for (var j = 0; j < mapsData.length; j++) {
          var m = mapsData[j];
          // Don't show the current map or maps already flagged as lesson maps with a parent
          if (String(m.mapId) === String(currentMap.mapId)) continue;
          var meta = m.meta || {};
          if (meta.isLessonMap && meta.parentMapId && String(meta.parentMapId) !== String(currentMap.mapId)) continue;
          html += '<option value="' + escapeHtml(m.mapId) + '">' + escapeHtml(m.title) + '</option>';
        }
        html += '</select>';
        html += '</div>';
        container.innerHTML = html;
      }
    }

    /**
     * Export lesson plan for a hex to a Google Doc.
     */
    function exportLessonPlanFromHex(hexId) {
      if (!hexId) return;
      showToast('Generating lesson plan document\u2026', 'info');
      google.script.run
        .withSuccessHandler(function(url) {
          if (!url) {
            showToast('Export returned no document URL.', 'error');
            return;
          }
          window.open(url, '_blank');
          showToast('Lesson plan exported! Opening Google Doc.', 'success');
        })
        .withFailureHandler(function(err) {
          showToast('Export failed: ' + escapeHtml(err.message), 'error');
        })
        .exportLessonPlanToDoc(hexId);
    }

    /**
     * Create a new lesson map linked to the given hex.
     */
    function lsmCreateLinkedMap(hexId) {
      var hex = findHexById(hexId);
      if (!hex) return;
      var parentMapId = currentMap.mapId;
      var lessonTitle = (hex.label || 'Lesson') + ' — Activities';

      // Build the new map object
      var newMapData = {
        title: lessonTitle,
        courseId: currentMap.courseId || '',
        unitId: currentMap.unitId || '',
        hexesJson: '[]',
        edgesJson: '[]',
        metaJson: JSON.stringify({
          parentMapId: parentMapId,
          parentHexId: hexId,
          isLessonMap: true
        })
      };

      showToast('Creating lesson map...');
      google.script.run
        .withSuccessHandler(function(savedMap) {
          // Update hex with linked map ID
          hex.linkedMapId = savedMap.mapId;
          // Add to local mapsData
          mapsData.push(savedMap);
          // Save the parent map (to persist the linkedMapId change)
          saveCurrentMap();
          // Refresh the editor panel
          lsmRenderLinkInfo(hexId);
          showToast('Lesson map created! Click "Open Lesson Map" to add activities.');
        })
        .withFailureHandler(function(err) {
          showToast(friendlyError(err), 'error');
        })
        .saveMap(newMapData);
    }

    /**
     * Link an existing map to the given lesson hex.
     */
    function lsmLinkExistingMap(hexId, mapId) {
      if (!mapId) return;
      var hex = findHexById(hexId);
      if (!hex) return;

      hex.linkedMapId = mapId;

      // Update the target map's meta to mark it as a lesson map
      var targetMap = null;
      for (var i = 0; i < mapsData.length; i++) {
        if (String(mapsData[i].mapId) === String(mapId)) {
          targetMap = mapsData[i];
          break;
        }
      }
      if (targetMap) {
        if (!targetMap.meta) targetMap.meta = {};
        targetMap.meta.parentMapId = currentMap.mapId;
        targetMap.meta.parentHexId = hexId;
        targetMap.meta.isLessonMap = true;
        // Save the target map meta
        var targetSaveData = {
          mapId: targetMap.mapId,
          title: targetMap.title,
          courseId: targetMap.courseId || '',
          unitId: targetMap.unitId || '',
          metaJson: JSON.stringify(targetMap.meta)
        };
        google.script.run
          .withFailureHandler(function(err) {
            console.error('Failed to update linked map meta:', err);
          })
          .saveMap(targetSaveData);
      }

      // Save parent map
      saveCurrentMap();
      lsmRenderLinkInfo(hexId);
      showToast('Map linked successfully!');
    }

    /**
     * Unlink a lesson map from the given hex.
     */
    function lsmUnlinkMap(hexId) {
      var hex = findHexById(hexId);
      if (!hex) return;

      var oldLinkedId = hex.linkedMapId;
      hex.linkedMapId = '';

      // Clear the target map's lesson meta
      if (oldLinkedId) {
        for (var i = 0; i < mapsData.length; i++) {
          if (String(mapsData[i].mapId) === String(oldLinkedId)) {
            var tm = mapsData[i];
            if (tm.meta) {
              delete tm.meta.parentMapId;
              delete tm.meta.parentHexId;
              delete tm.meta.isLessonMap;
            }
            var unlinkSave = {
              mapId: tm.mapId,
              title: tm.title,
              courseId: tm.courseId || '',
              unitId: tm.unitId || '',
              metaJson: JSON.stringify(tm.meta || {})
            };
            google.script.run
              .withFailureHandler(function(err) {
                console.error('Failed to clear linked map meta:', err);
              })
              .saveMap(unlinkSave);
            break;
          }
        }
      }

      saveCurrentMap();
      lsmRenderLinkInfo(hexId);
      showToast('Map unlinked.');
    }

    /**
     * Navigate to a linked lesson map (teacher mode — opens in builder).
     */
    function lsmOpenLinkedMap(linkedMapId, parentHexId) {
      // Push current location onto navigation stack
      parentMapStack.push({ mapId: currentMap.mapId, hexId: parentHexId });

      // Find and open the linked map
      for (var i = 0; i < mapsData.length; i++) {
        if (String(mapsData[i].mapId) === String(linkedMapId)) {
          openMapInBuilder(mapsData[i]);
          lsmUpdateBackButton();
          return;
        }
      }
      showToast('Linked map not found.', 'error');
      parentMapStack.pop();
    }

    /**
     * Navigate back to the parent map.
     */
    function lsmGoBack() {
      if (parentMapStack.length === 0) return;
      var parent = parentMapStack.pop();

      for (var i = 0; i < mapsData.length; i++) {
        if (String(mapsData[i].mapId) === String(parent.mapId)) {
          openMapInBuilder(mapsData[i]);
          lsmUpdateBackButton();
          return;
        }
      }
      showToast('Parent map not found.', 'error');
    }

    /**
     * Show/hide the "Back to Unit" button based on parentMapStack.
     */
    function lsmUpdateBackButton() {
      var btn = document.getElementById('lsmBackBtn');
      if (!btn) return;
      if (parentMapStack.length > 0) {
        var parentEntry = parentMapStack[parentMapStack.length - 1];
        var parentMap = null;
        for (var i = 0; i < mapsData.length; i++) {
          if (String(mapsData[i].mapId) === String(parentEntry.mapId)) {
            parentMap = mapsData[i];
            break;
          }
        }
        var parentTitle = parentMap ? parentMap.title : 'Parent Map';
        btn.textContent = '\u2190 Back to ' + parentTitle;
        btn.style.display = 'inline-block';
      } else {
        btn.style.display = 'none';
      }
    }

    /**
     * Render lesson overview for students (intercept in openStudentHexPanel).
     */
    function lsmRenderStudentOverview(hex, progress, status, teacherApproved) {
      var bodyHtml = '';

      // Status section
      bodyHtml += '<div class="lsm-overview-status">';
      bodyHtml += renderStudentStatusSection(status, teacherApproved, progress);
      bodyHtml += '</div>';

      // Progress ring from cached lesson progress summary
      var lps = lessonProgressSummary[hex.id];
      if (lps && lps.total > 0) {
        var pct = lps.completionPct || 0;
        var ringColor = pct >= 100 ? '#10b981' : (pct > 0 ? '#3b82f6' : '#cbd5e1');
        var bgColor = '#e2e8f0';
        bodyHtml += '<div class="lsm-overview-progress">';
        bodyHtml += '<div class="lsm-progress-ring" style="background: conic-gradient(' + ringColor + ' ' + pct + '%, ' + bgColor + ' ' + pct + '%)">';
        bodyHtml += '<div class="lsm-progress-ring-inner">';
        bodyHtml += '<span class="lsm-progress-fraction">' + lps.completed + '/' + lps.total + '</span>';
        bodyHtml += '</div>';
        bodyHtml += '</div>';
        bodyHtml += '<div class="lsm-progress-label">activities complete</div>';
        bodyHtml += '</div>';
      } else {
        bodyHtml += '<div class="lsm-overview-progress">';
        bodyHtml += '<div class="lsm-progress-ring" style="background: #e2e8f0">';
        bodyHtml += '<div class="lsm-progress-ring-inner">';
        bodyHtml += '<span class="lsm-progress-fraction">0/0</span>';
        bodyHtml += '</div>';
        bodyHtml += '</div>';
        bodyHtml += '<div class="lsm-progress-label">Enter the lesson to get started</div>';
        bodyHtml += '</div>';
      }

      // Activity list from linked lesson map
      bodyHtml += lsmRenderActivityList(hex.linkedMapId, hex.id);

      // Lesson objectives / description from inline content
      if (hex.inlineContent && hex.inlineContent.body) {
        bodyHtml += '<div class="lsm-overview-section">';
        bodyHtml += '<div class="lsm-overview-section-title">About This Lesson</div>';
        bodyHtml += '<div class="lsm-overview-section-body">' + escapeHtml(hex.inlineContent.body) + '</div>';
        bodyHtml += '</div>';
      }

      // Vocabulary preview
      if (hex.vocabulary && hex.vocabulary.length > 0) {
        bodyHtml += '<div class="lsm-overview-section">';
        bodyHtml += '<div class="lsm-overview-section-title">Key Vocabulary</div>';
        bodyHtml += '<div class="lsm-overview-vocab">';
        for (var v = 0; v < hex.vocabulary.length && v < 5; v++) {
          var term = hex.vocabulary[v];
          bodyHtml += '<span class="lsm-vocab-chip">' + escapeHtml(term.term || term) + '</span>';
        }
        if (hex.vocabulary.length > 5) {
          bodyHtml += '<span class="lsm-vocab-more">+' + (hex.vocabulary.length - 5) + ' more</span>';
        }
        bodyHtml += '</div>';
        bodyHtml += '</div>';
      }

      // Set modal content
      document.getElementById('contentModalBody').innerHTML = bodyHtml;

      // Footer with "Enter Lesson" button
      var footerHtml = '<button class="btn" onclick="closeContentModal()">Close</button>';
      footerHtml += '<button class="btn btn-primary" onclick="lsmEnterLessonMap(\'' + escapeHtml(hex.linkedMapId) + '\', \'' + escapeHtml(hex.id) + '\')">Enter Lesson \u2192</button>';
      document.getElementById('contentModalFooter').innerHTML = footerHtml;

      // Show the modal
      document.getElementById('contentModal').classList.add('active');
      document.querySelector('.content-modal-overlay').classList.add('active');
      var statusEl = document.getElementById('contentModalStatus');
      if (statusEl) statusEl.style.display = 'none';
    }

    /**
     * Render activity list for a linked lesson map.
     * Shows each hex from the lesson map with icon, label, and status dot.
     */
    function lsmRenderActivityList(linkedMapId, parentHexId) {
      // Find lesson map data (from cache or mapsData)
      var lessonMap = lessonMapCache[linkedMapId];
      if (!lessonMap) {
        for (var i = 0; i < mapsData.length; i++) {
          if (String(mapsData[i].mapId) === String(linkedMapId)) {
            lessonMap = mapsData[i];
            break;
          }
        }
      }
      if (!lessonMap || !lessonMap.hexes || lessonMap.hexes.length === 0) {
        return '<div class="lsm-overview-section"><div class="lsm-overview-section-title">Activities</div>' +
          '<div class="lsm-overview-section-body" style="color:#94a3b8;">Activities will appear once you enter the lesson.</div></div>';
      }

      var html = '<div class="lsm-overview-section">';
      html += '<div class="lsm-overview-section-title">Activities (' + lessonMap.hexes.length + ')</div>';
      html += '<div class="lsm-overview-activities">';
      for (var h = 0; h < lessonMap.hexes.length; h++) {
        var act = lessonMap.hexes[h];
        // Look up progress status if available (from studentProgressData for the lesson map)
        var actStatus = 'not_started';
        // Progress for lesson maps is loaded separately; check if we have it cached
        // (not always available from the parent map view, so we show neutral dots by default)
        var dotClass = 'lsm-dot-gray';
        html += '<div class="lsm-activity-item">';
        html += '<span class="lsm-activity-status-dot ' + dotClass + '"></span>';
        html += '<span class="lsm-activity-icon">' + escapeHtml(act.icon || '') + '</span>';
        html += '<span class="lsm-activity-label">' + escapeHtml(act.label || 'Activity') + '</span>';
        html += '</div>';
      }
      html += '</div></div>';
      return html;
    }

    /**
     * Student enters a lesson map from the overview modal.
     */
    function lsmEnterLessonMap(linkedMapId, parentHexId) {
      // Push current context
      parentMapStack.push({ mapId: currentMap.mapId, hexId: parentHexId });
      closeContentModal();

      // Check if map data is cached
      if (lessonMapCache[linkedMapId]) {
        lsmLoadAndRenderLessonMap(lessonMapCache[linkedMapId]);
        return;
      }

      // Find in mapsData (may be skeleton)
      var targetMap = null;
      for (var i = 0; i < mapsData.length; i++) {
        if (String(mapsData[i].mapId) === String(linkedMapId)) {
          targetMap = mapsData[i];
          break;
        }
      }

      if (targetMap && targetMap.hexes && targetMap.hexes.length > 0) {
        // Already have full data
        lessonMapCache[linkedMapId] = targetMap;
        lsmLoadAndRenderLessonMap(targetMap);
      } else {
        // Need to lazy-load from backend
        showToast('Loading lesson...');
        google.script.run
          .withSuccessHandler(function(fullMap) {
            if (!fullMap) {
              showToast('Lesson map not found.', 'error');
              parentMapStack.pop();
              return;
            }
            // Merge into mapsData
            for (var j = 0; j < mapsData.length; j++) {
              if (String(mapsData[j].mapId) === String(fullMap.mapId)) {
                mapsData[j] = fullMap;
                break;
              }
            }
            lessonMapCache[linkedMapId] = fullMap;
            lsmLoadAndRenderLessonMap(fullMap);
          })
          .withFailureHandler(function(err) {
            showToast(friendlyError(err), 'error');
            parentMapStack.pop();
          })
          .getMapById(linkedMapId);
      }
    }

    /**
     * Load a lesson map into the builder and render it.
     */
    function lsmLoadAndRenderLessonMap(mapObj) {
      // Ensure the lesson map is in mapsData so openMapInBuilder can find it
      var found = false;
      for (var mi = 0; mi < mapsData.length; mi++) {
        if (String(mapsData[mi].mapId) === String(mapObj.mapId)) {
          mapsData[mi] = mapObj;
          found = true;
          break;
        }
      }
      if (!found) mapsData.push(mapObj);

      openMapInBuilder(mapObj.mapId);
      lsmUpdateBackButton();
      // Load student progress for the lesson map
      if (currentViewMode === 'student' && typeof loadStudentMapProgress === 'function') {
        loadStudentMapProgress();
      }
    }

    /**
     * Load lesson progress summaries for all lesson hexes in the current unit map.
     * Called after loadStudentMapProgress completes for a non-lesson map.
     * Populates lessonProgressSummary and re-renders the hex grid.
     */
    function lsmLoadProgressSummaries() {
      if (!currentMap || !currentMap.mapId) return;
      // Skip if this IS a lesson map (not a unit map)
      var meta = currentMap.meta || {};
      if (meta.isLessonMap) { lessonProgressSummary = {}; return; }

      // Check if map has any lesson hexes
      var hasLessonHex = false;
      for (var i = 0; i < currentMap.hexes.length; i++) {
        if (currentMap.hexes[i].type === 'lesson' && currentMap.hexes[i].linkedMapId) {
          hasLessonHex = true;
          break;
        }
      }
      if (!hasLessonHex) { lessonProgressSummary = {}; return; }

      var expectedMapId = currentMap.mapId;
      google.script.run
        .withSuccessHandler(function(summaries) {
          if (!currentMap || String(currentMap.mapId) !== String(expectedMapId)) return;
          lessonProgressSummary = summaries || {};
          renderHexGridInternal();
        })
        .withFailureHandler(function(err) {
          if (!currentMap || String(currentMap.mapId) !== String(expectedMapId)) return;
          console.warn('Lesson progress summary error: ' + (err && err.message ? err.message : ''));
          lessonProgressSummary = {};
        })
        .getLessonProgressSummaries(currentMap.mapId);
    }

    /**
     * Auto-generate lesson hexes from existing Lessons data for the current map's unitId.
     * Creates one lesson hex per lesson, with linked lesson maps.
     */
    function lsmAutoGenerateFromUnit() {
      if (!currentMap) { showToast('No map selected.', 'error'); return; }
      var unitId = currentMap.unitId;
      if (!unitId) { showToast('This map is not linked to a unit. Link it in the course editor first.', 'error'); return; }

      // Check if map already has lesson hexes
      var existingLessonHexes = 0;
      for (var e = 0; e < currentMap.hexes.length; e++) {
        if (currentMap.hexes[e].type === 'lesson') existingLessonHexes++;
      }
      if (existingLessonHexes > 0) {
        if (!confirm('This map already has ' + existingLessonHexes + ' lesson hex(es). Continue and add more from unit lessons?')) return;
      }

      showToast('Loading lessons...');
      google.script.run
        .withSuccessHandler(function(lessons) {
          if (!lessons || lessons.length === 0) {
            showToast('No lessons found for this unit. Create lessons in the Courses tab first.', 'error');
            return;
          }

          var lessonIcons = ['📖', '📝', '🔬', '💡', '🎯', '📊', '🗺️', '📐'];
          var startRow = currentMap.hexes.length > 0
            ? currentMap.hexes.reduce(function(max, h) { return Math.max(max, h.row); }, -1) + 1
            : 0;

          var mapsToCreate = [];
          var hexesToAdd = [];

          for (var i = 0; i < lessons.length; i++) {
            var lesson = lessons[i];
            var hexId = 'hex-' + Date.now() + '-' + i;
            var icon = lessonIcons[i % lessonIcons.length];

            var newHex = {
              id: hexId,
              label: lesson.title || ('Lesson ' + (i + 1)),
              icon: icon,
              type: 'lesson',
              row: startRow + i,
              col: 0,
              status: '',
              size: 'default',
              linkUrl: '',
              curriculum: {
                sbarDomains: [],
                standards: [],
                atlSkills: [],
                competencies: [],
                valuesAlignment: [],
                ubdStage: ''
              },
              inlineContent: {
                type: 'text',
                title: lesson.title || '',
                body: lesson.objectives || '',
                showOnClick: true
              },
              assessmentJson: null,
              linkedMapId: '',
              progress: 'not_started'
            };

            hexesToAdd.push(newHex);
            mapsToCreate.push({
              hexId: hexId,
              title: (lesson.title || 'Lesson ' + (i + 1)) + ' — Activities',
              index: i
            });
          }

          // Add hexes to current map
          for (var h = 0; h < hexesToAdd.length; h++) {
            currentMap.hexes.push(hexesToAdd[h]);
          }

          // Create lesson maps for each hex (sequential to avoid race conditions)
          var createIndex = 0;
          function createNextMap() {
            if (createIndex >= mapsToCreate.length) {
              // All done — save parent map and render
              saveCurrentMap();
              renderHexGrid();
              showToast(mapsToCreate.length + ' lesson hex(es) created with linked maps!');
              return;
            }
            var item = mapsToCreate[createIndex];
            var mapData = {
              title: item.title,
              courseId: currentMap.courseId || '',
              unitId: currentMap.unitId || '',
              hexesJson: '[]',
              edgesJson: '[]',
              metaJson: JSON.stringify({
                parentMapId: currentMap.mapId,
                parentHexId: item.hexId,
                isLessonMap: true
              })
            };
            google.script.run
              .withSuccessHandler(function(savedMap) {
                // Link the hex to the new map
                var targetHex = findHexById(item.hexId);
                if (targetHex) targetHex.linkedMapId = savedMap.mapId;
                mapsData.push(savedMap);
                createIndex++;
                createNextMap();
              })
              .withFailureHandler(function(err) {
                console.error('Failed to create lesson map for hex ' + item.hexId + ':', err);
                createIndex++;
                createNextMap();
              })
              .saveMap(mapData);
          }
          createNextMap();
        })
        .withFailureHandler(function(err) {
          showToast(friendlyError(err), 'error');
        })
        .getLessonsForUnit(unitId);
    }

    // ================================================
    // TEACHER LESSON INSIGHTS (lsmt-)
    // ================================================

    function lsmtLoadDashboard() {
      var container = document.getElementById('lessonInsightsContainer');
      if (!container) return;

      if (!progressSelectedClassId || !progressSelectedMapId) {
        container.innerHTML = '<div class="lsmt-empty"><div class="icon">&#128214;</div><p>Select a class and map in Class Progress, then switch to Lesson Insights.</p></div>';
        return;
      }

      // Use cache if already loaded for same class+map
      if (lsmtInitialized && lsmtData) {
        lsmtRenderDashboard(container);
        return;
      }

      container.innerHTML = '<div class="lsmt-loading"><span class="loading-spinner"></span> Loading lesson insights...</div>';

      var expectedClassId = progressSelectedClassId;
      var expectedMapId = progressSelectedMapId;

      google.script.run
        .withSuccessHandler(function(result) {
          if (String(progressSelectedClassId) !== String(expectedClassId)) return;
          if (String(progressSelectedMapId) !== String(expectedMapId)) return;
          lsmtData = result;
          lsmtInitialized = true;
          lsmtExpandedStudents = {};
          var el = document.getElementById('lessonInsightsContainer');
          if (el) lsmtRenderDashboard(el);
        })
        .withFailureHandler(function(err) {
          if (String(progressSelectedClassId) !== String(expectedClassId)) return;
          if (String(progressSelectedMapId) !== String(expectedMapId)) return;
          var el = document.getElementById('lessonInsightsContainer');
          if (el) el.innerHTML = '<div class="lsmt-empty"><p style="color:#dc2626;">Error: ' + escapeHtml(err.message) + '</p></div>';
        })
        .getTeacherLessonInsights(progressSelectedClassId, progressSelectedMapId);
    }

    function lsmtRenderDashboard(container) {
      var data = lsmtData;
      if (!data) return;

      if (!data.hasLessons) {
        container.innerHTML = '<div class="lsmt-empty"><div class="icon">&#128214;</div><p>This map has no lesson hexes. Create lesson-type hexes and link lesson maps to see insights here.</p></div>';
        return;
      }

      var lessons = data.lessons || [];
      var totalStudents = data.totalStudents || 0;

      // Compute overview stats
      var totalActivities = 0;
      var avgCompletionSum = 0;
      for (var i = 0; i < lessons.length; i++) {
        totalActivities += lessons[i].totalActivities;
        avgCompletionSum += lessons[i].classCompletionRate;
      }
      var avgCompletion = lessons.length > 0 ? Math.round(avgCompletionSum / lessons.length) : 0;
      var completionColor = avgCompletion >= 70 ? '#16a34a' : (avgCompletion >= 40 ? '#f59e0b' : '#dc2626');

      var html = '<div class="lsmt-container">';

      // Overview cards
      html += '<div class="lsmt-section-title">Overview</div>';
      html += '<div class="lsmt-overview-cards">';
      html += '<div class="lsmt-card"><div class="lsmt-card-value">' + lessons.length + '</div><div class="lsmt-card-label">Lessons</div></div>';
      html += '<div class="lsmt-card"><div class="lsmt-card-value">' + totalStudents + '</div><div class="lsmt-card-label">Students</div></div>';
      html += '<div class="lsmt-card"><div class="lsmt-card-value" style="color:' + completionColor + ';">' + avgCompletion + '%</div><div class="lsmt-card-label">Avg Completion</div></div>';
      html += '</div>';

      // Per-lesson rows
      html += '<div class="lsmt-section-title">Lesson Breakdown</div>';
      for (var l = 0; l < lessons.length; l++) {
        var lesson = lessons[l];
        var rateColor = lesson.classCompletionRate >= 70 ? '#16a34a' : (lesson.classCompletionRate >= 40 ? '#f59e0b' : '#dc2626');
        var isExpanded = lsmtExpandedStudents[l] === true;

        html += '<div class="lsmt-lesson-row">';
        html += '<div class="lsmt-lesson-header" tabindex="0" role="button" aria-expanded="' + (isExpanded ? 'true' : 'false') + '" onclick="lsmtToggleLesson(' + l + ')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();lsmtToggleLesson(' + l + ');}">';
        html += '<span class="lsmt-lesson-icon">' + escapeHtml(lesson.icon || '\uD83D\uDCD6') + '</span>';
        html += '<span class="lsmt-lesson-label">' + escapeHtml(lesson.label) + '</span>';
        html += '<span class="lsmt-lesson-activities">' + lesson.totalActivities + ' activities</span>';
        html += '<span class="lsmt-lesson-rate" style="color:' + rateColor + ';">' + lesson.classCompletionRate + '%</span>';
        if (lesson.classAvgScore !== null) {
          html += '<span class="lsmt-lesson-score">' + lesson.classAvgScore + '% avg</span>';
        }
        html += '<span class="lsmt-chevron">' + (isExpanded ? '&#9650;' : '&#9660;') + '</span>';
        html += '</div>';

        // Student list (expandable)
        html += '<div class="lsmt-student-list' + (isExpanded ? '' : ' collapsed') + '">';
        var students = lesson.students || [];
        for (var s = 0; s < students.length; s++) {
          var st = students[s];
          var barColor = st.completionPct >= 100 ? '#16a34a' : (st.completionPct > 0 ? '#7c3aed' : '#e2e8f0');
          html += '<div class="lsmt-student-row">';
          html += '<span class="lsmt-student-name">' + escapeHtml(st.name) + '</span>';
          html += '<div class="lsmt-student-bar"><div class="lsmt-student-fill" style="width:' + Math.min(st.completionPct, 100) + '%;background:' + barColor + ';"></div></div>';
          html += '<span class="lsmt-student-fraction">' + st.activitiesCompleted + '/' + st.activitiesTotal + '</span>';
          html += '</div>';
        }
        html += '</div>';
        html += '</div>';
      }

      html += '</div>';
      container.innerHTML = html;
    }

    function lsmtToggleLesson(index) {
      if (lsmtExpandedStudents[index]) {
        lsmtExpandedStudents[index] = false;
      } else {
        lsmtExpandedStudents[index] = true;
      }
      var container = document.getElementById('lessonInsightsContainer');
      if (container) lsmtRenderDashboard(container);
    }

    // ================================================
    // CONVERT TO LESSONS TOOL (lsm-convert-)
    // ================================================

    function lsmStartConvertMode() {
      lsmConvertMode = true;
      lsmConvertSelected = {};

      // Hide convert button, show action bar
      var convertBtn = document.getElementById('lsmConvertBtn');
      if (convertBtn) convertBtn.style.display = 'none';

      // Insert floating action bar into toolbar
      var toolbar = document.getElementById('builderTools');
      if (toolbar) {
        var bar = document.createElement('div');
        bar.className = 'lsm-convert-bar';
        bar.id = 'lsmConvertBar';
        bar.innerHTML = '<span class="lsm-convert-info" id="lsmConvertCount">0 selected</span>' +
          '<button class="btn btn-success btn-small" onclick="lsmFinishConvert()" id="lsmConvertConfirmBtn" disabled>Convert Selected</button>' +
          '<button class="btn btn-ghost btn-small" onclick="lsmCancelConvert()">Cancel</button>';
        toolbar.appendChild(bar);
      }

      renderHexGrid();
    }

    function lsmCancelConvert() {
      lsmConvertMode = false;
      lsmConvertSelected = {};

      // Remove action bar
      var bar = document.getElementById('lsmConvertBar');
      if (bar && bar.parentNode) bar.parentNode.removeChild(bar);

      // Re-show convert button
      var convertBtn = document.getElementById('lsmConvertBtn');
      if (convertBtn && currentViewMode === 'teacher' && currentMap && !(currentMap.meta && currentMap.meta.isLessonMap)) {
        convertBtn.style.display = '';
      }

      renderHexGrid();
    }

    function lsmToggleConvertSelect(hexId) {
      if (!lsmConvertMode) return;
      var hex = findHexById(hexId);
      if (!hex) return;

      // Skip already lesson-type hexes
      if (hex.type === 'lesson') {
        showToast('This hex is already a lesson type.', 'info');
        return;
      }

      // Toggle selection
      if (lsmConvertSelected[hexId]) {
        delete lsmConvertSelected[hexId];
      } else {
        lsmConvertSelected[hexId] = true;
      }

      // Update count text + button state
      var count = Object.keys(lsmConvertSelected).length;
      var countEl = document.getElementById('lsmConvertCount');
      if (countEl) countEl.textContent = count + ' selected';
      var confirmBtn = document.getElementById('lsmConvertConfirmBtn');
      if (confirmBtn) confirmBtn.disabled = count === 0;

      // Toggle visual class on hex element
      var hexEl = document.getElementById('hex-' + hexId);
      if (hexEl) {
        if (lsmConvertSelected[hexId]) {
          hexEl.classList.add('lsm-convert-selected');
        } else {
          hexEl.classList.remove('lsm-convert-selected');
        }
      }
    }

    function lsmFinishConvert() {
      var selectedIds = Object.keys(lsmConvertSelected);
      if (selectedIds.length === 0) return;

      if (!confirm('Convert ' + selectedIds.length + ' hex(es) to lesson type? Each will get a new linked lesson map.')) return;

      showToast('Converting hexes...');
      var convertIndex = 0;
      var convertErrors = 0;

      function convertNextHex() {
        if (convertIndex >= selectedIds.length) {
          // All done
          lsmConvertMode = false;
          lsmConvertSelected = {};

          // Remove action bar
          var bar = document.getElementById('lsmConvertBar');
          if (bar && bar.parentNode) bar.parentNode.removeChild(bar);

          // Re-show convert button
          var convertBtn = document.getElementById('lsmConvertBtn');
          if (convertBtn && currentViewMode === 'teacher') convertBtn.style.display = '';

          hasUnsavedMoves = true;
          saveCurrentMap();
          renderHexGrid();

          var successCount = selectedIds.length - convertErrors;
          showToast(successCount + ' hex(es) converted to lesson type!', convertErrors > 0 ? 'warning' : 'success');
          return;
        }

        var hexId = selectedIds[convertIndex];
        var hex = findHexById(hexId);
        if (!hex) {
          convertIndex++;
          convertNextHex();
          return;
        }

        // Change type to lesson
        hex._originalType = hex.type;
        hex.type = 'lesson';

        // Create linked lesson map
        var mapData = {
          title: (hex.label || 'Hex ' + hexId) + ' \u2014 Activities',
          courseId: currentMap.courseId || '',
          unitId: currentMap.unitId || '',
          hexesJson: '[]',
          edgesJson: '[]',
          metaJson: JSON.stringify({
            parentMapId: currentMap.mapId,
            parentHexId: hexId,
            isLessonMap: true
          })
        };

        google.script.run
          .withSuccessHandler(function(savedMap) {
            hex.linkedMapId = savedMap.mapId;
            mapsData.push(savedMap);
            convertIndex++;
            convertNextHex();
          })
          .withFailureHandler(function(err) {
            console.error('Failed to create lesson map for hex ' + hexId + ':', err);
            convertErrors++;
            convertIndex++;
            convertNextHex();
          })
          .saveMap(mapData);
      }

      convertNextHex();
    }

    function bexSetLogic(logic) {
      if (!selectedConnection) return;
      var hex = findHexById(selectedConnection.hexId);
      var branch = hex && hex.branches ? hex.branches[selectedConnection.branchIndex] : null;
      if (!branch || !branch.condition || branch.condition.type !== 'compound') return;

      branch.condition.logic = logic;
      var andBtn = document.getElementById('bexLogicAnd');
      var orBtn = document.getElementById('bexLogicOr');
      if (andBtn) andBtn.className = 'bex-logic-btn' + (logic === 'and' ? ' active' : '');
      if (orBtn) orBtn.className = 'bex-logic-btn' + (logic === 'or' ? ' active' : '');

      branch.condition.label = bexBuildAutoLabel(branch.condition);
      document.getElementById('editorLabel').value = branch.condition.label;
      renderConnections();
    }

    function bexAddSubCondition() {
      if (!selectedConnection) return;
      var hex = findHexById(selectedConnection.hexId);
      var branch = hex && hex.branches ? hex.branches[selectedConnection.branchIndex] : null;
      if (!branch || !branch.condition) return;

      if (!branch.condition.conditions) branch.condition.conditions = [];
      if (branch.condition.conditions.length >= 5) {
        showToast('Maximum 5 sub-conditions allowed.', 'error');
        return;
      }

      branch.condition.conditions.push({ type: 'always' });
      bexRenderSubConditions(branch.condition);
      branch.condition.label = bexBuildAutoLabel(branch.condition);
      document.getElementById('editorLabel').value = branch.condition.label;
      renderConnections();
    }

    function bexRemoveSubCondition(index) {
      if (!selectedConnection) return;
      var hex = findHexById(selectedConnection.hexId);
      var branch = hex && hex.branches ? hex.branches[selectedConnection.branchIndex] : null;
      if (!branch || !branch.condition || !branch.condition.conditions) return;

      branch.condition.conditions.splice(index, 1);
      bexRenderSubConditions(branch.condition);
      branch.condition.label = bexBuildAutoLabel(branch.condition);
      document.getElementById('editorLabel').value = branch.condition.label;
      renderConnections();
    }

    function bexOnSubConditionChange(index) {
      if (!selectedConnection) return;
      var hex = findHexById(selectedConnection.hexId);
      var branch = hex && hex.branches ? hex.branches[selectedConnection.branchIndex] : null;
      if (!branch || !branch.condition || !branch.condition.conditions) return;

      var card = document.getElementById('bexSubCard_' + index);
      if (!card) return;

      var typeEl = card.querySelector('.bex-sub-type');
      var subType = typeEl ? typeEl.value : 'always';
      var sub = { type: subType };

      if (subType === 'score') {
        var opEl = card.querySelector('.bex-sub-score-op');
        var valEl = card.querySelector('.bex-sub-score-val');
        sub.operator = opEl ? opEl.value : 'gte';
        sub.value = valEl ? (parseInt(valEl.value) || 70) : 70;
      } else if (subType === 'status') {
        var statEl = card.querySelector('.bex-sub-status-val');
        sub.value = statEl ? statEl.value : 'completed';
      } else if (subType === 'time') {
        var aEl = card.querySelector('.bex-sub-time-after');
        var bEl = card.querySelector('.bex-sub-time-before');
        if (aEl && aEl.value) sub.availableAfter = aEl.value;
        if (bEl && bEl.value) sub.availableBefore = bEl.value;
      }

      branch.condition.conditions[index] = sub;
      branch.condition.label = bexBuildAutoLabel(branch.condition);
      document.getElementById('editorLabel').value = branch.condition.label;
      renderConnections();
    }

    function bexRenderSubConditions(condition) {
      var container = document.getElementById('bexSubConditions');
      if (!container) return;

      var subs = (condition && condition.conditions) ? condition.conditions : [];
      var logic = (condition && condition.logic) ? condition.logic : 'and';

      // Update logic toggle buttons
      var andBtn = document.getElementById('bexLogicAnd');
      var orBtn = document.getElementById('bexLogicOr');
      if (andBtn) andBtn.className = 'bex-logic-btn' + (logic === 'and' ? ' active' : '');
      if (orBtn) orBtn.className = 'bex-logic-btn' + (logic === 'or' ? ' active' : '');

      var html = '';
      for (var i = 0; i < subs.length; i++) {
        html += bexRenderSubConditionCard(i, subs[i]);
      }
      container.innerHTML = html;
    }

    function bexRenderSubConditionCard(index, sub) {
      var html = '<div class="bex-sub-card" id="bexSubCard_' + index + '">';
      html += '<div class="bex-sub-card-header">';
      html += '<select class="bex-sub-type" onchange="bexOnSubConditionChange(' + index + ')">';
      var types = [
        { v: 'always', l: 'Always' }, { v: 'score', l: 'Score' }, { v: 'status', l: 'Status' },
        { v: 'teacher_approval', l: 'Approval' }, { v: 'time', l: 'Time' }
      ];
      for (var t = 0; t < types.length; t++) {
        html += '<option value="' + types[t].v + '"' + (sub.type === types[t].v ? ' selected' : '') + '>' + types[t].l + '</option>';
      }
      html += '</select>';
      html += '<button class="bex-sub-remove" onclick="bexRemoveSubCondition(' + index + ')" title="Remove">&times;</button>';
      html += '</div>';

      // Type-specific fields
      if (sub.type === 'score') {
        html += '<div class="bex-sub-fields">';
        html += '<select class="bex-sub-score-op" onchange="bexOnSubConditionChange(' + index + ')">';
        var ops = [{ v: 'gte', l: '\u2265' }, { v: 'lte', l: '\u2264' }, { v: 'gt', l: '>' }, { v: 'lt', l: '<' }];
        for (var o = 0; o < ops.length; o++) {
          html += '<option value="' + ops[o].v + '"' + ((sub.operator || 'gte') === ops[o].v ? ' selected' : '') + '>' + ops[o].l + '</option>';
        }
        html += '</select>';
        html += '<input type="number" class="bex-sub-score-val" min="0" max="100" value="' + (sub.value !== undefined ? sub.value : 70) + '" onchange="bexOnSubConditionChange(' + index + ')">%';
        html += '</div>';
      } else if (sub.type === 'status') {
        html += '<div class="bex-sub-fields">';
        html += '<select class="bex-sub-status-val" onchange="bexOnSubConditionChange(' + index + ')">';
        var statuses = [{ v: 'completed', l: 'Completed' }, { v: 'mastered', l: 'Mastered' }, { v: 'in_progress', l: 'In Progress' }];
        for (var s = 0; s < statuses.length; s++) {
          html += '<option value="' + statuses[s].v + '"' + ((sub.value || 'completed') === statuses[s].v ? ' selected' : '') + '>' + statuses[s].l + '</option>';
        }
        html += '</select>';
        html += '</div>';
      } else if (sub.type === 'time') {
        html += '<div class="bex-sub-fields">';
        html += '<label style="font-size:12px;color:#64748b;">After</label>';
        html += '<input type="date" class="bex-sub-time-after" value="' + (sub.availableAfter || '') + '" onchange="bexOnSubConditionChange(' + index + ')">';
        html += '<label style="font-size:12px;color:#64748b;">Before</label>';
        html += '<input type="date" class="bex-sub-time-before" value="' + (sub.availableBefore || '') + '" onchange="bexOnSubConditionChange(' + index + ')">';
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function bexBuildAutoLabel(condition) {
      if (!condition || !condition.conditions || condition.conditions.length === 0) return 'Multi-Gate';
      var logic = (condition.logic || 'and').toUpperCase();
      var parts = [];
      var subLabels = {
        always: 'Always', score: 'Score', status: 'Status',
        teacher_approval: 'Approved', time: 'Time', assessment: 'Assessment'
      };
      for (var i = 0; i < condition.conditions.length; i++) {
        var sub = condition.conditions[i];
        var lbl = subLabels[sub.type] || sub.type;
        if (sub.type === 'score' && sub.value !== undefined) {
          var opSymbol = { gte: '\u2265', lte: '\u2264', gt: '>', lt: '<' }[sub.operator || 'gte'] || '\u2265';
          lbl = opSymbol + sub.value + '%';
        } else if (sub.type === 'status' && sub.value) {
          lbl = sub.value.charAt(0).toUpperCase() + sub.value.slice(1);
        }
        parts.push(lbl);
      }
      var result = parts.join(' ' + logic + ' ');
      return result.length > 30 ? result.substring(0, 27) + '...' : result;
    }

    function bexCheckAndShowChoiceModal(hexId) {
      if (!currentMap || !currentMap.hexes) return;
      var hex = findHexById(hexId);
      if (!hex || !hex.branches) return;

      // Collect choice branches
      var choiceBranches = [];
      for (var i = 0; i < hex.branches.length; i++) {
        var b = hex.branches[i];
        if (b.condition && b.condition.type === 'choice') {
          choiceBranches.push(b);
        }
      }
      if (choiceBranches.length === 0) return;

      // Check if student already chose for this hex
      var mapId = currentMap.mapId;
      if (bexStudentChoices[hexId]) return; // already chosen (cached)

      // RPC to check
      google.script.run
        .withSuccessHandler(function(choices) {
          var alreadyChosen = false;
          for (var c = 0; c < choices.length; c++) {
            if (String(choices[c].hexId) === String(hexId)) {
              bexStudentChoices[hexId] = choices[c].branchId;
              alreadyChosen = true;
              break;
            }
          }
          if (!alreadyChosen) {
            bexShowChoiceModal(hexId, choiceBranches);
          }
        })
        .withFailureHandler(function(err) {
          console.warn('Failed to check student choices:', err);
        })
        .getStudentChoices(mapId);
    }

    function bexShowChoiceModal(hexId, choiceBranches) {

      var html = '<div class="bex-choice-subtitle">Select how you want to continue:</div>';
      html += '<div class="bex-choice-cards">';

      for (var i = 0; i < choiceBranches.length; i++) {
        var branch = choiceBranches[i];
        var choiceLabel = (branch.condition && branch.condition.choiceLabel) || 'Option ' + (i + 1);

    function bexSubmitChoice(hexId, branchId) {

    /**
     * phmToggleOverlay — Toggle heatmap mode on/off
     */
    function phmToggleOverlay() {
      if (phmOverlayActive) {
        // Deactivate
        phmOverlayActive = false;
        phmHexStats = null;
        var btn = document.getElementById('phmToggleBtn');
        if (btn) btn.classList.remove('phm-active-indicator');

        closeHexEditorPanel();

      }
