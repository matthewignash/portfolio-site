    /**
     * phmLoadDashboardData — Load teacher dashboard data for heatmap
     * Reuses progressDashboardData if available, otherwise makes RPC
     */
    function phmLoadDashboardData() {
      // Try to reuse existing progress data
      if (typeof progressDashboardData !== 'undefined' && progressDashboardData &&
          progressDashboardData.students && progressDashboardData.students.length > 0) {
        phmDashboardData = progressDashboardData;
        phmComputeHexStats();
        renderHexGrid();
        return;
      }

      // Need class selected
      if (!progressSelectedClassId || !currentMap || !currentMap.mapId) {
        showToast('Select a class in Progress tab first', 'error');
        phmOverlayActive = false;
        var btn = document.getElementById('phmToggleBtn');
        if (btn) btn.classList.remove('phm-active-indicator');
        return;
      }

      showToast('Loading class progress...', 'info');
      var expectedMapId = currentMap.mapId;

      google.script.run
        .withSuccessHandler(function(data) {
          if (!currentMap || currentMap.mapId !== expectedMapId || !phmOverlayActive) return;
          phmDashboardData = data;
          phmComputeHexStats();
          renderHexGrid();
        })
        .withFailureHandler(function(err) {
          showToast('Failed to load progress: ' + escapeHtml(err.message), 'error');
          phmOverlayActive = false;
          var btn = document.getElementById('phmToggleBtn');
          if (btn) btn.classList.remove('phm-active-indicator');
        })
        .getTeacherDashboardData(progressSelectedClassId, currentMap.mapId);
    }

    /**
     * phmComputeHexStats — Aggregate per-hex status counts from dashboard data
     */
    function phmComputeHexStats() {
      phmHexStats = {};
      if (!phmDashboardData || !phmDashboardData.students) return;

      var students = phmDashboardData.students;
      // Initialize stats for all hexes in the map
      if (currentMap && currentMap.hexes) {
        for (var h = 0; h < currentMap.hexes.length; h++) {
          var hid = String(currentMap.hexes[h].id);
          phmHexStats[hid] = { total: 0, completed: 0, mastered: 0, inProgress: 0, notStarted: 0, pending: 0, avgScore: 0, scoreSum: 0, scoreCount: 0 };
        }
      }

      for (var s = 0; s < students.length; s++) {
        var stu = students[s];
        var hp = stu.hexProgress || {};
        for (var hexId in phmHexStats) {
          if (!phmHexStats.hasOwnProperty(hexId)) continue;
          var stat = phmHexStats[hexId];
          stat.total++;
          var prog = hp[hexId];
          if (!prog) {
            stat.notStarted++;
          } else {
            var st = prog.status || 'not_started';
            if (st === 'mastered') { stat.mastered++; stat.completed++; }
            else if (st === 'completed') { stat.completed++; }
            else if (st === 'in_progress') { stat.inProgress++; }
            else { stat.notStarted++; }
            // Count pending approvals
            if ((st === 'completed' || st === 'mastered') && !prog.teacherApproved) {
              stat.pending++;
            }
            // Score aggregation
            if (prog.score !== null && prog.score !== undefined && prog.maxScore > 0) {
              stat.scoreSum += (prog.score / prog.maxScore) * 100;
              stat.scoreCount++;
            }
          }
        }
      }

      // Compute averages
      for (var hid2 in phmHexStats) {
        if (!phmHexStats.hasOwnProperty(hid2)) continue;
        var s2 = phmHexStats[hid2];
        s2.avgScore = s2.scoreCount > 0 ? Math.round(s2.scoreSum / s2.scoreCount) : null;
        s2.completionPct = s2.total > 0 ? Math.round((s2.completed / s2.total) * 100) : 0;
      }
    }

    /**
     * phmGetHeatColor — Return fill+stroke for a hex based on completion %
     */
    function phmGetHeatColor(hexId) {
      var stat = phmHexStats ? phmHexStats[String(hexId)] : null;
      var pct = stat ? stat.completionPct : 0;
      for (var i = PHM_HEAT_COLORS.length - 1; i >= 0; i--) {
        if (pct >= PHM_HEAT_COLORS[i].min) {
          return PHM_HEAT_COLORS[i];
        }
      }
      return PHM_HEAT_COLORS[0];
    }

    /**
     * phmRenderHexPanel — Show per-student progress in the editor panel
     */
    function phmRenderHexPanel(hexId) {
      var hex = findHexById(hexId);
      if (!hex) return;
      var stat = phmHexStats ? phmHexStats[String(hexId)] : null;
      if (!stat) return;

      // Highlight selected hex
      selectedHexId = hexId;
      renderHexGrid();

      var panel = document.getElementById('editorPanel');
      if (!panel) return;
      panel.classList.add('open');
      var body = document.getElementById('editorBody');
      if (!body) return;

      var html = '<div class="phm-hex-panel">';
      html += '<div class="phm-hex-panel-title">' + escapeHtml(hex.icon || '⬡') + ' ' + escapeHtml(hex.label) + '</div>';

      // Legend
      html += '<div class="phm-legend">';
      for (var l = 0; l < PHM_HEAT_COLORS.length; l++) {
        var lbl = '';
        if (l === 0) lbl = '0%';
        else if (l === 1) lbl = '1-25%';
        else if (l === 2) lbl = '26-50%';
        else if (l === 3) lbl = '51-75%';
        else lbl = '76-100%';
        html += '<span class="phm-legend-item"><span class="phm-legend-swatch" style="background:' + PHM_HEAT_COLORS[l].fill + ';border-color:' + PHM_HEAT_COLORS[l].stroke + ';"></span>' + lbl + '</span>';
      }
      html += '</div>';

      // Completion bar
      var pct = stat.completionPct;
      html += '<div class="phm-completion-bar"><div class="phm-completion-fill" style="width:' + pct + '%;"></div></div>';
      html += '<div style="font-size:12px;color:#64748b;margin-bottom:8px;">' + stat.completed + '/' + stat.total + ' completed (' + pct + '%)';
      if (stat.avgScore !== null) html += ' &middot; Avg score: ' + stat.avgScore + '%';
      if (stat.pending > 0) html += ' &middot; <span style="color:#f59e0b;font-weight:600;">' + stat.pending + ' pending</span>';
      html += '</div>';

      // Student list — sorted: pending first, then by status
      var students = phmDashboardData ? phmDashboardData.students : [];
      var rows = [];
      for (var s = 0; s < students.length; s++) {
        var stu = students[s];
        var prog = (stu.hexProgress || {})[String(hexId)];
        var status = prog ? (prog.status || 'not_started') : 'not_started';
        var isPending = (status === 'completed' || status === 'mastered') && prog && !prog.teacherApproved;
        var score = (prog && prog.score !== null && prog.score !== undefined && prog.maxScore > 0) ? Math.round((prog.score / prog.maxScore) * 100) : null;
        rows.push({ name: stu.name || stu.email, email: stu.email, status: status, isPending: isPending, score: score });
      }
      // Sort: pending first, then in_progress, then completed, then not_started
      var statusOrder = { completed: 1, mastered: 1, in_progress: 2, not_started: 3 };
      rows.sort(function(a, b) {
        if (a.isPending && !b.isPending) return -1;
        if (!a.isPending && b.isPending) return 1;
        return (statusOrder[a.status] || 3) - (statusOrder[b.status] || 3);
      });

      // Pending section
      var pendingRows = [];
      var otherRows = [];
      for (var r = 0; r < rows.length; r++) {
        if (rows[r].isPending) pendingRows.push(rows[r]);
        else otherRows.push(rows[r]);
      }

      if (pendingRows.length > 0) {
        html += '<div class="phm-section-label">Pending Approval (' + pendingRows.length + ')</div>';
        for (var p = 0; p < pendingRows.length; p++) {
          html += phmRenderStudentRow(pendingRows[p], hexId, true);
        }
      }

      html += '<div class="phm-section-label">All Students</div>';
      for (var o = 0; o < otherRows.length; o++) {
        html += phmRenderStudentRow(otherRows[o], hexId, false);
      }

      html += '</div>';
      body.innerHTML = html;
      document.getElementById('editorTitle').textContent = 'Progress Heatmap';
    }

    function phmRenderStudentRow(row, hexId, showActions) {
      var dotClass = row.isPending ? 'completed_pending' : row.status;
      var safeHexId = escapeHtml(String(hexId));
      var safeEmail = escapeHtml(row.email);
      var feedbackId = 'phmFeedback_' + String(hexId) + '_' + row.email.replace(/[^a-zA-Z0-9]/g, '_');
      var html = '<div class="phm-student-row-wrap">';
      html += '<div class="phm-student-row">';
      html += '<span class="phm-status-dot ' + dotClass + '"></span>';
      html += '<span class="phm-student-name">' + escapeHtml(row.name) + '</span>';
      if (row.score !== null) {
        html += '<span class="phm-student-score">' + row.score + '%</span>';
      }
      if (showActions) {
        html += '<span class="phm-student-actions">';
        html += '<button class="phm-action-btn approve" onclick="phmApproveFromPanel(\'' + safeHexId + '\',\'' + safeEmail + '\')">✓</button>';
        html += '<button class="phm-action-btn revise" onclick="phmShowFeedback(\'' + feedbackId + '\')">↩</button>';
        html += '</span>';
      }
      html += '</div>';
      if (showActions) {
        html += '<div class="phm-feedback-area" id="' + feedbackId + '" style="display:none;">';
        html += '<textarea class="phm-feedback-input" placeholder="Feedback for student (optional)" maxlength="1000"></textarea>';
        html += '<div class="phm-feedback-actions">';
        html += '<button class="phm-action-btn approve" onclick="phmSendRevision(\'' + safeHexId + '\',\'' + safeEmail + '\',\'' + feedbackId + '\')">Send</button>';
        html += '<button class="phm-action-btn" onclick="phmHideFeedback(\'' + feedbackId + '\')">Cancel</button>';
        html += '</div>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    /**
     * phmShowFeedback — Toggle inline feedback textarea for revision
     */
    function phmShowFeedback(feedbackId) {
      var el = document.getElementById(feedbackId);
      if (el) {
        el.style.display = 'block';
        var ta = el.querySelector('textarea');
        if (ta) ta.focus();
      }
    }

    function phmHideFeedback(feedbackId) {
      var el = document.getElementById(feedbackId);
      if (el) {
        el.style.display = 'none';
        var ta = el.querySelector('textarea');
        if (ta) ta.value = '';
      }
    }

    /**
     * phmSendRevision — Submit revision request with inline feedback
     */
    function phmSendRevision(hexId, studentEmail, feedbackId) {
      var el = document.getElementById(feedbackId);
      var feedback = '';
      if (el) {
        var ta = el.querySelector('textarea');
        if (ta) feedback = (ta.value || '').substring(0, 1000);
      }
      phmReviseFromPanel(hexId, studentEmail, feedback);
    }

    /**
     * phmApproveFromPanel — Quick approve from heatmap panel
     */
    function phmApproveFromPanel(hexId, studentEmail) {
      if (!currentMap || !currentMap.mapId) return;
      var expectedMapId = currentMap.mapId;
      google.script.run
        .withSuccessHandler(function() {
          if (!phmOverlayActive || !currentMap || currentMap.mapId !== expectedMapId) return;
          showToast('Approved', 'success');
          // Update local dashboard data
          if (phmDashboardData && phmDashboardData.students) {
            for (var i = 0; i < phmDashboardData.students.length; i++) {
              var hp = phmDashboardData.students[i].hexProgress || {};
              if (phmDashboardData.students[i].email === studentEmail && hp[String(hexId)]) {
                hp[String(hexId)].teacherApproved = true;
              }
            }
          }
          phmComputeHexStats();
          phmRenderHexPanel(hexId);
          if (typeof grvFireAutoProgress === 'function') {
            grvFireAutoProgress(expectedMapId, hexId, studentEmail);
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error: ' + escapeHtml(err.message), 'error');
        })
        .approveSubmission(currentMap.mapId, hexId, studentEmail);
    }

    /**
     * phmReviseFromPanel — Request revision from heatmap panel
     */
    function phmReviseFromPanel(hexId, studentEmail, feedback) {
      if (!currentMap || !currentMap.mapId) return;
      var expectedMapId = currentMap.mapId;
      feedback = (feedback || '').substring(0, 1000);

      google.script.run
        .withSuccessHandler(function() {
          if (!phmOverlayActive || !currentMap || currentMap.mapId !== expectedMapId) return;
          showToast('Revision requested', 'success');
          // Update local dashboard data
          if (phmDashboardData && phmDashboardData.students) {
            for (var i = 0; i < phmDashboardData.students.length; i++) {
              var hp = phmDashboardData.students[i].hexProgress || {};
              if (phmDashboardData.students[i].email === studentEmail && hp[String(hexId)]) {
                hp[String(hexId)].status = 'in_progress';
                hp[String(hexId)].teacherApproved = false;
              }
            }
          }
          phmComputeHexStats();
          phmRenderHexPanel(hexId);
        })
        .withFailureHandler(function(err) {
          showToast('Error: ' + escapeHtml(err.message), 'error');
        })
        .requestRevision(currentMap.mapId, hexId, studentEmail, feedback);
    }
</script>
