<style>
/* ================================================
   STANDARDS ALIGNMENT STYLES (sal- prefix)
   ================================================ */

/* Hex badge (small pill on hex cards, teacher mode) */
.sal-hex-badge {
  background: #ede9fe;
  color: #6d28d9;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  gap: 2px;
  cursor: pointer;
}
.sal-hex-badge:hover { background: #ddd6fe; }

/* Strength dots (colored circle indicators) */
.sal-strength-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  background: #94a3b8;
}
.sal-strength-dot.introduced { background: #94a3b8; }
.sal-strength-dot.practiced { background: #3b82f6; }
.sal-strength-dot.mastered { background: #10b981; }

/* Strength legend (small bar above tags) */
.sal-strength-legend {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 0 10px 0;
  font-size: 11px;
  color: #64748b;
  border-bottom: 1px solid #f1f5f9;
  margin-bottom: 8px;
}
.sal-strength-legend .sal-strength-dot {
  margin-right: 3px;
  vertical-align: middle;
}

/* Enhanced tag row (standard tag with strength + notes) */
.sal-tag-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 8px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 12px;
  transition: border-color 0.15s;
}
.sal-tag-row:hover { border-color: #cbd5e1; }

.sal-tag-code {
  font-weight: 700;
  color: #334155;
  white-space: nowrap;
  min-width: 60px;
}

.sal-tag-desc {
  flex: 1;
  color: #64748b;
  font-size: 11px;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Strength select (tiny inline dropdown) */
.sal-strength-select {
  font-size: 11px;
  padding: 1px 4px;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  background: white;
  color: #475569;
  cursor: pointer;
  min-width: 90px;
}
.sal-strength-select:focus { border-color: #3b82f6; outline: none; }

/* Notes inline (expandable notes field) */
.sal-notes-toggle {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  padding: 2px;
  color: #94a3b8;
  line-height: 1;
  flex-shrink: 0;
}
.sal-notes-toggle:hover { color: #3b82f6; }
.sal-notes-toggle.has-notes { color: #3b82f6; }

.sal-notes-inline {
  display: none;
  margin-top: 4px;
  padding-top: 4px;
  border-top: 1px solid #f1f5f9;
}
.sal-notes-inline.visible { display: block; }

.sal-notes-input {
  width: 100%;
  font-size: 11px;
  padding: 4px 8px;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  resize: vertical;
  min-height: 28px;
  font-family: inherit;
  color: #334155;
}
.sal-notes-input:focus { border-color: #3b82f6; outline: none; }

/* Tag remove button */
.sal-tag-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: #94a3b8;
  font-size: 14px;
  padding: 0 2px;
  line-height: 1;
  flex-shrink: 0;
}
.sal-tag-remove:hover { color: #ef4444; }

/* Coverage drilldown (expandable hex list under covered item) */
.sal-coverage-item {
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  transition: background 0.15s;
}
.sal-coverage-item:hover { background: #f1f5f9; }

.sal-drilldown {
  display: none;
  margin: 4px 0 8px 16px;
  padding: 8px 12px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 12px;
}
.sal-drilldown.visible { display: block; }

.sal-drilldown-hex {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  color: #475569;
}
.sal-drilldown-hex-title {
  font-weight: 600;
  color: #334155;
}

/* Gap action button ("Link to hex") */
.sal-gap-link-btn {
  font-size: 11px;
  padding: 2px 10px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
}
.sal-gap-link-btn:hover { background: #5568d3; }

/* Uncovered hexes section */
.sal-uncovered-section {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 2px solid #e2e8f0;
}

.sal-uncovered-title {
  font-size: 14px;
  font-weight: 600;
  color: #475569;
  margin-bottom: 8px;
}

.sal-uncovered-hex {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 6px;
  margin-bottom: 4px;
  font-size: 12px;
  color: #991b1b;
}

/* Bulk panel */
.sal-bulk-panel {
  display: none;
  margin-top: 16px;
  padding: 16px;
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
}
.sal-bulk-panel.visible { display: block; }

.sal-bulk-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
  border-bottom: 2px solid #e2e8f0;
  padding-bottom: 8px;
}

.sal-bulk-tab {
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  background: #f1f5f9;
  border: none;
  border-radius: 6px 6px 0 0;
  cursor: pointer;
  color: #64748b;
}
.sal-bulk-tab.active { background: #667eea; color: white; }
.sal-bulk-tab:hover:not(.active) { background: #e2e8f0; }

.sal-bulk-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #f1f5f9;
}

.sal-bulk-result {
  font-size: 12px;
  color: #10b981;
  font-weight: 600;
}

/* Checkbox list (scrollable checkbox list for bulk ops) */
.sal-checkbox-list {
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 4px;
}

.sal-checkbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 4px;
  font-size: 12px;
  color: #334155;
  cursor: pointer;
}
.sal-checkbox-item:hover { background: #f1f5f9; }

.sal-checkbox-item input[type="checkbox"] {
  flex-shrink: 0;
}

.sal-checkbox-item-code {
  font-weight: 600;
  min-width: 80px;
}

.sal-checkbox-item-desc {
  color: #64748b;
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Lesson standards picker (in lesson editor modal) */
.sal-lesson-picker {
  padding: 8px 0;
}

.sal-lesson-search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.sal-lesson-search-row .form-input {
  flex: 1;
}

.sal-lesson-results {
  max-height: 150px;
  overflow-y: auto;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  margin-bottom: 8px;
  display: none;
}
.sal-lesson-results.visible { display: block; }

.sal-lesson-result-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid #f1f5f9;
}
.sal-lesson-result-item:last-child { border-bottom: none; }
.sal-lesson-result-item:hover { background: #f1f5f9; }

.sal-lesson-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.sal-lesson-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: #ede9fe;
  color: #5b21b6;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}

.sal-lesson-tag-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: #7c3aed;
  font-size: 12px;
  padding: 0;
  line-height: 1;
}
.sal-lesson-tag-remove:hover { color: #ef4444; }

/* Gap hex picker (inline dropdown for linking gaps) */
.sal-gap-hex-picker {
  display: none;
  margin-top: 4px;
  padding: 8px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
}
.sal-gap-hex-picker.visible { display: block; }

.sal-gap-hex-picker select {
  font-size: 12px;
  padding: 4px 8px;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  margin-right: 8px;
}

/* Standards Scope Indicator */
.std-scope-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  margin-bottom: 6px;
  background: #f5f3ff;
  border: 1px solid #ddd6fe;
  border-radius: 4px;
  font-size: 12px;
}
.std-scope-label {
  color: #7c3aed;
  font-weight: 500;
}
.std-scope-toggle {
  color: #6366f1;
  font-size: 12px;
  text-decoration: none;
  cursor: pointer;
}
.std-scope-toggle:hover {
  text-decoration: underline;
}
</style>
