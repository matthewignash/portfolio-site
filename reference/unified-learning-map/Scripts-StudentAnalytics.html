<script>
    // ================================================
    // STUDENT PROGRESS ANALYTICS (ES5)
    // 8 functions for overview cards, detail panel,
    // completion ring, SBAR bars, hex list
    // ================================================

    console.log('=== Scripts-StudentAnalytics.html loaded ===');

    /**
     * Returns bracket-appropriate rating labels for confidence distribution.
     * Reuses SA_BRACKET_CONFIG from Scripts-MapBuilder.html if available.
     */
    function spaGetRatingLabels() {
      var bracket = (typeof getWidaBracket === 'function') ? getWidaBracket() : null;
      if (bracket && typeof SA_BRACKET_CONFIG !== 'undefined' && SA_BRACKET_CONFIG[bracket]) {
        return SA_BRACKET_CONFIG[bracket].labels;
      }
      return ['Beginning', 'Developing', 'Proficient', 'Extending'];
    }

    // ------------------------------------------------
    // 1. renderStudentOverviewCards(maps)
    //    3 summary cards at top of student progress view
    // ------------------------------------------------
    function renderStudentOverviewCards(maps) {
      if (!maps || maps.length === 0) return '';

      var totalMaps = maps.length;
      var totalCompletion = 0;
      var totalScore = 0;
      var scoredCount = 0;

      for (var i = 0; i < maps.length; i++) {
        totalCompletion += (maps[i].percentComplete || 0);
        if (maps[i].averageScore !== null && maps[i].averageScore !== undefined) {
          totalScore += maps[i].averageScore;
          scoredCount++;
        }
      }

      var avgCompletion = Math.round(totalCompletion / totalMaps);
      var avgScore = scoredCount > 0 ? Math.round(totalScore / scoredCount) : null;

      // Compute average confidence across all maps (v2)
      var totalRating = 0;
      var ratedMapCount = 0;
      for (var j = 0; j < maps.length; j++) {
        if (maps[j].selfAssessStats && maps[j].selfAssessStats.avgRating !== null) {
          totalRating += maps[j].selfAssessStats.avgRating;
          ratedMapCount++;
        }
      }
      var avgConfidence = ratedMapCount > 0 ? (totalRating / ratedMapCount).toFixed(1) : null;

      var html = '<div class="spa-overview-cards">';

      html += '<div class="spa-overview-card">';
      html += '<div class="spa-overview-value">' + totalMaps + '</div>';
      html += '<div class="spa-overview-label">Total Maps</div>';
      html += '</div>';

      html += '<div class="spa-overview-card">';
      html += '<div class="spa-overview-value">' + avgCompletion + '%</div>';
      html += '<div class="spa-overview-label">Overall Completion</div>';
      html += '</div>';

      html += '<div class="spa-overview-card">';
      html += '<div class="spa-overview-value">' + (avgScore !== null ? avgScore + '%' : '\u2014') + '</div>';
      html += '<div class="spa-overview-label">Overall Score</div>';
      html += '</div>';

      html += '<div class="spa-overview-card">';
      html += '<div class="spa-overview-value">' + (avgConfidence !== null ? avgConfidence + '/4' : '\u2014') + '</div>';
      html += '<div class="spa-overview-label">Avg Confidence</div>';
      html += '</div>';

      // Badges earned card (from celebrations)
      if (celData && celData.badges) {
        html += '<div class="spa-overview-card">';
        html += '<div class="spa-overview-value">' + celData.badges.length + '</div>';
        html += '<div class="spa-overview-label">Badges Earned</div>';
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    // ------------------------------------------------
    // 2. openStudentMapDetail(mapIndex)
    //    Opens detail panel for map at given index
    // ------------------------------------------------
    function openStudentMapDetail(mapIndex) {
      if (!progressDashboardData || !progressDashboardData.maps) return;

      var map = progressDashboardData.maps[mapIndex];
      if (!map) return;

      spaSelectedMapIndex = mapIndex;

      // Open the detail panel
      var panel = document.getElementById('progressDetailPanel');
      panel.classList.add('active');

      document.getElementById('progressDetailTitle').textContent = map.mapTitle || 'Map Details';

      renderStudentMapDetail(map);
    }

    // ------------------------------------------------
    // 3. renderStudentMapDetail(map)
    //    Full detail: ring, class avg, status breakdown,
    //    hex list, SBAR placeholder
    // ------------------------------------------------
    function renderStudentMapDetail(map) {
      var body = document.getElementById('progressDetailBody');
      var html = '';

      // Completion ring + class average
      html += renderSpaCompletionRing(map.percentComplete || 0);

      if (map.classAvgCompletion !== null && map.classAvgCompletion !== undefined) {
        html += '<div class="spa-class-avg" style="text-align:center; margin-top:-8px; margin-bottom:12px;">';
        html += 'Class Average: ' + Math.round(map.classAvgCompletion) + '%';
        if (map.classStudentCount) {
          html += ' (' + map.classStudentCount + ' students)';
        }
        html += '</div>';
      }

      // Score
      if (map.averageScore !== null && map.averageScore !== undefined) {
        html += '<div style="text-align:center; font-size:14px; color:#475569; margin-bottom:16px;">';
        html += 'Your Score: <strong style="color:#1e293b;">' + map.averageScore + '%</strong>';
        html += '</div>';
      }

      // Status breakdown
      html += '<div class="spa-detail-section">';
      html += '<div class="spa-detail-title">Status Breakdown</div>';
      html += '<div class="spa-status-breakdown">';
      var statuses = ['mastered', 'completed', 'in_progress', 'not_started'];
      var statusLabels = { mastered: 'Mastered', completed: 'Completed', in_progress: 'In Progress', not_started: 'Not Started' };
      for (var s = 0; s < statuses.length; s++) {
        var count = (map.statusCounts && map.statusCounts[statuses[s]]) || 0;
        if (count > 0) {
          html += '<div class="spa-status-item">';
          html += '<div class="spa-status-dot ' + statuses[s] + '"></div>';
          html += statusLabels[statuses[s]] + ': ' + count;
          html += '</div>';
        }
      }
      html += '</div>';
      html += '</div>';

      // Self-assessment confidence distribution (v2)
      if (map.selfAssessStats && map.selfAssessStats.ratedCount > 0) {
        html += renderSpaConfidenceDistribution(map.hexDetails);
      }

      // Lesson Progress breakdown (for unit maps with lesson hexes)
      if (map.lessonHexSummaries) {
        html += lsmRenderAnalyticsLessonBreakdown(map.hexDetails, map.lessonHexSummaries);
      }

      // Hex list
      if (map.hexDetails && map.hexDetails.length > 0) {
        html += '<div class="spa-detail-section">';
        html += '<div class="spa-detail-title">Hex Progress (' + map.hexDetails.length + ')</div>';
        html += renderSpaHexList(map.hexDetails);
        html += '</div>';
      }

      // SBAR placeholder (lazy-loaded)
      html += '<div class="spa-sbar-container" id="spaSbarContainer"></div>';

      // Competency profile placeholder (lazy-loaded)
      html += '<div class="spa-sbar-container" id="spaCompetencyContainer"></div>';

      // Iteration activity section (client-side, no RPC)
      html += '<div id="spaIterationContainer"></div>';

      body.innerHTML = html;

      // Load SBAR if map has one
      if (map.mapId) {
        loadSpaSbarBreakdown(map.mapId);
        loadSpaCompetencyProfile(map.mapId);
      }

      // Render iteration activity (client-side)
      if (map.hexDetails) {
        renderSpaIterationActivity(map.hexDetails);
      }
    }

    // ------------------------------------------------
    // 4. renderSpaCompletionRing(percent)
    //    CSS-only circular progress ring
    // ------------------------------------------------
    function renderSpaCompletionRing(percent) {
      var pct = Math.min(100, Math.max(0, percent));
      var color = pct >= 80 ? '#10b981' : (pct >= 50 ? '#3b82f6' : (pct >= 25 ? '#f59e0b' : '#ef4444'));

      var html = '<div class="spa-ring-container">';
      html += '<div class="spa-ring" style="background: conic-gradient(' + color + ' ' + (pct * 3.6) + 'deg, #e2e8f0 ' + (pct * 3.6) + 'deg);">';
      html += '<div class="spa-ring-inner">';
      html += '<div class="spa-ring-text">' + Math.round(pct) + '%</div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
      return html;
    }

    // ------------------------------------------------
    // 5. loadSpaSbarBreakdown(mapId)
    //    Lazy-load SBAR strand data via RPC
    // ------------------------------------------------
    function loadSpaSbarBreakdown(mapId) {
      var container = document.getElementById('spaSbarContainer');
      if (!container) return;

      container.innerHTML = '<div class="loading" style="padding:8px;font-size:12px;"><span class="loading-spinner"></span> Loading strands...</div>';

      google.script.run
        .withSuccessHandler(function(sbarData) {
          if (!sbarData || !sbarData.hasSbar) {
            container.innerHTML = '';
            return;
          }
          container.innerHTML = renderSpaSbarBars(sbarData);
        })
        .withFailureHandler(function(err) {
          container.innerHTML = '';
          console.log('SPA SBAR load error: ' + err.message);
        })
        .getSbarBreakdown(mapId, previewStudentEmail || undefined);
    }

    // ------------------------------------------------
    // 6. renderSpaSbarBars(sbarData)
    //    Horizontal bars per strand (KU, TT, C)
    // ------------------------------------------------
    function renderSpaSbarBars(sbarData) {
      if (!sbarData || !sbarData.hasSbar) return '';

      var gs = sbarData.gradingSystem;
      var scale = gs.scale || 8;

      // Bracket-adaptive section title and strand labels
      var spaBracket = (typeof getWidaBracket === 'function') ? getWidaBracket() : null;
      var sbarTitle = 'SBAR Strand Breakdown';
      var sbarStrandLabels = null;
      if (spaBracket === 'low') {
        sbarTitle = 'Subject Skills Breakdown';
        sbarStrandLabels = { KU: 'Knowledge', TT: 'Thinking', C: 'Communication' };
      }

      var html = '<div class="spa-detail-section">';
      html += '<div class="spa-detail-title">' + escapeHtml(sbarTitle) + '</div>';
      html += '<div class="spa-sbar-section">';

      var strandKeys = Object.keys(sbarData.strands);
      for (var i = 0; i < strandKeys.length; i++) {
        var key = strandKeys[i];
        var strand = sbarData.strands[key];
        var pct = scale > 0 ? (strand.avgScore / scale * 100).toFixed(1) : 0;
        var strandDisplayLabel = (sbarStrandLabels && sbarStrandLabels[key]) ? sbarStrandLabels[key] : key;

        html += '<div class="spa-sbar-row">';
        html += '<div class="spa-sbar-label">' + escapeHtml(strandDisplayLabel) + '</div>';
        html += '<div class="spa-sbar-bar">';
        html += '<div class="spa-sbar-fill ' + key.toLowerCase() + '" style="width:' + pct + '%;"></div>';
        html += '</div>';
        html += '<div class="spa-sbar-value">' + strand.avgScore.toFixed(1) + '/' + scale + '</div>';
        html += '</div>';
      }

      html += '</div>';
      html += '</div>';
      return html;
    }

    // ------------------------------------------------
    // 6b. loadSpaCompetencyProfile(mapId)
    //     Lazy-load AISC competency profile via RPC
    // ------------------------------------------------
    function loadSpaCompetencyProfile(mapId) {
      var container = document.getElementById('spaCompetencyContainer');
      if (!container) return;
      if (typeof ascRenderStudentProfile !== 'function') { container.innerHTML = ''; return; }

      container.innerHTML = '<div class="loading" style="padding:8px;font-size:12px;"><span class="loading-spinner"></span> Loading competencies...</div>';

      google.script.run
        .withSuccessHandler(function(profileData) {
          if (!profileData || !profileData.competencies) {
            container.innerHTML = '';
            return;
          }
          // Check if any competency has data
          var hasData = false;
          var keys = Object.keys(profileData.competencies);
          for (var k = 0; k < keys.length; k++) {
            if (profileData.competencies[keys[k]].totalHexes > 0) { hasData = true; break; }
          }
          if (!hasData) { container.innerHTML = ''; return; }

          var html = '<div class="spa-detail-section">';
          html += '<div class="spa-detail-title">Competency Profile</div>';
          html += ascRenderStudentProfile(profileData);
          html += '</div>';
          container.innerHTML = html;
        })
        .withFailureHandler(function(err) {
          container.innerHTML = '';
          console.log('SPA competency load error: ' + err.message);
        })
        .getStudentCompetencyProfile(mapId, previewStudentEmail || undefined);
    }

    // ------------------------------------------------
    // 7. renderSpaHexList(hexDetails)
    //    Scrollable list of hexes sorted by status
    // ------------------------------------------------
    function renderSpaHexList(hexDetails) {
      // Sort: completed/mastered first, then in_progress, then not_started
      var statusOrder = { mastered: 0, completed: 1, in_progress: 2, not_started: 3, locked: 4 };
      var sorted = hexDetails.slice().sort(function(a, b) {
        var oa = statusOrder[a.status] !== undefined ? statusOrder[a.status] : 5;
        var ob = statusOrder[b.status] !== undefined ? statusOrder[b.status] : 5;
        return oa - ob;
      });

      var html = '<div class="spa-hex-list">';
      for (var i = 0; i < sorted.length; i++) {
        var h = sorted[i];
        var scoreText = '';
        if (h.score !== null && h.score !== undefined && h.maxScore !== null && h.maxScore !== undefined) {
          scoreText = h.score + '/' + h.maxScore;
        }
        var statusLabel = (h.status || 'not_started').replace('_', ' ');

        html += '<div class="spa-hex-item">';
        html += '<div class="spa-hex-icon">' + (h.icon || '') + '</div>';
        html += '<div class="spa-hex-label">' + escapeHtml(h.label || '') + '</div>';
        if (scoreText) {
          html += '<div class="spa-hex-score">' + scoreText + '</div>';
        }
        html += '<div class="spa-hex-status ' + (h.status || 'not_started') + '">' + statusLabel + '</div>';
        if (h.selfAssessRating && saRatingLabels && saRatingLabels[h.selfAssessRating]) {
          html += '<span class="sa-teacher-rating-badge sa-level-' + h.selfAssessRating + '" title="Self-assessed: ' + saRatingLabels[h.selfAssessRating] + '">' + saRatingLabels[h.selfAssessRating].charAt(0) + '</span>';
        }
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    // ------------------------------------------------
    // 8. renderSpaConfidenceDistribution(hexDetails)
    //    Self-assessment confidence distribution bars
    // ------------------------------------------------
    function renderSpaConfidenceDistribution(hexDetails) {
      if (!hexDetails || hexDetails.length === 0) return '';

      // Bracket-adaptive labels (reuses SA_BRACKET_CONFIG via helper)
      var ratingLabelArr = spaGetRatingLabels();
      var distLabels = {};
      // SA_BRACKET_CONFIG.labels is an array, ATL_RATING_LABELS is an object — handle both
      if (ratingLabelArr && typeof ratingLabelArr === 'object') {
        if (ratingLabelArr.length) {
          // Array form: ['Beginning', 'Developing', 'Proficient', 'Extending']
          distLabels = { 1: ratingLabelArr[0], 2: ratingLabelArr[1], 3: ratingLabelArr[2], 4: ratingLabelArr[3] };
        } else {
          // Already object form
          distLabels = ratingLabelArr;
        }
      } else {
        distLabels = { 1: 'Beginning', 2: 'Developing', 3: 'Proficient', 4: 'Extending' };
      }
      var dist = { 1: 0, 2: 0, 3: 0, 4: 0 };
      var maxCount = 0;

      for (var i = 0; i < hexDetails.length; i++) {
        if (hexDetails[i].selfAssessRating) {
          dist[hexDetails[i].selfAssessRating]++;
        }
      }
      for (var dk = 1; dk <= 4; dk++) {
        if (dist[dk] > maxCount) maxCount = dist[dk];
      }

      var html = '<div class="spa-detail-section">';
      html += '<div class="spa-detail-title">Self-Assessment Distribution</div>';
      html += '<div class="sa-distribution-bar">';

      for (var dl = 1; dl <= 4; dl++) {
        var count = dist[dl];
        var pct = maxCount > 0 ? Math.round(count / maxCount * 100) : 0;
        html += '<div class="sa-distribution-row">';
        html += '<div class="sa-distribution-label">' + escapeHtml(distLabels[dl]) + '</div>';
        html += '<div class="sa-distribution-track">';
        html += '<div class="sa-distribution-fill sa-level-' + dl + '" style="width:' + pct + '%;"></div>';
        html += '</div>';
        html += '<div class="sa-distribution-count">' + count + '</div>';
        html += '</div>';
      }

      html += '</div>';
      html += '</div>';
      return html;
    }

    // ------------------------------------------------
    // 9. formatSpaDate(isoString)
    //    Format date for display
    // ------------------------------------------------
    function formatSpaDate(isoString) {
      if (!isoString) return '';
      try {
        var d = new Date(isoString);
        return d.toLocaleDateString();
      } catch (e) {
        return isoString;
      }
    }

    // ------------------------------------------------
    // 10. lsmRenderAnalyticsLessonBreakdown(hexDetails, lessonSummaries)
    //     Per-lesson horizontal progress bars in student analytics
    // ------------------------------------------------
    function lsmRenderAnalyticsLessonBreakdown(hexDetails, lessonSummaries) {
      if (!lessonSummaries) return '';

      var keys = Object.keys(lessonSummaries);
      if (keys.length === 0) return '';

      var html = '<div class="spa-detail-section">';
      html += '<div class="spa-detail-title">Lesson Progress</div>';

      for (var i = 0; i < keys.length; i++) {
        var hexId = keys[i];
        var summary = lessonSummaries[hexId];
        var pct = summary.completionPct || 0;
        var label = escapeHtml(summary.label || 'Lesson');
        var fractionText = summary.completed + '/' + summary.total;

        html += '<div class="lsm-analytics-lesson">';
        html += '<div class="lsm-analytics-lesson-label" title="' + label + '">' + label + '</div>';
        html += '<div class="lsm-analytics-lesson-bar">';
        html += '<div class="lsm-analytics-lesson-fill" style="width:' + pct + '%;"></div>';
        html += '</div>';
        html += '<div class="lsm-analytics-lesson-text">' + fractionText + '</div>';
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    // ------------------------------------------------
    // renderSpaIterationActivity(hexDetails)
    //   Client-side iteration checkpoint activity section
    // ------------------------------------------------
    function renderSpaIterationActivity(hexDetails) {
      var container = document.getElementById('spaIterationContainer');
      if (!container) return;

      // Find checkpoint hexes
      var checkpoints = [];
      for (var i = 0; i < hexDetails.length; i++) {
        if (hexDetails[i].isCheckpoint) {
          checkpoints.push(hexDetails[i]);
        }
      }
      if (checkpoints.length === 0) { container.innerHTML = ''; return; }

      // Count stats
      var totalCheckpoints = checkpoints.length;
      var completedCheckpoints = 0;
      var approvedCheckpoints = 0;
      for (var c = 0; c < checkpoints.length; c++) {
        var st = checkpoints[c].status;
        if (st === 'completed' || st === 'mastered') {
          completedCheckpoints++;
          if (checkpoints[c].teacherApproved) approvedCheckpoints++;
        }
      }

      var html = '<div class="spa-detail-section" style="margin-top:16px;">';
      html += '<div class="spa-detail-section-title">Iteration Activity</div>';

      // Stat cards
      html += '<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">';
      html += '<div class="spa-mini-stat"><strong>' + totalCheckpoints + '</strong> Checkpoints</div>';
      html += '<div class="spa-mini-stat"><strong>' + completedCheckpoints + '</strong> Submitted</div>';
      html += '<div class="spa-mini-stat"><strong>' + approvedCheckpoints + '</strong> Approved</div>';
      html += '</div>';

      // Per-checkpoint list
      for (var j = 0; j < checkpoints.length; j++) {
        var cp = checkpoints[j];
        var cpStatus = cp.status || 'not_started';
        var statusColor = '#94a3b8';
        var statusLabel = 'Not Started';
        if (cpStatus === 'in_progress') { statusColor = '#3b82f6'; statusLabel = 'In Progress'; }
        else if (cpStatus === 'completed' || cpStatus === 'mastered') {
          if (cp.teacherApproved) { statusColor = '#10b981'; statusLabel = 'Approved'; }
          else { statusColor = '#f59e0b'; statusLabel = 'Pending Review'; }
        }
        html += '<div style="display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px;">';
        html += '<span style="width:8px; height:8px; border-radius:50%; background:' + statusColor + '; flex-shrink:0;"></span>';
        html += '<span style="flex:1; color:#1e293b;">' + escapeHtml(cp.icon || '') + ' ' + escapeHtml(cp.label || 'Hex') + '</span>';
        if (cp.score !== null && cp.score !== undefined && parseFloat(cp.score) > 0) {
          html += '<span style="color:#475569; font-size:12px;">' + cp.score + '/' + cp.maxScore + '</span>';
        }
        html += '<span class="itr-analytics-status" style="color:' + statusColor + '; font-size:12px; font-weight:600;">' + statusLabel + '</span>';
        html += '</div>';
      }

      html += '</div>';
      container.innerHTML = html;
    }

    console.log('=== Scripts-StudentAnalytics.html ready ===');
</script>
