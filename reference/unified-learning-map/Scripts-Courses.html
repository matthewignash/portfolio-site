    function renderHexCheckboxes(hexes, selectedHexIds) {
      var container = document.getElementById('lessonHexCheckboxes');

      if (!hexes || hexes.length === 0) {
        // Check if the unit even has a linked map
        var unit = null;
        for (var i = 0; i < currentUnitsData.length; i++) {
          if (currentUnitsData[i].unitId === currentLessonsUnitId) {
            unit = currentUnitsData[i];
            break;
          }
        }
        if (!unit || !unit.mapId) {
          container.innerHTML = '<div class="hex-checkbox-empty">Link a map to this unit first to select hexes</div>';
        } else {
          container.innerHTML = '<div class="hex-checkbox-empty">Map has no hexes yet</div>';
        }
        return;
      }

      var selectedSet = {};
      for (var s = 0; s < selectedHexIds.length; s++) {
        selectedSet[selectedHexIds[s]] = true;
      }

      var html = '<div class="hex-checkbox-list">';
      for (var h = 0; h < hexes.length; h++) {
        var hex = hexes[h];
        var checked = selectedSet[hex.id] ? ' checked' : '';
        html += '<label class="hex-checkbox-item">';
        html += '<input type="checkbox" name="lessonHex" value="' + hex.id + '"' + checked + '>';
        html += '<span class="hex-cb-icon">' + (hex.icon || '⬡') + '</span>';
        html += '<span class="hex-cb-label">' + escapeHtml(hex.label || 'Hex ' + hex.id) + '</span>';
        html += '</label>';
      }
      html += '</div>';
      container.innerHTML = html;
    }

    function getCheckedHexIds() {
      var checkboxes = document.querySelectorAll('input[name="lessonHex"]:checked');
      var ids = [];
      for (var i = 0; i < checkboxes.length; i++) {
        ids.push(checkboxes[i].value);
      }
      return ids;
    }

    function saveLessonFromModal() {
      var lessonId = document.getElementById('lessonFormId').value;
      var unitId = document.getElementById('lessonFormUnitId').value;
      var title = document.getElementById('lessonFormTitle').value.trim();
      var duration = document.getElementById('lessonFormDuration').value.trim();
      var status = document.getElementById('lessonFormStatus').value;
      var objectivesText = document.getElementById('lessonFormObjectives').value;
      var materialsText = document.getElementById('lessonFormMaterials').value;
      var hexIds = getCheckedHexIds();

      if (!title) {
        showToast('Lesson title is required', 'error');
        return;
      }

      // Parse textarea lines into arrays
      var objectives = objectivesText.split('\n').map(function(line) { return line.trim(); }).filter(function(line) { return line.length > 0; });
      var materials = materialsText.split('\n').map(function(line) { return line.trim(); }).filter(function(line) { return line.length > 0; });

      // Collect rich lessonData
      syncMainActivitiesFromDom();
      syncSuccessCriteriaFromDom();

      var resourcesText = document.getElementById('lsnResources').value;
      var resources = resourcesText.split('\n').map(function(line) { return line.trim(); }).filter(function(line) { return line.length > 0; });

      var richData = {
        openingActivity: {
          name: document.getElementById('lsnOpeningName').value.trim(),
          description: document.getElementById('lsnOpeningDesc').value.trim(),
          duration: document.getElementById('lsnOpeningDuration').value.trim()
        },
        mainActivities: lessonEditorMainActivities,
        closingActivity: {
          name: document.getElementById('lsnClosingName').value.trim(),
          description: document.getElementById('lsnClosingDesc').value.trim(),
          duration: document.getElementById('lsnClosingDuration').value.trim()
        },
        udl: {
          representation: getSelectedUdlStrategies('representation'),
          actionExpression: getSelectedUdlStrategies('actionExpression'),
          engagement: getSelectedUdlStrategies('engagement'),
          customRepresentation: document.getElementById('lsnUdlCustom-representation').value.trim(),
          customActionExpression: document.getElementById('lsnUdlCustom-actionExpression').value.trim(),
          customEngagement: document.getElementById('lsnUdlCustom-engagement').value.trim()
        },
        formativeAssessment: document.getElementById('lsnFormativeAssessment').value.trim(),
        successCriteria: lessonEditorSuccessCriteria,
        resources: resources,
        teacherNotes: document.getElementById('lsnTeacherNotes').value.trim(),
        modifications: document.getElementById('lsnModifications').value.trim()
      };

      // Collect standard IDs from lesson standards picker
      var standardIds = [];
      for (var si = 0; si < lessonStandardsSelected.length; si++) {
        standardIds.push(lessonStandardsSelected[si].standardId);
      }

      var lessonObj = {
        unitId: unitId,
        title: title,
        duration: duration,
        status: status,
        objectives: objectives,
        materials: materials,
        hexIds: hexIds,
        standardIds: standardIds,
        lessonData: richData
      };

      // E2-S1: Sync UDL selections from lesson editor to linked hex(es) in current map
      if (currentMap && richData.udl && hexIds && hexIds.length > 0) {
        for (var hi = 0; hi < hexIds.length; hi++) {
          var linkedHex = (typeof findHexById === 'function') ? findHexById(hexIds[hi]) : null;
          if (linkedHex) {
            if (!linkedHex.lessonPlan) linkedHex.lessonPlan = {};
            linkedHex.lessonPlan.udl = {
              representation: (richData.udl.representation || []).slice(0),
              actionExpression: (richData.udl.actionExpression || []).slice(0),
              engagement: (richData.udl.engagement || []).slice(0),
              customRepresentation: richData.udl.customRepresentation || '',
              customActionExpression: richData.udl.customActionExpression || '',
              customEngagement: richData.udl.customEngagement || ''
            };
          }
        }
      }

      if (lessonId) {
        lessonObj.lessonId = lessonId;
        // Preserve existing sequence
        for (var i = 0; i < currentLessonsData.length; i++) {
          if (currentLessonsData[i].lessonId === lessonId) {
            lessonObj.sequence = currentLessonsData[i].sequence;
            break;
          }
        }
      } else {
        // New lesson: assign next sequence number
        lessonObj.sequence = currentLessonsData.length + 1;
      }

      showToast('Saving lesson...', 'info');

      google.script.run
        .withSuccessHandler(function(savedLesson) {
          showToast(lessonId ? 'Lesson updated!' : 'Lesson created!', 'success');
          closeLessonModal();
          // Reload lessons panel
          if (unitsPanelMode === 'lessons' && currentLessonsUnitId) {
            loadLessonsForPanel(currentLessonsUnitId);
          }
          // Refresh unit card lesson count
          if (currentUnitsCourseId) {
            refreshUnitCountForCourse(currentUnitsCourseId);
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error saving lesson: ' + err.message, 'error');
        })
        .saveLesson(lessonObj);
    }

    function confirmDeleteLesson(lessonId) {
      var lesson = null;
      for (var i = 0; i < currentLessonsData.length; i++) {
        if (currentLessonsData[i].lessonId === lessonId) { lesson = currentLessonsData[i]; break; }
      }
      if (!lesson) return;

      if (!confirm('Delete lesson "' + lesson.title + '"? This cannot be undone.')) return;

      showToast('Deleting lesson...', 'info');
      google.script.run
        .withSuccessHandler(function() {
          showToast('Lesson deleted!', 'success');
          if (unitsPanelMode === 'lessons' && currentLessonsUnitId) {
            loadLessonsForPanel(currentLessonsUnitId);
          }
          if (currentUnitsCourseId) {
            refreshUnitCountForCourse(currentUnitsCourseId);
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error deleting lesson: ' + err.message, 'error');
        })
        .deleteLesson(lessonId);
    }

    // ---- Lesson Reorder Functions ----

    function moveLessonUp(lessonId) {
      var idx = -1;
      for (var i = 0; i < currentLessonsData.length; i++) {
        if (currentLessonsData[i].lessonId === lessonId) { idx = i; break; }
      }
      if (idx <= 0) return;

      // Swap locally
      var temp = currentLessonsData[idx];
      currentLessonsData[idx] = currentLessonsData[idx - 1];
      currentLessonsData[idx - 1] = temp;

      // Update sequences
      for (var j = 0; j < currentLessonsData.length; j++) {
        currentLessonsData[j].sequence = j + 1;
      }

      // Optimistic re-render
      renderLessonsPanel();

      // Persist
      var lessonIds = currentLessonsData.map(function(l) { return l.lessonId; });
      google.script.run
        .withSuccessHandler(function() { /* silent */ })
        .withFailureHandler(function(err) {
          showToast('Error reordering: ' + err.message, 'error');
          loadLessonsForPanel(currentLessonsUnitId);
        })
        .reorderLessons(currentLessonsUnitId, lessonIds);
    }

    function moveLessonDown(lessonId) {
      var idx = -1;
      for (var i = 0; i < currentLessonsData.length; i++) {
        if (currentLessonsData[i].lessonId === lessonId) { idx = i; break; }
      }
      if (idx < 0 || idx >= currentLessonsData.length - 1) return;

      // Swap locally
      var temp = currentLessonsData[idx];
      currentLessonsData[idx] = currentLessonsData[idx + 1];
      currentLessonsData[idx + 1] = temp;

      // Update sequences
      for (var j = 0; j < currentLessonsData.length; j++) {
        currentLessonsData[j].sequence = j + 1;
      }

      // Optimistic re-render
      renderLessonsPanel();

      // Persist
      var lessonIds = currentLessonsData.map(function(l) { return l.lessonId; });
      google.script.run
        .withSuccessHandler(function() { /* silent */ })
        .withFailureHandler(function(err) {
          showToast('Error reordering: ' + err.message, 'error');
          loadLessonsForPanel(currentLessonsUnitId);
        })
        .reorderLessons(currentLessonsUnitId, lessonIds);
    }

    // ---- Rich Lesson Editor Helpers ----

    function toggleLessonSection(sectionId) {
      var el = document.getElementById('lsnSec-' + sectionId);
      if (!el) return;
      var cls = el.className;
      if (cls.indexOf('lsn-collapsed') >= 0) {
        el.className = cls.replace('lsn-collapsed', '').replace(/\s+/g, ' ').trim();
      } else {
        el.className = cls + ' lsn-collapsed';
      }
    }

    function hasUdlContent(udl) {
      if (!udl) return false;
      if (udl.representation && udl.representation.length > 0) return true;
      if (udl.actionExpression && udl.actionExpression.length > 0) return true;
      if (udl.engagement && udl.engagement.length > 0) return true;
      if (udl.customRepresentation) return true;
      if (udl.customActionExpression) return true;
      if (udl.customEngagement) return true;
      return false;
    }

    function loadLessonReferenceData(callback) {
      // If already cached, callback immediately
      if (lessonActivityTemplatesCache && lessonUdlStrategiesCache && lessonAssessmentStrategiesCache) {
        if (callback) callback();
        return;
      }

      var loaded = 0;
      var total = 3; // templates, udl, assessment

      function checkDone() {
        loaded++;
        if (loaded >= total && callback) callback();
      }

      // Load activity templates (3 types combined)
      if (!lessonActivityTemplatesCache) {
        lessonActivityTemplatesCache = { opening: [], main: [], closing: [] };
        var tmplLoaded = 0;
        var types = ['opening', 'main', 'closing'];
        for (var t = 0; t < types.length; t++) {
          (function(type) {
            google.script.run
              .withSuccessHandler(function(data) {
                lessonActivityTemplatesCache[type] = data || [];
                tmplLoaded++;
                if (tmplLoaded >= 3) checkDone();
              })
              .withFailureHandler(function() {
                tmplLoaded++;
                if (tmplLoaded >= 3) checkDone();
              })
              .getActivityTemplates(type);
          })(types[t]);
        }
      } else {
        checkDone();
      }

      // Load UDL strategies (3 principles combined)
      if (!lessonUdlStrategiesCache) {
        lessonUdlStrategiesCache = { representation: [], actionExpression: [], engagement: [] };
        var udlLoaded = 0;
        var principles = ['representation', 'actionExpression', 'engagement'];
        for (var p = 0; p < principles.length; p++) {
          (function(principle) {
            google.script.run
              .withSuccessHandler(function(data) {
                lessonUdlStrategiesCache[principle] = data || [];
                udlLoaded++;
                if (udlLoaded >= 3) checkDone();
              })
              .withFailureHandler(function() {
                udlLoaded++;
                if (udlLoaded >= 3) checkDone();
              })
              .getUdlStrategies(principle);
          })(principles[p]);
        }
      } else {
        checkDone();
      }

      // Load assessment strategies
      if (!lessonAssessmentStrategiesCache) {
        google.script.run
          .withSuccessHandler(function(data) {
            lessonAssessmentStrategiesCache = data || [];
            checkDone();
          })
          .withFailureHandler(function() {
            lessonAssessmentStrategiesCache = [];
            checkDone();
          })
          .getFormativeAssessmentStrategies();
      } else {
        checkDone();
      }
    }

    function populateLessonTemplateDropdowns() {
      if (lessonActivityTemplatesCache) {
        populateTemplateSelect('lsnTmplOpening', lessonActivityTemplatesCache.opening || []);
        populateTemplateSelect('lsnTmplClosing', lessonActivityTemplatesCache.closing || []);
      }
      if (lessonAssessmentStrategiesCache) {
        var sel = document.getElementById('lsnAssessSelect');
        if (sel) {
          var html = '<option value="">-- Strategy --</option>';
          for (var i = 0; i < lessonAssessmentStrategiesCache.length; i++) {
            var st = lessonAssessmentStrategiesCache[i];
            html += '<option value="' + i + '">' + escapeHtml(st.name) + '</option>';
          }
          sel.innerHTML = html;
        }
      }
    }

    function populateTemplateSelect(selectId, templates) {
      var sel = document.getElementById(selectId);
      if (!sel) return;
      var html = '<option value="">-- Template --</option>';
      for (var i = 0; i < templates.length; i++) {
        html += '<option value="' + i + '">' + escapeHtml(templates[i].name) + '</option>';
      }
      sel.innerHTML = html;
    }

    function applyActivityTemplate(type) {
      var selectId = (type === 'opening') ? 'lsnTmplOpening' : 'lsnTmplClosing';
      var sel = document.getElementById(selectId);
      if (!sel || sel.value === '') return;
      var idx = parseInt(sel.value);
      var templates = (lessonActivityTemplatesCache && lessonActivityTemplatesCache[type]) ? lessonActivityTemplatesCache[type] : [];
      if (idx < 0 || idx >= templates.length) return;
      var tmpl = templates[idx];
      var prefix = (type === 'opening') ? 'lsnOpening' : 'lsnClosing';
      document.getElementById(prefix + 'Name').value = tmpl.name || '';
      document.getElementById(prefix + 'Desc').value = tmpl.description || '';
      document.getElementById(prefix + 'Duration').value = tmpl.duration || '';
    }

    // ---- Main Activities (dynamic list) ----

    function addMainActivity() {
      syncMainActivitiesFromDom();
      lessonEditorMainActivities.push({ name: '', description: '', duration: '' });
      renderMainActivities();
    }

    function removeMainActivity(idx) {
      syncMainActivitiesFromDom();
      lessonEditorMainActivities.splice(idx, 1);
      renderMainActivities();
    }

    function renderMainActivities() {
      var container = document.getElementById('lsnMainActivitiesList');
      if (!container) return;
      if (lessonEditorMainActivities.length === 0) {
        container.innerHTML = '<div style="font-size:12px; color:#94a3b8; padding:4px 0;">No main activities yet</div>';
        return;
      }
      var html = '';
      var mainTemplates = (lessonActivityTemplatesCache && lessonActivityTemplatesCache.main) ? lessonActivityTemplatesCache.main : [];
      for (var i = 0; i < lessonEditorMainActivities.length; i++) {
        var act = lessonEditorMainActivities[i];
        html += '<div class="lsn-activity-card" data-main-idx="' + i + '">';
        html += '<div class="lsn-activity-card-header">';
        html += '<span class="lsn-activity-card-label">Activity ' + (i + 1) + '</span>';
        html += '<button class="lsn-activity-remove" onclick="removeMainActivity(' + i + ')" title="Remove">&times;</button>';
        html += '</div>';
        // Template row
        html += '<div class="lsn-template-row">';
        html += '<select class="lsn-template-select" id="lsnMainTmpl-' + i + '">';
        html += '<option value="">-- Template --</option>';
        for (var t = 0; t < mainTemplates.length; t++) {
          html += '<option value="' + t + '">' + escapeHtml(mainTemplates[t].name) + '</option>';
        }
        html += '</select>';
        html += '<button class="lsn-template-apply" onclick="applyMainActivityTemplate(' + i + ')">Apply</button>';
        html += '</div>';
        html += '<input type="text" class="lsn-form-input lsn-main-name" data-idx="' + i + '" value="' + escapeHtml(act.name || '') + '" placeholder="Activity name" style="margin-bottom:4px;">';
        html += '<textarea class="lsn-form-textarea lsn-main-desc" data-idx="' + i + '" rows="2" placeholder="Description...">' + escapeHtml(act.description || '') + '</textarea>';
        html += '<input type="text" class="lsn-form-input lsn-main-dur" data-idx="' + i + '" value="' + escapeHtml(act.duration || '') + '" placeholder="Duration" style="margin-top:4px;">';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function syncMainActivitiesFromDom() {
      var names = document.querySelectorAll('.lsn-main-name');
      var descs = document.querySelectorAll('.lsn-main-desc');
      var durs = document.querySelectorAll('.lsn-main-dur');
      for (var i = 0; i < names.length; i++) {
        var idx = parseInt(names[i].getAttribute('data-idx'));
        if (idx >= 0 && idx < lessonEditorMainActivities.length) {
          lessonEditorMainActivities[idx].name = names[i].value.trim();
        }
      }
      for (var j = 0; j < descs.length; j++) {
        var idx2 = parseInt(descs[j].getAttribute('data-idx'));
        if (idx2 >= 0 && idx2 < lessonEditorMainActivities.length) {
          lessonEditorMainActivities[idx2].description = descs[j].value.trim();
        }
      }
      for (var k = 0; k < durs.length; k++) {
        var idx3 = parseInt(durs[k].getAttribute('data-idx'));
        if (idx3 >= 0 && idx3 < lessonEditorMainActivities.length) {
          lessonEditorMainActivities[idx3].duration = durs[k].value.trim();
        }
      }
    }

    function applyMainActivityTemplate(actIdx) {
      var sel = document.getElementById('lsnMainTmpl-' + actIdx);
      if (!sel || sel.value === '') return;
      var tmplIdx = parseInt(sel.value);
      var mainTemplates = (lessonActivityTemplatesCache && lessonActivityTemplatesCache.main) ? lessonActivityTemplatesCache.main : [];
      if (tmplIdx < 0 || tmplIdx >= mainTemplates.length) return;
      var tmpl = mainTemplates[tmplIdx];

      // Sync first so we don't lose other fields
      syncMainActivitiesFromDom();
      if (actIdx >= 0 && actIdx < lessonEditorMainActivities.length) {
        lessonEditorMainActivities[actIdx].name = tmpl.name || '';
        lessonEditorMainActivities[actIdx].description = tmpl.description || '';
        lessonEditorMainActivities[actIdx].duration = tmpl.duration || '';
      }
      renderMainActivities();
    }

    // ---- UDL Chips ----

    function renderUdlChips(principle, selected) {
      var container = document.getElementById('lsnChips-' + principle);
      if (!container) return;
      var strategies = (lessonUdlStrategiesCache && lessonUdlStrategiesCache[principle]) ? lessonUdlStrategiesCache[principle] : [];
      if (strategies.length === 0) {
        container.innerHTML = '<span style="font-size:11px; color:#94a3b8;">Loading...</span>';
        return;
      }
      var selectedSet = {};
      for (var s = 0; s < selected.length; s++) {
        selectedSet[selected[s]] = true;
      }
      var html = '';
      for (var i = 0; i < strategies.length; i++) {
        var isSelected = selectedSet[strategies[i]] ? ' selected' : '';
        html += '<span class="lsn-strategy-chip' + isSelected + '" data-principle="' + principle + '" onclick="toggleUdlChip(this)">' + escapeHtml(strategies[i]) + '</span>';
      }
      container.innerHTML = html;
    }

    function toggleUdlChip(el) {
      var cls = el.className;
      if (cls.indexOf('selected') >= 0) {
        el.className = cls.replace(' selected', '');
      } else {
        el.className = cls + ' selected';
      }
      updateUdlBadge();
    }

    function updateUdlBadge() {
      var total = 0;
      var principles = ['representation', 'actionExpression', 'engagement'];
      for (var p = 0; p < principles.length; p++) {
        var chips = document.querySelectorAll('#lsnChips-' + principles[p] + ' .lsn-strategy-chip.selected');
        total += chips.length;
        var customEl = document.getElementById('lsnUdlCustom-' + principles[p]);
        if (customEl && customEl.value.trim()) total++;
      }
      var badge = document.getElementById('lsnUdlBadge');
      if (badge) {
        badge.textContent = String(total);
        badge.className = total > 0 ? 'lsn-section-badge' : 'lsn-section-badge empty';
      }
    }

    function getSelectedUdlStrategies(principle) {
      var chips = document.querySelectorAll('#lsnChips-' + principle + ' .lsn-strategy-chip.selected');
      var result = [];
      for (var i = 0; i < chips.length; i++) {
        result.push(chips[i].textContent);
      }
      return result;
    }

    // ---- Success Criteria (dynamic list) ----

    function addSuccessCriteria() {
      syncSuccessCriteriaFromDom();
      lessonEditorSuccessCriteria.push('');
      renderSuccessCriteria();
      updateAssessBadge();
    }

    function removeSuccessCriteria(idx) {
      syncSuccessCriteriaFromDom();
      lessonEditorSuccessCriteria.splice(idx, 1);
      renderSuccessCriteria();
      updateAssessBadge();
    }

    function renderSuccessCriteria() {
      var container = document.getElementById('lsnSuccessCriteriaList');
      if (!container) return;
      if (lessonEditorSuccessCriteria.length === 0) {
        container.innerHTML = '';
        return;
      }
      var html = '';
      for (var i = 0; i < lessonEditorSuccessCriteria.length; i++) {
        html += '<div class="lsn-list-item">';
        html += '<input type="text" class="form-input lsn-sc-input" data-sc-idx="' + i + '" value="' + escapeHtml(lessonEditorSuccessCriteria[i] || '') + '" placeholder="I can...">';
        html += '<button class="lsn-list-remove" onclick="removeSuccessCriteria(' + i + ')" title="Remove">&times;</button>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function syncSuccessCriteriaFromDom() {
      var inputs = document.querySelectorAll('.lsn-sc-input');
      for (var i = 0; i < inputs.length; i++) {
        var idx = parseInt(inputs[i].getAttribute('data-sc-idx'));
        if (idx >= 0 && idx < lessonEditorSuccessCriteria.length) {
          lessonEditorSuccessCriteria[idx] = inputs[i].value.trim();
        }
      }
    }

    function updateAssessBadge() {
      var total = 0;
      var fa = document.getElementById('lsnFormativeAssessment');
      if (fa && fa.value.trim()) total++;
      total += lessonEditorSuccessCriteria.length;
      var badge = document.getElementById('lsnAssessBadge');
      if (badge) {
        badge.textContent = String(total);
        badge.className = total > 0 ? 'lsn-section-badge' : 'lsn-section-badge empty';
      }
    }

    // ---- Assessment Template ----

    function applyAssessmentTemplate() {
      var sel = document.getElementById('lsnAssessSelect');
      if (!sel || sel.value === '') return;
      var idx = parseInt(sel.value);
      if (!lessonAssessmentStrategiesCache || idx < 0 || idx >= lessonAssessmentStrategiesCache.length) return;
      var strat = lessonAssessmentStrategiesCache[idx];
      var fa = document.getElementById('lsnFormativeAssessment');
      if (fa) {
        var current = fa.value.trim();
        var line = strat.name + ': ' + strat.description + ' (' + strat.timing + ')';
        fa.value = current ? (current + '\n' + line) : line;
      }
      updateAssessBadge();
    }

</script>
