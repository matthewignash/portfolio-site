<script>
    // ================================================
    // COURSES - DATA & STATE (Story 2.1)
    // ================================================

    var gradingPresetsData = [];  // Grading system presets cache

    function populateCourseDropdowns() {
      // Departments
      var deptSelect = document.getElementById('courseFormDepartment');
      if (deptSelect.options.length <= 1) {
        deptSelect.innerHTML = '<option value="">-- Select --</option>';
        DEPARTMENTS.forEach(function(dept) {
          var opt = document.createElement('option');
          opt.value = dept;
          opt.textContent = dept;
          deptSelect.appendChild(opt);
        });
      }

      // Grade Levels
      var gradeSelect = document.getElementById('courseFormGradeLevel');
      if (gradeSelect.options.length <= 1) {
        gradeSelect.innerHTML = '<option value="">-- Select --</option>';
        GRADE_LEVELS.forEach(function(grade) {
          var opt = document.createElement('option');
          opt.value = grade;
          opt.textContent = 'Grade ' + grade;
          gradeSelect.appendChild(opt);
        });
      }

      // Years (reuse existing formOptions.years if available)
      var yearSelect = document.getElementById('courseFormYear');
      if (yearSelect.options.length === 0) {
        var currentYear = new Date().getFullYear();
        for (var i = -1; i <= 2; i++) {
          var yr = (currentYear + i) + '-' + (currentYear + i + 1);
          var opt = document.createElement('option');
          opt.value = yr;
          opt.textContent = yr;
          if (i === 0) opt.selected = true;
          yearSelect.appendChild(opt);
        }
      }

      // Grading System Presets
      if (gradingPresetsData.length === 0) {
        google.script.run
          .withSuccessHandler(function(presets) {
            gradingPresetsData = presets || [];
            populateGradingDropdowns();
          })
          .withFailureHandler(function(err) {
            console.error('Error loading grading presets:', err);
          })
          .getGradingSystemPresets();
      }
    }

    // ================================================
    // GRADING SYSTEM EDITOR — DUAL SCALE + CUSTOMIZATION
    // ================================================

    var gradingEditorState = { primary: null, secondary: null };

    function deepCopyObj(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function findPreset(type) {
      for (var i = 0; i < gradingPresetsData.length; i++) {
        if (gradingPresetsData[i].type === type) return gradingPresetsData[i];
      }
      return null;
    }

    function populateGradingDropdowns() {
      var ids = ['grdPrimaryPreset', 'grdSecondaryPreset'];
      for (var s = 0; s < ids.length; s++) {
        var select = document.getElementById(ids[s]);
        if (!select) continue;
        select.innerHTML = '';
        for (var i = 0; i < gradingPresetsData.length; i++) {
          var preset = gradingPresetsData[i];
          var opt = document.createElement('option');
          opt.value = preset.type;
          opt.textContent = preset.name;
          select.appendChild(opt);
        }
      }
    }

    function onGradingPresetChange(which) {
      var selectId = which === 'primary' ? 'grdPrimaryPreset' : 'grdSecondaryPreset';
      var type = document.getElementById(selectId).value;
      var preset = findPreset(type);
      if (preset) {
        gradingEditorState[which] = deepCopyObj(preset);
        gradingEditorState[which].customized = false;
      }
      // Close customize panel and re-render
      document.getElementById('grd' + capitalize(which) + 'Customize').style.display = 'none';
      document.getElementById('grd' + capitalize(which) + 'CustomizeLink').textContent = 'Customize...';
      document.getElementById('grd' + capitalize(which) + 'ResetLink').style.display = 'none';
      updateGradingPreview();
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function toggleGradingCustomize(which) {
      var panel = document.getElementById('grd' + capitalize(which) + 'Customize');
      var link = document.getElementById('grd' + capitalize(which) + 'CustomizeLink');
      if (panel.style.display === 'none') {
        panel.style.display = 'block';
        link.textContent = 'Hide customization';
        renderGradingEditor(which);
      } else {
        panel.style.display = 'none';
        link.textContent = 'Customize...';
      }
    }

    function renderGradingEditor(which) {
      var container = document.getElementById('grd' + capitalize(which) + 'Editor');
      var state = gradingEditorState[which];
      if (!state) { container.innerHTML = ''; return; }

      var html = '';

      // Passing Level
      html += '<div class="grd-field-row">';
      html += '<label>Passing Level</label>';
      html += '<input type="number" min="1" max="' + state.scale + '" value="' + (state.passingLevel || 1) + '" onchange="onGradingFieldChange(\'' + which + '\', \'passingLevel\', this.value)">';
      html += '</div>';

      // Strands (only if they exist on this scale)
      if (state.strands) {
        html += '<div class="grd-field-row">';
        html += '<label>Strands</label>';
        html += '<input type="text" value="' + escapeHtml((state.strands || []).join(', ')) + '" placeholder="e.g., KU, TT, C" onchange="onGradingFieldChange(\'' + which + '\', \'strands\', this.value)">';
        html += '</div>';
      }

      // Levels Table
      if (state.levels && state.levels.length > 0) {
        html += '<div class="grd-levels-table">';
        html += '<div class="grd-levels-header"><span style="width:36px;">Val</span><span style="flex:1;">Label</span><span style="width:90px;">Range</span><span style="width:24px;"></span></div>';
        for (var i = 0; i < state.levels.length; i++) {
          var lv = state.levels[i];
          html += '<div class="grd-level-row">';
          html += '<span class="grd-lv">' + lv.value + '</span>';
          html += '<input class="grd-ll" type="text" value="' + escapeHtml(lv.label || '') + '" onchange="onLevelFieldChange(\'' + which + '\',' + i + ',\'label\',this.value)">';
          html += '<input class="grd-lr" type="text" value="' + escapeHtml(lv.range || '') + '" onchange="onLevelFieldChange(\'' + which + '\',' + i + ',\'range\',this.value)">';
          html += '<button class="grd-ld" type="button" onclick="removeGradingLevel(\'' + which + '\',' + i + ')" title="Remove level">&times;</button>';
          html += '</div>';
        }
        html += '</div>';
        html += '<div class="grd-add-level"><button class="btn btn-ghost btn-small" type="button" onclick="addGradingLevel(\'' + which + '\')">+ Add Level</button></div>';
      } else {
        // Percentage preset has no levels — offer to add them
        html += '<p style="font-size:12px; color:#64748b; margin-top:8px;">This scale has no defined levels. <a href="#" onclick="initLevelsForScale(\'' + which + '\'); return false;">Add levels</a></p>';
      }

      container.innerHTML = html;
    }

    function onGradingFieldChange(which, field, value) {
      var state = gradingEditorState[which];
      if (!state) return;
      if (field === 'passingLevel') {
        state.passingLevel = parseInt(value) || 1;
      } else if (field === 'strands') {
        state.strands = value.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
      }
      state.customized = true;
      document.getElementById('grd' + capitalize(which) + 'ResetLink').style.display = 'inline';
      updateGradingPreview();
    }

    function onLevelFieldChange(which, index, field, value) {
      var state = gradingEditorState[which];
      if (!state || !state.levels || !state.levels[index]) return;
      state.levels[index][field] = value;
      state.customized = true;
      document.getElementById('grd' + capitalize(which) + 'ResetLink').style.display = 'inline';
      updateGradingPreview();
    }

    function addGradingLevel(which) {
      var state = gradingEditorState[which];
      if (!state) return;
      if (!state.levels) state.levels = [];
      var newVal = state.levels.length > 0 ? state.levels[state.levels.length - 1].value - 1 : 1;
      if (newVal < 1) newVal = 1;
      state.levels.push({ value: newVal, label: '', range: '' });
      state.customized = true;
      document.getElementById('grd' + capitalize(which) + 'ResetLink').style.display = 'inline';
      renderGradingEditor(which);
      updateGradingPreview();
    }

    function removeGradingLevel(which, index) {
      var state = gradingEditorState[which];
      if (!state || !state.levels) return;
      state.levels.splice(index, 1);
      state.customized = true;
      document.getElementById('grd' + capitalize(which) + 'ResetLink').style.display = 'inline';
      renderGradingEditor(which);
      updateGradingPreview();
    }

    function initLevelsForScale(which) {
      var state = gradingEditorState[which];
      if (!state) return;
      state.levels = [];
      for (var v = state.scale; v >= 1; v--) {
        state.levels.push({ value: v, label: '', range: '' });
      }
      state.customized = true;
      document.getElementById('grd' + capitalize(which) + 'ResetLink').style.display = 'inline';
      renderGradingEditor(which);
    }

    function resetToPreset(which) {
      var selectId = which === 'primary' ? 'grdPrimaryPreset' : 'grdSecondaryPreset';
      var type = document.getElementById(selectId).value;
      var preset = findPreset(type);
      if (preset) {
        gradingEditorState[which] = deepCopyObj(preset);
        gradingEditorState[which].customized = false;
      }
      document.getElementById('grd' + capitalize(which) + 'ResetLink').style.display = 'none';
      renderGradingEditor(which);
      updateGradingPreview();
    }

    function addSecondaryScale() {
      // Default to first preset that is NOT the primary type
      var primaryType = gradingEditorState.primary ? gradingEditorState.primary.type : '';
      var secondaryPreset = null;
      for (var i = 0; i < gradingPresetsData.length; i++) {
        if (gradingPresetsData[i].type !== primaryType) {
          secondaryPreset = gradingPresetsData[i];
          break;
        }
      }
      if (!secondaryPreset && gradingPresetsData.length > 0) {
        secondaryPreset = gradingPresetsData[0];
      }
      if (secondaryPreset) {
        gradingEditorState.secondary = deepCopyObj(secondaryPreset);
        gradingEditorState.secondary.customized = false;
        document.getElementById('grdSecondaryPreset').value = secondaryPreset.type;
      }
      document.getElementById('grdSecondarySection').style.display = 'block';
      document.getElementById('grdAddSecondaryRow').style.display = 'none';
      document.getElementById('grdSecondaryCustomize').style.display = 'none';
      document.getElementById('grdSecondaryCustomizeLink').textContent = 'Customize...';
      document.getElementById('grdSecondaryResetLink').style.display = 'none';
      updateGradingPreview();
    }

    function removeSecondaryScale() {
      gradingEditorState.secondary = null;
      document.getElementById('grdSecondarySection').style.display = 'none';
      document.getElementById('grdAddSecondaryRow').style.display = 'block';
      updateGradingPreview();
    }

    function updateGradingPreview() {
      var container = document.getElementById('gradingPreview');
      var primary = gradingEditorState.primary;
      if (!primary) { container.style.display = 'none'; return; }

      var html = renderScalePreview(primary, 'Primary');
      var secondary = gradingEditorState.secondary;
      if (secondary) {
        html += renderScalePreview(secondary, 'Secondary');
      }

      container.innerHTML = html;
      container.style.display = 'block';
    }

    function renderScalePreview(scale, label) {
      var html = '<div class="grading-preview-header">';
      if (label) html += '<span style="font-size:11px; color:#94a3b8; margin-right:4px;">' + label + ':</span>';
      html += escapeHtml(scale.name);
      html += '<span class="grading-preview-scale">Scale: 1\u2013' + scale.scale + '</span>';
      if (scale.customized) html += '<span style="font-size:10px; color:#f59e0b; margin-left:4px;">(customized)</span>';
      html += '</div>';

      html += '<div class="grading-preview-meta">';
      html += '<span>Passing: ' + scale.passingLevel + '+</span>';
      if (scale.strands && scale.strands.length > 0) {
        html += '<span>Strands: ' + escapeHtml(scale.strands.join(', ')) + '</span>';
      }
      html += '</div>';

      if (scale.levels && scale.levels.length > 0) {
        html += '<div class="grading-preview-levels">';
        for (var j = 0; j < scale.levels.length; j++) {
          var level = scale.levels[j];
          var isPassing = level.value >= scale.passingLevel;
          html += '<span class="grading-preview-level' + (isPassing ? ' passing' : '') + '">';
          html += level.value + ' ' + escapeHtml(level.label);
          html += '</span>';
        }
        html += '</div>';
      }

      return html;
    }

 function loadCourses() {
  google.script.run
    .withSuccessHandler(function(courses) {
      coursesData = courses || [];
      showCourses();
      // Load unit counts for each course (async, updates badges when ready)
      for (var i = 0; i < coursesData.length; i++) {
        loadUnitCount(coursesData[i].courseId);
      }
    })
    .withFailureHandler(function(err) {
      console.error('[loadCourses] Error:', err);
    })
    .getCourses();
}

    function loadUnitCount(courseId) {
      google.script.run
        .withSuccessHandler(function(units) {
          unitCountsCache[courseId] = units ? units.length : 0;
          // Update the displayed count
          var countEl = document.getElementById('unit-count-' + courseId);
          if (countEl) {
            countEl.textContent = '📖 ' + unitCountsCache[courseId] + ' Unit' + (unitCountsCache[courseId] !== 1 ? 's' : '');
          }
        })
        .withFailureHandler(function(err) {
          console.error('Error loading units for course:', courseId, err);
          unitCountsCache[courseId] = 0;
        })
        .getUnits(courseId);
    }

    function showCourses() {
      var container = document.getElementById('coursesContent');
      var searchTerm = (document.getElementById('courseSearchInput').value || '').toLowerCase().trim();
      var statusFilter = document.getElementById('courseStatusFilter').value;

      // Filter courses
      var filteredCourses = coursesData.filter(function(course) {
        // Status filter
        var isActive = course.active !== false;
        if (statusFilter === 'active' && !isActive) return false;
        if (statusFilter === 'archived' && isActive) return false;

        // Search filter
        if (searchTerm) {
          var title = (course.title || '').toLowerCase();
          var dept = (course.programTrack || '').toLowerCase();
          if (title.indexOf(searchTerm) === -1 && dept.indexOf(searchTerm) === -1) {
            return false;
          }
        }

        return true;
      });

      if (filteredCourses.length === 0) {
        if (coursesData.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><h3>No courses yet</h3><p>Create your first course to organize your curriculum.</p><button class="btn btn-success" onclick="openCourseModal()">+ Create Course</button></div>';
        } else {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>No matching courses</h3><p>Try adjusting your search or filter.</p></div>';
        }
        return;
      }

      var html = '';
      for (var i = 0; i < filteredCourses.length; i++) {
        var course = filteredCourses[i];
        var isActive = course.active !== false;
        var safeCourseTitle = escapeHtml(course.title).replace(/'/g, "\\'");
        var unitCount = unitCountsCache[course.courseId] || 0;

        html += '<div class="course-card' + (isActive ? '' : ' archived') + '">';
        html += '<div class="course-card-header"><div>';
        html += '<div class="course-card-title"><span class="icon">📚</span>' + escapeHtml(course.title) + '</div>';

        // Subtitle: Department • Grade • Year
        var subtitleParts = [];
        if (course.programTrack) subtitleParts.push(escapeHtml(course.programTrack));
        if (course.gradeLevel) subtitleParts.push('Grade ' + escapeHtml(course.gradeLevel));
        if (course.year) subtitleParts.push(escapeHtml(course.year));
        if (subtitleParts.length > 0) {
          html += '<div class="course-card-subtitle">' + subtitleParts.join(' • ') + '</div>';
        }

        html += '</div>';
        html += '<span class="course-card-badge' + (isActive ? '' : ' archived') + '">' + (isActive ? 'Active' : 'Archived') + '</span></div>';

        html += '<div class="course-card-meta">';
        html += '<span class="unit-count-badge" id="unit-count-' + course.courseId + '">📖 ' + unitCount + ' Unit' + (unitCount !== 1 ? 's' : '') + '</span>';
        var gs = course.gradingSystem || {};
        var primaryName = (gs.primary && gs.primary.name) || (gs.name) || '8-Point SBAR';
        html += '<span class="grading-badge">' + escapeHtml(primaryName) + '</span>';
        if (gs.secondary && gs.secondary.name) {
          html += '<span class="grading-badge" style="background:#fef3c7; color:#d97706; border-color:#fde68a;">' + escapeHtml(gs.secondary.name) + '</span>';
        }
        if (course.standardFramework) {
          var stdLabel = course.standardSubject || course.standardFramework;
          html += '<span class="grading-badge" style="background:#ede9fe; color:#7c3aed; border-color:#ddd6fe;">' + escapeHtml(stdLabel) + '</span>';
        }
        html += '</div>';

        html += '<div class="course-card-actions">';
        html += '<button class="btn btn-outline btn-small" onclick="viewCourseUnits(\'' + course.courseId + '\', \'' + safeCourseTitle + '\')">View Units</button>';
        html += '<button class="btn btn-ghost btn-small" onclick="openCourseModal(\'' + course.courseId + '\')">Edit</button>';

        if (isActive) {
          html += '<button class="btn btn-ghost btn-small" onclick="toggleCourseArchive(\'' + course.courseId + '\', false)">Archive</button>';
        } else {
          html += '<button class="btn btn-ghost btn-small" onclick="toggleCourseArchive(\'' + course.courseId + '\', true)">Restore</button>';
        }
        html += '<button class="btn btn-ghost btn-small" style="color:#dc2626;" onclick="confirmDeleteCourse(\'' + course.courseId + '\', \'' + safeCourseTitle + '\')">Delete</button>';

        html += '</div></div>';
      }

      container.innerHTML = html;
    }

    function filterCourses() {
      showCourses();
    }

    function openCourseModal(courseId) {
      // Reset form
      document.getElementById('courseFormId').value = '';
      document.getElementById('courseFormTitle').value = '';
      document.getElementById('courseFormDepartment').value = '';
      document.getElementById('courseFormGradeLevel').value = '';
      document.getElementById('courseFormStdFramework').value = '';
      document.getElementById('courseFormStdSubject').innerHTML = '<option value="">Select framework first</option>';
      document.getElementById('courseFormStdSubject').disabled = true;

      // Set year to current
      var yearSelect = document.getElementById('courseFormYear');
      var currentYear = new Date().getFullYear();
      var currentYearStr = currentYear + '-' + (currentYear + 1);
      for (var i = 0; i < yearSelect.options.length; i++) {
        if (yearSelect.options[i].value === currentYearStr) {
          yearSelect.selectedIndex = i;
          break;
        }
      }

      if (courseId) {
        document.getElementById('courseModalTitle').textContent = 'Edit Course';
        var course = coursesData.find(function(c) { return c.courseId === courseId; });
        if (course) {
          document.getElementById('courseFormId').value = course.courseId;
          document.getElementById('courseFormTitle').value = course.title || '';
          document.getElementById('courseFormDepartment').value = course.programTrack || '';
          document.getElementById('courseFormGradeLevel').value = course.gradeLevel || '';
          document.getElementById('courseFormYear').value = course.year || '';
          // Standard set
          document.getElementById('courseFormStdFramework').value = course.standardFramework || '';
          if (course.standardFramework) {
            if (stdSubjectsCache) {
              populateCourseSubjectDropdown(course.standardFramework, course.standardSubject || '');
            } else {
              var capturedFw = course.standardFramework;
              var capturedSubj = course.standardSubject || '';
              google.script.run
                .withSuccessHandler(function(data) {
                  stdSubjectsCache = data || {};
                  populateCourseSubjectDropdown(capturedFw, capturedSubj);
                })
                .withFailureHandler(function() {
                  var subEl = document.getElementById('courseFormStdSubject');
                  subEl.innerHTML = '<option value="">All ' + escapeHtml(capturedFw) + '</option>';
                  subEl.disabled = false;
                })
                .getStandardSubjects();
            }
          }
          // Grading system: load into editor state
          var gs = course.gradingSystem || {};
          var primary = gs.primary || null;
          var secondary = gs.secondary || null;

          if (primary) {
            gradingEditorState.primary = deepCopyObj(primary);
            document.getElementById('grdPrimaryPreset').value = primary.type || 'sbar_8point';
          } else {
            var defPreset = findPreset('sbar_8point');
            gradingEditorState.primary = defPreset ? deepCopyObj(defPreset) : null;
            document.getElementById('grdPrimaryPreset').value = 'sbar_8point';
          }

          if (secondary) {
            gradingEditorState.secondary = deepCopyObj(secondary);
            document.getElementById('grdSecondaryPreset').value = secondary.type || '';
            document.getElementById('grdSecondarySection').style.display = 'block';
            document.getElementById('grdAddSecondaryRow').style.display = 'none';
          } else {
            gradingEditorState.secondary = null;
            document.getElementById('grdSecondarySection').style.display = 'none';
            document.getElementById('grdAddSecondaryRow').style.display = 'block';
          }

          // Open customize panels if customized
          if (primary && primary.customized) {
            document.getElementById('grdPrimaryCustomize').style.display = 'block';
            document.getElementById('grdPrimaryCustomizeLink').textContent = 'Hide customization';
            document.getElementById('grdPrimaryResetLink').style.display = 'inline';
            renderGradingEditor('primary');
          } else {
            document.getElementById('grdPrimaryCustomize').style.display = 'none';
            document.getElementById('grdPrimaryCustomizeLink').textContent = 'Customize...';
            document.getElementById('grdPrimaryResetLink').style.display = 'none';
          }
          if (secondary && secondary.customized) {
            document.getElementById('grdSecondaryCustomize').style.display = 'block';
            document.getElementById('grdSecondaryCustomizeLink').textContent = 'Hide customization';
            document.getElementById('grdSecondaryResetLink').style.display = 'inline';
            renderGradingEditor('secondary');
          } else {
            document.getElementById('grdSecondaryCustomize').style.display = 'none';
            document.getElementById('grdSecondaryCustomizeLink').textContent = 'Customize...';
            document.getElementById('grdSecondaryResetLink').style.display = 'none';
          }
        }
      } else {
        document.getElementById('courseModalTitle').textContent = 'Create New Course';
        // Default: SBAR primary, no secondary
        var defPreset = findPreset('sbar_8point');
        gradingEditorState.primary = defPreset ? deepCopyObj(defPreset) : null;
        if (gradingEditorState.primary) gradingEditorState.primary.customized = false;
        gradingEditorState.secondary = null;
        document.getElementById('grdPrimaryPreset').value = 'sbar_8point';
        document.getElementById('grdSecondarySection').style.display = 'none';
        document.getElementById('grdAddSecondaryRow').style.display = 'block';
        // Reset customize panels for create mode
        document.getElementById('grdPrimaryCustomize').style.display = 'none';
        document.getElementById('grdPrimaryCustomizeLink').textContent = 'Customize...';
        document.getElementById('grdPrimaryResetLink').style.display = 'none';
        document.getElementById('grdSecondaryCustomize').style.display = 'none';
        document.getElementById('grdSecondaryCustomizeLink').textContent = 'Customize...';
        document.getElementById('grdSecondaryResetLink').style.display = 'none';
      }

      updateGradingPreview();
      document.getElementById('courseModal').classList.add('active');
      document.getElementById('courseFormTitle').focus();
    }

    function closeCourseModal() {
      document.getElementById('courseModal').classList.remove('active');
    }

    function onCourseFrameworkChange() {
      var fw = document.getElementById('courseFormStdFramework').value;
      var subjectEl = document.getElementById('courseFormStdSubject');
      if (!fw) {
        subjectEl.innerHTML = '<option value="">Select framework first</option>';
        subjectEl.disabled = true;
        return;
      }
      // Load subjects from cache or RPC
      if (stdSubjectsCache) {
        populateCourseSubjectDropdown(fw, '');
      } else {
        subjectEl.innerHTML = '<option value="">Loading...</option>';
        subjectEl.disabled = true;
        google.script.run
          .withSuccessHandler(function(data) {
            stdSubjectsCache = data || {};
            populateCourseSubjectDropdown(fw, '');
          })
          .withFailureHandler(function() {
            subjectEl.innerHTML = '<option value="">All ' + escapeHtml(fw) + '</option>';
            subjectEl.disabled = false;
          })
          .getStandardSubjects();
      }
    }

    function populateCourseSubjectDropdown(framework, selectedSubject) {
      var subjectEl = document.getElementById('courseFormStdSubject');
      var subjects = (stdSubjectsCache && stdSubjectsCache[framework]) || [];
      var html = '<option value="">All ' + escapeHtml(framework) + '</option>';
      for (var i = 0; i < subjects.length; i++) {
        var sel = (subjects[i] === selectedSubject) ? ' selected' : '';
        html += '<option value="' + escapeHtml(subjects[i]) + '"' + sel + '>' + escapeHtml(subjects[i]) + '</option>';
      }
      subjectEl.innerHTML = html;
      subjectEl.disabled = false;
      if (selectedSubject) {
        subjectEl.value = selectedSubject;
      }
    }

    function saveCourse() {
      var courseId = document.getElementById('courseFormId').value;
      var title = document.getElementById('courseFormTitle').value.trim();
      var department = document.getElementById('courseFormDepartment').value;
      var gradeLevel = document.getElementById('courseFormGradeLevel').value;
      var year = document.getElementById('courseFormYear').value;

      // Validation
      if (!title) { showToast('Please enter a course title', 'error'); return; }
      if (!department) { showToast('Please select a department', 'error'); return; }
      if (!gradeLevel) { showToast('Please select a grade level', 'error'); return; }

      // Grading system: build from editor state
      var gradingSystem = {
        primary: gradingEditorState.primary ? deepCopyObj(gradingEditorState.primary) : null,
        secondary: gradingEditorState.secondary ? deepCopyObj(gradingEditorState.secondary) : null
      };

      var stdFramework = document.getElementById('courseFormStdFramework').value;
      var stdSubject = document.getElementById('courseFormStdSubject').value;

      var courseData = {
        title: title,
        programTrack: department,
        gradeLevel: gradeLevel,
        year: year,
        gradingSystem: gradingSystem,
        standardFramework: stdFramework,
        standardSubject: stdSubject,
        active: true
      };

      if (courseId) {
        courseData.courseId = courseId;
        // Preserve active status when editing
        var existingCourse = coursesData.find(function(c) { return c.courseId === courseId; });
        if (existingCourse) {
          courseData.active = existingCourse.active;
        }
      }

      showToast('Saving course...', 'info');

    google.script.run
        .withSuccessHandler(function(savedCourse) {
          showToast(courseId ? 'Course updated!' : 'Course created!', 'success');
          closeCourseModal();

          // BUGFIX: Use returned course directly
          if (savedCourse && savedCourse.courseId) {
            var existingIndex = -1;
            for (var i = 0; i < coursesData.length; i++) {
              if (coursesData[i].courseId === savedCourse.courseId) {
                existingIndex = i;
                break;
              }
            }

            if (existingIndex >= 0) {
              coursesData[existingIndex] = savedCourse;
            } else {
              coursesData.push(savedCourse);
            }

            showCourses();
            loadUnitCount(savedCourse.courseId);
          } else {
            loadCourses();  // Fallback
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error: ' + err.message, 'error');
        })
        .saveCourse(courseData);
    }

    function toggleCourseArchive(courseId, restore) {
      var course = coursesData.find(function(c) { return c.courseId === courseId; });
      if (!course) return;

      var action = restore ? 'restore' : 'archive';
      if (!confirm('Are you sure you want to ' + action + ' "' + course.title + '"?')) return;

      // Create a copy with updated active status
      var updatedCourse = {
        courseId: course.courseId,
        title: course.title,
        programTrack: course.programTrack,
        gradeLevel: course.gradeLevel,
        year: course.year,
        active: restore
      };

      showToast((restore ? 'Restoring' : 'Archiving') + ' course...', 'info');

    google.script.run
        .withSuccessHandler(function(savedCourse) {
          showToast('Course ' + (restore ? 'restored' : 'archived') + '!', 'success');

          // BUGFIX: Update local data directly
          if (savedCourse && savedCourse.courseId) {
            for (var i = 0; i < coursesData.length; i++) {
              if (coursesData[i].courseId === savedCourse.courseId) {
                coursesData[i] = savedCourse;
                break;
              }
            }
            showCourses();
          } else {
            loadCourses();
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error: ' + err.message, 'error');
        })
        .saveCourse(updatedCourse);
    }

    function confirmDeleteCourse(courseId, courseTitle) {
      if (!confirm('Delete course "' + courseTitle + '" and ALL its units, lessons, and linked maps?\n\nThis cannot be undone.')) return;
      showToast('Deleting course...', 'info');
      google.script.run
        .withSuccessHandler(function() {
          showToast('Course deleted', 'success');
          coursesData = coursesData.filter(function(c) { return c.courseId !== courseId; });
          showCourses();
        })
        .withFailureHandler(function(err) {
          showToast('Error: ' + escapeHtml(err.message), 'error');
        })
        .deleteCourse(courseId);

    function viewCourseUnits(courseId, courseTitle) {

      // Story 2.2: Reset to units mode when opening for a new course
      unitsPanelMode = 'units';
      currentLessonsUnitId = null;
      currentLessonsData = [];
      currentLessonMapHexes = [];

      var panel = document.getElementById('unitsPanel');
      var titleEl = document.getElementById('unitsPanelTitle');
      titleEl.innerHTML = '';
      titleEl.textContent = courseTitle ? courseTitle + ' — Units' : 'Units';
      panel.classList.add('active');

      // Show/hide footer (Add Unit button) based on view mode
      var footer = document.getElementById('unitsPanelFooter');
      if (currentViewMode === 'teacher') {
        footer.style.display = 'block';

    function closeUnitsPanel() {
      var panel = document.getElementById('unitsPanel');
      panel.classList.remove('active');
      currentUnitsCourseId = null;
      currentUnitsData = [];
      // Story 2.2: Reset lesson state
      currentLessonsUnitId = null;
      currentLessonsData = [];
      currentLessonMapHexes = [];
      unitsPanelMode = 'units';

    function loadUnitsForPanel(courseId) {
      var body = document.getElementById('unitsPanelBody');
      body.innerHTML = '<div class="loading"><span class="loading-spinner"></span>Loading units...</div>';

      google.script.run
        .withSuccessHandler(function(units) {
          currentUnitsData = units || [];
          // Sort by sequence
          currentUnitsData.sort(function(a, b) {
            return (a.sequence || 0) - (b.sequence || 0);
          });
          renderUnitsPanel();
        })
        .withFailureHandler(function(err) {
          var body = document.getElementById('unitsPanelBody');
          body.innerHTML = '<p style="color:#dc2626; padding:16px;">Error loading units: ' + escapeHtml(err.message) + '</p>';
        })
        .getUnitsForCourse(courseId);
    }

    function renderUnitsPanel() {
      var body = document.getElementById('unitsPanelBody');
      var isTeacher = (currentViewMode === 'teacher');

      if (currentUnitsData.length === 0) {
        body.innerHTML = '<div style="text-align:center; padding:40px 16px; color:#94a3b8;">' +
          '<div style="font-size:48px; margin-bottom:12px;">📖</div>' +
          '<p style="font-size:14px; margin:0;">No units yet.</p>' +
          (isTeacher ? '<p style="font-size:13px; color:#64748b; margin-top:8px;">Click "+ Add Unit" below to create one.</p>' : '') +
          '</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < currentUnitsData.length; i++) {
        var unit = currentUnitsData[i];
        var mapName = unit.mapId ? getMapNameById(unit.mapId) : '';
        var statusClass = (unit.status === 'active') ? 'status-active' :
                          (unit.status === 'draft') ? 'status-draft' : 'status-archived';
        var statusLabel = unit.status ? unit.status.charAt(0).toUpperCase() + unit.status.slice(1) : 'Active';

        html += '<div class="unit-card" data-unit-id="' + unit.unitId + '">';
        html += '<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">';
        html += '<span class="unit-card-seq">' + (unit.sequence || (i + 1)) + '</span>';
        html += '<div style="flex:1; min-width:0;">';
        html += '<div style="font-weight:600; font-size:14px; color:#1e293b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + escapeHtml(unit.title) + '</div>';
        html += '<div class="unit-card-meta">';
        if (unit.lessonCount !== undefined) {
          html += '<span>📝 ' + unit.lessonCount + ' lesson' + (unit.lessonCount !== 1 ? 's' : '') + '</span>';
        }
        if (mapName) {
          html += '<span>🗺️ ' + escapeHtml(mapName) + '</span>';
        }
        html += '</div>';
        html += '</div>';
        html += '<span class="unit-card-status ' + statusClass + '">' + statusLabel + '</span>';
        html += '</div>';

        // Action buttons
        html += '<div class="unit-card-actions">';
        if (isTeacher) {
          // Reorder buttons
          html += '<span>';
          if (i > 0) {
            html += '<button class="unit-reorder-btn" onclick="moveUnitUp(\'' + unit.unitId + '\')" title="Move up">&#9650;</button>';
          }
          if (i < currentUnitsData.length - 1) {
            html += '<button class="unit-reorder-btn" onclick="moveUnitDown(\'' + unit.unitId + '\')" title="Move down">&#9660;</button>';
          }
          html += '</span>';
          // Edit / Delete / Unlink
          html += '<span>';
          html += '<button class="btn btn-ghost btn-small" onclick="openUnitModal(\'' + unit.unitId + '\')">Edit</button>';
          if (unit.mapId) {
            html += '<button class="btn btn-ghost btn-small" onclick="confirmUnlinkMap(\'' + unit.unitId + '\')" style="color:#f59e0b;">Unlink Map</button>';
          }
          html += '<button class="btn btn-ghost btn-small" onclick="confirmDeleteUnit(\'' + unit.unitId + '\')" style="color:#dc2626;">Delete</button>';
          html += '</span>';
          // View Lessons button (teacher)
          html += '<button class="btn btn-outline btn-small" onclick="viewUnitLessons(\'' + unit.unitId + '\')" style="margin-top:4px; width:100%;">Lessons (' + (unit.lessonCount || 0) + ')</button>';
        } else {
          // Student view: Open Map + View Lessons
          if (unit.mapId) {
            html += '<button class="btn btn-success btn-small" onclick="openMapFromUnit(\'' + unit.mapId + '\')">Open Map</button>';
          }
          html += '<button class="btn btn-outline btn-small" onclick="viewUnitLessons(\'' + unit.unitId + '\')">Lessons (' + (unit.lessonCount || 0) + ')</button>';
          if (!unit.mapId) {
            html += '<span style="font-size:12px; color:#94a3b8;">No map linked</span>';
          }
        }
        html += '</div>';
        html += '</div>';
      }

      body.innerHTML = html;
    }

    function getMapNameById(mapId) {
      if (!mapId || !mapsData) return '';
      for (var i = 0; i < mapsData.length; i++) {
        if (mapsData[i].mapId === mapId) {
          return mapsData[i].title || mapsData[i].name || 'Untitled Map';
        }
      }
      return 'Unknown Map';
    }

    // ---- Unit Modal Functions ----

    function openUnitModal(unitId) {
      var modal = document.getElementById('unitModal');
      var titleEl = document.getElementById('unitModalTitle');
      var formId = document.getElementById('unitFormId');
      var formCourseId = document.getElementById('unitFormCourseId');
      var formTitle = document.getElementById('unitFormTitle');
      var formStatus = document.getElementById('unitFormStatus');

      // Reset form
      formId.value = '';
      formCourseId.value = currentUnitsCourseId || '';
      formTitle.value = '';
      formStatus.value = 'active';

      // Reset vocabulary section
      if (typeof dctResetState === 'function') dctResetState();

      // Reset PBL section
      var dtkEnabled = document.getElementById('dtkPblEnabled');
      if (dtkEnabled) dtkEnabled.checked = false;
      var dtkConfig = document.getElementById('dtkFrameworkConfig');
      if (dtkConfig) dtkConfig.classList.remove('dtk-visible');
      dtkCurrentFramework = null;

      if (unitId) {
        // Edit mode: find unit in current data
        var unit = null;
        for (var i = 0; i < currentUnitsData.length; i++) {
          if (currentUnitsData[i].unitId === unitId) {
            unit = currentUnitsData[i];
            break;
          }
        }
        if (unit) {
          titleEl.textContent = 'Edit Unit';
          formId.value = unit.unitId;
          formCourseId.value = unit.courseId;
          formTitle.value = unit.title || '';
          formStatus.value = unit.status || 'active';
          populateUnitMapDropdown(unit.mapId || '');

          // Populate PBL framework
          var fw = null;
          if (unit.designFrameworkJson) {
            try {
              fw = (typeof unit.designFrameworkJson === 'string') ? JSON.parse(unit.designFrameworkJson) : unit.designFrameworkJson;
            } catch(e) { fw = null; }
          }
          if (fw && fw.isActive) {
            dtkEnabled.checked = true;
            dtkConfig.classList.add('dtk-visible');
            dtkCurrentFramework = fw;
            var fwSelect = document.getElementById('dtkFrameworkSelect');
            if (fwSelect) fwSelect.value = fw.type || 'dschool';
            dtkRenderPhaseList(fw.phases || []);
            if (fw.type === 'custom') {
              dtkRenderCustomEditor(fw.phases || []);
            }
          }

          // Populate vocabulary
          var vocabData = null;
          if (unit.vocabularyJson) {
            try {
              vocabData = (typeof unit.vocabularyJson === 'string') ? JSON.parse(unit.vocabularyJson) : unit.vocabularyJson;
            } catch(ev) { vocabData = null; }
          }
          dctUnitVocab = vocabData || [];
        } else {
          showToast('Unit not found', 'error');
          return;
        }
      } else {
        titleEl.textContent = 'Create New Unit';
        populateUnitMapDropdown('');
      }

      // Render vocabulary section
      if (typeof dctRenderUnitVocabSection === 'function') {
        dctRenderUnitVocabSection();
      }

      modal.classList.add('active');
      formTitle.focus();
    }

    function closeUnitModal() {
      var modal = document.getElementById('unitModal');
      modal.classList.remove('active');
    }

    function populateUnitMapDropdown(currentMapId) {
      var select = document.getElementById('unitFormMapId');
      // Start fresh
      select.innerHTML = '<option value="">-- No Map Linked --</option>';

      if (!mapsData || mapsData.length === 0) return;

      // Build a set of mapIds already linked to OTHER units (not the one being edited)
      var linkedMapIds = {};
      var editingUnitId = document.getElementById('unitFormId').value;
      for (var i = 0; i < currentUnitsData.length; i++) {
        var u = currentUnitsData[i];
        if (u.mapId && u.unitId !== editingUnitId) {
          linkedMapIds[u.mapId] = true;
        }
      }

      for (var j = 0; j < mapsData.length; j++) {
        var map = mapsData[j];
        var mapId = map.mapId;
        // Show if: it's the current map, OR it's not linked to another unit
        if (mapId === currentMapId || !linkedMapIds[mapId]) {
          var opt = document.createElement('option');
          opt.value = mapId;
          opt.textContent = map.title || map.name || 'Untitled Map';
          if (mapId === currentMapId) opt.selected = true;
          select.appendChild(opt);
        }
      }
    }

    function saveUnitFromModal() {
      var unitId = document.getElementById('unitFormId').value;
      var courseId = document.getElementById('unitFormCourseId').value;
      var title = document.getElementById('unitFormTitle').value.trim();
      var status = document.getElementById('unitFormStatus').value;
      var newMapId = document.getElementById('unitFormMapId').value;

      if (!title) {
        showToast('Unit title is required', 'error');
        return;
      }

      // Find old mapId for comparison (edit mode)
      var oldMapId = '';
      if (unitId) {
        for (var i = 0; i < currentUnitsData.length; i++) {
          if (currentUnitsData[i].unitId === unitId) {
            oldMapId = currentUnitsData[i].mapId || '';
            break;
          }
        }
      }

      var unitData = {
        courseId: courseId,
        title: title,
        status: status
      };
      if (unitId) {
        unitData.unitId = unitId;
      }
      // Don't set mapId directly - we handle linking separately
      if (!unitId) {
        unitData.mapId = '';
      }

      // PBL / Design Framework
      var dtkEnabledChk = document.getElementById('dtkPblEnabled');
      if (dtkEnabledChk && dtkEnabledChk.checked && dtkCurrentFramework) {
        unitData.designFrameworkJson = JSON.stringify(dtkCurrentFramework);
      } else if (dtkEnabledChk && !dtkEnabledChk.checked) {
        // Explicitly disable — preserve type/phases but set isActive=false
        var existingFw = dtkCurrentFramework || { type: 'dschool', phases: [] };
        existingFw.isActive = false;
        unitData.designFrameworkJson = JSON.stringify(existingFw);
      }

      showToast('Saving unit...', 'info');

      google.script.run
        .withSuccessHandler(function(savedUnit) {
          showToast(unitId ? 'Unit updated!' : 'Unit created!', 'success');

          // Save vocabulary after unit save
          var savedUnitId = savedUnit.unitId || unitId;
          if (typeof dctSaveUnitVocab === 'function' && dctUnitVocab && dctUnitVocab.length > 0) {
            dctSaveUnitVocab(savedUnitId);
          }

          closeUnitModal();

          // Handle map link changes after unit save
          handleMapLinkChange(savedUnitId, oldMapId, newMapId);

          // Reload units panel
          loadUnitsForPanel(currentUnitsCourseId);
          // Refresh unit count badge on course card
          refreshUnitCountForCourse(currentUnitsCourseId);
        })
        .withFailureHandler(function(err) {
          showToast('Error saving unit: ' + err.message, 'error');
        })
        .saveUnit(unitData);
    }

    function handleMapLinkChange(unitId, oldMapId, newMapId) {
      if (oldMapId === newMapId) return; // No change

      if (oldMapId && !newMapId) {
        // Unlink old map
        google.script.run
          .withSuccessHandler(function() { /* silent success */ })
          .withFailureHandler(function(err) {
            showToast('Warning: Failed to unlink old map: ' + err.message, 'error');
          })
          .unlinkMapFromUnit(unitId);
      } else if (newMapId && oldMapId !== newMapId) {
        // If there was an old map, unlink first then link new
        if (oldMapId) {
          google.script.run
            .withSuccessHandler(function() {
              linkNewMap(unitId, newMapId);
            })
            .withFailureHandler(function(err) {
              showToast('Warning: Failed to unlink old map: ' + err.message, 'error');
              // Still try to link new map
              linkNewMap(unitId, newMapId);
            })
            .unlinkMapFromUnit(unitId);
        } else {
          linkNewMap(unitId, newMapId);
        }
      }
    }

    function linkNewMap(unitId, mapId) {
      google.script.run
        .withSuccessHandler(function() {
          showToast('Map linked to unit!', 'success');
          // Reload to show updated map name
          if (currentUnitsCourseId) {
            loadUnitsForPanel(currentUnitsCourseId);
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error linking map: ' + err.message, 'error');
        })
        .linkMapToUnit(unitId, mapId);
    }

    function dtkTogglePbl() {
      var enabled = document.getElementById('dtkPblEnabled').checked;
      var configDiv = document.getElementById('dtkFrameworkConfig');
      if (enabled) {
        configDiv.classList.add('dtk-visible');
        // Initialize framework if none set
        if (!dtkCurrentFramework) {
          dtkOnFrameworkChange();
        }
      } else {
        configDiv.classList.remove('dtk-visible');
        if (dtkCurrentFramework) {
          dtkCurrentFramework.isActive = false;
        }
      }
    }

    function dtkOnFrameworkChange() {
      var type = document.getElementById('dtkFrameworkSelect').value;
      var customEditor = document.getElementById('dtkCustomEditor');

      if (type === 'custom') {
        // Custom: start from current or empty
        var phases = (dtkCurrentFramework && dtkCurrentFramework.phases) ? dtkCurrentFramework.phases : [
          { id: 'phase_1', label: 'Phase 1', icon: '', color: '#3b82f6' }
        ];
        dtkCurrentFramework = { type: 'custom', isActive: true, phases: phases };
        dtkRenderPhaseList(phases);
        dtkRenderCustomEditor(phases);
        customEditor.style.display = 'block';
      } else {
        // Preset
        var preset = DTK_PRESETS[type];
        if (preset) {
          var presetPhases = [];
          for (var i = 0; i < preset.phases.length; i++) {
            presetPhases.push({
              id: preset.phases[i].id,
              label: preset.phases[i].label,
              icon: preset.phases[i].icon || '',
              color: preset.phases[i].color
            });
          }
          dtkCurrentFramework = { type: type, isActive: true, phases: presetPhases };
          dtkRenderPhaseList(presetPhases);
        }
        customEditor.style.display = 'none';
      }
    }

    function dtkRenderPhaseList(phases) {
      var container = document.getElementById('dtkPhaseList');
      if (!container) return;
      var html = '';
      for (var i = 0; i < phases.length; i++) {
        var p = phases[i];
        html += '<div class="dtk-phase-item">';
        html += '<span class="dtk-phase-dot" style="background:' + (p.color || '#64748b') + ';"></span>';
        html += '<span class="dtk-phase-name">' + escapeHtml(p.label) + '</span>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function dtkRenderCustomEditor(phases) {
      var container = document.getElementById('dtkCustomEditor');
      if (!container) return;
      var html = '';
      for (var i = 0; i < phases.length; i++) {
        var p = phases[i];
        html += '<div class="dtk-custom-row" data-dtk-idx="' + i + '">';
        html += '<input type="color" class="dtk-custom-color" value="' + (p.color || '#3b82f6') + '" onchange="dtkUpdateCustomPhase(' + i + ', \'color\', this.value)">';
        html += '<input type="text" class="dtk-custom-label-input" value="' + escapeHtml(p.label) + '" placeholder="Phase name" onchange="dtkUpdateCustomPhase(' + i + ', \'label\', this.value)">';
        if (phases.length > 1) {
          html += '<button class="dtk-custom-remove" onclick="dtkRemoveCustomPhase(' + i + ')" title="Remove">&times;</button>';
        }
        html += '</div>';
      }
      if (phases.length < 8) {
        html += '<button class="dtk-custom-add-btn" onclick="dtkAddCustomPhase()">+ Add Phase</button>';
      }
      container.innerHTML = html;
    }

    function dtkUpdateCustomPhase(idx, field, value) {
      if (!dtkCurrentFramework || !dtkCurrentFramework.phases[idx]) return;
      dtkCurrentFramework.phases[idx][field] = value;
      if (field === 'label') {
        dtkCurrentFramework.phases[idx].id = value.toLowerCase().replace(/[^a-z0-9]+/g, '_').substring(0, 30);
      }
      dtkRenderPhaseList(dtkCurrentFramework.phases);
    }

    function dtkRemoveCustomPhase(idx) {
      if (!dtkCurrentFramework) return;
      dtkCurrentFramework.phases.splice(idx, 1);
      dtkRenderPhaseList(dtkCurrentFramework.phases);
      dtkRenderCustomEditor(dtkCurrentFramework.phases);
    }

    function dtkAddCustomPhase() {
      if (!dtkCurrentFramework) return;
      if (dtkCurrentFramework.phases.length >= 8) return;
      var n = dtkCurrentFramework.phases.length + 1;
      dtkCurrentFramework.phases.push({ id: 'phase_' + n, label: 'Phase ' + n, icon: '', color: '#64748b' });
      dtkRenderPhaseList(dtkCurrentFramework.phases);
      dtkRenderCustomEditor(dtkCurrentFramework.phases);
    }

    // ---- Reorder Functions ----

    function moveUnitUp(unitId) {
      var idx = -1;
      for (var i = 0; i < currentUnitsData.length; i++) {
        if (currentUnitsData[i].unitId === unitId) { idx = i; break; }
      }
      if (idx <= 0) return;

      // Swap locally
      var temp = currentUnitsData[idx];
      currentUnitsData[idx] = currentUnitsData[idx - 1];
      currentUnitsData[idx - 1] = temp;

      // Update sequence numbers
      for (var j = 0; j < currentUnitsData.length; j++) {
        currentUnitsData[j].sequence = j + 1;
      }

      // Optimistic re-render
      renderUnitsPanel();

      // Persist to backend
      var unitIds = currentUnitsData.map(function(u) { return u.unitId; });
      google.script.run
        .withSuccessHandler(function() { /* silent */ })
        .withFailureHandler(function(err) {
          showToast('Error reordering: ' + err.message, 'error');
          // Reload to get correct order
          loadUnitsForPanel(currentUnitsCourseId);
        })
        .reorderUnits(currentUnitsCourseId, unitIds);
    }

    function moveUnitDown(unitId) {
      var idx = -1;
      for (var i = 0; i < currentUnitsData.length; i++) {
        if (currentUnitsData[i].unitId === unitId) { idx = i; break; }
      }
      if (idx < 0 || idx >= currentUnitsData.length - 1) return;

      // Swap locally
      var temp = currentUnitsData[idx];
      currentUnitsData[idx] = currentUnitsData[idx + 1];
      currentUnitsData[idx + 1] = temp;

      // Update sequence numbers
      for (var j = 0; j < currentUnitsData.length; j++) {
        currentUnitsData[j].sequence = j + 1;
      }

      // Optimistic re-render
      renderUnitsPanel();

      // Persist to backend
      var unitIds = currentUnitsData.map(function(u) { return u.unitId; });
      google.script.run
        .withSuccessHandler(function() { /* silent */ })
        .withFailureHandler(function(err) {
          showToast('Error reordering: ' + err.message, 'error');
          loadUnitsForPanel(currentUnitsCourseId);
        })
        .reorderUnits(currentUnitsCourseId, unitIds);
    }

    // ---- Delete / Unlink Functions ----

    function confirmDeleteUnit(unitId) {
      var unit = null;
      for (var i = 0; i < currentUnitsData.length; i++) {
        if (currentUnitsData[i].unitId === unitId) { unit = currentUnitsData[i]; break; }
      }
      if (!unit) return;

      var msg = 'Delete unit "' + unit.title + '"';
      if (unit.mapId) {
        msg += ', its lessons, and linked map';
      }
      msg += '? This cannot be undone.';
      if (!confirm(msg)) return;

      showToast('Deleting unit...', 'info');
      google.script.run
        .withSuccessHandler(function() {
          showToast('Unit deleted!', 'success');
          loadUnitsForPanel(currentUnitsCourseId);
          refreshUnitCountForCourse(currentUnitsCourseId);
        })
        .withFailureHandler(function(err) {
          showToast('Error deleting unit: ' + err.message, 'error');
        })
        .deleteUnit(unitId);
    }

    function confirmUnlinkMap(unitId) {
      var unit = null;
      for (var i = 0; i < currentUnitsData.length; i++) {
        if (currentUnitsData[i].unitId === unitId) { unit = currentUnitsData[i]; break; }

      if (!unit || !unit.mapId) return;

    function loadLessonAccommodationReminders() {
      var contentEl = document.getElementById('lsnAccommodationsContent');
      var badgeEl = document.getElementById('lsnAccommodationCount');
      if (!contentEl) return;

      // Find the map for the current unit
      var unitId = currentLessonsUnitId;
      if (!unitId) {
        contentEl.innerHTML = '<div style="color:#a0aec0;font-size:13px;">No unit context — cannot check accommodations.</div>';
        if (badgeEl) badgeEl.style.display = 'none';
        return;
      }

      // Trace unit -> map
      var mapId = null;
      for (var i = 0; i < currentUnitsData.length; i++) {
        if (currentUnitsData[i].unitId === unitId && currentUnitsData[i].mapId) {
          mapId = currentUnitsData[i].mapId;
          break;
        }
      }

        return;
      }

      contentEl.innerHTML = '<div class="loading">Checking for student accommodations...</div>';

      google.script.run
        .withSuccessHandler(function(data) {
          renderAccommodationReminders(data);
        })
        .withFailureHandler(function(err) {
          contentEl.innerHTML = '<div style="color:#a0aec0;font-size:13px;">Could not load accommodations.</div>';
          if (badgeEl) badgeEl.style.display = 'none';

      var contentEl = document.getElementById('lsnAccommodationsContent');
      var badgeEl = document.getElementById('lsnAccommodationCount');

      if (!data || data.totalStudentsWithProfiles === 0) {

        if (badgeEl) badgeEl.style.display = 'none';

      }

      // Show badge count
      if (badgeEl) {
        badgeEl.textContent = data.totalStudentsWithProfiles;
        badgeEl.style.display = 'inline-block';
      }

      // Summary bar
      html += '<div class="ssp-reminder-summary">';
      html += '&#128203; <strong>' + data.totalStudentsWithProfiles + ' student(s)</strong> with support profiles';
      if (data.classNames && data.classNames.length > 0) {
        html += ' across ' + data.classNames.join(', ');
      }
      html += '</div>';

      // Grouped accommodation reminders
      if (data.reminders && data.reminders.length > 0) {
        for (var r = 0; r < data.reminders.length; r++) {
          var rem = data.reminders[r];
          html += '<div class="ssp-reminder-group">';
          html += '<div class="ssp-reminder-group-title">' + escapeHtml(rem.label) + ' (' + rem.count + ')</div>';
          html += '<div class="ssp-reminder-students">';
          for (var s = 0; s < rem.students.length; s++) {
            html += '<span class="ssp-student-chip">' + escapeHtml(rem.students[s]) + '</span>';
          }
          html += '</div>';
          html += '</div>';
        }
      }

      // WIDA students with strategies
      if (data.widaStudents && data.widaStudents.length > 0) {
        html += '<div class="ssp-section-title" style="margin-top:16px;">EAL Students (WIDA)</div>';
        for (var w = 0; w < data.widaStudents.length; w++) {
          var ws = data.widaStudents[w];

          html += '<div class="ssp-wida-card-header">';

          html += '<span class="ssp-wida-badge ssp-wida-' + ws.level + '">WIDA ' + ws.level + '</span>';

          if (ws.strategies && ws.strategies.length > 0) {

              html += '<span class="ssp-strategy-tag">' + escapeHtml(ws.strategies[st]) + '</span>';
            }
          }
          html += '</div>';
        }
      }

      contentEl.innerHTML = html;
