<style>
/* ===== Student Study Dashboard (ssd-) ===== */

/* Layout: main panel + side panel */
.ssd-layout {
  display: flex;
  gap: 24px;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.ssd-main {
  flex: 1;
  min-width: 0;
}

.ssd-side {
  width: 280px;
  flex-shrink: 0;
}

/* Welcome section */
.ssd-welcome {
  background: linear-gradient(135deg, #f0fdfa 0%, #ecfdf5 100%);
  border: 1px solid #99f6e4;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 20px;
}

.ssd-welcome-msg {
  font-size: 15px;
  color: #134e4a;
  line-height: 1.5;
  margin: 0;
}

.ssd-welcome-streak {
  display: inline-block;
  margin-left: 8px;
  font-weight: 600;
}

/* Stats cards */
.ssd-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.ssd-stat-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 14px 16px;
  text-align: center;
}

.ssd-stat-value {
  font-size: 24px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.2;
}

.ssd-stat-label {
  font-size: 12px;
  color: #64748b;
  margin-top: 4px;
}

.ssd-stat-sub {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 2px;
}

.ssd-stat-value.ssd-streak-red { color: #dc2626; }
.ssd-stat-value.ssd-streak-amber { color: #d97706; }
.ssd-stat-value.ssd-streak-gray { color: #94a3b8; }

/* Empty state */
.ssd-empty {
  text-align: center;
  padding: 48px 20px;
  color: #64748b;
}

.ssd-empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.ssd-empty-title {
  font-size: 18px;
  font-weight: 600;
  color: #334155;
  margin-bottom: 8px;
}

.ssd-empty-text {
  font-size: 14px;
  line-height: 1.5;
}
.ssd-empty-action {
  display: inline-block; margin-top: 16px; padding: 10px 24px;
  background: linear-gradient(135deg, #14b8a6, #0d9488); color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.15s ease;
}
.ssd-empty-action:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(20,184,166,0.35); }
.ssd-empty-action:focus-visible { outline: 3px solid #14b8a6; outline-offset: 2px; }

/* Loading state */
.ssd-loading {
  text-align: center;
  padding: 48px 20px;
  color: #64748b;
  font-size: 14px;
}

/* Topic navigator — map chips */
.ssd-section-title {
  font-size: 15px;
  font-weight: 600;
  color: #334155;
  margin-bottom: 12px;
}

.ssd-map-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.ssd-map-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #e2e8f0;
  background: #fff;
  font-size: 13px;
  color: #475569;
  cursor: pointer;
  transition: all 0.15s ease;
}

.ssd-map-chip:hover {
  border-color: #99f6e4;
  background: #f0fdfa;
}

.ssd-map-chip.active {
  border-color: #14b8a6;
  background: #14b8a6;
  color: #fff;
}

.ssd-map-chip-pct {
  font-size: 12px;
  opacity: 0.8;
}

/* Hex groups */
.ssd-hex-groups {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.ssd-hex-group {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  overflow: hidden;
}

.ssd-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  cursor: default;
}

.ssd-group-header[role="button"] {
  cursor: pointer;
}

.ssd-group-header[role="button"]:hover {
  background: #f1f5f9;
}

.ssd-group-title {
  font-size: 13px;
  font-weight: 600;
  color: #334155;
}

.ssd-group-badge {
  font-size: 12px;
  color: #64748b;
  background: #e2e8f0;
  padding: 1px 8px;
  border-radius: 10px;
}

.ssd-group-chevron {
  margin-left: auto;
  font-size: 12px;
  color: #94a3b8;
  transition: transform 0.2s;
}

.ssd-group-chevron.collapsed {
  transform: rotate(-90deg);
}

.ssd-group-body {
  padding: 4px 0;
}

.ssd-group-body.collapsed {
  display: none;
}

/* Hex items */
.ssd-hex-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.15s;
}

.ssd-hex-item:hover {
  background: #f8fafc;
}

.ssd-hex-icon {
  font-size: 18px;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
}

.ssd-hex-info {
  flex: 1;
  min-width: 0;
}

.ssd-hex-label {
  font-size: 13px;
  font-weight: 500;
  color: #1e293b;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ssd-hex-type {
  font-size: 12px;
  color: #94a3b8;
}

.ssd-hex-status {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ssd-hex-status-label { font-size: 12px; color: #64748b; margin-left: 2px; flex-shrink: 0; text-transform: capitalize; }

.ssd-hex-status.in_progress { background: #3b82f6; }
.ssd-hex-status.not_started { background: #cbd5e1; }
.ssd-hex-status.completed { background: #22c55e; }
.ssd-hex-status.mastered { background: #059669; }

.ssd-hex-score {
  font-size: 12px;
  color: #64748b;
  flex-shrink: 0;
}

/* Group left-border accents */
.ssd-hex-group.ssd-group-up-next {
  border-left: 3px solid #3b82f6;
}

.ssd-hex-group.ssd-group-ready {
  border-left: 3px solid #cbd5e1;
}

.ssd-hex-group.ssd-group-completed {
  border-left: 3px solid #22c55e;
}

/* No hexes in selection */
.ssd-no-hexes {
  padding: 24px 14px;
  text-align: center;
  color: #94a3b8;
  font-size: 13px;
}

/* Strategy picker */
.ssd-strategy-section {
  margin-bottom: 16px;
}

.ssd-strategy-title {
  font-size: 14px;
  font-weight: 600;
  color: #334155;
  margin-bottom: 12px;
}

.ssd-strategy-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ssd-strategy-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.ssd-strategy-card:hover {
  border-color: #14b8a6;
  background: #f0fdfa;
}

.ssd-strategy-icon {
  font-size: 20px;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
  line-height: 1.2;
}

.ssd-strategy-info {
  flex: 1;
  min-width: 0;
}

.ssd-strategy-name {
  font-size: 13px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 2px;
}

.ssd-strategy-desc {
  font-size: 12px;
  color: #64748b;
  line-height: 1.4;
}

.ssd-strategy-action {
  font-size: 12px;
  color: #14b8a6;
  font-weight: 500;
}

.ssd-strategy-card.ssd-strategy-disabled {
  opacity: 0.6;
  cursor: default;
}

.ssd-strategy-card.ssd-strategy-disabled:hover {
  border-color: #e2e8f0;
  background: #fff;
}

/* Focus-visible for keyboard accessibility */
.ssd-map-chip:focus-visible,
.ssd-hex-item:focus-visible,
.ssd-strategy-card:focus-visible,
.ssd-group-header[role="button"]:focus-visible {
  outline: 3px solid #14b8a6;
  outline-offset: 2px;
}

/* Pending status dot */
.ssd-hex-status.pending { background: #f59e0b; }

/* Pending group left-border accent */
.ssd-hex-group.ssd-group-pending {
  border-left: 3px solid #f59e0b;
}

/* ===== B1: Spaced Review Section ===== */
.ssd-review-section {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 20px;
}

.ssd-review-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-left: 3px solid #3b82f6;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.ssd-review-card:hover {
  background: #f8fafc;
  border-color: #bfdbfe;
  border-left-color: #3b82f6;
}

.ssd-review-card.ssd-review-overdue {
  border-left-color: #dc2626;
}

.ssd-review-card.ssd-review-today {
  border-left-color: #f59e0b;
}

.ssd-review-icon {
  font-size: 18px;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
}

.ssd-review-info {
  flex: 1;
  min-width: 0;
}

.ssd-review-label {
  font-size: 13px;
  font-weight: 500;
  color: #1e293b;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ssd-review-meta {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 2px;
}

.ssd-review-score {
  font-size: 12px;
  color: #64748b;
  flex-shrink: 0;
  font-weight: 500;
}

.ssd-review-arrow {
  font-size: 14px;
  color: #94a3b8;
  flex-shrink: 0;
}

.ssd-review-toggle {
  display: inline-block;
  padding: 4px 0;
  font-size: 12px;
  color: #14b8a6;
  cursor: pointer;
  font-weight: 500;
  margin-top: 4px;
}

.ssd-review-toggle:hover {
  color: #0d9488;
}

.ssd-review-empty {
  padding: 16px;
  text-align: center;
  color: #059669;
  font-size: 13px;
  background: #ecfdf5;
  border: 1px solid #a7f3d0;
  border-radius: 8px;
}

/* ===== B2: Recommendations Section ===== */
.ssd-recs-section {
  margin-bottom: 16px;
}

.ssd-rec-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-left: 3px solid #e2e8f0;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.ssd-rec-card:hover {
  background: #f8fafc;
}

.ssd-rec-card.ssd-rec-review {
  border-left-color: #d97706;
}

.ssd-rec-card.ssd-rec-continue {
  border-left-color: #3b82f6;
}

.ssd-rec-card.ssd-rec-start {
  border-left-color: #22c55e;
}

.ssd-rec-emoji {
  font-size: 18px;
  flex-shrink: 0;
  width: 24px;
  text-align: center;
  line-height: 1.3;
}

.ssd-rec-info {
  flex: 1;
  min-width: 0;
}

.ssd-rec-prefix {
  font-size: 12px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.ssd-rec-label {
  font-size: 13px;
  font-weight: 500;
  color: #1e293b;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ssd-rec-detail {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 2px;
}

/* ===== B3: Weekly Goal Card + Progress Ring ===== */
.ssd-goal-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.ssd-goal-ring {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.ssd-goal-ring-inner {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ssd-goal-ring-text {
  font-size: 14px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1;
}

.ssd-goal-action {
  font-size: 12px;
  color: #14b8a6;
  cursor: pointer;
  font-weight: 500;
  padding: 0;
  background: none;
  border: none;
}

.ssd-goal-action:hover {
  color: #0d9488;
  text-decoration: underline;
}

/* Focus-visible for new interactive elements (B1/B2/B3) */
.ssd-review-card:focus-visible,
.ssd-rec-card:focus-visible,
.ssd-review-toggle:focus-visible,
.ssd-goal-action:focus-visible {
  outline: 3px solid #14b8a6;
  outline-offset: 2px;
}

/* C6: Strategy recommendation badges */
.ssd-strategy-recommended {
  border-left: 3px solid #0d9488;
}
.ssd-strategy-rec-badge {
  font-size: 12px;
  color: #0d9488;
  font-weight: 600;
  margin-top: 4px;
}

/* ===== Unified Goal Dashboard (Story 2.3) ===== */
.ssd-goals-section {
  margin-bottom: 16px;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 14px;
}
.ssd-goals-title {
  font-size: 15px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 12px;
}
.ssd-goal-group {
  margin-bottom: 10px;
}
.ssd-goal-group-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #64748b;
  margin-bottom: 6px;
}
.ssd-goal-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid #f1f5f9;
}
.ssd-goal-item:last-child {
  border-bottom: none;
}
.ssd-goal-done {
  opacity: 0.5;
}
.ssd-goal-done .ssd-goal-text {
  text-decoration: line-through;
}
.ssd-goal-badge {
  font-size: 12px;
  color: #fff;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.ssd-goal-text {
  flex: 1;
  font-size: 13px;
  color: #334155;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ssd-goal-progress {
  font-size: 12px;
  color: #94a3b8;
  white-space: nowrap;
  flex-shrink: 0;
}
.ssd-goal-add {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.ssd-goal-input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
}
.ssd-goal-input:focus {
  border-color: #0d9488;
  box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.15);
}
.ssd-goal-add-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #0d9488;
  color: #fff;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s ease;
}
.ssd-goal-add-btn:hover {
  background: #0f766e;
}
.ssd-goal-add-btn:focus-visible {
  outline: 3px solid #0d9488;
  outline-offset: 2px;
}
</style>
