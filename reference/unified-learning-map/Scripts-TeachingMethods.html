function loadTeachingMethodsTab() {

  strategies:     { id: 'tmgSectionStrategies',     render: function() { return tmgRenderStrategiesTab(); } }
};

function switchTmgSection(sectionName) {
  var keys = ['gettingStarted', 'concepts', 'demo', 'setup', 'templates', 'strategies'];
  var i, key, el;

  // Hide all sections
  for (i = 0; i < keys.length; i++) {
    key = keys[i];
    el = document.getElementById(TMG_SECTION_MAP[key].id);
    if (el) el.style.display = 'none';
  }

  // Update active button
  var btns = document.querySelectorAll('#tmgSubNav .tmg-subnav-btn');
  for (i = 0; i < btns.length; i++) {
    btns[i].className = 'tmg-subnav-btn' + (keys[i] === sectionName ? ' active' : '');
  }

  // Show selected section + lazy render
  var section = TMG_SECTION_MAP[sectionName];
  if (!section) return;
  el = document.getElementById(section.id);
  if (!el) return;
  el.style.display = '';

  if (!tmgRenderedSections[sectionName]) {
    tmgRenderedSections[sectionName] = true;
    el.innerHTML = '<div class="tmg-container">' + section.render() + '</div>';
  }

  // Reset scroll position
  var sc = el.closest('.scroll-container');
  if (sc) sc.scrollTop = 0;
}

function tmgBuildDemoHex(label, phase, desc, isCheckpoint) {
  var color = TMG_PHASE_COLORS[phase] || '#64748b';
  var html = '';
  html += '<div class="tmg-demo-hex">';
  html += '<div class="tmg-demo-hex-shape">';
  html += '<svg viewBox="0 0 80 70">';
  html += '<polygon points="40,2 76,19 76,53 40,70 4,53 4,19" fill="' + color + '" fill-opacity="0.12" stroke="' + color + '" stroke-width="2.5"/>';
  html += '<text x="40" y="38" text-anchor="middle" font-size="9" fill="' + color + '" font-weight="600">';
  var lines = desc.split('\n');
  for (var i = 0; i < lines.length; i++) {
    html += '<tspan x="40" dy="' + (i === 0 ? '0' : '12') + '">' + lines[i] + '</tspan>';
  }
  html += '</text>';
  html += '</svg>';
  if (isCheckpoint) {
    html += '<div class="tmg-demo-checkpoint">&#9878;</div>';
  }
  html += '</div>';
  html += '<div class="tmg-demo-hex-label">' + label + '</div>';
  html += '<span class="tmg-demo-hex-phase tmg-phase-' + phase + '">' + label + '</span>';
  html += '</div>';
  return html;
}

// ================================================
// USE TEMPLATE — creates a new map from template data
// ================================================

function tmgUseTemplate(templateKey) {
  var tpl = TMG_TEMPLATES[templateKey];
  if (!tpl) {
    showToast('Template not found', 'error');
    return;
  }

  var rowId = 'tmgInlineTitleRow-' + templateKey;
  if (document.getElementById(rowId)) return;

  // Find the template card to insert inline input
  var btn = document.querySelector('[onclick*="tmgUseTemplate(\'' + templateKey + '\'"]');
  var container = btn ? btn.parentNode : document.getElementById('tmgTemplatesContainer');
  if (!container) return;

  var defaultTitle = tpl.name + ' Map';
  var row = document.createElement('div');
  row.id = rowId;
  row.style.cssText = 'display:flex;gap:6px;margin-top:6px;align-items:center;';
  row.innerHTML = '<input id="tmgTitleInput-' + escapeHtml(templateKey) + '" type="text" '
    + 'value="' + escapeHtml(defaultTitle) + '" maxlength="100" '
    + 'style="flex:1;padding:6px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;" '
    + 'onkeydown="if(event.key===\'Enter\'){tmgConfirmUseTemplate(\'' + escapeHtml(templateKey) + '\');}if(event.key===\'Escape\'){tmgCancelUseTemplate(\'' + escapeHtml(templateKey) + '\');}">'
    + '<button onclick="tmgConfirmUseTemplate(\'' + escapeHtml(templateKey) + '\')" style="padding:6px 12px;background:#0d9488;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;">Create</button>'
    + '<button onclick="tmgCancelUseTemplate(\'' + escapeHtml(templateKey) + '\')" style="padding:6px 12px;background:#e2e8f0;border:none;border-radius:6px;cursor:pointer;font-size:12px;">Cancel</button>';
  container.appendChild(row);
  var input = document.getElementById('tmgTitleInput-' + templateKey);
  if (input) { input.focus(); input.select(); }
}

function tmgCancelUseTemplate(templateKey) {
  var row = document.getElementById('tmgInlineTitleRow-' + templateKey);
  if (row) row.parentNode.removeChild(row);
}

function tmgConfirmUseTemplate(templateKey) {
  var tpl = TMG_TEMPLATES[templateKey];
  if (!tpl) return;
  var input = document.getElementById('tmgTitleInput-' + templateKey);
  var title = (input ? input.value : '').trim();
  if (!title) { showToast('Title cannot be empty', 'error'); return; }
  var row = document.getElementById('tmgInlineTitleRow-' + templateKey);
  if (row) row.parentNode.removeChild(row);

  // Build template data for backend
  var templateData = {
    title: title,
    hexes: [],
    edges: []
  };

  for (var h = 0; h < tpl.hexes.length; h++) {
    var hexDef = tpl.hexes[h];
    templateData.hexes.push({
      label: hexDef.label,
      type: hexDef.type || 'core',
      row: hexDef.row,
      col: hexDef.col,
      designPhase: hexDef.designPhase || '',
      isCheckpoint: hexDef.isCheckpoint || false
    });
  }

  for (var e = 0; e < tpl.edges.length; e++) {
    templateData.edges.push({
      fromIndex: tpl.edges[e].from,
      toIndex: tpl.edges[e].to
    });
  }

  showToast('Creating map from template...');

  google.script.run
    .withSuccessHandler(function(newMap) {
      showToast('Map "' + title + '" created successfully!');
      // Reload maps to show the new one
      if (typeof mapsData !== 'undefined' && newMap) {
        mapsData.push(newMap);
        showMaps();
      }
    })
    .withFailureHandler(function(err) {
      showToast('Error creating map: ' + escapeHtml(err.message), 'error');
    })
    .createMapFromTemplate(templateData);
}

  { name: 'Compare and Contrast', key: 'compareContrast', style: 'understanding', estimatedMinutes: 25, phases: ['Identify items to compare', 'Select criteria for comparison', 'Analyze similarities and differences', 'Draw conclusions and generalize'], whenToUse: 'Deepening understanding through structured comparison', description: 'Students use criteria-based comparison to find meaningful similarities, differences, and patterns. Develops analytical thinking and evidence-based conclusions.' },

  { name: 'Mystery', key: 'mystery', style: 'understanding', estimatedMinutes: 30, phases: ['Present the mystery question', 'Distribute clue cards', 'Students organize clues into categories', 'Construct and defend explanations'], whenToUse: 'Engaging investigation that requires evidence organization', description: 'Students receive clue cards and must organize evidence to solve a compelling question. Develops skills in categorizing information and building explanations.' },

  { name: 'Inductive Learning', key: 'inductiveLearning', style: 'selfExpressive', estimatedMinutes: 25, phases: ['Present collection of items or data', 'Students group items by their own criteria', 'Label each group and explain logic', 'Predict patterns or generate rules'], whenToUse: 'Discovering patterns and building conceptual categories', description: 'Students organize information into self-created groups, then label and explain their classifications. Develops pattern recognition and creative categorization.' },
  { name: 'Metaphorical Expression', key: 'metaphoricalExpression', style: 'selfExpressive', estimatedMinutes: 20, phases: ['Introduce the topic or concept', 'Present a metaphor prompt', 'Students create extended metaphors', 'Share and explain connections'], whenToUse: 'Making abstract concepts concrete through creative comparison', description: 'Students create metaphors to represent content, revealing their understanding through creative analogy. Develops abstract thinking and communication skills.' },
  { name: 'Pattern Maker', key: 'patternMaker', style: 'selfExpressive', estimatedMinutes: 25, phases: ['Collect data or examples', 'Identify repeating patterns', 'Create visual representation of pattern', 'Predict what comes next'], whenToUse: 'Finding and extending patterns across content', description: 'Students search for patterns in data, examples, or content, then represent those patterns visually and use them to make predictions.' },

];

// ================================================
// STRATEGIES TAB — Orchestrator
// ================================================

function tmgRenderStrategiesTab() {
  var html = '';
  html += '<div class="tmg-section">';
  html += '<div class="tmg-section-title">Research-Based Instructional Strategies</div>';
  html += '<p style="color:#64748b; font-size:13px; margin-bottom:20px;">Based on <em>The Strategic Teacher</em> (Silver, Strong &amp; Perini, 2007) — 20 strategies across 5 learning styles to match the right strategy to every lesson.</p>';
  html += '</div>';
  html += tmgRenderStyleOverview();
  html += tmgRenderStrategyBrowser();
  html += tmgRenderStrategyPicker();
  return html;
}

// ================================================
// STYLE OVERVIEW — 5 Expandable Accordion Cards
// ================================================

function tmgRenderStyleOverview() {
  var html = '';
  html += '<div class="tmg-section">';
  html += '<div class="tmg-section-title">The 5 Learning Styles</div>';
  html += '<div class="tmg-concept-cards">';

  for (var s = 0; s < TMG_STYLE_META.length; s++) {
    var style = TMG_STYLE_META[s];
    var cardId = 'tmgStyleCard_' + style.key;
    html += '<div class="tmg-concept-card tmg-strat-style-card" id="' + cardId + '" style="border-left: 4px solid ' + style.color + ';">';
    html += '<div class="tmg-concept-header" onclick="tmgToggleStyleCard(\'' + style.key + '\')">';
    html += '<div class="tmg-concept-icon" style="background:' + style.color + '15; color:' + style.color + '; font-size:20px;">' + style.icon + '</div>';
    html += '<div class="tmg-concept-title">' + style.label;
    html += '<span class="tmg-concept-subtitle">' + style.motivator + '</span>';
    html += '</div>';
    html += '<span class="tmg-concept-chevron">&#9660;</span>';
    html += '</div>';

    html += '<div class="tmg-concept-body">';
    html += '<p><strong>Focus:</strong> ' + style.focus + '</p>';
    html += '<div class="tmg-highlight" style="border-left-color:' + style.color + '; background:' + style.color + '08;">';
    html += '<strong>When to use:</strong> ' + style.whenToUse;
    html += '</div>';

    // Strategy chips inside the style card
    html += '<h4>Strategies in this style:</h4>';
    html += '<div class="tmg-strat-chip-row">';
    for (var j = 0; j < TMG_STRAT_DATA.length; j++) {
      if (TMG_STRAT_DATA[j].style === style.key) {
        html += '<span class="tmg-strat-badge" style="background:' + style.color + '12; color:' + style.color + '; border: 1px solid ' + style.color + '30;">';
        html += TMG_STRAT_DATA[j].name + ' <span style="opacity:0.7;">(' + TMG_STRAT_DATA[j].estimatedMinutes + ' min)</span>';
        html += '</span>';
      }
    }
    html += '</div>';

    html += '</div>'; // .tmg-concept-body
    html += '</div>'; // .tmg-concept-card
  }

  html += '</div>'; // .tmg-concept-cards
  html += '</div>'; // .tmg-section
  return html;
}

function tmgToggleStyleCard(styleKey) {
  var card = document.getElementById('tmgStyleCard_' + styleKey);
  if (!card) return;
  card.classList.toggle('tmg-expanded');
}

// ================================================
// STRATEGY BROWSER — Cards Grouped by Style
// ================================================

function tmgRenderStrategyBrowser() {
  var html = '';
  html += '<div class="tmg-section">';
  html += '<div class="tmg-section-title">All 20 Strategies</div>';

  for (var s = 0; s < TMG_STYLE_META.length; s++) {
    var style = TMG_STYLE_META[s];
    html += '<div class="tmg-strat-group">';
    html += '<div class="tmg-strat-group-header" style="color:' + style.color + ';">' + style.icon + ' ' + style.label + '</div>';
    html += '<div class="tmg-strat-cards">';

    for (var j = 0; j < TMG_STRAT_DATA.length; j++) {
      var strat = TMG_STRAT_DATA[j];
      if (strat.style !== style.key) continue;
      var cardId = 'tmgStratCard_' + strat.key;

      html += '<div class="tmg-strat-card" id="' + cardId + '" style="border-left: 3px solid ' + style.color + ';">';
      html += '<div class="tmg-strat-card-header" onclick="tmgToggleStratCard(\'' + strat.key + '\')">';
      html += '<div class="tmg-strat-name">' + strat.name + '</div>';
      html += '<div class="tmg-strat-meta">';
      html += '<span class="tmg-strat-badge" style="background:' + style.color + '12; color:' + style.color + ';">' + style.label + '</span>';
      html += '<span class="tmg-strat-time">&#9201; ' + strat.estimatedMinutes + ' min</span>';
      html += '</div>';
      html += '</div>';

      html += '<div class="tmg-strat-detail">';
      html += '<p class="tmg-strat-desc">' + strat.description + '</p>';

      html += '<div class="tmg-strat-tip">';
      html += '<strong>When to use:</strong> ' + strat.whenToUse;
      html += '</div>';

      html += '<div class="tmg-strat-phases">';
      html += '<strong>Phases:</strong>';
      html += '<ol class="tmg-strat-phase-list">';
      for (var p = 0; p < strat.phases.length; p++) {
        html += '<li>' + strat.phases[p] + '</li>';
      }
      html += '</ol>';
      html += '</div>';

      html += '</div>'; // .tmg-strat-detail
      html += '</div>'; // .tmg-strat-card
    }

    html += '</div>'; // .tmg-strat-cards
    html += '</div>'; // .tmg-strat-group
  }

  html += '</div>'; // .tmg-section
  return html;
}

function tmgToggleStratCard(stratKey) {
  var card = document.getElementById('tmgStratCard_' + stratKey);
  if (!card) return;
  card.classList.toggle('tmg-strat-expanded');
}

// ================================================
// STRATEGY PICKER — 4 Questions + Recommendations
// ================================================

function tmgRenderStrategyPicker() {
  var html = '';
  html += '<div class="tmg-section">';
  html += '<div class="tmg-section-title">&#128161; Which Strategy Should I Use?</div>';
  html += '<p style="color:#64748b; font-size:13px; margin-bottom:16px;">Answer these four questions about your lesson goals, then get personalized strategy recommendations.</p>';

  html += '<div class="tmg-picker-questions" id="tmgPickerQuestions">';

  var questions = [
    { label: 'Students need to remember, practice, or demonstrate a skill', style: 'mastery' },
    { label: 'Students need to analyze, compare, or build evidence-based arguments', style: 'understanding' },
    { label: 'Students need to create, imagine, or make unexpected connections', style: 'selfExpressive' },
    { label: 'Students need to collaborate, share perspectives, or connect personally', style: 'interpersonal' }
  ];

  for (var q = 0; q < questions.length; q++) {
    var styleMeta = null;
    for (var m = 0; m < TMG_STYLE_META.length; m++) {
      if (TMG_STYLE_META[m].key === questions[q].style) { styleMeta = TMG_STYLE_META[m]; break; }
    }
    var color = styleMeta ? styleMeta.color : '#64748b';
    var isActive = tmgPickerAnswers[q];
    html += '<div class="tmg-picker-q' + (isActive ? ' tmg-picker-q-active' : '') + '" style="border-color:' + (isActive ? color : '#e2e8f0') + ';" onclick="tmgTogglePickerQ(' + q + ')">';
    html += '<div class="tmg-picker-q-check" style="' + (isActive ? 'background:' + color + '; border-color:' + color + ';' : '') + '">' + (isActive ? '&#10003;' : '') + '</div>';
    html += '<div class="tmg-picker-q-label">' + questions[q].label + '</div>';
    html += '</div>';
  }

  html += '</div>'; // .tmg-picker-questions

  html += '<div style="text-align:center; margin-top:16px;">';
  html += '<button class="tmg-template-btn" onclick="tmgComputeRecommendations()" style="font-size:14px; padding:10px 24px;">Show Recommendations</button>';
  html += '</div>';

  html += '<div id="tmgPickerResults" class="tmg-picker-results"></div>';

  html += '</div>'; // .tmg-section
  return html;
}

function tmgTogglePickerQ(idx) {
  tmgPickerAnswers[idx] = !tmgPickerAnswers[idx];
  // Re-render the picker section
  var container = document.getElementById('tmgSectionStrategies');
  if (container) {
    container.innerHTML = '<div class="tmg-container">' + tmgRenderStrategiesTab() + '</div>';
  }
}

function tmgComputeRecommendations() {
  var styleKeys = ['mastery', 'understanding', 'selfExpressive', 'interpersonal'];
  var matchedStyles = [];
  var q;

  for (q = 0; q < 4; q++) {
    if (tmgPickerAnswers[q]) {
      matchedStyles.push(styleKeys[q]);
    }
  }

  // If nothing selected or all selected, recommend fourStyle
  if (matchedStyles.length === 0 || matchedStyles.length === 4) {
    matchedStyles = ['fourStyle'];
  } else if (matchedStyles.length >= 3) {
    // 3+ styles = also suggest fourStyle
    matchedStyles.push('fourStyle');
  }

  var resultsEl = document.getElementById('tmgPickerResults');
  if (!resultsEl) return;

  var html = '';
  html += '<div class="tmg-section-title" style="margin-top:24px;">Recommended Strategies</div>';

  for (var ms = 0; ms < matchedStyles.length; ms++) {
    var styleKey = matchedStyles[ms];
    var styleMeta = null;
    for (var m = 0; m < TMG_STYLE_META.length; m++) {
      if (TMG_STYLE_META[m].key === styleKey) { styleMeta = TMG_STYLE_META[m]; break; }
    }
    if (!styleMeta) continue;

    html += '<div class="tmg-strat-group">';
    html += '<div class="tmg-strat-group-header" style="color:' + styleMeta.color + ';">' + styleMeta.icon + ' ' + styleMeta.label + ' Strategies</div>';
    html += '<div class="tmg-strat-cards">';

    for (var j = 0; j < TMG_STRAT_DATA.length; j++) {
      var strat = TMG_STRAT_DATA[j];
      if (strat.style !== styleKey) continue;

      html += '<div class="tmg-strat-card tmg-strat-expanded" style="border-left: 3px solid ' + styleMeta.color + ';">';
      html += '<div class="tmg-strat-card-header">';
      html += '<div class="tmg-strat-name">' + strat.name + '</div>';
      html += '<div class="tmg-strat-meta">';
      html += '<span class="tmg-strat-badge" style="background:' + styleMeta.color + '12; color:' + styleMeta.color + ';">' + styleMeta.label + '</span>';
      html += '<span class="tmg-strat-time">&#9201; ' + strat.estimatedMinutes + ' min</span>';
      html += '</div>';
      html += '</div>';
      html += '<div class="tmg-strat-detail">';
      html += '<p class="tmg-strat-desc">' + strat.description + '</p>';
      html += '<div class="tmg-strat-tip"><strong>When to use:</strong> ' + strat.whenToUse + '</div>';
      html += '</div>';
      html += '</div>';
    }

    html += '</div></div>';
  }

  if (matchedStyles.length === 0) {
    html += '<p style="color:#64748b; text-align:center; padding:20px;">Select at least one learning goal above to get recommendations.</p>';
  }

  resultsEl.innerHTML = html;
}
</script>
